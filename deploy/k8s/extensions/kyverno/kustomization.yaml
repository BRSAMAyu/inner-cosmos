# CN-POLICY-AS-CODE — Kyverno ClusterPolicy bundle for Inner Cosmos runtime.
#
# Apply:
#   kubectl apply -k deploy/k8s/extensions/kyverno
# Remove (kill switch):
#   kubectl delete -k deploy/k8s/extensions/kyverno
# Full uninstall (also removes the admission webhooks):
#   helm uninstall kyverno -n kyverno
#
# These are admission-time Enforce policies (background:false) scoped to
# namespaces matching inner-cosmos-* so system/infra namespaces are unaffected.
# They require the Kyverno admission controller (see values-kind.yaml).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - disallow-root-user.yaml
  - require-resource-limits.yaml
  - disallow-latest-tag.yaml
