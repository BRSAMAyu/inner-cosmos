apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: inner-cosmos-api
  namespace: inner-cosmos-dev
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inner-cosmos-api
  # Same contract as deploy/k8s/base/app-hpa.yml (2..4, CPU 70%).
  minReplicas: 2
  maxReplicas: 4
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
    scaleDown:
      stabilizationWindowSeconds: 60
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
