# Mirrors deploy/k8s/base/app-network-policy.yml + overlays/academy-eks/{data,runtime}-network-policy.yml,
# collapsed into one file for the kind-full overlay. Every workload component in this
# namespace (api, worker, scheduler, migration, postgres, redis) is selected by exactly
# one of the three policies below, so — per Kubernetes NetworkPolicy semantics, where a
# pod matched by zero policies has NO restriction at all — this namespace has no
# unrestricted pod; deny is the default for anything not explicitly opened here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inner-cosmos-api
spec:
  podSelector:
    matchLabels: {app.kubernetes.io/component: api}
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - {protocol: TCP, port: 8080}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 6379}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - {protocol: TCP, port: 443}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inner-cosmos-runtime-roles
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [worker, scheduler, migration]
  policyTypes: [Ingress, Egress]
  ingress:
    - ports:
        - {protocol: TCP, port: 8081}
        - {protocol: TCP, port: 8082}
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 6379}
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except: [169.254.169.254/32]
      ports:
        - {protocol: TCP, port: 443}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inner-cosmos-data
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [postgres, redis]
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels: {app.kubernetes.io/name: inner-cosmos}
      ports:
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 6379}
