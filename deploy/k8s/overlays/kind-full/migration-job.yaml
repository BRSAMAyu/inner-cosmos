apiVersion: batch/v1
kind: Job
metadata:
  name: inner-cosmos-migration
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inner-cosmos
        app.kubernetes.io/component: migration
        inner-cosmos/runtime-role: migration
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: {type: RuntimeDefault}
      initContainers:
        - name: wait-for-postgres
          image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
          command: ["sh", "-c", "until psql -h inner-cosmos-postgres -U inner_cosmos -d inner_cosmos -c 'SELECT 1' >/dev/null 2>&1; do sleep 2; done"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: inner-cosmos-runtime, key: SPRING_DATASOURCE_PASSWORD}
      containers:
        - name: migration
          image: inner-cosmos:w3-dev
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          envFrom:
            - configMapRef: {name: inner-cosmos-config}
            - secretRef: {name: inner-cosmos-runtime}
          env:
            - {name: INNER_COSMOS_RUNTIME_ROLE, value: migration}
            - {name: SPRING_MAIN_WEB_APPLICATION_TYPE, value: none}
            - {name: SPRING_MAIN_LAZY_INITIALIZATION, value: "true"}
            - {name: SPRING_FLYWAY_ENABLED, value: "true"}
            - {name: REDIS_SESSION_ENABLED, value: "false"}
            - {name: REDIS_RATE_LIMIT_ENABLED, value: "false"}
            - {name: REDIS_SCHEDULER_LOCK_ENABLED, value: "false"}
            - {name: REDIS_IDEMPOTENCY_ENABLED, value: "false"}
            - {name: REDIS_AURORA_STREAM_ENABLED, value: "false"}
            - {name: JDBC_OUTBOX_ENABLED, value: "false"}
          resources:
            requests: {cpu: 100m, memory: 384Mi}
            limits: {cpu: 500m, memory: 768Mi}
          volumeMounts:
            - {name: logs, mountPath: /var/log/inner-cosmos}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
