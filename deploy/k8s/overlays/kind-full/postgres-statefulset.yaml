apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: inner-cosmos-postgres
spec:
  serviceName: inner-cosmos-postgres
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: postgres}
  template:
    metadata:
      labels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: postgres}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        seccompProfile: {type: RuntimeDefault}
      initContainers:
        - name: prepare-data
          image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
          command: ["sh", "-c", "mkdir -p /var/lib/postgresql/data/pgdata && chown -R 999:999 /var/lib/postgresql/data /var/run/postgresql /tmp"]
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: run-postgresql, mountPath: /var/run/postgresql}
            - {name: tmp, mountPath: /tmp}
      containers:
        - name: postgres
          image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
          securityContext:
            runAsNonRoot: true
            runAsUser: 999
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
            readOnlyRootFilesystem: true
          env:
            - {name: POSTGRES_DB, value: inner_cosmos}
            - {name: POSTGRES_USER, value: inner_cosmos}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef: {name: inner-cosmos-runtime, key: SPRING_DATASOURCE_PASSWORD}
            - {name: PGDATA, value: /var/lib/postgresql/data/pgdata}
          ports:
            - {name: postgres, containerPort: 5432}
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
          startupProbe:
            exec: {command: ["sh", "-c", "pg_isready -U inner_cosmos -d inner_cosmos"]}
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            exec: {command: ["sh", "-c", "pg_isready -U inner_cosmos -d inner_cosmos"]}
            periodSeconds: 10
          livenessProbe:
            exec: {command: ["sh", "-c", "pg_isready -U inner_cosmos -d inner_cosmos"]}
            periodSeconds: 20
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
            - {name: run-postgresql, mountPath: /var/run/postgresql}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: run-postgresql
          emptyDir: {}
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: inner-cosmos-postgres
spec:
  clusterIP: None
  selector: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: postgres}
  ports:
    - {name: postgres, port: 5432, targetPort: postgres}
