apiVersion: apps/v1
kind: Deployment
metadata:
  name: inner-cosmos-scheduler
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: scheduler}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inner-cosmos
        app.kubernetes.io/component: scheduler
        inner-cosmos/runtime-role: scheduler
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8082"
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile: {type: RuntimeDefault}
      initContainers:
        - name: wait-for-schema-version
          image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
          command: ["sh", "-c", "until [ \"$(psql -h inner-cosmos-postgres -U inner_cosmos -d inner_cosmos -Atc \"SELECT CASE WHEN EXISTS (SELECT 1 FROM flyway_schema_history WHERE NOT success) THEN -1 ELSE COALESCE(MAX(version::integer),0) END FROM flyway_schema_history WHERE success\" 2>/dev/null)\" -eq \"$INNER_COSMOS_EXPECTED_SCHEMA_VERSION\" ]; do sleep 2; done"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          env:
            - name: INNER_COSMOS_EXPECTED_SCHEMA_VERSION
              valueFrom:
                configMapKeyRef: {name: inner-cosmos-config, key: INNER_COSMOS_EXPECTED_SCHEMA_VERSION}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: inner-cosmos-runtime, key: SPRING_DATASOURCE_PASSWORD}
      containers:
        - name: scheduler
          image: inner-cosmos:w3-dev
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          envFrom:
            - configMapRef: {name: inner-cosmos-config}
            - secretRef: {name: inner-cosmos-runtime}
          env:
            - {name: INNER_COSMOS_RUNTIME_ROLE, value: scheduler}
            - {name: SERVER_PORT, value: "8082"}
          ports:
            - {name: health, containerPort: 8082}
          resources:
            requests: {cpu: 150m, memory: 384Mi}
            limits: {cpu: "1", memory: 768Mi}
          startupProbe:
            httpGet: {path: /actuator/health/readiness, port: health}
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet: {path: /actuator/health/readiness, port: health}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health/liveness, port: health}
            periodSeconds: 20
          lifecycle:
            preStop:
              exec: {command: ["sh", "-c", "sleep 15"]}
          volumeMounts:
            - {name: logs, mountPath: /var/log/inner-cosmos}
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
