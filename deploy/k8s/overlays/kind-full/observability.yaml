apiVersion: v1
kind: ConfigMap
metadata:
  name: inner-cosmos-otel-collector
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 192
        spike_limit_mib: 48
      attributes/privacy:
        actions:
          - {key: user.id, action: delete}
          - {key: enduser.id, action: delete}
          - {key: message.content, action: delete}
          - {key: gen_ai.prompt, action: delete}
          - {key: gen_ai.completion, action: delete}
          - {key: db.statement, action: delete}
          - {key: http.request.body, action: delete}
          - {key: url.query, action: delete}
      batch:
        timeout: 1s
        send_batch_size: 256
    exporters:
      otlp_http/jaeger:
        endpoint: http://inner-cosmos-jaeger:4318
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
    service:
      extensions: [health_check]
      telemetry:
        logs:
          level: info
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, attributes/privacy, batch]
          exporters: [otlp_http/jaeger]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inner-cosmos-otel-collector
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: otel-collector}
  template:
    metadata:
      labels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: otel-collector}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.156.0@sha256:125bdbeb7590cc1952c5b3430ecf14063568980c2c93d5b38676cc0446ed8108
          args: ["--config=/conf/collector.yaml"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          ports:
            - {name: otlp-grpc, containerPort: 4317}
            - {name: otlp-http, containerPort: 4318}
            - {name: health, containerPort: 13133}
          readinessProbe:
            httpGet: {path: /, port: health}
          livenessProbe:
            httpGet: {path: /, port: health}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 300m, memory: 256Mi}
          volumeMounts:
            - {name: config, mountPath: /conf, readOnly: true}
      volumes:
        - name: config
          configMap: {name: inner-cosmos-otel-collector}
---
apiVersion: v1
kind: Service
metadata:
  name: inner-cosmos-otel-collector
spec:
  selector: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: otel-collector}
  ports:
    - {name: otlp-grpc, port: 4317}
    - {name: otlp-http, port: 4318}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inner-cosmos-jaeger
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: trace-backend}
  template:
    metadata:
      labels: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: trace-backend}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: jaeger
          image: cr.jaegertracing.io/jaegertracing/jaeger:2.20.0@sha256:46a886260e04002d8f45e213fc39063fa11a50446048fdaa64786fc0840cb9f8
          args:
            - --set=receivers.otlp.protocols.grpc.endpoint=0.0.0.0:4317
            - --set=receivers.otlp.protocols.http.endpoint=0.0.0.0:4318
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          ports:
            - {name: otlp-grpc, containerPort: 4317}
            - {name: otlp-http, containerPort: 4318}
            - {name: ui, containerPort: 16686}
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
          volumeMounts:
            - {name: tmp, mountPath: /tmp}
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: inner-cosmos-jaeger
spec:
  selector: {app.kubernetes.io/name: inner-cosmos, app.kubernetes.io/component: trace-backend}
  ports:
    - {name: otlp-grpc, port: 4317}
    - {name: otlp-http, port: 4318}
    - {name: ui, port: 16686}
