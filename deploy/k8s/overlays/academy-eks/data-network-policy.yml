apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: inner-cosmos-data
spec:
  podSelector:
    matchExpressions:
      - key: app.kubernetes.io/component
        operator: In
        values: [postgres, redis]
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: inner-cosmos
      ports:
        - {protocol: TCP, port: 5432}
        - {protocol: TCP, port: 6379}
