apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: inner-cosmos
spec:
  gatewayClassName: academy-runtime-discovery-required
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: inner-cosmos-edge-tls
      allowedRoutes:
        namespaces: {from: Same}
