apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inner-cosmos
  namespace: inner-cosmos-dev
spec:
  parentRefs:
    - name: inner-cosmos-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: inner-cosmos-api
          port: 8080
