apiVersion: apps/v1
kind: Deployment
metadata:
  name: inner-cosmos-api
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: inner-cosmos
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: inner-cosmos
        app.kubernetes.io/component: api
        inner-cosmos/runtime-role: api
      annotations:
        # Scraped by the observability stack (deploy/k8s/observability) — every runtime
        # role carries this same annotation triple so Prometheus discovers api/worker/
        # scheduler pods identically; the "component" label on the scrape target is what
        # lets a role-specific dashboard/alert query distinguish them (see prometheus-config.yaml).
        prometheus.io/scrape: "true"
        prometheus.io/path: /actuator/prometheus
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: inner-cosmos
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: inner-cosmos
              app.kubernetes.io/component: api
      initContainers:
        - name: wait-for-schema-version
          image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
          command: ["sh", "-c", "until [ \"$(psql -h inner-cosmos-postgres -U inner_cosmos -d inner_cosmos -Atc \"SELECT CASE WHEN EXISTS (SELECT 1 FROM flyway_schema_history WHERE NOT success) THEN -1 ELSE COALESCE(MAX(version::integer),0) END FROM flyway_schema_history WHERE success\" 2>/dev/null)\" -eq \"$INNER_COSMOS_EXPECTED_SCHEMA_VERSION\" ]; do sleep 2; done"]
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: INNER_COSMOS_EXPECTED_SCHEMA_VERSION
              valueFrom:
                configMapKeyRef: {name: inner-cosmos-config, key: INNER_COSMOS_EXPECTED_SCHEMA_VERSION}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef: {name: inner-cosmos-runtime, key: SPRING_DATASOURCE_PASSWORD}
            - {name: PGSSLMODE, value: verify-full}
            - {name: PGSSLROOTCERT, value: /run/secrets/postgres/ca.crt}
          volumeMounts:
            - {name: postgres-ca, mountPath: /run/secrets/postgres, readOnly: true}
      containers:
        - name: app
          image: inner-cosmos:academy-placeholder
          imagePullPolicy: IfNotPresent
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: inner-cosmos-config
            - secretRef:
                name: inner-cosmos-runtime
          env:
            - {name: INNER_COSMOS_RUNTIME_ROLE, value: api}
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          # Startup/readiness intentionally check the "readiness" health group (app +
          # PostgreSQL + Redis + custom indicators): a pod must not receive traffic until
          # its dependencies are actually reachable. Liveness checks ONLY the "liveness"
          # group (process-internal only) so a transient PostgreSQL/Redis/Provider outage
          # pulls the pod out of Service/HPA rotation without ever restarting the JVM —
          # a liveness probe that also depended on those externals would restart every
          # replica in lockstep the moment a shared dependency blips (a restart storm that
          # cannot fix an external outage and only adds cold-start load on top of it).
          startupProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sh", "-c", "sleep 15"]
          volumeMounts:
            - name: postgres-ca
              mountPath: /run/secrets/postgres
              readOnly: true
            - name: redis-ca
              mountPath: /run/secrets/redis
              readOnly: true
            - name: logs
              mountPath: /var/log/inner-cosmos
            # readOnlyRootFilesystem is on, so the embedded Tomcat work dir and
            # multipart upload staging under java.io.tmpdir need a writable volume.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: postgres-ca
          secret:
            secretName: inner-cosmos-postgres-client-ca
            defaultMode: 0444
        - name: redis-ca
          secret:
            secretName: inner-cosmos-redis-client-ca
            defaultMode: 0444
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}
