apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - app-config.yml
  - app-deployment.yml
  - app-service.yml
  - app-pdb.yml
  - app-hpa.yml
  - app-network-policy.yml
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/name: inner-cosmos
      app.kubernetes.io/part-of: inner-cosmos
      app.kubernetes.io/managed-by: kustomize
