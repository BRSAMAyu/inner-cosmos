apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
  labels: {app.kubernetes.io/name: grafana}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: grafana}
  template:
    metadata:
      labels: {app.kubernetes.io/name: grafana}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: grafana
          image: grafana/grafana:11.3.0
          env:
            # Local kind-only credentials; NOT a production secret. Override via a real Secret off-cluster.
            - {name: GF_SECURITY_ADMIN_USER, value: admin}
            - {name: GF_SECURITY_ADMIN_PASSWORD, value: admin}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            - {name: GF_AUTH_ANONYMOUS_ENABLED, value: "true"}
            - {name: GF_AUTH_ANONYMOUS_ORG_ROLE, value: Viewer}
          ports:
            - {name: http, containerPort: 3000}
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            periodSeconds: 10
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 256Mi}
          volumeMounts:
            - {name: provisioning-ds, mountPath: /etc/grafana/provisioning/datasources}
            - {name: provisioning-dash, mountPath: /etc/grafana/provisioning/dashboards}
            - {name: dashboards, mountPath: /var/lib/grafana/dashboards}
      volumes:
        - name: provisioning-ds
          configMap:
            name: grafana-provisioning
            items: [{key: datasource.yaml, path: datasource.yaml}]
        - name: provisioning-dash
          configMap:
            name: grafana-provisioning
            items: [{key: dashboards.yaml, path: dashboards.yaml}]
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items: [{key: inner-cosmos-app.json, path: inner-cosmos-app.json}]
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
  labels: {app.kubernetes.io/name: grafana}
spec:
  selector: {app.kubernetes.io/name: grafana}
  ports:
    - {name: http, port: 3000, targetPort: http}
