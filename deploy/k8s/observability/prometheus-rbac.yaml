apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: inner-cosmos-prometheus
rules:
  # This Prometheus uses only `role: pod` service discovery (see prometheus-config.yaml),
  # so it needs read access to pods and nothing else. nodes/proxy in particular would grant
  # kubelet-proxy access that enables privilege escalation (trivy KSV-0047); dropped here to
  # keep the ClusterRole least-privilege.
  - apiGroups: [""]
    resources: [pods]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: inner-cosmos-prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: inner-cosmos-prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: observability
