apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: observability
  labels: {app.kubernetes.io/name: prometheus}
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: prometheus}
  template:
    metadata:
      labels: {app.kubernetes.io/name: prometheus}
    spec:
      serviceAccountName: prometheus
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
        seccompProfile: {type: RuntimeDefault}
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.0
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --storage.tsdb.retention.time=6h
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities: {drop: [ALL]}
          ports:
            - {name: http, containerPort: 9090}
          readinessProbe:
            httpGet: {path: /-/ready, port: http}
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /-/healthy, port: http}
            periodSeconds: 20
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: 500m, memory: 512Mi}
          volumeMounts:
            - {name: config, mountPath: /etc/prometheus/prometheus.yml, subPath: prometheus.yml}
            - {name: config, mountPath: /etc/prometheus/rules/rules.yml, subPath: rules.yml}
            - {name: data, mountPath: /prometheus}
      volumes:
        - name: config
          configMap: {name: prometheus-config}
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: observability
  labels: {app.kubernetes.io/name: prometheus}
spec:
  selector: {app.kubernetes.io/name: prometheus}
  ports:
    - {name: http, port: 9090, targetPort: http}
