name: inner-cosmos-mobile-local

services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    environment:
      POSTGRES_DB: inner_cosmos
      POSTGRES_USER: inner_cosmos
      POSTGRES_PASSWORD: test-only-mobile-local-pg
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inner_cosmos -d inner_cosmos"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - mobile-local-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7.4.2-alpine@sha256:02419de7eddf55aa5bcf49efb74e88fa8d931b4d77c07eff8a6b2144472b6952
    command: ["redis-server", "--requirepass", "test-only-mobile-local-redis"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "test-only-mobile-local-redis", "--no-auth-warning", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30
    volumes:
      - mobile-local-redis:/data

  keycloak:
    image: quay.io/keycloak/keycloak:26.7.0
    command: ["start-dev", "--import-realm", "--hostname=http://10.0.2.2:8081", "--health-enabled=true"]
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: local-admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: test-only-mobile-local-admin
    ports:
      - "127.0.0.1:8081:8080"
    volumes:
      - ./keycloak/inner-cosmos-realm.json:/opt/keycloak/data/import/inner-cosmos-realm.json:ro

  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: inner-cosmos:mobile-local
    environment:
      SPRING_PROFILES_ACTIVE: mobile-local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inner_cosmos
      SPRING_DATASOURCE_USERNAME: inner_cosmos
      SPRING_DATASOURCE_PASSWORD: test-only-mobile-local-pg
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: test-only-mobile-local-redis
      LLM_MODE: dev
      LLM_PROVIDER: mock
      LLM_ALLOW_FALLBACK: "true"
      OIDC_ENABLED: "true"
      OIDC_ISSUER_URI: http://10.0.2.2:8081/realms/inner-cosmos
      OIDC_JWK_SET_URI: http://keycloak:8080/realms/inner-cosmos/protocol/openid-connect/certs
      OIDC_AUDIENCE: inner-cosmos-api
      OIDC_AUTHORIZATION_URI: http://10.0.2.2:8081/realms/inner-cosmos/protocol/openid-connect/auth
      OIDC_TOKEN_URI: http://10.0.2.2:8081/realms/inner-cosmos/protocol/openid-connect/token
      OIDC_MOBILE_CLIENT_ID: inner-cosmos-mobile-local
      OIDC_MOBILE_REDIRECT_URI: innercosmos://oauth/callback
      CORS_ALLOWED_ORIGINS: http://localhost,https://localhost
      SEED_ENABLED: "false"
      COOKIE_SECURE: "false"
      SERVER_TOMCAT_ACCESSLOG_ENABLED: "true"
      SERVER_TOMCAT_ACCESSLOG_PATTERN: "%m %U %s"
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
      keycloak: {condition: service_started}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 3s
      retries: 40
      start_period: 30s

volumes:
  mobile-local-postgres:
  mobile-local-redis:
