apiVersion: v1
kind: Pod
metadata:
  name: cn-policy-violating-root
  namespace: inner-cosmos-w3
  labels: {app.kubernetes.io/name: inner-cosmos}
spec:
  securityContext:
    runAsUser: 0
    runAsNonRoot: false
  restartPolicy: OnFailure
  containers:
    - name: app
      image: inner-cosmos:w3-otel
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 30"]
      securityContext: {runAsUser: 0}
      resources: {requests: {cpu: 50m, memory: 64Mi}, limits: {cpu: 200m, memory: 256Mi}}
