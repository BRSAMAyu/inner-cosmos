apiVersion: v1
kind: Pod
metadata:
  name: cn-policy-violating-no-resources
  namespace: inner-cosmos-w3
  labels: {app.kubernetes.io/name: inner-cosmos}
spec:
  securityContext: {runAsNonRoot: true, runAsUser: 1001}
  restartPolicy: OnFailure
  containers:
    - name: app
      image: inner-cosmos:w3-otel
      imagePullPolicy: IfNotPresent
      command: ["sh", "-c", "sleep 30"]
