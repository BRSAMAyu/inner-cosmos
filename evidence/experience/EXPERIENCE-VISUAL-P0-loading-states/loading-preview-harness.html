<main class="shell" style="display:block;padding:32px">
  <h1 style="font-size:20px;margin-bottom:24px">加载四态样张 · 夜色暖褐主题（checkpoint 6）</h1>
  <section class="account-settings" aria-label="账户与数据" style="max-width:520px">
    <span class="eyebrow">ACCOUNT &amp; DATA</span>
    <h2>账户与数据 — 异步按钮忙碌态</h2>
    <div class="account-actions-grid">
      <article>
        <strong>1-3s 档：文案 + 静态点</strong>
        <p class="muted">busy 后 1 秒进入，禁用并显示忙碌文案</p>
        <button type="button" disabled aria-busy="true"><span class="async-busy">正在导出<span class="loading-dots static" aria-hidden="true"><i></i><i></i><i></i></span></span></button>
      </article>
      <article>
        <strong>&gt;3s 档：文案 + 微动画三点</strong>
        <p class="muted">busy 超过 3 秒，三点渐隐动画（非 spinner）</p>
        <button type="button" disabled aria-busy="true"><span class="async-busy">正在删除<span class="loading-dots" aria-hidden="true"><i></i><i></i><i></i></span></span></button>
      </article>
      <article>
        <strong>&lt;1s 档：原标签（不闪）</strong>
        <p class="muted">busy 但未满 1 秒，仍显示原标签，只是禁用</p>
        <button type="button" disabled aria-busy="true">导出数据</button>
      </article>
    </div>
  </section>
  <section style="margin-top:28px">
    <h2>首屏连接页 · LoadingText（&gt;3s 档）</h2>
    <div class="login"><p class="loading-text" role="status">正在连接你的内宇宙<span class="loading-dots" aria-hidden="true"><i></i><i></i><i></i></span></p></div>
  </section>
</main>
