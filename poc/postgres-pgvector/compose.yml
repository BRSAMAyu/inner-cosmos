services:
  postgres:
    image: pgvector/pgvector:0.8.1-pg16@sha256:33198da2828a14c30348d2ccb4750833d5ed9a44c88d840a0e523d7417120337
    environment:
      POSTGRES_DB: inner_cosmos_poc
      POSTGRES_USER: inner_cosmos
      POSTGRES_PASSWORD: local-poc-only
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inner_cosmos -d inner_cosmos_poc"]
      interval: 2s
      timeout: 3s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data
