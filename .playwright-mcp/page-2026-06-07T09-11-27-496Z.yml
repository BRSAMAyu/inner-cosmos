    - generic [ref=e43]:
      - heading "6 种设计模式的落地" [level=2] [ref=e44]
      - generic [ref=e45]:
        - article [ref=e46]:
          - strong [ref=e47]: Adapter 适配器
          - paragraph [ref=e48]: LlmClient 接口统一 MiniMax、DeepSeek、GLM 三家模型，上层只看一个接口。
          - generic [ref=e49]: ai/client/
        - article [ref=e50]:
          - strong [ref=e51]: Observer 观察者
          - paragraph [ref=e52]: DialogFinishedEvent 发布后，MemoryExtractService 和 ThoughtShredder 各自独立响应。
          - generic [ref=e53]: event/
        - article [ref=e54]:
          - strong [ref=e55]: State 状态机
          - paragraph [ref=e56]: SlowLetter 的 10 种状态（DRAFT→SENT→FLYING→DELIVERED→READ→...），用 LetterState 接口严格约束转移。
          - generic [ref=e57]: letterstate/
        - article [ref=e58]:
          - strong [ref=e59]: Builder 建造者
          - paragraph [ref=e60]: PromptBuilder 链式构建 Aurora 的 system prompt，把系统边界、用户画像、记忆上下文分层叠加。
          - generic [ref=e61]: ai/prompt/PromptBuilder.java
        - article [ref=e62]:
          - strong [ref=e63]: Strategy 策略
          - paragraph [ref=e64]: AgentReplyStrategy 根据对话模式（日常聊天、认知梳理、行动拆解等）选择不同的回复策略。
          - generic [ref=e65]: ai/agent/
        - article [ref=e66]:
          - strong [ref=e67]: Chain 责任链
          - paragraph [ref=e68]: SafetyRule 链式检查用户输入，三级响应：LOW/MEDIUM/HIGH，高危输入直接阻断模型调用。
          - generic [ref=e69]: safety/
    - generic [ref=e70]:
      - heading "关键工程决策" [level=2] [ref=e71]
      - generic [ref=e72]:
        - generic [ref=e73]:
          - strong [ref=e74]: Mock-first AI 架构
          - paragraph [ref=e75]: 课程环境无稳定 API Key，所有 AI 调用默认走 Mock 模板，配置真实 Key 后自动切换真实模型。Mock 内容经过精心撰写，不是占位符。
        - generic [ref=e76]:
          - strong [ref=e77]: MVC 严格分层
          - paragraph [ref=e78]: Controller 只做参数校验和路由，Service 包含全部业务逻辑，Mapper 继承 MyBatis-Plus BaseMapper。VO/DTO 隔离内外数据结构。
        - generic [ref=e79]:
          - strong [ref=e80]: 安全边界设计
          - paragraph [ref=e81]: AI 是镜子不是医生。SafetyBoundaryFilter 在模型调用前拦截；共鸣体是授权回声不是真人替代；慢信延迟机制防止即时情绪冲动。
        - generic [ref=e82]:
          - strong [ref=e83]: 情感重力算法
          - paragraph [ref=e84]: MemoryCard 的 emotionalGravity = intensity * recurrence^0.7 * importance * (1 + triggers*0.1)，综合情绪强度、重复次数、用户评分、触发次数。不是简单计数。
        - generic [ref=e85]:
          - strong [ref=e86]: H2 演示 + MySQL 生产
          - paragraph [ref=e87]: 默认 H2 内存数据库零配置启动，application.yml 中提供 MySQL 配置模板，切换只需改 spring.datasource.url。
    - generic [ref=e88]:
