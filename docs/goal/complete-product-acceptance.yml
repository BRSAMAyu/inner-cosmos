      - {id: ACADEMY-WORKLOAD, target: "The same immutable application runs on Academy EKS through Gateway with API, worker, scheduler, static-PV PostgreSQL, disposable Redis, and JDBC outbox without SQS, EBS CSI, or injected learner credentials.", status: PASS, evidence: [evidence/academy/PROFILE-FOUNDATION-001/, evidence/academy/ACADEMY-RUNTIME-001/, evidence/academy/ACADEMY-LIVE-001/]}
