      - {id: AURORA-QUALITY, target: "Blind longitudinal evaluation passes empathy, continuity, proactive appropriateness, and recovery thresholds.", status: IN_PROGRESS, evidence: [evidence/innovation/INNO-EVAL-001/, evidence/innovation/INNO-EVAL-002/, evidence/campaign-a/LIVING-AURORA-001/]}

