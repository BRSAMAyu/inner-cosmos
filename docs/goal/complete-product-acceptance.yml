status_semantics:
  UNASSESSED: current HEAD and target environment have not been verified
  IN_PROGRESS: implementation or evidence exists but the gate is not closed
  BLOCKED: a concrete external or dependency blocker prevents closure
  FAIL: verified behavior does not meet the target
  PASS: target is met with reproducible evidence and required review

human_gates:
  - id: HG-SECRET-ROTATION
    required: true
    status: BLOCKED
    description: External provider credentials are revoked, rotated, and independently signed off without recording secret material.
    evidence:
      - evidence/m1/M1-SEC-001/human-rotation-checklist.md
  - id: HG-PRODUCTION-ACCOUNTS
    required: true
    status: UNASSESSED
    description: Authorized owner approves irreversible AWS, DNS, store, payment, and legal-entity actions.
    evidence: []
  - id: HG-PRIVACY-LEGAL
    required: true
    status: UNASSESSED
    description: Singapore privacy, cross-border processing, user terms, and release data flows receive current qualified review.
    evidence: []
  - id: HG-PSYCHOLOGY-REVIEW
    required: true
    status: UNASSESSED
    description: High-risk psychology skills, claims, and crisis paths receive qualified human review.
    evidence: []
  - id: HG-REAL-USERS
    required: true
    status: UNASSESSED
    description: Real-user research and public launch have valid consent and owner authorization.
    evidence: []

gates:
  - id: G0
    name: Governance and security foundation
    status: IN_PROGRESS
    required: true
    acceptance:
      - id: SEC-CURRENT-TREE
        target: Current-tree secret scan has zero usable credentials and production secrets are externally injected.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-001/, evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/]
      - id: SEC-ROTATION
        target: HG-SECRET-ROTATION is PASS with independent review.
        status: BLOCKED
        evidence: [evidence/m1/M1-SEC-001/human-rotation-checklist.md]
      - id: SEC-OWNERSHIP
        target: All user-domain resources enforce owner, purpose, and consent before content read or AI side effects.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-002/, evidence/m1/M1-SEC-003/]
      - id: SEC-PROD-GUARD
        target: Production fails fast on mock, fallback, demo seed, weak cookies, weak TLS, or missing secrets.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-001/, evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/]
      - id: GOV-INNOVATION
        target: Innovation semantics remain authoritative and are governed by versioning, evaluation, consent, and rollback rather than deletion.
        status: IN_PROGRESS
        evidence: [evidence/innovation/INNO-SELF-001/, evidence/innovation/INNO-INNER-003/, evidence/innovation/INNO-CAP-002/]

