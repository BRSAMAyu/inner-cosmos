  - id: G3
    name: Unified product shell
    status: IN_PROGRESS
    required: true
    acceptance:
      - id: UX-SHELL
        target: React TypeScript PWA implements the five-space information architecture and shared component system.
        status: IN_PROGRESS
        evidence: [evidence/innovation/INNO-CONV-003/, evidence/campaign-a/APP-SHELL-001/]
        remaining: |
          CORRECTED (a checkpoint prior to this one, before acting on a wrong plan — see
          UX-LEGACY): the five spaces exist structurally and the CORE loop of each is real (Aurora
          chat send/modes/interrupt, memory starfield visualization, capsule creation, letters
          inbox, portrait claims), but a systematic per-page parity check against the legacy
          static implementation found REAL, substantial missing depth, not cosmetic gaps.
          UPDATE (a checkpoint prior to this one): portrait viewing/calibration is DONE —
          PortraitView.tsx renders every dimension sorted by confidence with a lazy-loaded history
          view and a calibration form; verified live end-to-end. This closed the #1-ranked gap;
          portrait no longer has zero AppShell presence.
          UPDATE (this checkpoint): settings' data-rights/safety fields are DONE —
          AccountSettings.tsx now covers change-password, delete-account (with password re-auth),
          and data export, all reusing existing backend endpoints; verified live end-to-end
          (old password rejected after change, new one works; wrong delete-password rejected with
          the correct error; correct delete-password genuinely removes the account row, confirmed
          by direct database query, not just a UI state change). MeSpace is no longer read-only —
          it is still missing the cosmetic preference toggles (persona tone, proactive intensity,
          quiet hours, theme, social reachability), which remain queued as lower priority since
          they are not data-rights-relevant.
          UPDATE (this checkpoint): correction history + retire is DONE — UnderstandingCorrection.tsx
          now lists the user's confirmed corrections (old->new, reason, field/time) with a two-step
          inline retire action wired to DELETE /api/aurora/corrections/{id}; the AppShell previously
          showed only the top-3 active claims. Verified live end-to-end (history renders a seeded
          correction, retire removes it and the backend list drops to 0, 0 console errors). This also
          surfaced and fixed a real backend 500 (re-correcting a self-understanding topic after
          retiring its correction collided on the understanding-claim (user_id, claim_key, version)
          unique index — version now advances past the highest existing version across all statuses;
          red->green UserCorrectionControllerTest, 791/791 runnable green). Still open: memory
          starfield has no
          importance-tuning or archive action; capsule creation hardcodes privacy/boundary fields
          the legacy wizard exposes; no way to chat with an arbitrary discovered capsule outside a
          curated match; letters has no outbox/drafts/archive/thread view; and relations/social's
          entire relationship-temperature/health/discovery/groups feature set has zero API-client
          presence. This is a genuinely large, previously-unmeasured gap between "five spaces
          exist" and "five spaces have real parity with what they're replacing" — do not treat
          UX-SHELL as near-PASS on the basis of the spaces merely existing.
      - {id: UX-CONTRACTS, target: "Generated typed API client and unified auth, errors, tasks, offline, and telemetry are used.", status: IN_PROGRESS, evidence: [evidence/innovation/INNO-CONV-003/]}
      - {id: UX-QUALITY, target: "Core routes pass Playwright, visual regression, accessibility, i18n, and performance budgets.", status: IN_PROGRESS, evidence: [evidence/innovation/INNO-CONV-003/]}
      - id: UX-LEGACY
        target: Migrated journeys have no competing legacy physical-page implementation.
        status: IN_PROGRESS
        evidence: []
        remaining: |
          Explore-agent audit found the root URL and post-login/post-register redirects all
          funneled users into the legacy static site (/pages/dashboard.html) by default, never
          the AppShell — the AppShell was reachable only by manually typing /app/aurora/. Fixed
          this checkpoint: login.html (both password and guest paths), register.html now redirect
          to /app/aurora/ instead of /pages/dashboard.html; verified end-to-end in a real browser
          against a fresh database (register -> lands on /app/aurora/ -> five-space UI renders,
          0 console errors). AuroraApp.tsx's footer link to the legacy site was relabeled from
          "经典界面" (implying an equivalent alternate skin) to "尚未迁移的工具" (not-yet-migrated
          tools) and retargeted from the now-duplicated aurora-chat.html to the legacy dashboard.html
          hub, since 12 legacy pages (daily-record, heart-diary, timeline, weekly-review, todo,
          safety-harbor, thought-shredder, beliefs, admin pages) have no AppShell equivalent yet
          and must stay reachable. Two confirmed-dead pages removed (capsule-detail.html html file
          + its sitemap.xml entry; ui-preview.html deliberately kept as a design-system dev tool,
          not a competing journey).
          CORRECTED, same checkpoint, BEFORE acting on the wrong plan: the entry-flow fix above is
          real and stays. But the previously-written "remaining work" here (retire/redirect the 13
          legacy pages that duplicate an AppShell space) was WRONG and is walked back — a follow-up
          parity audit (2 Explore-agent passes, all 10 checked page-pairs) found EVERY one of the
          13 legacy pages (settings, aurora-chat, echo-plaza, memory-starfield, corrections,
          capsule-create, capsule-chat, slow-letter+letter-threads+inbox, relations+social,
          portrait) has at least one REAL, non-cosmetic capability the AppShell does not yet have
          (see UX-SHELL's remaining note for the full list). Redirecting any of them right now
          would strand real users from real functionality — account deletion, password change,
          data export, voice input, memory archiving, correction history, arbitrary-capsule chat,
          letters outbox/drafts, the entire relations/social feature set, and the entire portrait
          feature most prominently. Retiring/redirecting these pages is NOT safe until the missing
          functionality is ported into the AppShell first — that porting work, not page retirement,
          is the actual remaining work before this item (and UX-SHELL) can be PASS.

