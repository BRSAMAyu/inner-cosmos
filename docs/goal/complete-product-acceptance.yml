  - id: G2
    name: Contracts, data, and runtime roles
    status: IN_PROGRESS
    required: true
    acceptance:
      - id: ARCH-MODULES
        target: "Module boundaries are executable through ArchUnit, domain interfaces and events; Spring Modulith is optional after a package-by-feature migration."
        status: IN_PROGRESS
        evidence: [docs/adr/0003-arch-modules-archunit-not-spring-modulith.md, src/test/java/com/innercosmos/architecture/ControllerLayerShortcutArchTest.java, src/test/java/com/innercosmos/architecture/DomainBoundaryArchitectureTest.java]
        remaining: |
          ADR-0003: deliberately NOT adopting Spring Modulith -- the codebase is layer-structured
          (one controller/service/mapper package for all domains), not package-by-feature, so a
          Modulith migration would be a large structural rewrite disproportionate to this item's
          scope. Adopted real ArchUnit (bytecode-based) layer-boundary tests instead, alongside the
          pre-existing regex-based DomainBoundaryArchitectureTest. New ControllerLayerShortcutArchTest
          enforces controller -> service interface -> mapper (no controller->mapper or
          controller->service.impl shortcut), with an explicit, non-growable allowlist of 7
          pre-existing violations (SocialController, AuroraChatController, UserController,
          UserPreferenceController, DiaryController, PortraitController inject a mapper directly;
          DailyRecordController injects the interface-less WeeklyReviewV2Service directly). Still
          open: refactor each of the 7 through its service interface and remove it from the
          allowlist (a reverse assertion in the test fails if the allowlist stops matching reality,
          so it cannot silently grow); give WeeklyReviewV2Service a service-package interface.
      - {id: AUTH-OIDC, target: "Spring Security protects secure web sessions and mobile OIDC PKCE flows.", status: IN_PROGRESS, evidence: [evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/, evidence/innovation/INNO-MOBILE-002/, evidence/innovation/INNO-MOBILE-004/], remaining: "2026-07-22: the PKCE contract is now proven against a real (locally-hosted) Keycloak IdP end to end on Android and a new Tauri desktop client, not just mocked. Still open: a production IdP tenant registration, and real-device verification."}
      - id: API-CONTRACT
        target: "Versioned OpenAPI, typed errors, idempotency, concurrency, and resumable SSE are verified."
        status: IN_PROGRESS
        evidence: [evidence/g2/API-CONTRACT-001/, evidence/g2/API-CONTRACT-002/, evidence/g2/API-CONTRACT-003/, docs/campaigns/api-contract/experience-contract.md]
        remaining: |
          Builder evidence closes an executable external core slice: shipped OpenAPI 3.1 v1 and real
          controller aliases, one typed error envelope, Redis cross-Pod idempotency, capsule ETag CAS,
          owner-bound private stream staging and durable Last-Event-ID replay. The repository still has
          public domains outside v1. Generated TypeScript declarations and base-aware OpenAPI 3.1
          breaking-change CI now govern the documented core slice. Live cross-Pod SSE is now
          builder-verified (API-CONTRACT-003): Redis Stream owner-scoped live fan-out, resumable
          Last-Event-ID follow past the sequence-0 turn.started race, 10s heartbeat, terminal-event
          completion, bounded MAXLEN retention and Redis-outage fallback to the durable PostgreSQL
          timeline, with a Docker-gated two-instance real-Redis proof. Consistent cursor pagination and
          concurrency beyond the core slice, plus a sustained multi-Pod SSE soak with recorded
          latency/heartbeat percentiles and Redis Stream consumer-group redelivery, remain open.
      - {id: DATA-POSTGRES, target: "PostgreSQL and Flyway are production truth with Testcontainers and migration reconciliation.", status: IN_PROGRESS, evidence: [evidence/m1/M1-DATA-POC-001/, evidence/m1/M1-DATA-APP-001/, evidence/m1/M1-AUTH-OIDC-001/, evidence/innovation/INNO-INNER-005/, evidence/g2/API-CONTRACT-001/, docs/adr/0002-postgresql-system-of-record.md]}
      - {id: DATA-REDIS, target: "Sessions, short state, limits, and leases are externalized to Redis where required.", status: IN_PROGRESS, evidence: [evidence/m1/M1-DATA-REDIS-001/, evidence/m1/M1-DATA-REDIS-002/, evidence/m1/M1-DATA-REDIS-003/, evidence/g2/API-CONTRACT-001/]}
      - {id: EVENT-RELIABLE, target: "Transactional outbox/inbox, idempotent consumers, retries and replay are verified with JDBC transport for local/Academy and SQS/DLQ transport for commercial-sg.", status: IN_PROGRESS, evidence: [evidence/g2/EVENT-RELIABLE-001/, evidence/academy/ACADEMY-LIVE-001/, evidence/integration/FINAL-P0-CLOSURE-2026-07-22/], remaining: "The durable JDBC projection path is implemented and is the authoritative Academy transport. Remaining: reconcile all derivative receipts and non-author replay evidence; implement and verify the commercial-sg SQS/DLQ adapter only in an authorized environment. Academy does not wait for SQS and must not receive learner AWS credentials."}
      - {id: RUNTIME-ROLES, target: "API, AI worker, event worker, scheduler, and migration roles run and scale independently.", status: IN_PROGRESS, evidence: [evidence/academy/ACADEMY-LIVE-001/], remaining: "Role assembly is gated by inner-cosmos.runtime.role (@ConditionalOnExpression): worker->JdbcOutboxWorker, scheduler->6 scheduler jobs + SessionIdleWatcher, api->neither, migration->MigrationRoleExit run-once. Covered by RuntimeRoleConfigurationTest (scheduling gate per role + migration exit/reject) and by ACADEMY-LIVE-001 which ran api(2 replicas)+worker+scheduler+migration as independent workloads. Remaining: an explicit per-role job-bean-presence assertion test (a full-boot attempt was reverted because enabling the Postgres-only outbox worker on H2 triggers its poll; the right form is a Testcontainers or ApplicationContextRunner slice) + independent scaling soak."}
