completion_rule:
  required_gate_status: PASS
  required_human_gate_status: PASS
  allow_release_candidate_blocked_by_human_gate: true
  complete_when: Every required gate and acceptance item is PASS with current evidence and required independent review.
  release_candidate_blocked_by_human_gate_when: >-
    Every machine-executable required item is PASS and every remaining non-PASS item is mapped to a
    named external credential, device, legal, qualified-expert, real-user or irreversible-account gate
    with owner, required input and closure procedure. Convenience, uncertainty, missing tests, missing
    implementation, unavailable local setup or agent self-review never qualify as a human gate.
