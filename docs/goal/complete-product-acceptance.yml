schema_version: 1
goal_id: INNER-COSMOS-COMPLETE-PRODUCT
authority: goal-objective.md
status: IN_PROGRESS
last_reconciled_at: 2026-07-15T08:45:00+08:00
last_reconciled_commit: 55c2b1901b2d8f62cfdf24b1d78abc97f9a240bd

status_semantics:
  UNASSESSED: current HEAD and target environment have not been verified
  IN_PROGRESS: implementation or evidence exists but the gate is not closed
  BLOCKED: a concrete external or dependency blocker prevents closure
  FAIL: verified behavior does not meet the target
  PASS: target is met with reproducible evidence and required review

human_gates:
  - id: HG-SECRET-ROTATION
    required: true
    status: BLOCKED
    description: External provider credentials are revoked, rotated, and independently signed off without recording secret material.
    evidence:
      - evidence/m1/M1-SEC-001/human-rotation-checklist.md
  - id: HG-PRODUCTION-ACCOUNTS
    required: true
    status: UNASSESSED
    description: Authorized owner approves irreversible AWS, DNS, store, payment, and legal-entity actions.
    evidence: []
  - id: HG-PRIVACY-LEGAL
    required: true
    status: UNASSESSED
    description: Singapore privacy, cross-border processing, user terms, and release data flows receive current qualified review.
    evidence: []
  - id: HG-PSYCHOLOGY-REVIEW
    required: true
    status: UNASSESSED
    description: High-risk psychology skills, claims, and crisis paths receive qualified human review.
    evidence: []
  - id: HG-REAL-USERS
    required: true
    status: UNASSESSED
    description: Real-user research and public launch have valid consent and owner authorization.
    evidence: []

gates:
  - id: G0
    name: Governance and security foundation
    status: IN_PROGRESS
    required: true
    acceptance:
      - id: SEC-CURRENT-TREE
        target: Current-tree secret scan has zero usable credentials and production secrets are externally injected.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-001/, evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/]
      - id: SEC-ROTATION
        target: HG-SECRET-ROTATION is PASS with independent review.
        status: BLOCKED
        evidence: [evidence/m1/M1-SEC-001/human-rotation-checklist.md]
      - id: SEC-OWNERSHIP
        target: All user-domain resources enforce owner, purpose, and consent before content read or AI side effects.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-002/, evidence/m1/M1-SEC-003/]
      - id: SEC-PROD-GUARD
        target: Production fails fast on mock, fallback, demo seed, weak cookies, weak TLS, or missing secrets.
        status: IN_PROGRESS
        evidence: [evidence/m1/M1-SEC-001/, evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/]
      - id: GOV-INNOVATION
        target: Innovation semantics remain authoritative and are governed by versioning, evaluation, consent, and rollback rather than deletion.
        status: UNASSESSED
        evidence: []

  - id: G1
    name: Modern platform baseline
    status: IN_PROGRESS
    required: true
    acceptance:
      - {id: BASE-JAVA, target: "Java 21 is both compile and runtime baseline.", status: IN_PROGRESS, evidence: [evidence/m1/M1-BASE-001/]}
      - {id: BASE-BOOT, target: "Spring Boot 3.5 supported patch baseline passes the full suite.", status: IN_PROGRESS, evidence: [evidence/m1/M1-BASE-001/]}
      - {id: BASE-SUPPLY, target: "SBOM, dependency, SAST, secret, IaC, and container scans are gated.", status: IN_PROGRESS, evidence: [evidence/m1/M1-BASE-001/]}
      - {id: BASE-IMAGE, target: "Signed non-root minimal OCI image passes production-profile smoke.", status: IN_PROGRESS, evidence: [evidence/m1/M1-BASE-001/image-release-summary.txt]}

  - id: G2
    name: Contracts, data, and runtime roles
    status: IN_PROGRESS
    required: true
    acceptance:
      - {id: ARCH-MODULES, target: "Module boundaries are executable through Spring Modulith and architecture tests.", status: UNASSESSED, evidence: []}
      - {id: AUTH-OIDC, target: "Spring Security protects secure web sessions and mobile OIDC PKCE flows.", status: IN_PROGRESS, evidence: [evidence/m1/M1-AUTH-WEB-001/, evidence/m1/M1-AUTH-OIDC-001/]}
      - {id: API-CONTRACT, target: "Versioned OpenAPI, typed errors, idempotency, concurrency, and resumable SSE are verified.", status: UNASSESSED, evidence: []}
      - {id: DATA-POSTGRES, target: "PostgreSQL and Flyway are production truth with Testcontainers and migration reconciliation.", status: IN_PROGRESS, evidence: [evidence/m1/M1-DATA-POC-001/, evidence/m1/M1-DATA-APP-001/, evidence/m1/M1-AUTH-OIDC-001/, docs/adr/0002-postgresql-system-of-record.md]}
      - {id: DATA-REDIS, target: "Sessions, short state, limits, and leases are externalized to Redis where required.", status: IN_PROGRESS, evidence: [evidence/m1/M1-DATA-REDIS-001/, evidence/m1/M1-DATA-REDIS-002/]}
      - {id: EVENT-RELIABLE, target: "Transactional outbox, SQS, idempotent consumers, retries, and DLQ replay are verified.", status: UNASSESSED, evidence: []}
      - {id: RUNTIME-ROLES, target: "API, AI worker, event worker, scheduler, and migration roles run and scale independently.", status: UNASSESSED, evidence: []}
      - {id: DATA-RIGHTS, target: "Consent, provenance, correction, export, and deletion propagate to all derivatives.", status: UNASSESSED, evidence: []}

  - id: G3
    name: Unified product shell
    status: UNASSESSED
    required: true
    acceptance:
      - {id: UX-SHELL, target: "React TypeScript PWA implements the five-space information architecture and shared component system.", status: UNASSESSED, evidence: []}
      - {id: UX-CONTRACTS, target: "Generated typed API client and unified auth, errors, tasks, offline, and telemetry are used.", status: UNASSESSED, evidence: []}
      - {id: UX-QUALITY, target: "Core routes pass Playwright, visual regression, accessibility, i18n, and performance budgets.", status: UNASSESSED, evidence: []}
      - {id: UX-LEGACY, target: "Migrated journeys have no competing legacy physical-page implementation.", status: UNASSESSED, evidence: []}

  - id: G4
    name: Aurora living mind
    status: IN_PROGRESS
    required: true
    acceptance:
      - {id: AURORA-DUAL-KERNEL, target: "Fast and slow kernels plus context assembly show measured benefit over the single-pass baseline.", status: UNASSESSED, evidence: []}
      - {id: AURORA-CHOREOGRAPHY, target: "Typed multi-message, pause, stop, interrupt, replan, and reconnect behavior works end to end.", status: IN_PROGRESS, evidence: [evidence/innovation/INNO-CONV-001/, evidence/innovation/INNO-CONV-002/]}
      - {id: AURORA-TEMPORAL, target: "Durable WakeIntent scheduling respects timezone, quiet hours, relevance, risk, and user controls.", status: UNASSESSED, evidence: []}
      - {id: AURORA-SELF, target: "Self, Constitution, Relationship State, and Emergence are versioned, evaluated, observable, and rollbackable.", status: UNASSESSED, evidence: []}
      - {id: AURORA-QUALITY, target: "Blind longitudinal evaluation passes empathy, continuity, proactive appropriateness, and recovery thresholds.", status: UNASSESSED, evidence: []}

  - id: G5
    name: Memory, profile, and Inner Cosmos
    status: UNASSESSED
    required: true
    acceptance:
      - {id: MEMORY-LIFECYCLE, target: "Memories support consolidation, reinforcement, contradiction, supersession, decay, archive, and forgetting.", status: UNASSESSED, evidence: []}
      - {id: PROFILE-MODEL, target: "High-dimensional claims retain source, confidence, time, consent, conflict, and correction history.", status: UNASSESSED, evidence: []}
      - {id: RETRIEVAL-QUALITY, target: "Task-aware hybrid retrieval meets precision, relevance, contradiction, privacy, latency, and budget thresholds.", status: UNASSESSED, evidence: []}
      - {id: PROFILE-PROPAGATION, target: "Correction and withdrawal re-evaluate downstream insights, vectors, caches, capsules, and matching.", status: UNASSESSED, evidence: []}
      - {id: STARFIELD-V2, target: "Starfield visual semantics, time/topic/person exploration, provenance detail, accessible alternative, and mobile performance pass.", status: UNASSESSED, evidence: []}

  - id: G6
    name: Capsule intelligence and resonance
    status: UNASSESSED
    required: true
    acceptance:
      - {id: CAPSULE-COMPILER, target: "Authorized data compiles into a versioned Genome with coverage, conflicts, sandbox, and withdrawal.", status: UNASSESSED, evidence: []}
      - {id: CAPSULE-RUNTIME, target: "Planner, retrieval, speaker, critics, and reranker produce materially better fidelity than a long-prompt baseline.", status: UNASSESSED, evidence: []}
      - {id: CAPSULE-SAFETY, target: "Fact, style, habit, boundary, leakage, adversarial, and longitudinal evaluations pass.", status: UNASSESSED, evidence: []}
      - {id: MATCH-MULTI, target: "Mirror, Complement, Growth Edge, Serendipity, and Contextual matching are explainable and user-controllable.", status: UNASSESSED, evidence: []}
      - {id: SOCIAL-CLOSED-LOOP, target: "Discovery, capsule conversation, slow letter, mutual connection, refusal, report, and withdrawal work end to end.", status: UNASSESSED, evidence: []}
      - {id: SIMULATOR-ASSET, target: "An isolated consent-bound simulator demo proves reusable fidelity technology without covert personal-data training.", status: UNASSESSED, evidence: []}

  - id: G7
    name: Psychology skills, mobile, and experience completion
    status: UNASSESSED
    required: true
    acceptance:
      - {id: SKILL-RUNTIME, target: "Versioned skill manifests enforce schemas, tools, consent, evidence, risk, retention, evaluation, and escalation.", status: UNASSESSED, evidence: []}
      - {id: SKILL-PRODUCT, target: "At least three evidence-informed non-diagnostic skills pass quality, safety, i18n, and human review.", status: UNASSESSED, evidence: []}
      - {id: MOBILE-NATIVE, target: "Capacitor push, microphone, deep links, secure storage, lifecycle, and network recovery pass on real devices.", status: UNASSESSED, evidence: []}
      - {id: UX-COMPLETE, target: "All five product spaces meet desktop/mobile, bilingual, WCAG 2.2 AA target, reduced-motion, and blind-experience acceptance.", status: UNASSESSED, evidence: []}

  - id: G8
    name: EKS operations and Singapore readiness
    status: UNASSESSED
    required: true
    acceptance:
      - {id: ACADEMY-CAPABILITY, target: "Every Learner Lab session runs a sanitized capability preflight that distinguishes human LabRole access from Pod workload access and cleans all probes.", status: IN_PROGRESS, evidence: [evidence/academy/AWS-ACADEMY-CAP-001/summary.md, docs/goal/aws-academy-capabilities.yml]}
      - {id: ACADEMY-WORKLOAD, target: "The same immutable application runs on Academy EKS through Gateway with API, worker, scheduler, static-PV PostgreSQL, disposable Redis, and JDBC outbox without SQS, EBS CSI, or injected learner credentials.", status: UNASSESSED, evidence: []}
      - {id: ACADEMY-RELIABILITY, target: "Academy evidence exercises probes, resources, PDB, HPA, rolling update, graceful shutdown, multi-replica session/rate/lease, idempotency, and Pod recovery while disclosing storage limits.", status: UNASSESSED, evidence: []}
      - {id: LOCAL-COMPLETE, target: "A reproducible local-complete profile runs the full AI and product experience with PostgreSQL/pgvector, Redis, real-provider configuration, and core E2E journeys.", status: UNASSESSED, evidence: []}
      - {id: EKS-IAC, target: "Terraform reproducibly creates least-privilege Singapore-region platform dependencies and EKS environments.", status: UNASSESSED, evidence: []}
      - {id: EKS-WORKLOAD, target: "Kustomize workloads enforce probes, resources, PDB, spread, HPA, network policy, secrets, and graceful shutdown.", status: UNASSESSED, evidence: []}
      - {id: OPS-OBSERVABILITY, target: "OpenTelemetry dashboards, alerts, traces, AI cost/quality signals, and runbooks are exercised by non-authors.", status: UNASSESSED, evidence: []}
      - {id: OPS-RESILIENCE, target: "Canary, rollback, pod/node/provider failure, queue replay, and database/object restore meet declared SLO/RPO/RTO.", status: UNASSESSED, evidence: []}
      - {id: SG-PRODUCT, target: "English-first Singapore timezone experience and current local safety resources work completely.", status: UNASSESSED, evidence: []}
      - {id: SG-RELEASE, target: "Current PDPA, cross-border LLM, store, HSA-boundary, corporate, tax, and payment checks have owner sign-off.", status: UNASSESSED, evidence: []}

  - id: G9
    name: Complete product acceptance
    status: UNASSESSED
    required: true
    acceptance:
      - {id: FINAL-E2E, target: "Web, PWA, and mobile complete-product journeys pass against a production-like environment.", status: UNASSESSED, evidence: []}
      - {id: FINAL-DEMO, target: "An 8-12 minute reproducible demo proves product differentiation, AI depth, data lineage, and Kubernetes operations.", status: UNASSESSED, evidence: []}
      - {id: FINAL-USABILITY, target: "Non-author participants complete core tasks and articulate the unique value without developer explanation.", status: UNASSESSED, evidence: []}
      - {id: FINAL-OPERATIONS, target: "Release, rollback, incident, provider failure, data-rights, and disaster-recovery runbooks are independently exercised.", status: UNASSESSED, evidence: []}
      - {id: FINAL-TRACEABILITY, target: "Every required acceptance item points to current reproducible evidence and no hidden P0 blocker remains.", status: UNASSESSED, evidence: []}

completion_rule:
  required_gate_status: PASS
  required_human_gate_status: PASS
  allow_release_candidate_blocked_by_human_gate: true
  complete_when: Every required gate and acceptance item is PASS with current evidence and required independent review.
