deltas:
  - id: TA-DELTA-001
    title: Owner-facing data-rights retraction receipts
    purpose: >-
      Expose the auditable "what Aurora stopped using, and when" trail so Track B can render a
      trust-building data-rights panel. Makes the G5 PROFILE-PROPAGATION backend work user-visible.
    endpoint: "GET /api/me/data-rights/receipts?limit=<int, optional, default 50, clamped 1..500>"
    auth: "Session/authenticated (falls under /api/** authenticated); owner-scoped — only the caller's own receipts are returned."
    idempotency: "Read-only GET; safe to retry."
    response_schema: |
      ApiResponse<DataRetractionReceiptVO[]> newest-first:
        { success: true, data: [ {
            id: number,
            subjectType: "MEMORY" | "CAPSULE" | "DATA_USE_GRANT",
            subjectId: number,
            derivativeType: "CAPSULE_MATCH_INDEX" | "MEMORY_EMBEDDING" | "CAPSULE_PERSONA" | "GENOME",
            action: "ERASED" | "CLEARED" | "REVIEW_REQUIRED",
            affectedCount: number,
            reason: string,          // short, non-sensitive; never source content
            createdAt: string        // ISO-8601 local date-time
        } ] }
    typed_errors: "401 UNAUTHORIZED when not logged in (ApiResponse.success=false)."
    sensitive_payload: "None. Counts + a short reason only; never memory text, embeddings or persona prompts."
    compatibility: "Additive; new endpoint + new tb_data_retraction_receipt table (Flyway V19). No existing response changed."
    fixture: |
      [
        {"id":12,"subjectType":"CAPSULE","subjectId":5,"derivativeType":"CAPSULE_MATCH_INDEX",
