discoveries:
  - "The React AppShell (/app/aurora/) has no registration form or register link at all; the only working registration entry point is the legacy static page /pages/register.html, completely unlinked from the new app. A user following CLAUDE.md's own run instructions hits a dead-end login form. This is the top-priority B1 fix."
  - "Registration -> AppShell session hand-off already works correctly: register.html redirects to /app/aurora/ and the cookie session carries over with no forced re-login."
  - "The Aurora conversation experience itself is already in good shape: live-verified multi-message pacing, a visible stop/interrupt control pair while streaming, and a dual-core status signal ('理解与表达双核协作'). Preserve this through the B1 refactor rather than rebuilding it."
  - "No real client routes exist anywhere; navigation is a single ?space= query param on one path (/app/aurora/), and all five spaces are simultaneously mounted in the DOM (toggled via the hidden attribute) out of one 1292-line AuroraApp.tsx with 60+ useState hooks. Confirms 对齐文档/20 4.3 with fresh evidence, not just re-citing the doc."
  - "Mobile bottom navigation is not fixed/sticky -- on the Aurora space it renders inline after the hero/mode-picker/WakeIntent/Self-Emergence blocks, pushing both the nav and the message composer below the fold on first load. Screenshot: evidence/track-b/screenshots/20-space-aurora-mobile.png."
  - "No PWA offline shell exists: forcing the browser fully offline and reloading produces a blank browser network-error page, not a branded offline state. Screenshot: evidence/track-b/screenshots/40-offline-reload-desktop.png."
  - "Expired/cleared-cookie deep links (e.g. ?space=cosmos) silently drop the intended target and show a bare, unexplained login form with no register link; user always lands back on the default aurora space after re-login. Screenshot: evidence/track-b/screenshots/41-expired-auth-desktop.png."
  - "The Resonance space ships 11 fully-written sample capsule personas (洛哥, 苏格拉底, 庄周, ...) visible to every brand-new, zero-activity account, grouped by all five target matching strategies. Whether this is intentional sample/practice content or leaked seed data is UNRESOLVED and should be a first product decision for B1/B2 before designing the Resonance first-run state."
  - "The People-Discovery list (Connections space) surfaces QA/test accounts to real users -- observed 'CSRF Runtime' x3, 'CSRF Check', 'Header', 'Smoke', and two of this pass's own throwaway B0-observer test accounts, all listed as people a brand-new real user could 'want to get to know'. Every registered account, including automated test ones, appears to be globally discoverable by default with no filtering. Needs a backend-side fix (track-b-integration-requests.yml candidate) before any local-complete demo is trusted."
  - "A shared loading/error primitive set already exists (web/src/loading.tsx: useDelayedBusy 3-tier timing, ConnectError, AsyncButton) implementing 对齐文档/11 14.3's loading-state rule correctly. B1's 'single async/task/error model' work should audit for consistent adoption across components rather than invent a new primitive from scratch."
  - "Every full navigation to /app/aurora/?space=<x> logs one console `403 POST /api/dialog/session/create` (confirmed the exact URL with a dedicated network-tap script). The conversation still works, so this reads as a redundant 'ensure session' bootstrap call re-firing on every full-page reload rather than a functional break -- silent to the user today, but worth Track A/B1 follow-up as part of consolidating bootstrap/session logic."
  - "Theme inconsistency: /pages/register.html and /app/aurora/ rendered in opposite time-of-day themes (light/day vs dark/night) at the identical wall-clock moment, because they are two separate implementations that don't share the same time-of-day computation."
  - "Portrait ('Aurora 眼中的你') is currently rendered inside the Me space, not Inner Cosmos, contradicting the target IA table in 对齐文档/09 5. Needs a deliberate decision in B1: move the component, or update the spec's target home for Portrait."
  - "B0's claim that the mobile bottom nav itself is not fixed/sticky did not reproduce this pass -- .app-shell-nav already has position:fixed at <=680px (confirmed live: position=fixed, anchored to the viewport bottom) and has for some time per git history (web/src/styles.css). Only the composer-below-the-fold half of that finding was real and is now fixed; the nav-not-fixed half of the original observation appears to have been a misread, not a regression introduced since B0."
  - "AuthController.register (/api/auth/register and /api/v1/auth/register, both mapped) already rotates the session id and stores the user id exactly like login does -- confirmed live, not just from reading AuthController.java -- so the new in-app register path could reuse the same onSuccess/bootstrap callback as login with no backend changes and no new integration request needed."
  - "The generated OpenAPI types (web/src/generated/inner-cosmos-v1.d.ts) have no RegisterRequest schema at all, unlike LoginRequest/ChatRequest/etc. api.register() therefore uses a small hand-written inline type rather than a CoreApiSchemas type, matching the one precedent of that pattern already in api.ts (draftSlowLetter's ad hoc body typing). Worth flagging to whoever owns the openapi-generate step as a documentation gap, though not filed as a track-b-integration-requests.yml item since it did not block this work."
  - "evidence/track-b/experience-inventory.md section 7's reproduction note ('script must run with cwd=web/') does not actually work in this Node 22.20 environment -- Node's ESM resolver walks up from the *importing file's own path*, not the process cwd, so a script physically under evidence/track-b/scripts/ can never resolve web/node_modules/playwright regardless of cwd. Confirmed by trying observe-b0-journeys.mjs itself (it also fails now). Workaround used this pass: run from a temporary copy placed under web/ (e.g. web/.scratch-e2e/), deleted afterward. Future sessions should either always use this workaround, or move the scripts under web/scripts/ permanently (not done this pass to avoid unrequested churn to evidence/track-b/scripts/'s existing layout)."
  - "Loading-audit checkpoint: nine components hand-rolled the exact busy/error pattern web/src/loading.tsx's AsyncButton/LoadingText already implement correctly (disabled+ternary-text buttons, or a raw busy-conditional block message with no delay tiering) -- see evidence/track-b/README.md 'Workstream B1 -- third checkpoint' for the full file-by-file list. No gap was found in loading.tsx itself; every instance mapped cleanly onto the existing API."
  - "A recurring, larger pattern was found and deliberately NOT fixed this pass: several components disable multiple SIBLING buttons (representing different candidates/proposals/versions/mode-tabs/strategies/runs/ratings) off of ONE SHARED busy boolean with no per-item id -- AuroraSelfSpace (propose/evaluate/activate/rollback across different items), MemoryStarfield's 时间/主题/人物 mode tabs, ResonanceNetwork's 5 strategy-switcher buttons, PsychologySkillStudio's per-run revoke button, CapsuleWorkbench's 5 sandbox-rating buttons. Wrapping each sibling in AsyncButton with the SAME shared busy flag would make every sibling show busy text the instant any one is clicked -- a UX regression, not a fix. These need a per-item busy id added to AuroraApp.tsx's state first (the same pattern already used for claimCandidateBusyId/detailBusy/rollbackBusy), which is domain-hook-decomposition-shaped work, not a call-site swap -- flagged as B1 backlog rather than force-migrated with a misleading mechanism."
  - "LettersInbox.tsx's reply-to-letter button has NO busy tracking passed in at all (no prop for it exists) -- clicking '让回复慢信启程' while the network call is in flight gives zero feedback and does not guard a double-submit. Real gap, not fixed this pass (needs new state threaded from AuroraApp.tsx's replyWithLetter, out of scope for a mechanism-only audit)."
  - "AuthGate's submit button previously disabled with ZERO busy feedback at all (no text change between idle and busy) despite being the very first interactive control any new user sees. Migrated to AsyncButton with a mode-dependent busyText ('正在登录'/'正在创建') following the '正在X' convention already established by every other AsyncButton call site in the codebase -- a small, convention-consistent copy addition, not an invented one-off."
  - "B5 PWA checkpoint: the app's existing bootstrap-error path (web/src/loading.tsx's ConnectError, already wired into AuroraApp.tsx's render for a failed bootstrap() call) turns out to ALREADY be the correct branded 'can't connect' UI for the offline case -- the only missing piece was the JS/CSS/HTML shell itself being loadable at all while offline. Once vite-plugin-pwa precaches that shell and a NavigationRoute falls back to it, the exact same ConnectError card renders offline with zero AuroraApp.tsx changes. Worth remembering for future B-track work: check whether a 'missing offline state' is actually a caching gap before assuming a new UI component is needed."
  - "The ConnectError card's detail line shows the raw browser error string verbatim (observed: literally 'Failed to fetch', in English, inside an otherwise fully Chinese UI) when bootstrap() fails from a real network-level failure (as opposed to a 401/business error, which already gets a translated message). This is a real, pre-existing small polish gap surfaced by making the offline path reachable for the first time -- not fixed this pass to avoid touching AuroraApp.tsx/api.ts while a parallel B1 agent is mid-refactor on AuroraApp.tsx. Candidate follow-up: detect network-level fetch failures (e.g. `error instanceof TypeError` or `!navigator.onLine`) in the bootstrap catch block and substitute a Chinese '你已离线' message instead of surfacing error.message directly."
  - "No sharp/ImageMagick/any image-processing dependency exists anywhere in this repo (checked: not in package.json, not on PATH -- Windows' own convert.exe at /c/Windows/system32/convert is the disk-format utility, not ImageMagick). The new web/scripts/generate-pwa-icons.mjs resizes the existing 1024x1024 app icon into the 192/512/512-maskable PWA sizes using a real <canvas> inside headless Chromium via the already-installed playwright devDependency, instead of adding a new native image dependency just for a one-time (re-runnable) icon export."
  - "vite-plugin-pwa's generated precache manifest (embedded in the built sw.js) lists each of the three public/icons/*.png files and manifest.webmanifest TWICE -- once from the plugin's own manifest.icons entries and once from the workbox globPatterns crawl of the same files in the dist output. Confirmed harmless (workbox's precache controller keys by URL internally, so this is redundant list entries, not double-cached storage or double network fetches) but left as a known cosmetic inefficiency rather than spending more time suppressing it via manifestTransforms for a first B5 slice."
  - "web/tsconfig.node.json previously had no explicit noEmit, and since it only covered vite.config.ts + playwright.config.ts (whose stray .js/.d.ts output at the web/ root is already covered by the root .gitignore's 'web/*.js' pattern), this never surfaced. Adding src/pwaManifest.ts to that project's file list (required so vite.config.ts can import the same tested buildPwaManifest() used by pwaManifest.test.ts) caused tsc -b to emit stray web/src/pwaManifest.js/.d.ts NOT covered by that gitignore pattern (which only matches direct children of web/, not web/src/). Fixed by adding 'noEmit: true' to tsconfig.node.json's compilerOptions -- worth remembering if a future checkpoint adds another src/ file to that project's include list."
  - "Confirmed live via a dedicated Playwright script (evidence/track-b/scripts/observe-b1-pwa-offline.mjs): after one online visit + a ~1.5s settle, the Cache Storage API reports exactly 14 precached entries and 0 of them are /api/ URLs; during a subsequent forced-offline reload, exactly one /api/ request fires (the bootstrap CSRF call) and Playwright's response.fromServiceWorker() reports false for it -- it fails on the network as expected, it is never served from any cache. This is the concrete evidence behind the 'never cache P0 API payloads' requirement in TRACK-B-COMPLETE-EXPERIENCE.md section 9, not just a config-reading assertion."
  - "A concurrent agent in the same checkout is mid-way through extracting Aurora-conversation-domain hooks out of AuroraApp.tsx (web/src/hooks/useAuroraSession.ts + .test.ts appeared during this session, and web/src/AuroraApp.tsx itself was observed in a transiently TS-broken intermediate state -- e.g. 'Cannot find name activeTurnRef/setMessages/finishTurn' -- confirmed via `npx tsc -b` producing errors ONLY inside AuroraApp.tsx and zero errors anywhere else, including every file this B5 checkpoint touched). Per this checkpoint's explicit brief, AuroraApp.tsx was left completely untouched; the PWA work does not depend on it being fixed. A full `npm run build` was verified clean twice earlier in this same session (before the other agent's later edit); the built src/main/resources/static/app/aurora/** committed here reflects that last-known-good build, already containing all of this checkpoint's PWA output (manifest.webmanifest, sw.js, icons/, etc.) -- whoever picks up B1's hook-extraction next should rerun `npm run build` once AuroraApp.tsx is consistent again, purely to confirm the two checkpoints' outputs still compose cleanly together (no PWA-specific action expected to be needed)."
  - "First domain-hook decomposition slice confirms the B5 discovery above and closes its loop: web/src/hooks/useAuroraSession.ts + useAuroraSession.test.ts (14 cases) is exactly the work the B5 checkpoint observed in-flight; AuroraApp.tsx was left in a fully consistent, green (tsc/vitest/build) state by the time B5's commit 856a243 landed, and rebuilding after B5's commit reproduced its already-committed src/main/resources/static/app/aurora/** byte-for-byte -- the two independent checkpoints compose with zero interaction, exactly as B5's discovery predicted."
  - "AuroraApp.tsx's bootstrap() originally guarded against a superseded/stale bootstrap call (relevant to mobile OIDC re-init racing a previous in-flight bootstrap) by checking a call-token BEFORE firing its one big 23-way Promise.all of every domain's initial fetch -- if stale, it returned without ever touching setSessionId or any of those 23 fetches. Naively splitting 'resolve which session to load' into the new hook while keeping 'load everything else' in AuroraApp.tsx would have broken this guard (the two halves would run in parallel via a wrapping Promise.all, so a stale call would still fire all 20 other-domain fetches before finding out it was stale). Fixed by having the hook's resolveSession(isStale) accept a callback and check it itself, right before setSessionId, exactly mirroring the original single-function control flow -- AuroraApp.tsx's bootstrap() still does ONE sequential 'resolve session' step followed by ONE 23-way Promise.all, unchanged in shape from before this extraction."
  - "Live-verification methodology note: the very first live-verification pass (default Playwright context, service worker allowed to register since a B5 concurrent checkpoint just landed) showed an apparent streamAurora failure with no stop control ever appearing and the status stuck at '还没建立回应时间线，请重试这句话。' A second run with the same context ('serviceWorkers: block' Playwright option) succeeded cleanly, and a THIRD run re-testing with service workers allowed again also succeeded cleanly -- i.e. the failure did not reproduce on repeat regardless of the service-worker setting, so it was NOT conclusively caused by the new service worker (that would have been an unproven assertion). The real, already-documented explanation is api.ts's request() wrapper: it retries once on a 403 CSRF_INVALID response, and a handful of POSTs right after a brand-new registration (stream-stage, psychology/skills/suggestions, wake-intents/negotiate, turns/:id/stop) intermittently hit this retry-then-succeed path, visible as console 403 noise even though the actual call succeeds on retry -- consistent with the pre-existing 'redundant 403 POST /api/dialog/session/create' discovery logged earlier in this file. Every clean run (screenshots b1-decompose-02..05) shows the exact original status copy and message counts, confirming this extraction changed nothing observable."
