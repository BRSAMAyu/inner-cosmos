latest_checkpoint: "B5 first slice: PWA offline app shell. Added vite-plugin-pwa (generateSW strategy) to web/vite.config.ts; a testable buildPwaManifest() (web/src/pwaManifest.ts + 6 new Vitest cases) supplies name/short_name/colors/icons -- colors reused verbatim from web/src/styles.css's --surface-canvas/--accent-aurora night tokens, icons generated from the real ios AppIcon-512@2x.png via a new headless-Chromium resize script (web/scripts/generate-pwa-icons.mjs), no invented artwork/palette, no new image-processing dependency. Service worker precaches only the built static app shell (JS/CSS/HTML/manifest/icons) and explicitly never caches /api/** (navigateFallbackDenylist + an explicit NetworkOnly runtimeCaching rule) -- live-verified via Playwright that after an online visit primes the cache, 0 of the 14 cached entries are /api/ URLs, and during a forced-offline reload the one /api/ request that fires is NOT served from the SW cache (response.fromServiceWorker() is false for it; it simply fails, as it should). Registered the SW in web/src/main.tsx via virtual:pwa-register, guarded by a serviceWorker-support check, without touching AuroraApp.tsx: the existing bootstrap error path (web/src/loading.tsx's ConnectError, already wired in AuroraApp.tsx) turns out to already be the right branded offline fallback once the app shell itself can load offline -- confirmed live, B0's blank-browser-error-page bug (evidence/track-b/screenshots/40-offline-reload-desktop.png) is fixed, replaced by the same warm-theme '没能连上你的内宇宙' card + 重试 button, over the app's own starfield background, not a blank page. Vitest 149/149 in this checkpoint's own files (143 baseline + 6 new pwaManifest.test.ts cases; a concurrent B1 hook-extraction agent working in the same checkout independently added its own useAuroraSession.test.ts, bringing the whole-tree total higher -- not this checkpoint's count to claim). npm run build verified clean twice earlier in this session (dist output byte-for-byte the same existing assets/{app,base,native,web,web2,web3,web4}.js/index.css plus new manifest.webmanifest/sw.js/workbox-*.js/icons/); a later npm run build attempt failed, but exclusively with TS errors inside web/src/AuroraApp.tsx (confirmed via `npx tsc -b` producing zero errors outside that one file) caused by the concurrent B1 hook-extraction agent's own in-progress, not-yet-consistent edit to that file -- not this checkpoint's regression, and left untouched per the task's explicit instruction not to touch AuroraApp.tsx. See evidence/track-b/README.md 'Workstream B5 -- first checkpoint' section."
