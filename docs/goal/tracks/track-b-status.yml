latest_checkpoint: "B1 fourth checkpoint: first AuroraApp.tsx domain-hook decomposition slice. Extracted the Aurora conversation/session domain -- message list, streaming/turn status, interrupt/stop, mode picker, WakeIntent negotiate, and session bootstrap/replay -- out of the ~1270-line, 60+-useState AuroraApp.tsx into a dedicated web/src/hooks/useAuroraSession.ts, following docs/tracks/TRACK-B-COMPLETE-EXPERIENCE.md section 5's decomposition ask. Pure state/logic move: no JSX/rendering structure or visible-behavior change. AuroraApp.tsx now calls the hook and passes its returned state/handlers straight through to the same JSX it always rendered. TDD'd first: 14 new characterization tests in useAuroraSession.test.ts (renderHook + mocked api/streamAurora/replayTurnEvents/subscribeProactive) pin session bootstrap/replay, send/stream/interrupt, mode switching and WakeIntent negotiate BEFORE the extraction was wired into AuroraApp.tsx, then AuroraApp.tsx was rewired to use the hook and re-verified green. Two deliberate behavior-preservation design points: (1) bootstrap()'s original 'abort a stale/superseded bootstrap call before firing every other domain's initial fetch' race guard is preserved exactly via a resolveSession(isStale) callback, rather than being silently dropped by a naive parallel restructuring; (2) the original 23-way concurrent Promise.all in bootstrap() is preserved as a single Promise.all (the session/WakeIntent-return resolution still happens sequentially before it, exactly as before -- only the internal grouping of which fetches are 'hook-owned' changed, not the concurrency shape). Vitest 163/163 across 26 files (143/24 baseline + this checkpoint's 14 new useAuroraSession.test.ts cases + ~6 more from a concurrent B5 PWA checkpoint's own pwaManifest.test.ts, landed via commit 856a243 in the same working tree -- see discoveries). tsc -b and vite build both clean; the built src/main/resources/static/app/aurora/** already committed by that concurrent B5 checkpoint was confirmed byte-identical after rebuilding with this checkpoint's AuroraApp.tsx, i.e. the two checkpoints' work composes cleanly with zero interaction. Live-verified against the real running app (dev profile, H2 + Mock provider): register, mode-picker switch, a real multi-message Aurora reply mid-stream with the stop/interrupt control visible, clicking stop producing the exact original '已停在这里...' status copy, a second turn completing to 4 message bubbles, and WakeIntent negotiate producing a real return-card with the exact original '因为还有话没有说完...' copy and '约好了...' status. See evidence/track-b/README.md 'Workstream B1 -- fourth checkpoint' section."
