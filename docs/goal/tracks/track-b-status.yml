  - "Playwright verification methodology note: getByRole('button', {name}) with exact:false performs substring matching against the FULL accessible name (all descendant text, e.g. a nav button's <strong>label</strong><small>description</small> both count) across the ENTIRE page, not just an intended container -- since all five product spaces are simultaneously mounted (hidden-toggled, not unmounted) per the existing architecture, an unscoped/loose name match can silently grab a same-substring element from a different, currently-hidden-looking-but-still-matched space. Scope nav-button locators to page.getByRole('navigation', {name: ...}) first, and use each space's exact label from ProductShell.tsx's productSpaces array ('我的' not '我', '今天' not 'Aurora') -- see evidence/track-b/scripts/observe-b1-routes.mjs for the corrected pattern."
  - "Loading-audit checkpoint done: nine components (MemoryStarfield, ClaimCandidateReview, CapsuleWorkbench, UnderstandingCorrection, PsychologySkillStudio, RelationsView, AuthGate, AuroraConversation, PortraitView) migrated onto web/src/loading.tsx's existing AsyncButton/LoadingText primitives; loading.tsx itself needed no changes. This closes the 'single async/task/error model' item from the earlier handoff note above, at least for the unambiguous single-button/single-item cases -- the remaining shared-busy-across-siblings cases (see discoveries) are real but smaller follow-ups, not blockers."
  - "Next unblocked B1 step: begin the actual AuroraApp.tsx decomposition into per-route domain hooks/stores now that real routes exist (docs/tracks/TRACK-B-COMPLETE-EXPERIENCE.md section 5's 'application shell, route pages, domain hooks/stores and small presentational components'). Suggested order, since AuroraApp.tsx is ~1270 lines with 60+ useState hooks: extract one space's state+handlers into a dedicated hook at a time, starting with a self-contained one (e.g. useRelationsSpace or usePortraitSpace, which have few cross-space dependencies) before the more entangled ones (Aurora conversation streaming, capsule/resonance, which share sessionId/status/skillSuggestion across spaces). Doing this would also naturally unlock the shared-busy-across-siblings discoveries above, since a per-space hook is the natural place to introduce a per-item busy id (e.g. an evolveBusyId for AuroraSelfSpace, mirroring the existing claimCandidateBusyId/detailBusy/rollbackBusy pattern) instead of one global boolean."
  - "B5 first slice done: PWA offline app shell (manifest + service-worker precache of the static app shell only + branded offline fallback reusing the existing ConnectError path, no AuroraApp.tsx change needed + an explicit, live-verified API-caching boundary). This closes backlog item (6) from B0's original list ('build a real offline app shell') and the B0 discovery about a blank offline error page. Next unblocked B5 step, in priority order: (1) a real install-prompt UX -- capture the browser's beforeinstallprompt event and surface an in-app 'install Inner Cosmos' affordance (e.g. in the 我的/Me space or a dismissible banner), since right now installability relies entirely on the browser's own default UI; (2) a versioned-update flow with real user-facing copy -- vite-plugin-pwa's registerSW() callbacks (onNeedRefresh/onOfflineReady) were left at defaults (registerType: 'autoUpdate' silently reloads), spec section 9 asks for a 'safe update flow' which implies at least a visible 'a new version is ready' moment, not a silent reload that could interrupt an in-progress Aurora conversation; (3) Capacitor-specific §9 checks (deep links, secure storage, network/background transitions, mic/push permission UX) -- completely untouched, this slice was web-PWA only; (4) reconnect/resume idempotency for streams and queued actions (§9's 'show what is pending') -- not addressed; (5) the small ConnectError copy gap (raw 'Failed to fetch' text) noted in discoveries above, once AuroraApp.tsx/api.ts are free of the concurrent B1 edit."
  - "First AuroraApp.tsx domain-hook decomposition slice done: the Aurora conversation/session domain (message list, streaming/turn status, interrupt/stop, mode picker, WakeIntent negotiate, session bootstrap/replay) is now in web/src/hooks/useAuroraSession.ts, TDD'd with 14 new characterization tests, wired into AuroraApp.tsx with no JSX/behavior change, and live-verified. AuroraApp.tsx dropped from ~1270 to ~900 lines but still holds every OTHER domain inline: memory/starfield (starfield, starfieldDetail, memoryOperations, correction targets/claims/candidates), capsule/resonance (capsules, genomeHistory, capsulePreview, sandbox, persona chat, slow letters), connections/letters (connectionRequests, friends, people, relations, letter threads), psychology skills, portrait, and account settings -- none of those moved this pass. Next unblocked step is your call between two reasonable options: (a) extract the memory/starfield + correction domain next (a natural pairing since beginMemoryCorrection already bridges them, and MemoryStarfield/UnderstandingCorrection/ClaimCandidateReview are the three components it would feed) into e.g. useMemoryStarfield.ts, or (b) extract the smaller, more self-contained relations/connections domain (openRelation/refreshConnections/requestPersonConnection/decideConnection/leaveConnection, feeding PeopleDiscovery/RelationsView) first as an easier warm-up before the more entangled capsule/resonance domain. Either is legitimate; capsule/resonance is the most entangled (shares sessionId/skillLocale/status with the just-extracted Aurora domain and with psychology skills) so it is the least attractive next slice. Once 2-3 more domain hooks land, AuroraApp.tsx itself should shrink enough to start the separate, later rendering-decomposition pass (splitting the five product-space JSX blocks into small presentational components) that this checkpoint deliberately did not attempt."
