discoveries:
  - "ai-lab/ (Python) already has a mature dev/held_out/adversarial/compiler_train split, adapters, judges and a real-provider-pairwise CLI (evidence/innovation/INNO-EVAL-001/002/003) — but its adapters are deterministic fixtures that match `expected` by construction, not a harness that drives the real Java runtime. This session's Java suites fill exactly that gap; they are additive, not a replacement, and the two catalogs are not yet cross-referenced (see A0 remaining)."
  - "AuroraDualKernelRuntime already supports single-vs-dual via the `inner-cosmos.aurora.runtime` property (enabled()/runtimeMode field), so the single-pass-vs-dual-kernel ablation needed no production code change to drive — only ReflectionTestUtils to set the field per test variant."
  - "Real-provider finding (reproduced identically on GLM, DeepSeek and MiniMax, n=2 scenarios x these 3 providers): production's dual-kernel plan/speaker instructions (AuroraDualKernelRuntime.planInstruction()/speakerInstruction()) do not embed an inline JSON schema example, and every real provider deviated from the expected AuroraPlanResult/AuroraResult field names on the first attempt every single time (badOutputEventsInThisCall=2 on every dual-kernel run vs 0 on single-pass, which does embed a schema example in this test). The repair-retry/critic path still recovered a non-fallback answer every time, but this is a concrete, repeatable A1 prompt-engineering lead, not a lexical guess. Full detail in evidence/track-a/A0-quality-laboratory/README.md section 4."
handoff_notes:
  - "Five suites are green under ./mvnw test: TrackARuntimeAblationEvaluationTest, TrackAMemoryAuthorityAblationEvaluationTest, TrackACapsuleGenomeAblationEvaluationTest, TrackAProactiveDecisionEvaluationTest (offline/deterministic, always run) and TrackARealProviderSmokeEvaluationTest (tagged real-provider, excluded from the default gate via pom.xml's excludedGroups property, run explicitly with -DexcludedGroups= plus env credentials)."
  - "pom.xml changed: added an `excludedGroups` property (default `real-provider`) and wired maven-surefire-plugin's `excludedGroups` to it, so the default gate stays fully offline/deterministic while the real-provider suite remains explicitly runnable — this is the only non-test, non-evidence file this session touched."
