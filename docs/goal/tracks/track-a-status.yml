discoveries:
  - "ai-lab/ (Python) already has a mature dev/held_out/adversarial/compiler_train split, adapters, judges and a real-provider-pairwise CLI (evidence/innovation/INNO-EVAL-001/002/003) — but its adapters are deterministic fixtures that match `expected` by construction, not a harness that drives the real Java runtime. This session's Java suites fill exactly that gap; they are additive, not a replacement, and the two catalogs are not yet cross-referenced (see A0 remaining)."
  - "AuroraDualKernelRuntime already supports single-vs-dual via the `inner-cosmos.aurora.runtime` property (enabled()/runtimeMode field), so the single-pass-vs-dual-kernel ablation needed no production code change to drive — only ReflectionTestUtils to set the field per test variant."
  - "Real-provider finding (reproduced identically on GLM, DeepSeek and MiniMax, n=2 scenarios x these 3 providers): production's dual-kernel plan/speaker instructions (AuroraDualKernelRuntime.planInstruction()/speakerInstruction()) do not embed an inline JSON schema example, and every real provider deviated from the expected AuroraPlanResult/AuroraResult field names on the first attempt every single time (badOutputEventsInThisCall=2 on every dual-kernel run vs 0 on single-pass, which does embed a schema example in this test). The repair-retry/critic path still recovered a non-fallback answer every time, but this is a concrete, repeatable A1 prompt-engineering lead, not a lexical guess. Full detail in evidence/track-a/A0-quality-laboratory/README.md section 4."
  - "A1 FIX CONFIRMED (this session): adding inline JSON schema examples to AuroraDualKernelRuntime.planInstruction()/speakerInstruction()/criticInstruction() (matching the style PromptBuilder.withOutputSchema() already used for the single-pass path) dropped badOutputEventsInThisCall from 2 to 0 on every dual-kernel real-provider call across GLM, DeepSeek and MiniMax (n=2 scenarios x 3 providers, same harness/scenarios as the A0 finding). Critic/repair-retry path, needsCritic triggers, interruption handling and runtimeMode single/dual switch were left unchanged — only instruction text changed. Full detail in evidence/track-a/A1-living-aurora/README.md."
  - "GLM's dual-kernel latency dropped noticeably once the repair-retry round-trip was no longer needed on the first attempt (illustrative, n=1 per cell: TA-SES-DEV-01 27970ms->7137ms, TA-CRISIS-DEV-01 29824ms->16251ms) — a plausible side-effect of the schema fix, not a formally repeated latency benchmark; see evidence/track-a/A1-living-aurora/README.md §2."
  - "The next highest-value A1 lead identified but not yet implemented this session: AuroraDualKernelRuntime.enabled() is a global single-vs-dual switch (inner-cosmos.aurora.runtime property), not a per-turn adaptive decision as TRACK-A-LIVING-INTELLIGENCE.md §5 asks for ('Dual kernel is adaptive, not mandatory... high-ambiguity, high-continuity or high-risk turns may spend more budget'). Implementing per-turn adaptivity (e.g. a cheap pre-classifier or a plan-kernel self-assessment deciding whether to invoke the speaker+critic path vs. a fast single-pass reply) is recorded as the top remaining A1 lead in evidence/track-a/A1-living-aurora/README.md §5."
  - "ADAPTIVE BUDGET POLICY IMPLEMENTED (this follow-up session): the A1 lead above is now real code, not just a recommendation. New DualKernelBudgetPolicy (com.innercosmos.ai.runtime) scores a turn using signals reused from com.innercosmos.safety (CrisisKeywordRule, DistressSignalDetector — deliberately NOT a new risk lexicon), a small dedicated ambiguity-marker list, and structural continuity signals (interruption present, relevant-memory count, recent-thread depth). AuroraDualKernelRuntime.shouldUseDualKernelForTurn(turnContext) is the new routing entry point; inner-cosmos.aurora.runtime now accepts `adaptive` alongside the unchanged-default `single`/`dual`. AuroraAgentServiceImpl's single call site was updated from `.enabled()` to `.shouldUseDualKernelForTurn(turnContext)` — the only production wiring change. 12 unit tests + a 12-scenario-row ablation (6 catalog types x dev/held-out, reusing track-a-scenario-catalog-v1.json) all passed with correct budget AND correct module-call pattern (single-pass never touches AURORA_PLAN/SPEAKER/CRITIC). A real-GLM smoke run showed a genuine provider-observed difference: 1 real call/7.15s for a simple scenario vs 2 real calls/12.26s for a crisis scenario, same adaptive runtime, same provider, same session. Full detail: evidence/track-a/A1-living-aurora/README.md §6."
  - "Calibration caveat for the adaptive policy (honest limitation, not a hidden gap): the score weights (risk=3, ambiguity=2, interruption=2, memory up to 2, thread-depth=1) and the dual-kernel threshold (2) were reasoned to match the spec's qualitative examples on 6 of the 13 catalog scenario types, not tuned against a labeled corpus or validated on the other 7 types (disagreement, user_correction, quiet_hours, changing_preference, data_withdrawal, and the 2 capsule types). A future session should widen the ablation to those types and consider whether they expose a signal the current policy does not yet score, and treat the weights as a first calibration, not a final one — see the new human_gates entry."
  - "A2 SESSION START AUDIT: contrary to A2-memory-profile's NOT_STARTED status coming into this session, a substantial unified-claim system already exists and is already tested — ClaimCandidateServiceImpl (Campaign B automatic ingestion with authority tiers via ai.claim.ClaimAuthority/ClaimCandidateExtractor), UserCorrectionServiceImpl (explicit-correction promotion with UnderstandingClaim version/supersedesClaimId chaining and ClaimPropagation audit rows), and MemoryLifecycleServiceImpl (broad correction/withdrawal propagation: MemoryCard supersede, AuthorizedMemoryRef/EchoCapsule NEEDS_REVIEW + CapsuleGenomeService.markNeedsReview, MemoryEmbedding STALE invalidation, DataUseGrantService revocation, derived ThoughtFragment/TodoItem/RelationMention deletion on FORGET). MemoryRetrievalServiceImpl.taskFit already gives a real (if simple) task-conditioned retrieval policy. This changed which A2 gap this session targeted: not \"build unified ingestion\" or \"build correction propagation\" (both already real), but the one piece an exhaustive grep proved was 0% implemented — UnderstandingClaim.confidence was written once at insert and never read/modified by any other production code path, so §6's \"decay weak inferences and never decay explicit user assertions as if they were guesses\" sentence had zero code behind it."
  - "A2 CLAIM CONFIDENCE DECAY IMPLEMENTED (this session): new pure ClaimConfidenceDecayPolicy (com.innercosmos.ai.claim) computes a time-decayed confidence as a read-time function of (immutable stored confidence, authority tier, elapsed time since last reinforcement) rather than mutating the stored column in place — deliberately avoiding the double-decay/idempotency risk a nightly-multiplication design (like NightlyMemorySettlementJob's capsule-energy decay) would carry. Per-tier half-lives: MODEL_INFERENCE 14d < SINGLE_EXPLICIT 30d < REPEATED_BEHAVIOR 60d < REPEATED_EXPLICIT 90d; USER_CORRECTION/USER_CONFIRMED never decay. Wired into ClaimCandidateServiceImpl.listCandidates (lazy per-user decay+auto-dismiss below a 0.15 floor, on read) and a new global ClaimCandidateService.sweepStaleCandidates(batchSize) backed by a new scheduled ClaimDecaySweepJob (mirrors MemoryEmbeddingRebuildJob's simpler global-batch pattern rather than NightlyMemorySettlementJob's per-user loop, since decay needs no per-user context). 9 pure unit tests + 2 scheduler-delegation tests + 3 new H2 integration tests (200-day-stale candidate auto-dismissed; exactly-one-half-life candidate shows a halved-not-binary confidence and stays listed; a 3-user global sweep dismisses the stale one, leaves a fresh one, and leaves a confirm()-promoted ACTIVE claim backdated 2 years completely untouched at confidence 1.0) + 1 new sibling evaluation suite (TrackAClaimDecayAblationEvaluationTest, 4 rows / 2 types x dev+held-out, proving both failure modes a naive design could have: never-retiring a stale guess, and wrongly eroding an explicit correction) all passed. Full detail: evidence/track-a/A2-memory-profile/README.md."
  - "Backdating a BaseEntity's updatedAt for test purposes cannot use updateById(entity) — MybatisMetaObjectHandler.updateFill unconditionally stamps updated_at to now() on every entity-based update (that was the M1 fix's whole point). The working pattern, already used in production by MemoryLifecycleServiceImpl's FORGET path for the same reason, is claimMapper.update(null, new UpdateWrapper<T>().eq(\"id\", id).set(\"updated_at\", when)) — bypassing the entity-fill path entirely by passing a null entity and setting the column directly in the wrapper."
  - "The single largest remaining A2 gap identified but not yet implemented this session: UnderstandingClaim (the portrait/correction ledger) is never consulted by MemoryRetrievalServiceImpl.retrieve() — retrieval reads tb_memory_card only. An ACTIVE, USER_CORRECTION-authority claim is authoritative but is not itself retrievable evidence; it only reaches a conversation indirectly through whichever MemoryCard rows the correction flow also touched. Bridging the claim graph into retrieval (or explicitly documenting why it should remain a separate ledger) is recorded as the top remaining A2 architectural question for the next session — see evidence/track-a/A2-memory-profile/README.md §5."
