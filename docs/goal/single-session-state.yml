  done_this_front_summary:
    - "Frontend port: UnderstandingCorrection.tsx now renders a 'you confirmed corrections' history
      list (field/type/time, old->new change, reason) with a two-step inline retire action (click
      '让这条退休' -> inline '确认退休/再想想' -> onRetire), matching legacy corrections.html but in
      the AppShell design language (no native confirm()). api.ts gained UserCorrection type +
      recentCorrections()/retireCorrection(id). AuroraApp.tsx loads corrections in bootstrap
      (appended at the END of the Promise.all to preserve the positional-index casts loaded[8]/
      [9]/[13]), refetches BOTH the history list and understandingClaims after a retire (retire
      reactivates the superseded claim, so active claims change too), and also refetches the
      history after a confirm so a new correction appears immediately. New styles in styles.css."
    - "Tests: 4 new Vitest cases in UnderstandingCorrection.test.tsx (history renders old->new +
      reason; retire requires inline confirm then calls onRetire(id); retiring state disables +
      relabels the confirm; no history section when empty). 46/46 Vitest green (was 42), tsc clean,
      production bundle rebuilt (vite build into src/main/resources/static/app/aurora)."
    - "Live end-to-end (packaged jar on a THROWAWAY H2, not the persistent dev DB): registered a
      user, created a CONFIRMED correction via the real /confirm endpoint, reloaded the SPA and
      confirmed the history section renders it (heading 你确认过的更正, change 你更喜欢独处→我只是需要
      先恢复精力, reason/field/time all correct), then drove the real UI retire: '让这条退休' ->
      inline confirm appeared -> '确认退休' -> DELETE fired through the wired api client -> record
      disappeared, backend list dropped to 0, status message shown, 0 console errors. (Browser
      'computer' screenshot tool timed out — the same documented environment flakiness as prior
      checkpoints; captured the rendered .correction-history outerHTML as textual proof instead.)"
    - "[BACKEND 500 FIXED — real, deterministic bug the port surfaces] While re-seeding for a
      screenshot, hit a 500 that reproduced deterministically: confirm a self-understanding
      correction (understanding-claim version 1) -> retire it (claim -> RETIRED, still occupying
      (user_id, claim_key, version=1)) -> re-correct the SAME topic -> UserCorrectionServiceImpl
      computed the new version from the highest ACTIVE claim (null after retire -> version 1) and
      re-inserted version 1, violating the unique (user_id, claim_key, version) index. Making retire
      reachable in the AppShell makes this exact sequence (retire, then re-correct the same
      understanding) materially more likely for real users, so it was fixed here rather than
      deferred. Fix: version now advances past the highest EXISTING version across ALL statuses
      (RETIRED/SUPERSEDED/ACTIVE), while the supersession target stays the ACTIVE claim. New
      UserCorrectionControllerTest.reCorrectingAfterRetiringTheOnlyClaimAdvancesVersionInsteadOf
      CollidingOnTheRetiredRow: red (500) -> green (200, version 2 ACTIVE, retired v1 kept in
      history). Re-verified live through the rebuilt running jar: confirm->retire->re-confirm = 200,
      version 2."
    - "committed as HEAD b4eb9b4. Full `mvn test` gate run at this checkpoint: 791/791 runnable
      green, 0 failures; the only 6 errors are Testcontainers integration tests
      (PostgresApplicationSmokeTest, PostgresFlywayBaselineTest, Redis*, JdbcOutbox*) failing on
