active_front:
  id: CAMPAIGN-B-EXPERIENCE
  state: CORRECTION_PROPAGATION_HARDENING_IN_PROGRESS
  intent: Close the gap between the Campaign B Experience Contract (对齐文档/17-Campaign-B-Inner-Cosmos-Experience-Contract.md) and what a real user can actually trigger through the UI, then extend evaluability beyond CRUD-style tests.
  next_machine_actions:
    - DONE — the correction form previously always sent targetType=AURORA_UNDERSTANDING; a MemoryCard only got superseded/propagated to capsules if the user's free-typed oldValue happened to text-match an existing memory (fragile, undiscoverable). Added a "这条不准确了" button on each MemoryStarfield star that opens UnderstandingCorrection pre-targeted at that exact MEMORY_CARD id. Also fixed confirmCorrection never refetching starfield/memories/capsules despite claiming sync.
    - DONE — found and fixed a second, deeper gap: MockDataInitializer never created any AuthorizedMemoryRef rows for the demo "林澈的回声分身" capsule (only the denormalized EchoCapsule.authorizedMemoryIds display field was set), so the capsule-NEEDS_REVIEW propagation path described in the Experience Contract was structurally unreachable for the demo account even though the backend logic for it is correct and unit-tested. Seeded real AuthorizedMemoryRef rows (capsuleId/memoryCardId/AUTHORIZED) for the mirror capsule's top-6 memories. New Playwright journey drives a correction on an authorized memory through to the capsule's "需复核" tab badge, verified order-independent of other tests in the same file (first found the assertion was accidentally order-dependent — a capsule already in NEEDS_REVIEW from an earlier test caused a silent self-skip; fixed by dropping the too-broad "skip if already reviewed" guard so the test asserts the end-state directly regardless of run order).
    - Ran the FULL Maven suite (not just focused) before committing, since this changes a Spring bean constructor (MockDataInitializer/DemoDataConfiguration) exercised by nearly every @SpringBootTest (test profile has seed-enabled:true) — exit code 0, no [ERROR] markers. 13/13 Playwright (was 11 at session start), 33/33 Vitest.
    - NEXT — decide the scope of "claim precision" evaluation given there is no automatic claim-extraction pipeline yet (claims only originate from explicit UserCorrection today); either narrow the doc-16 metric to explicit-correction precision/consistency or build extraction first.
    - RE-CHECKED, LOWER SEVERITY THAN FIRST FLAGGED — ai-lab/adapters/current_production.py (`CurrentProductionContractAdapter`) is an honestly self-labeled offline fixture (class docstring says so; system.availability="AVAILABLE_CONTRACT_FIXTURE") that greps source markers and echoes each scenario's own `expected` block back as the "result" rather than driving the real backend/LLM. Confirmed via grep that docs/goal/complete-product-acceptance.yml does NOT currently cite ai-lab results for any gate, so this is not an active evidence-integrity violation today — but it would become one if a future checkpoint cites ai-lab output as live verification without preserving that label. Left unfixed (real fix = a real adapter driving the live backend); tracked here so it isn't cited by mistake later.
    - Retrieval eval (MemoryRetrievalEvaluationTest + memory-retrieval-v1.json) is a real scored/thresholded eval but tiny (12 memories/10 cases, one annotator) — grow it with more cases and a held-out set once time allows.
    - Return to UNIFIED-FIVE-SPACE-APPSHELL only if a new experience gap requires it; AuroraApp is down to ~1000 lines with shell/conversation/Self/correction/starfield/capsule-workbench/resonance-network/letters/psychology-skill-studio all isolated into components/*.tsx with matching Vitest specs. Remaining inline surface (bootstrap wiring, wake-intent Returns section, hero/mode-nav composition, Login) is orchestration, not a blocked user experience.

