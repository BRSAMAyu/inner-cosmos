    - "[BACKEND 500 FIXED — real, deterministic bug the port surfaces] While re-seeding for a
      screenshot, hit a 500 that reproduced deterministically: confirm a self-understanding
      correction (understanding-claim version 1) -> retire it (claim -> RETIRED, still occupying
      (user_id, claim_key, version=1)) -> re-correct the SAME topic -> UserCorrectionServiceImpl
      computed the new version from the highest ACTIVE claim (null after retire -> version 1) and
      re-inserted version 1, violating the unique (user_id, claim_key, version) index. Making retire
      reachable in the AppShell makes this exact sequence (retire, then re-correct the same
      understanding) materially more likely for real users, so it was fixed here rather than
      deferred. Fix: version now advances past the highest EXISTING version across ALL statuses
      (RETIRED/SUPERSEDED/ACTIVE), while the supersession target stays the ACTIVE claim. New
      UserCorrectionControllerTest.reCorrectingAfterRetiringTheOnlyClaimAdvancesVersionInsteadOf
      CollidingOnTheRetiredRow: red (500) -> green (200, version 2 ACTIVE, retired v1 kept in
      history). Re-verified live through the rebuilt running jar: confirm->retire->re-confirm = 200,
      version 2."
    - "committed as HEAD b4eb9b4. Full `mvn test` gate run at this checkpoint: 791/791 runnable
      green, 0 failures; the only 6 errors are Testcontainers integration tests
      (PostgresApplicationSmokeTest, PostgresFlywayBaselineTest, Redis*, JdbcOutbox*) failing on
