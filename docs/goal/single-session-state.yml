closed_front_pseudo_semantic_sentiment_bug:
  id: PSEUDO-SEMANTIC-SENTIMENT-BUG
  state: CLOSED_THIS_SESSION_FIX_VERIFIED_ACROSS_ALL_CONSUMERS
  intent: |
    While closing Campaign C punch-list item 2 (Genome compiler feature extraction), discovered
    and worked around a real, verified bug in PseudoSemanticAnalyzer (ai/semantic) shared by ~10
    consumers. Campaign C item 2 itself is DONE (see done_this_front_summary); this front is the
    newly-surfaced, higher-priority gap to pick up next.
  bug_detail: |
    PseudoSemanticAnalyzer.tokenize() splits Chinese text into INDIVIDUAL CHARACTERS, but
    calculateSentiment()/checkSafetyRisk() score via EXACT lookup (ChineseSentimentLexicon.getScore(token))
    against a lexicon whose keys are almost all 2+ character words. A single Chinese character is
    almost never itself a lexicon key, so sentimentScore is silently ~0.0 (NEUTRAL) for nearly all
    real sentences. Verified directly: 4/4 clearly emotional probe sentences ("我今天很开心，很满足，
    充满希望" etc.) scored 0.0/NEUTRAL. Theme detection (detectThemes) and intent detection
    (detectIntent/checkSafetyRisk's SELF_HARM branch) are UNAFFECTED because they already do
    substring containment (token.contains(keyword) || keyword.contains(token)), which works even
    with single-char tokens — only the exact-match sentiment scoring path is broken.
    Safety-relevant angle: checkSafetyRisk()'s secondary fallback ("severe negative sentiment
    words score <= -4") can now NEVER fire via free text, because every severe-negative lexicon
    entry is 2+ characters (绝望/崩溃/撑不住/活不下去/生不如死 etc.) — only the explicit SELF_HARM
    keyword substring-match path still catches crisis language. The independently-audited real
    safety pipeline (CrisisKeywordRule/SafetyBoundaryFilter/SafetyReviewService — see
    inner-cosmos-project memory "Safety pipeline independently re-audited = SOLID") is a SEPARATE,
    unaffected system; this bug is in the Mock-mode/demo pseudo-semantic layer used for response
    flavor selection, emotion visualization, and one CRISIS-label check in
    AuroraMemoryContextServiceImpl:184 — real but secondary, not the primary safety gate.
    Consumers (grep-verified): MockLlmClient (response tone + demo-mode safety block flavor),
    EmotionSpectrumDeriver, MemorySettlementServiceImpl, ThoughtShredderServiceImpl,
    EmotionInsightServiceImpl, AuroraContentLibrary, AuroraAgentServiceImpl, AuroraMemoryContextServiceImpl.
  workaround_applied_this_checkpoint: |
    CapsuleServiceImpl's new scene-conflict detection (Campaign C item 2) does NOT depend on the
    broken calculateSentiment path — it uses a small self-contained substring-based
    sceneSentiment() classifier (POSITIVE_WORDS/NEGATIVE_WORDS sets, whole-text String.contains),
    deliberately independent of PseudoSemanticAnalyzer, so the new feature works correctly today.
    This is a properly scoped local fix, not a fix of the shared root cause.
  resolution: |
    FIXED (this checkpoint): calculateSentiment and checkSafetyRisk's severe-word fallback now
    scan the raw text via substring containment (mirroring detectThemes/detectIntent) instead of
    exact-match against single-character tokens. Added entries()/getMultiplier-style accessors to
    ChineseSentimentLexicon/ChineseIntensifiers for this. Full consumer test surface re-ran green
    with no expectation changes needed: MockLlmClientAuroraDispatchTest, ThoughtShredderServiceImplTest,
    EmotionInsightServiceImplTest, EmotionSpectrumDeriverTest, EmotionWeatherMapperTest,
    AuroraChatOwnershipTest, NightlyMemorySettlementJobPaginationTest,
    NightlyMemorySettlementJobBaselineTest, CapsuleEnergyDecayTest, EmotionTraceDedupIntegrationTest,
    AuroraStreamServiceTest, AuroraEmergenceTest, DataMaskingServiceTest, plus a full `mvn test`
    cross-domain run (793/793).

closed_front_campaign_c_quality:
  id: CAMPAIGN-C-QUALITY
  state: TWO_P1S_CLOSED_THIS_CHECKPOINT_GENOME_IR_NEXT
  intent: |
    An independent review of this session's uncommitted Genome v2 work (Campaign C item 2) found
    two real P1 gaps and one valid conceptual overclaim. All three addressed this checkpoint; see
    done_this_front_summary below.
  done_this_front_summary:
    - "[P1 FIXED] Simulator purpose-grant bypass: createFromMemory's inline filter and the shared
      replaceAuthorizations (used by both updateContext and recompileGenome) did not exclude
      SIMULATOR_AUTHORIZED, and did not require it for a simulatorOnly capsule either — so a
      memory explicitly marked simulator-testing-only could end up in a normal, potentially-
      public capsule, and a Simulator capsule could later be recompiled with ordinary
      AURORA_PRIVATE memories. Fixed both directions: createFromMemory now also excludes
      SIMULATOR_AUTHORIZED; replaceAuthorizations now branches on capsule.simulatorOnly (true ->
      accept ONLY SIMULATOR_AUTHORIZED, false -> reject it same as LOCAL_ONLY/
      NO_EXTERNAL_PROCESSING). New test
      CapsuleGenomeServiceIntegrationTest.simulatorPurposeGrantCannotLeakIntoNormalCapsuleOrBeSwappedOutLater
      covers all 3 directions. NOTE (not yet done): this is still a consentScope string value on
      MemoryCard, not the versioned, revocable, purpose-specific DataUseGrant entity the review
      recommended (purpose=CAPSULE_PUBLIC|SIMULATOR|AURORA|RESEARCH, granted_at/revoked_at/
      expires_at) — flagged as a follow-up, not done this checkpoint."
    - "[P1 FIXED] FORGET did not propagate to dependent capsules: MemoryLifecycleServiceImpl.forgetDerived
      deleted the AuthorizedMemoryRef row but left the capsule's compiledPersonaPrompt/
      styleProfileJson/contextPreviewJson (and the capsule's own copies of those fields) intact,
      and did not delist an already-public capsule or withdraw its Genome — so a capsule built
      from a just-forgotten memory could still sit in the public plaza. Fixed: forgetDerived now
      captures affected capsule IDs before deleting the refs, then immediately sets
      visibility_status=NEEDS_REVIEW/is_public=false, redacts style_profile_json/
      context_preview_json to null, and calls genomeService.markNeedsReview — all in the same
      FORGET transaction. New scenario 'with-capsule' added to ForgettingCompletenessEvaluationTest/
      forgetting-completeness-v1.json using a REAL capsule compiled via
      CapsuleService.createFromMemory (not a fixture), asserting delisting + Genome withdrawal +
      plaza removal. Verified via git-stash-revert: reverting the fix made the new assertion fail
      with the exact predicted message, confirming the test is real. NOTE (not yet done): prompt
      cache, sync-queue/event backlog, analytics, and backup lifecycle for a forgotten memory are
      still unaudited — review's ask, not yet closed."
    - "[Reframed] 'conflict'/'conflicts' renamed to 'hasTension'/'tensions' throughout
      CapsuleServiceImpl.buildContextPreview and CapsuleGenomeServiceImpl's evaluationJson
      (conflictCount -> tensionCount): a happy and a difficult memory about the same relationship
      is normal emotional complexity, not a detected logical contradiction, and the old field
      name was overclaiming. COMPILER_VERSION's Javadoc now explicitly frames v2 as a
      'structural compiler scaffold' — no sourced intermediate representation yet (no per-feature
      memoryId/sourceVersion/evidence/confidence), no critic pass, fixed theme->voice mappings
      can inject unsupported personality claims. Genome IR (claims/values/style
      examples/habits/scenes/temporal state/tensions/unknowns, each with provenance) is the next
      real step for Campaign C item 2, not yet started."
    - "State-file honesty pass (this edit): last_full_gate's summary fields (784/17/11, baseline
      4c14ef9) had drifted from its own narrative bullets (which already said 33/33, 13/13) —
      fixed to the independently-reverified 792/792 @ 5bcc649 baseline, now 793/793 after this
      checkpoint's new tests. CAMPAIGN-B-EXPERIENCE's 'only dataset growth remaining' claim
      walked back to IN_PROGRESS with the real gaps listed (no automatic claim-extraction
      pipeline; forgetting-completeness eval still doesn't cover cache/queue/analytics/backup)."
  genome_ir_progress:
    - "Genome IR slice 1 DONE this checkpoint: every scene in contextPreviewJson now carries a
      'memories' array of {memoryId, sourceVersion, confidence} for the exact authorized memories
      that produced it (was: an aggregate excerpt with no per-memory traceability). styleProfileJson's
      dominant voice descriptors now carry a parallel 'voiceEvidence' map (theme -> [memoryIds]) so
      a reviewer or owner can trace e.g. '在关系中重视被认真回应' back to specific memories instead
      of trusting an unexplained personality adjective. Covered by new assertions in
      CapsuleGenomeServiceIntegrationTest.compilerIndexesDistinctScenesAndSurfacesOpposingSentimentAsTension
      (7/7 green), plus CapsuleMatchingTest 16/16, CapsuleQuotaIntegrationTest 5/5,
      ForgettingCompletenessEvaluationTest 1/1, DataMaskingServiceTest 21/21, EchoCapsuleVOTest 2/2
      unaffected. This is ONE bounded slice, not the full IR: still no claims/values/habits/
      temporal-state/unknowns/runtime-retrieval-policy categories — those remain queued below."
  eval_dimensions_progress:
    - "GenomeCompilerGroundednessEvaluationTest ADDED this checkpoint (1 of the review's 3
      requested eval dimensions — the leakage/boundary one): 4 scored scenarios, each requesting
      a mix of legitimate memoryIds plus one illegitimate one (another user's memory; a
      LOCAL_ONLY/NO_EXTERNAL_PROCESSING/SIMULATOR_AUTHORIZED memory), asserting that NO citation
      in styleProfileJson.voiceEvidence or contextPreviewJson.scenes[].memories ever traces back
      to the illegitimate memory. Verified via a real revert-and-restore check: temporarily
      removing the SIMULATOR_AUTHORIZED exclusion in createFromMemory made the eval fail with
      'compiler cited an illegitimate memory as evidence... ungroundedCitations=[20]' — proving
      the eval is a real, live-fire regression gate, not a vacuous pass. NOTE: this proves the
      compiler never fabricates evidence from memories it had no right to use — it does NOT (and
      without a real LLM provider, cannot) prove the compiled voice reads like the real user.
      Fidelity in that stronger sense, and the other 2 requested dimensions (fact/style fidelity
      against held-out memories, unfamiliar-scenario stability), remain open — see below."
    - "[P1 FIXED, real gap found while investigating 'counter-prompt-attack' testability]
      PersonaChatServiceImpl's real-visitor-facing reply had ZERO output-side safety net: the
      system prompt asks the model not to leak contact info/real identity/unauthorized memories,
      but that is a request a real provider (human-gated, not yet exercised for capsule work)
      manipulated via prompt injection could still ignore — and nothing downstream would catch
      it. grep-confirmed SafetyBoundaryFilter is used elsewhere (WakeIntentDeliveryJob,
      PsychologySkillServiceImpl, SafetyServiceImpl) but never for capsule persona-chat replies.
      Fixed: capsuleMessage.textContent now passes through DataMaskingUtils.maskContact (the
      same chokepoint AiLogServiceImpl already uses for logged AI responses) before it reaches
      the visitor. New test
      PersonaChatServiceImplPhaseBTest.modelReplyLeakingContactInfo_isRedactedBeforePersisting
      stubs a leaky reply and asserts the phone number/email never reach the returned message.
      Verified via revert-and-restore: reverting the fix made the test fail with 'a real phone
      number must never reach the visitor even if the model leaked it'. This is a genuine partial
      answer to the review's 'counter-prompt/leakage resistance' eval-dimension ask — it hardens
      the boundary a successful injection would need to defeat, though it cannot test whether a
      real model is actually vulnerable to injection without a real provider (human-gated)."
  checkpoint_closed: |
    Simulator purpose-grant fix, FORGET-capsule-propagation fix, conflict-to-tension rename,
    Genome IR provenance slice 1, GenomeCompilerGroundednessEvaluationTest, and persona-chat
    output-side redaction are committed as of HEAD 2ad9683/11ca8d6. Full `mvn test` re-verified
    AT commit 2ad9683: 795/795, BUILD SUCCESS, 2m12s — see last_full_gate below.
  genome_ir_unknowns_slice: |
    Added this checkpoint: inferStyleProfile now emits an honest 'unknowns' array instead of
    silently presenting a generic fallback voice with the same authority as a real theme-derived
    one. Two cases: (1) no authorized memory produced any theme signal at all -> voice falls back
    to "温和、诚实、慢热" AND unknowns explicitly says so ("没有任何授权记忆产生足够强的主题信号...
    不代表已识别出这个人具体的表达模式"); (2) an authorized memory has blank title+summary -> it's
    silently skipped from feature extraction, and unknowns now discloses the count. New test
    CapsuleGenomeServiceIntegrationTest.compilerDisclosesUnknownsInsteadOfPresentingAFallbackVoiceWithFalseConfidence
    (8/8 green in that class); GenomeCompilerGroundednessEvaluationTest, CapsuleMatchingTest,
    CapsuleQuotaIntegrationTest, ForgettingCompletenessEvaluationTest unaffected.
  next_machine_actions:
    - "NEXT — continue the Genome IR scaffold: model claims/values/habits/temporal-state/unknowns
      as their own provenance-carrying categories (not just scenes/voice), and a runtime retrieval
      policy field describing which categories PersonaChatServiceImpl should prioritize per
      question type. Deterministic extractor stays a scaffold (themes/sentiment/scenes); an LLM
      path can propose candidate features when a real provider is available (human gate), with a
      critic pass reviewing evidence support, leakage, and unknowns — but the structural IR
      (provenance fields, versioning) is machine-buildable now, independent of that human gate."
    - "THEN — add the remaining eval dimension that's machine-testable without a real LLM:
      unfamiliar-scenario stability (does the persona degrade gracefully, e.g. via
      PersonaChatServiceImpl/CapsuleSandboxService, on questions outside its authorized memories).
      Fact/style fidelity against held-out memories genuinely needs a real LLM to judge 'reads
      like the user' — log as human-gate-adjacent if attempted against Mock, since Mock's reply
      generation is content-blind by design (verified: buildPersonaChatJson only reads the
      VISITOR's message intent, never the persona's own authorized memory content) — so a
      Mock-only version of this eval risks being vacuous rather than a real fidelity proof."
    - "Also queued, lower priority than the above: DataUseGrant entity to replace the
      consentScope-string purpose enforcement; FORGET propagation to prompt cache/sync-queue/
      analytics/backup; Campaign B automatic claim-extraction pipeline; eval dataset growth;
      apply the same DataMaskingUtils.maskContact output-side check to CapsuleSandboxServiceImpl's
      owner-facing reply for defense-in-depth consistency (lower priority: owner already knows
      their own contact info, so this is not a cross-user leak, just consistency)."

