active_front:
  id: CAMPAIGN-B-EXPERIENCE
  state: EVAL_COVERAGE_COMPLETE_MOVING_TO_DATASET_GROWTH
  intent: Close the gap between the Campaign B Experience Contract (对齐文档/17-Campaign-B-Inner-Cosmos-Experience-Contract.md) and what a real user can actually trigger through the UI, then extend evaluability beyond CRUD-style tests.
  done_this_front_summary:
    - Fixed the correction form so a "这条不准确了" star button opens UnderstandingCorrection pre-targeted at an exact MEMORY_CARD id (previously only reachable via lucky free-text substring matching), and fixed confirmCorrection never refetching starfield/memories/capsules despite claiming sync. (7472e5f)
    - Fixed demo seed data never creating real AuthorizedMemoryRef rows, so the capsule-NEEDS_REVIEW propagation path was structurally unreachable even though the backend logic for it was already correct; added a Playwright journey proving the full star->correct->NEEDS_REVIEW path end to end. (b9f61ad)
    - Built all four doc-16-mandated Campaign B scored/labeled evals (reports under target/evaluation/, each gated on honestly-calibrated thresholds, not rigged-to-pass numbers): retrieval relevance (pre-existing, MemoryRetrievalEvaluationTest), correction-targeting precision (f651c19: MEMORY_CARD 1.0/1.0, free-text 0.778/1.0 — quantifies the exact fragility the star-targeting fix routes around), forgetting completeness (cd3b56c: 0/6 leaked surfaces across memory row/starfield/retrieval + 5 derived tables + rollback-refusal, after fixing a false-positive in the eval's own query-echo design), and conflict handling (this checkpoint: 0/4 violations across sequential-confirm and retract-latest/retract-older/retract-middle interleavings, including a case — retracting an older, already-superseded correction — that no prior structural test covered).
    - Playwright 13/13 (was 11 at session start), Vitest 33/33, AuroraApp down from 1210 to ~1000 lines with 8 domain components extracted.
  next_machine_actions:
    - NEXT — Campaign B's doc-16-mandated eval *dimensions* are now all covered. Remaining eval-quality work is dataset growth: MemoryRetrievalEvaluationTest's dataset is tiny (12 memories/10 cases, one annotator) and the three new evals are also single-annotator/synthetic — grow case counts and add a held-out set once time allows, or move to the next-highest-value Campaign B/C/D gap if dataset growth is judged lower value than a new experience gap.
    - FLAGGED, NOT YET FIXED — ai-lab/adapters/current_production.py (`CurrentProductionContractAdapter`) is an honestly self-labeled offline fixture (system.availability="AVAILABLE_CONTRACT_FIXTURE") that echoes each scenario's own `expected` block back as the "result" rather than driving the real backend/LLM. Not currently cited in docs/goal/complete-product-acceptance.yml (confirmed via grep), so not an active integrity violation today, but would become one if cited as live verification later. Real fix = a real adapter driving the live backend + a real LLM provider; left unfixed given its size.
    - Consider whether UNIFIED-FIVE-SPACE-APPSHELL's remaining inline surface (bootstrap wiring, wake-intent Returns section, hero/mode-nav composition, Login in AuroraApp.tsx) needs further decomposition, or whether it's orchestration that doesn't block a real experience gap and can stay as-is.

