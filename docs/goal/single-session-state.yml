    reason: The correction Experience Contract's propagation promise (star/memory -> preview -> confirm -> starfield/capsule sync) was not reliably reachable through the real UI, the UI did not actually refetch synced state, and demo seed data never populated the AuthorizedMemoryRef rows needed for the capsule NEEDS_REVIEW path to be reachable at all. All three fixed and E2E-verified. All four doc-16-mandated eval dimensions (retrieval relevance, correction-targeting precision, forgetting completeness, conflict handling) now have scored/labeled harnesses with honestly-calibrated thresholds. Remaining work is dataset growth only.
  - id: UNIFIED-FIVE-SPACE-APPSHELL
