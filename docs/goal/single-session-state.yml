closed_front_campaign_b_auto_claim_extraction:
  id: CAMPAIGN-B-AUTO-CLAIM-EXTRACTION
  state: SLICES_1_2_3_DONE_PIPELINE_AND_UI_LIVE_CONFLICT_AND_REALPROVIDER_REMAIN
  intent: |
    Build the missing automatic user-modeling pipeline doc-16 specifies. Today every UnderstandingClaim
    is produced only by an explicit user correction; there is no path from conversation evidence to
    claim candidates. Deliver a real extraction pipeline: conversation evidence -> claim candidate
    extraction -> normalization -> provenance + confidence -> conflict/uncertainty -> user
    confirm/correct -> propagation, gated by a labeled claim-precision harness, with real-provider
    quality proof left as the documented human gate.
  done_slice_1:
    - "com.innercosmos.ai.claim: ClaimTypes (11 doc-16 dimensions), ClaimAuthority (auto tiers below
      user-confirm), ClaimCandidate (type/value/authority/confidence/provenanceMessageIds/uncertain),
      and a deterministic precision-first ClaimCandidateExtractor that rejects questions/hypotheticals/
      reported-speech/momentary feelings and only emits explicit first-person self-statements."
    - "ClaimExtractionService/Impl wraps the extractor in the mock-safe StructuredAiService harness
      (real Provider when configured, deterministic fallback in tests) and SANITIZES every candidate
      (unknown type dropped, foreign provenance stripped, empty provenance dropped, confidence
      clamped) so an unreliable Provider cannot fabricate or mislabel a claim."
    - "RED->GREEN ClaimExtractionEvaluationTest over claim-extraction-v1.json (24 annotated cases;
      precision 1.0 / recall 1.0 / typeAccuracy 1.0 vs thresholds 0.9/0.7/0.9); ClaimExtractionServiceImplTest
      (mock-mode fallback + Provider-hallucination sanitization); full H2 context boots. Evidence
      evidence/innovation/INNO-INNER-007, report target/evaluation/claim-extraction-v1-report.json."
  done_slice_2:
    - "ClaimCandidateService/Impl persists candidates into tb_understanding_claim (status=CANDIDATE,
      sourceType=AUTO_EXTRACTION), idempotent per claim key, version past the unique-index max,
      provenance in evidenceRefs + value JSON — no schema change needed."
    - "ClaimCandidateExtractListener stages candidates on DialogFinishedEvent (AFTER_COMMIT, async,
      failure-swallowing), retaining the per-message provenance memory extraction discards."
    - "confirmCandidate promotes via UserCorrectionService.confirm (inherits impact preview +
      downstream propagation) then retires the candidate; dismissCandidate marks DISMISSED.
      ClaimCandidateController exposes owner-scoped list/confirm/dismiss."
    - "Verified: ClaimCandidateServiceImplIntegrationTest (stage/idempotent/confirm-to-ACTIVE/owner
      scope), ClaimCandidateControllerTest (HTTP surface + cross-user NOT_FOUND). Full Java 833/833.
      Evidence INNO-INNER-007 (Slice 2 section)."
  done_slice_3:
    - "web/src/components/ClaimCandidateReview.tsx: controlled panel (friendly type name, value,
      evidence, confidence bar, provenance count, authority + uncertain/already-known badges,
      confirm/dismiss with inline confirm); renders null when empty. api.ts ClaimCandidate type +
      claimCandidates/confirmClaimCandidate/dismissClaimCandidate (ungoverned /api/aurora path, no
      OpenAPI change). AuroraApp loads + renders in Cosmos space and wires confirm/dismiss. styles.css
      candidate-* dark-theme cards."
    - "Verified: ClaimCandidateReview.test.tsx 6 cases; tsc clean; web suite 66/66; vite build OK.
      Live browser screenshot with a seeded backend conversation is the remaining manual visual check."
  next_machine_actions:
    - "Decision point: Campaign B auto-extraction pipeline is end-to-end (extract -> stage -> review UI
      -> confirm -> propagate) and machine-verified. Remaining Campaign B items (semantic conflict
      detection, en-SG locale for the panel, scale, real-provider blind review) are either
      human-gated or lower-value than other open fronts."
    - "Pivot to the next-highest machine-executable priority_queue front. Candidates: CAMPAIGN-C item 5
      (matching similarity/embedding + diversity/safety-filter stage, currently lexical/theme only) and
      CAMPAIGN-E-PRODUCTION (EKS IaC / observability / resilience — much is human/credential-gated but
      Terraform + runbooks + dashboards-as-code are machine-authorable)."
    - "Reassess whether to try the academic AWS EKS deploy (temporary credentials, 4h window) once a
      deployable release candidate + IaC exist; record any external gate that blocks it and continue."

priority_queue:
  # —— Operator directive §1 (loop-goal-directive.md) merged per 17号协议 §9 (2026-07-16). These
  #    outrank everything below and must reach zero before the campaign/engineering queue resumes. ——
  - id: EXPERIENCE-VISUAL-SYSTEM
    reason: >-
      §1.1 P0. Cold-theme violation removed at token/base level (checkpoint 1, see active_front). Remaining:
      full var() tokenization, light/morandi + seven time-of-day theming with lerp, packaged fonts, five
      motifs, micro-interactions, four loading states, WCAG contrast + Lighthouse>85 + mobile breakpoints.
  - id: EXPERIENCE-DEAD-BUTTONS
    reason: >-
      §1.2 P0 (parallel to §1.1). Operator reports many buttons do nothing. Write a Playwright interaction
      sweep in web/e2e/ that logs in, walks every space, clicks every interactive element and asserts an
      observable response; fix/implement/remove each non-responsive control; freeze the sweep as a
      regression gate. Not yet started.
  - id: EXPERIENCE-LEGACY-PORT
    reason: >-
      §1.3 P1. Continue the G3-UX-SHELL-REAL-PARITY port list (relations/social, echo-plaza directory,
      capsule-chat open, letters outbox/drafts/threads, aurora-chat voice+rituals, capsule-create remaining
      fields) using the NEW design system; retire each legacy page only after verified parity.
  - id: CAMPAIGN-C-QUALITY
    reason: |
      Explore-agent punch list, ranked by user-visible fidelity/trust impact — updated as items close:
      1. OPEN — No real fidelity signal exists. CapsuleGenomeServiceImpl.compile()'s evaluationJson is a structural-eligibility checklist (ownerBound/currentOnly/authorizedMemoryCount), not a fidelity/leakage score. Blocks the whole Campaign C acceptance scenario (same user's long-prompt baseline vs compiled Genome, blind-tested). NOTE: evaluationJson now ALSO carries sceneCount/conflictCount (item 2 below) — still not a fidelity/leakage score, this item is still open.
      2. DONE for the machine-verifiable structural slice — capsule-genome.v3 adds provenance-carrying claims/values/habits/temporalState/unknowns; PersonaChat performs feature-level immutable-snapshot retrieval and emits ContextBuildManifest; unfamiliar-scenario evaluation is green. Evidence INNO-CAP-008. Still open under item 1/6: provider candidate generation, critics and blind fidelity proof.
      3. DONE (prior checkpoint) — CapsuleSandboxServiceImpl feedback is no longer write-only; aggregated per-Genome-version and surfaced in CapsuleWorkbench (fidelitySummary/CapsuleFidelitySummaryVO). Does not gate publish (kept as a visible signal, matching "反馈只成为下一版的改进信号" rather than a hard block).
      4. DONE for capsule/simulator grant authority — INNO-CAP-009 replaces the consentScope-only runtime convention with versioned, revocable, resource-version-bound DataUseGrant purposes and Provider-egress ordering. Broader cross-domain consent-center adoption remains outside this closed slice.
      5. DIVERSITY+SAFETY DONE (INNO-CAP-010, this session) — matching now has a bidirectional block safety filter (tb_block_relation, either direction, skipped before scoring) and an MMR diversity re-rank (theme-family Jaccard, lambda 0.72, per group, FIX-A preserved), both deterministic and tested (CapsuleMatchingTest 18/18). STILL OPEN: real similarity/embedding / user-vector matching and calibrated semantic relevance — provider-gated (REAL-PROVIDER-CREDENTIALS-AND-BLIND-REVIEW).
      6. OPEN, HUMAN-GATED — No real LLM provider is ever exercised for capsule work in tests/evidence — INNO-EVAL-001/known-limitations.md explicitly says real-Provider comparison is BLOCKED_BY_CREDENTIAL_GATE (human gate: REAL-PROVIDER-CREDENTIALS-AND-BLIND-REVIEW). Items 1/2's TRUE fidelity delta can't be proven without this.
      7. IN_PROGRESS — unfamiliar-scenario stability now has a 6-case annotated machine gate with exact evidence-selection/leakage thresholds (INNO-CAP-008). Real-provider counter-prompt attacks, longitudinal drift and independent adversarial review remain open.
  - id: CAMPAIGN-B-EXPERIENCE
    reason: |
      The correction Experience Contract's propagation promise (star/memory -> preview -> confirm
      -> starfield/capsule sync) was not reliably reachable through the real UI, the UI did not
      actually refetch synced state, and demo seed data never populated the AuthorizedMemoryRef
      rows needed for the capsule NEEDS_REVIEW path to be reachable at all. All three fixed and
      E2E-verified.
      CORRECTED (independent-review finding, previously overstated as "just dataset growth
      remaining" — that claim is walked back here): four scored/labeled harnesses exist
      (MemoryRetrievalEvaluationTest, CorrectionTargetingEvaluationTest,
      ForgettingCompletenessEvaluationTest, CorrectionConflictEvaluationTest), but two are
      mislabeled relative to what doc-16 actually asks for:
        - There is still NO automatic claim-extraction pipeline. Every UnderstandingClaim today
          is produced only by an explicit user correction action — CorrectionTargetingEvaluationTest
          measures targeting precision (does a correction land on the right claim/memory), which
          is a real and useful metric, but it is NOT claim-extraction precision (can the system
          derive claims from conversation on its own). Doc-16's automatic-user-modeling pipeline
          (conversation evidence -> claim candidate extraction -> entity/time/relation
          normalization -> provenance+confidence -> conflict/uncertainty -> user
          confirm/correct -> propagation) does not exist yet.
        - ForgettingCompletenessEvaluationTest (6, now 7, scenarios) covers memory-row/fragment/
          todo/relation/link/embedding and, as of this checkpoint, one capsule-propagation
          scenario (visibility/genome-withdrawal/plaza-removal) — a real fix for a real P1 gap an
          independent review found (a forgotten memory's compiled capsule Genome, and its public
          reachability, previously survived FORGET untouched). Still not yet covered: prompt
          cache, sync-queue/event backlog, analytics, and backup lifecycle for a forgotten memory.
        - All four datasets remain small (9-10 correction/retrieval scenarios, 6-7
          forgetting scenarios, 4 conflict scenarios) — fine as smoke/regression gates, not yet
          proof of portrait/conflict/forgetting quality at the scale doc-16 implies.
      Campaign B status is IN_PROGRESS, not "down to dataset growth."
  - id: UNIFIED-FIVE-SPACE-APPSHELL
    reason: Existing capabilities are concentrated in a single oversized Aurora page and do not yet form the specified product information architecture. Largely converged this session (1210 -> ~1000 lines, 8 domain components extracted with tests); only orchestration/hero/login remain inline.
  - id: CAMPAIGN-D-TRUST
    reason: Three skills exist; real quality, expert handoff, risk scenarios, and complete bilingual experience remain open.
  - id: CAMPAIGN-E-PRODUCTION
    reason: Mobile, local-complete, Academy reliability, commercial Singapore, observability, resilience, and final demo require closure.
  - id: G2-CONTRACT-CLOSURE
    reason: OpenAPI, executable modules, reliable event contract, production roles, reconciliation, and data-right propagation remain incomplete.
  - id: G9-FINAL-ACCEPTANCE
    reason: Complete-product E2E, blind usability, operations rehearsal, demo, and traceability have not started.

