active_front:
  id: CAMPAIGN-C-QUALITY
  state: SANDBOX_FIDELITY_AGGREGATION_DONE_PENDING_FULL_SUITE
  intent: Work through the Campaign C punch list captured below, starting with items actionable without real-provider credentials.
  done_this_front_summary:
    - P0 fix landed first (46bd566): DataMaskingServiceImpl.previewFromMemory leaked LOCAL_ONLY/NO_EXTERNAL_PROCESSING memories into the pre-consent capsule preview; fixed and verified via git-stash-revert rigor check.
    - Punch-list item 3 (cheapest, fully actionable without real-provider credentials): CapsuleSandboxFeedback (LIKE_ME/NOT_ME/FACT_WRONG/TOO_EXPOSED/TONE_WRONG) was write-only — recorded but never read back anywhere, so an owner had no way to see whether a Genome version was actually landing as "like me". Added CapsuleSandboxService.fidelitySummary(ownerUserId, capsuleId), a new GET /api/capsule/{id}/sandbox/fidelity endpoint, and surfaced it in CapsuleWorkbench as a "N 次反馈 · X% 像我" note next to the active version and inline in the genome-history list, refreshed immediately after rating (not just on reload).
    - Verified with a new integration test (CapsuleGenomeServiceIntegrationTest.fidelitySummaryAggregatesFeedbackPerVersionAndIsOwnerIsolated: per-version grouping across a recompile, correct score math, owner isolation) and extended the existing Playwright "owner publishes..." journey to assert the note appears with the exact score after a real rating click. Playwright 13/13, Vitest 33/33.
    - Full `mvn test` re-running in the background given this touches a shared controller/service.
  next_machine_actions:
    - NEXT once full suite confirms green — commit, then continue down the Campaign C punch list (item 4, Simulator isolation, is the next fully-actionable-without-credentials item; item 2, a real compiler, is the deepest but most valuable).
    - Campaign B eval dataset growth and the ai-lab fabricated-adapter fix remain queued but lower priority than new experience/safety gaps.

priority_queue:
  - id: CAMPAIGN-C-QUALITY
    reason: |
      Explore-agent punch list, ranked by user-visible fidelity/trust impact — updated as items close:
      1. OPEN — No real fidelity signal exists. CapsuleGenomeServiceImpl.compile()'s evaluationJson is a structural-eligibility checklist (ownerBound/currentOnly/authorizedMemoryCount), not a fidelity/leakage score. Blocks the whole Campaign C acceptance scenario (same user's long-prompt baseline vs compiled Genome, blind-tested).
      2. OPEN — The "compiler" is a thin pass-through: CapsuleServiceImpl.inferStyleProfile() is keyword-substring matching and buildContextPreview() just truncates joined summaries to 420 chars — functionally similar to the "long prompt" baseline it's supposed to beat. No feature extraction, conflict handling, scene indexing, or critic pass exists anywhere.
      3. DONE this checkpoint — CapsuleSandboxServiceImpl feedback is no longer write-only; aggregated per-Genome-version and surfaced in CapsuleWorkbench (fidelitySummary/CapsuleFidelitySummaryVO). Does not gate publish (kept as a visible signal, matching "反馈只成为下一版的改进信号" rather than a hard block).
      4. OPEN — No Simulator capability exists (only referenced in docs) — any adversarial/leakage testing today would have to run against a real user's live capsule, violating the "explicitly-authorized separate data" requirement.
      5. OPEN — Matching (CapsuleServiceImpl matchedCapsules/strategySignal, ResonanceMatchStrategy enum) is a real, explainable, switchable lexical/theme-family heuristic (14 passing tests in CapsuleMatchingTest) but not similarity/embedding-based and has no diversity/safety-filter stage baked into scoring.
      6. OPEN, HUMAN-GATED — No real LLM provider is ever exercised for capsule work in tests/evidence — INNO-EVAL-001/known-limitations.md explicitly says real-Provider comparison is BLOCKED_BY_CREDENTIAL_GATE (human gate: REAL-PROVIDER-CREDENTIALS-AND-BLIND-REVIEW). Items 1/2's TRUE fidelity delta can't be proven without this.
      7. OPEN — No adversarial/boundary Java tests (counter-prompt-attack, unfamiliar-scenario stability) exist — only structural/version-chain/matching tests.
  - id: CAMPAIGN-B-EXPERIENCE
    reason: The correction Experience Contract's propagation promise (star/memory -> preview -> confirm -> starfield/capsule sync) was not reliably reachable through the real UI, the UI did not actually refetch synced state, and demo seed data never populated the AuthorizedMemoryRef rows needed for the capsule NEEDS_REVIEW path to be reachable at all. All three fixed and E2E-verified. All four doc-16-mandated eval dimensions (retrieval relevance, correction-targeting precision, forgetting completeness, conflict handling) now have scored/labeled harnesses with honestly-calibrated thresholds. Remaining work is dataset growth only.
  - id: UNIFIED-FIVE-SPACE-APPSHELL
    reason: Existing capabilities are concentrated in a single oversized Aurora page and do not yet form the specified product information architecture. Largely converged this session (1210 -> ~1000 lines, 8 domain components extracted with tests); only orchestration/hero/login remain inline.
  - id: CAMPAIGN-D-TRUST
    reason: Three skills exist; real quality, expert handoff, risk scenarios, and complete bilingual experience remain open.
  - id: CAMPAIGN-E-PRODUCTION
    reason: Mobile, local-complete, Academy reliability, commercial Singapore, observability, resilience, and final demo require closure.
  - id: G2-CONTRACT-CLOSURE
    reason: OpenAPI, executable modules, reliable event contract, production roles, reconciliation, and data-right propagation remain incomplete.
  - id: G9-FINAL-ACCEPTANCE
    reason: Complete-product E2E, blind usability, operations rehearsal, demo, and traceability have not started.

