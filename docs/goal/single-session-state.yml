active_front:
  id: CAMPAIGN-B-EXPERIENCE
  state: CORRECTION_PROPAGATION_HARDENING_IN_PROGRESS
  intent: Close the gap between the Campaign B Experience Contract (对齐文档/17-Campaign-B-Inner-Cosmos-Experience-Contract.md) and what a real user can actually trigger through the UI, then extend evaluability beyond CRUD-style tests.
  next_machine_actions:
    - DONE this checkpoint — a real UX/correctness gap was found and fixed, not just a refactor: the correction form previously always sent targetType=AURORA_UNDERSTANDING (fieldName self_understanding); a MemoryCard only got superseded/propagated to capsules if the user's free-typed oldValue happened to text-match an existing memory's title/summary (fragile, undiscoverable). Added a "这条不准确了" button on each MemoryStarfield accessible-list star that opens UnderstandingCorrection pre-targeted at that exact MEMORY_CARD id (guaranteed match, no text-matching luck required). Also fixed a real bug: confirmCorrection never refetched starfield/memories/capsules, so the UI's own promise ("星空与共鸣体上下文会按确认结果同步") wasn't actually kept until a manual reload — now it refetches all three when the correction affected a memory.
    - NEXT — verify and, if needed, build the capsule NEEDS_REVIEW banner path end-to-end (CapsuleWorkbench should visibly show visibilityStatus NEEDS_REVIEW after a correction affects an authorized memory; confirm this renders correctly and add E2E coverage using a freshly-authorized capsule rather than relying on demo-seed gravity ranking).
    - NEXT — decide the scope of "claim precision" evaluation given there is no automatic claim-extraction pipeline yet (claims only originate from explicit UserCorrection today); either narrow the doc-16 metric to explicit-correction precision/consistency or build extraction first.
    - FLAGGED, NOT YET FIXED — ai-lab/adapters/current_production.py (`CurrentProductionContractAdapter`) does not call the real Spring Boot app or an LLM; it greps for marker strings in source files and fabricates SystemRun output by echoing the scenario's own `expected` block back as the "result". Any Campaign B/A claim resting on this harness (aurora_rhythm/aurora_self/capsule_fidelity/interruption/memory/privacy_boundary/proactive_time families) is self-confirming, not measured. This directly risks the goal-objective.md rule against self-scoring as evidence. Needs a real adapter that drives the live backend (and a real LLM provider for AI-quality claims) before citing ai-lab results as verification. Not fixed this checkpoint — flagged for a dedicated follow-up given its size and the need for careful design (do not rush this fix).
    - Retrieval eval (MemoryRetrievalEvaluationTest + memory-retrieval-v1.json) is a real scored/thresholded eval but tiny (12 memories/10 cases, one annotator) — grow it with more cases and a held-out set once time allows.
    - Return to UNIFIED-FIVE-SPACE-APPSHELL only if a new experience gap requires it; AuroraApp is down to ~1000 lines with shell/conversation/Self/correction/starfield/capsule-workbench/resonance-network/letters/psychology-skill-studio all isolated into components/*.tsx with matching Vitest specs. Remaining inline surface (bootstrap wiring, wake-intent Returns section, hero/mode-nav composition, Login) is orchestration, not a blocked user experience.

