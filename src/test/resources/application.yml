spring:
  profiles:
    active: test
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:innercosmos-test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8

llm:
  mode: dev
  provider: mock
  allow-fallback: true

inner-cosmos:
  demo:
    seed-enabled: true
