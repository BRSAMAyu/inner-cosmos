spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/inner_cosmos?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
  sql:
    init:
      mode: never

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

llm:
  mode: mock
  provider: mock
  api-key: ""
  base-url: ""
  model: mock-inner-cosmos

inner-cosmos:
  demo:
    seed-enabled: true
  security:
    session-user-key: LOGIN_USER_ID
