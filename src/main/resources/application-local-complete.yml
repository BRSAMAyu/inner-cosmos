spring.config.activate.on-profile: local-complete

inner-cosmos:
  runtime:
    role: ${INNER_COSMOS_RUNTIME_ROLE:all}
  events:
    outbox:
      enabled: true
  infrastructure:
    profile: local-complete
    region: developer-controlled
    event-dispatcher: jdbc-outbox
    database: postgresql-pgvector
    redis: local-tls
    durable-storage-claim: local-volume-only
    product-semantics: complete
