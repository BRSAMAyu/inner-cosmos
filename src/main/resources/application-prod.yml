# Production has no usable credential, database, provider, or fallback defaults.
spring.config.activate.on-profile: prod

server:
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 20000
      leak-detection-threshold: 120000
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    validate-migration-naming: true
    clean-disabled: true
  h2:
    console:
      enabled: false
  data:
    redis:
      host: ${REDIS_HOST:}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_READ_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:true}
  session:
    redis:
      namespace: ${REDIS_SESSION_NAMESPACE:inner-cosmos:session}
      repository-type: default
      flush-mode: on-save
      save-mode: on-set-attribute

logging:
  level:
    root: INFO
    com.innercosmos: INFO
    com.innercosmos.ai: WARN
    com.innercosmos.mapper: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","msg":"%msg","thread":"%thread"}%n'
  file:
    name: /var/log/inner-cosmos/app.log
    max-size: 100MB
    max-history: 30

management:
  tracing:
    enabled: true
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.10}
    propagation:
      produce: W3C
  opentelemetry:
    resource-attributes:
      service.name: ${OTEL_SERVICE_NAME:inner-cosmos}
      service.namespace: inner-cosmos
      deployment.environment: ${DEPLOYMENT_ENVIRONMENT:production}
      inner-cosmos.runtime.role: ${INNER_COSMOS_RUNTIME_ROLE:all}
  otlp:
    tracing:
      endpoint: ${OTLP_TRACING_ENDPOINT:http://localhost:4318/v1/traces}
      export:
        # Export is opt-in so offline tests and local development never emit telemetry.
        enabled: ${OTLP_TRACING_ENABLED:false}
  endpoints:
    web:
      exposure:
        # NOTE: this list previously narrowed to "health,info" only, silently dropping
        # metrics/prometheus for every profile that layers on top of prod (academy-eks,
        # commercial-sg, local-complete all activate "prod,<overlay>" together) — Prometheus
        # scraping /actuator/prometheus in those environments would 404. Restated explicitly
        # so role-specific metrics are provably scraped in every deployed environment, not
        # just the dev-profile kind demo.
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when_authorized

llm:
  mode: prod
  provider: ${LLM_PROVIDER:}
  api-key: ${LLM_API_KEY:}
  allow-fallback: false

inner-cosmos:
  aurora:
    stream:
      redis:
        enabled: ${REDIS_AURORA_STREAM_ENABLED:true}
      stage-namespace: ${REDIS_AURORA_STAGE_NAMESPACE:inner-cosmos:aurora:stage:v1}
      live-namespace: ${REDIS_AURORA_LIVE_NAMESPACE:inner-cosmos:aurora:live:v1}
      stage-ttl: ${AURORA_STREAM_STAGE_TTL:PT1M}
      retention: ${AURORA_STREAM_RETENTION:PT15M}
      max-length: ${AURORA_STREAM_MAX_LENGTH:1024}
  idempotency:
    ttl: ${IDEMPOTENCY_TTL:PT24H}
    max-response-bytes: ${IDEMPOTENCY_MAX_RESPONSE_BYTES:1048576}
    redis:
      enabled: ${REDIS_IDEMPOTENCY_ENABLED:true}
      namespace: ${REDIS_IDEMPOTENCY_NAMESPACE:inner-cosmos:idempotency:v1}
  session:
    redis:
      enabled: ${REDIS_SESSION_ENABLED:true}
  auth:
    oidc:
      enabled: ${OIDC_ENABLED:true}
      auto-provision: ${OIDC_AUTO_PROVISION:true}
      issuer-uri: ${OIDC_ISSUER_URI:}
      jwk-set-uri: ${OIDC_JWK_SET_URI:}
      audience: ${OIDC_AUDIENCE:}
      authorization-uri: ${OIDC_AUTHORIZATION_URI:}
      token-uri: ${OIDC_TOKEN_URI:}
      client-id: ${OIDC_MOBILE_CLIENT_ID:}
      redirect-uri: ${OIDC_MOBILE_REDIRECT_URI:}
  security:
    csrf-enabled: true
    rate-limit:
      redis:
        enabled: ${REDIS_RATE_LIMIT_ENABLED:true}
        namespace: ${REDIS_RATE_LIMIT_NAMESPACE:inner-cosmos:rate-limit:v1}
  demo:
    seed-enabled: false
  scheduler:
    redis-lock:
      enabled: ${REDIS_SCHEDULER_LOCK_ENABLED:true}
      namespace: ${REDIS_SCHEDULER_LOCK_NAMESPACE:inner-cosmos-scheduler-v1}
