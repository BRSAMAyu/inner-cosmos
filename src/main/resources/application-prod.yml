# Inner Cosmos — Production Profile
spring.config.activate.on-profile: prod

# Override dev defaults for production
spring:
  sql:
    init:
      mode: never  # Use proper migrations in prod, not schema.sql
  h2:
    console:
      enabled: false

# Production logging — JSON format for ELK stack
logging:
  level:
    root: INFO
    com.innercosmos: INFO
    com.innercosmos.ai: WARN
    com.innercosmos.mapper: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","msg":"%msg","thread":"%thread"}%n'
  file:
    name: /var/log/inner-cosmos/app.log
    max-size: 100MB
    max-history: 30

# Actuator — prod specific
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
  endpoint:
    health:
      show-details: when_authorized

# Production LLM config — no demo seeds
llm:
  mode: prod
  allow-fallback: true

inner-cosmos:
  demo:
    seed-enabled: false