# Production has no usable credential, database, provider, or fallback defaults.
spring.config.activate.on-profile: prod

server:
  servlet:
    session:
      cookie:
        secure: true
        http-only: true
        same-site: strict

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 20000
      leak-detection-threshold: 120000
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    validate-migration-naming: true
    clean-disabled: true
  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    com.innercosmos: INFO
    com.innercosmos.ai: WARN
    com.innercosmos.mapper: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
  pattern:
    console: '{"time":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","logger":"%logger{36}","msg":"%msg","thread":"%thread"}%n'
  file:
    name: /var/log/inner-cosmos/app.log
    max-size: 100MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when_authorized

llm:
  mode: prod
  provider: ${LLM_PROVIDER:}
  api-key: ${LLM_API_KEY:}
  allow-fallback: false

inner-cosmos:
  demo:
    seed-enabled: false
