<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>信箱 · 内宇宙</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    /* ── Inbox — slow connection mailbox ── */
    .inbox-hero {
      position: relative;
      min-height: 28vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 40px;
      background:
        radial-gradient(ellipse 55% 70% at 30% 25%, rgba(165,179,194,.10), transparent),
        radial-gradient(ellipse 45% 55% at 70% 35%, rgba(184,194,174,.08), transparent),
        linear-gradient(180deg, var(--surface-warm) 0%, transparent 100%);
      overflow: hidden;
    }
    .inbox-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1px 1px at 18% 35%, rgba(165,179,194,.30), transparent),
        radial-gradient(1px 1px at 45% 60%, rgba(184,194,174,.24), transparent),
        radial-gradient(1.2px 1.2px at 72% 22%, rgba(165,179,194,.20), transparent),
        radial-gradient(1px 1px at 88% 70%, rgba(184,194,174,.26), transparent);
      pointer-events: none;
      animation: inbox-drift 18s var(--ease-drift) infinite alternate;
    }
    @keyframes inbox-drift {
      0% { opacity: .5; transform: translateY(0); }
      100% { opacity: .8; transform: translateY(-5px); }
    }
    .inbox-hero-title {
      font-family: var(--font-hero);
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      color: var(--ink);
      margin: 0 0 10px;
      position: relative;
      z-index: 1;
      text-wrap: balance;
    }
    .inbox-hero-sub {
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 480px;
      position: relative;
      z-index: 1;
      text-wrap: pretty;
    }

    /* ── Tab bar ── */
    .inbox-tabs {
      display: flex;
      gap: 4px;
      background: rgba(160,155,180,.05);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
    }
    .inbox-tabs button {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: .875rem;
      cursor: pointer;
      transition: all 260ms var(--ease-flow);
    }
    .inbox-tabs button:hover { color: var(--ink); }
    .inbox-tabs button.active {
      background: var(--surface-paper);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(0,0,0,.05);
    }

    /* ── Letter list ── */
    .inbox-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Letter card ── */
    .letter-card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,250,243,.68), rgba(247,242,236,.44)),
        var(--surface-paper);
      border: 1px solid rgba(255,255,255,.20);
      border-radius: var(--radius-card);
      padding: 20px 24px;
      cursor: pointer;
      backdrop-filter: blur(16px);
      box-shadow: var(--elev-1, 0 2px 8px rgba(0,0,0,.03), 0 8px 32px rgba(0,0,0,.05));
      /* hover lift uses `translate` (not transform) so it composes past the
         card-reveal entry animation, whose `forwards` pins `transform`. */
      transition: translate 400ms var(--ease-bloom), box-shadow 400ms var(--ease-bloom), border-color 400ms var(--ease-bloom);
      opacity: 0;
      transform: translateY(12px);
      animation: card-reveal 600ms var(--ease-bloom) forwards;
    }
    .letter-card:hover {
      translate: 0 -2px;
      box-shadow: var(--elev-2, 0 4px 16px rgba(0,0,0,.06), 0 16px 48px rgba(0,0,0,.08));
    }
    @keyframes card-reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .letter-card.unread {
      border-left: 3px solid var(--accent-dusty-blue);
    }
    .letter-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .letter-card-title {
      font-size: 1rem;
      font-weight: 500;
      color: var(--ink);
    }
    .letter-card-preview {
      color: var(--muted);
      font-size: .875rem;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .letter-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .8125rem;
    }

    /* ── Empty state ── */
    .inbox-empty {
      text-align: center;
      padding: 56px 24px;
      color: var(--faint);
    }
    .inbox-empty-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      opacity: .35;
    }

    /* ── Modal ── */
    .letter-paper-reading {
      background:
        linear-gradient(180deg, rgba(255,250,243,.72), rgba(247,242,236,.52));
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    /* ── Reading ceremony — 启封 prelude + progressive reveal (IC-LTR-002) ──
       INVARIANT (reduced-motion contract): 信件正文永不被困在 opacity:0。
       The escaped letter body is ALWAYS present in the .letter-paper-reading DOM
       from the moment openLetter() renders. The sealed envelope is a SIBLING
       overlay shown above it; body segments start hidden ONLY through a class
       (.letter-reading--sealed on the wrapper) AND ONLY when motion is allowed.
       Under prefers-reduced-motion (or when matchMedia is unavailable, or if any
       animation step throws), openReadingCeremony() MUST bail to the fully-open
       state: it removes .letter-reading--sealed and never writes opacity:0 inline.
       Note: app.css globally forces animation/transition:none under
       prefers-reduced-motion, so any opacity:0 left in that path would be
       permanent — that is precisely the trap this design avoids. */
    .letter-ceremony {
      position: relative;
      margin-bottom: 16px;
    }
    .letter-paper-reading.letter-reading--sealed {
      /* Body stays in DOM & accessible (visibility handled below) but visually
         yielded to the envelope prelude until 启封. We hide via clip+opacity,
         never display:none, so screen readers / reduced-motion fallback still
         see the text if JS fails mid-way. */
      opacity: 0;
    }
    .letter-seg {
      display: block;
    }
    .letter-reading--sealed .letter-seg {
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 520ms var(--ease-bloom), transform 520ms var(--ease-bloom);
    }
    .letter-reading--revealing .letter-seg {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 520ms var(--ease-bloom), transform 520ms var(--ease-bloom);
    }
    /* When fully opened (or reduced-motion), every segment is plainly visible,
       no transition dependency. */
    .letter-reading--opened .letter-seg,
    .letter-paper-reading:not(.letter-reading--sealed):not(.letter-reading--revealing) .letter-seg {
      opacity: 1;
      transform: none;
    }
    .letter-paper-reading:not(.letter-reading--sealed) {
      opacity: 1;
    }

    /* Envelope / 启封 prelude — hand-letter aesthetic, tokens only */
    .letter-envelope {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 40px 24px 32px;
      background:
        radial-gradient(ellipse 60% 70% at 50% 30%, rgba(184,194,174,.10), transparent),
        linear-gradient(180deg, rgba(255,250,243,.82), rgba(247,242,236,.58));
      border: 1px solid rgba(255,255,255,.22);
      border-radius: var(--radius-card);
      text-align: center;
      cursor: pointer;
    }
    .letter-envelope:hover { box-shadow: 0 8px 32px rgba(0,0,0,.06); }
    .envelope-seal {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-hero);
      font-size: 1.5rem;
      color: var(--surface-paper);
      background: linear-gradient(135deg, var(--accent-dusty-blue), var(--accent-sage));
      box-shadow: 0 4px 18px rgba(134,152,169,.28);
      animation: seal-breathe 4.6s var(--ease-drift) infinite alternate;
    }
    @keyframes seal-breathe {
      0% { transform: scale(1); box-shadow: 0 4px 18px rgba(134,152,169,.22); }
      100% { transform: scale(1.05); box-shadow: 0 6px 26px rgba(134,152,169,.34); }
    }
    .envelope-caption {
      font-family: var(--font-hero);
      color: var(--ink);
      font-size: 1.0625rem;
      line-height: 1.9;
      max-width: 22em;
    }
    .envelope-hint {
      font-size: .8125rem;
      color: var(--muted);
    }
    .letter-ceremony--opened .letter-envelope { display: none; }

    /* ── Dark mode ── */
    body.dark-star .inbox-hero {
      background:
        radial-gradient(ellipse 55% 70% at 30% 25%, rgba(134,152,169,.06), transparent),
        radial-gradient(ellipse 45% 55% at 70% 35%, rgba(122,142,127,.05), transparent),
        linear-gradient(180deg, var(--surface-warm) 0%, transparent 100%);
    }
    body.dark-star .inbox-hero::before {
      background:
        radial-gradient(1px 1px at 18% 35%, rgba(134,152,169,.18), transparent),
        radial-gradient(1px 1px at 45% 60%, rgba(192,144,96,.16), transparent),
        radial-gradient(1px 1px at 72% 22%, rgba(134,152,169,.14), transparent);
    }
    body.dark-star .inbox-tabs button.active {
      background: rgba(42,38,34,.80);
    }
    body.dark-star .letter-card {
      background:
        linear-gradient(180deg, rgba(42,38,34,.68), rgba(37,33,29,.48)),
        rgba(42,38,34,.40);
      border-color: rgba(163,153,143,.10);
      box-shadow: 0 2px 8px rgba(0,0,0,.08), 0 8px 32px rgba(0,0,0,.16);
    }
    body.dark-star .letter-card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.12), 0 16px 48px rgba(0,0,0,.22);
    }
    body.dark-star .letter-paper-reading {
      background: rgba(42,38,34,.60);
      border-color: rgba(163,153,143,.12);
    }
    body.dark-star .letter-envelope {
      background:
        radial-gradient(ellipse 60% 70% at 50% 30%, rgba(134,152,169,.10), transparent),
        linear-gradient(180deg, rgba(42,38,34,.78), rgba(37,33,29,.58));
      border-color: rgba(163,153,143,.14);
    }

    @media (max-width: 640px) {
      .inbox-hero { min-height: 22vh; padding-bottom: 28px; }
      .letter-card { padding: 16px; }
    }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Hero -->
  <section class="inbox-hero">
    <span class="route-hint">慢连接信箱</span>
    <h1 class="inbox-hero-title" id="page-title">慢信箱</h1>
    <p class="inbox-hero-sub">每一封信都穿过了一段宇宙距离。不催促，不焦虑。</p>
    <p style="margin-top:14px;position:relative;z-index:1"><a class="muted" href="/pages/letter-threads.html" style="font-size:.875rem;border-bottom:1px solid var(--line);text-decoration:none;color:var(--muted)">查看慢信往来 →</a></p>
  </section>

  <!-- Tab bar -->
  <div class="inbox-tabs">
    <button class="active" onclick="switchTab('inbox', this)">收信</button>
    <button onclick="switchTab('outbox', this)">寄出</button>
    <button onclick="switchTab('drafts', this)">草稿</button>
    <button onclick="switchTab('archived', this)">归档</button>
  </div>

  <!-- Letter list -->
  <section id="letterList" class="inbox-list"></section>

  <!-- Letter detail modal -->
  <div id="letterModal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="flex-between" style="margin-bottom:20px">
        <h2 id="modalTitle" style="font-family:var(--font-hero)">信件详情</h2>
        <button onclick="closeLetterDetail()">关闭</button>
      </div>
      <div id="modalContent"></div>
    </div>
  </div>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("慢信箱");
IC.ensureDemoLogin().then(load);

var allInbox = [];
var allOutbox = [];
var currentTab = "inbox";
/* The most recently opened letter detail, kept so the reply-with-letter form
   can read the original sender / capsule without an extra round-trip. */
var currentDetail = null;

function esc(text) { return IC.esc(text); }

async function load() {
  var results = await Promise.all([API.letterInbox(), API.letterOutbox()]);
  allInbox = (results[0].success ? results[0].data : []) || [];
  allOutbox = (results[1].success ? results[1].data : []) || [];
  renderTab();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".inbox-tabs button").forEach(function(btn) { btn.classList.remove("active"); });
  if (el) el.classList.add("active");
  renderTab();
}

function statusBadge(status) {
  var map = {
    DRAFT: "badge-read", SENT: "badge-read", FLYING: "badge-new", DELIVERED: "badge-new",
    READ: "badge-replied", REPLIED: "badge-replied", DECLINED: "badge-declined",
    BLOCKED: "badge-declined", ARCHIVED: "badge-read", NEW: "badge-new"
  };
  return map[status] || "badge-read";
}

function statusLabel(status) {
  var map = {
    DRAFT: "草稿", SENT: "已发送", FLYING: "在路上", DELIVERED: "已送达", READ: "已读",
    REPLIED: "已回复", DECLINED: "已婉拒", BLOCKED: "已屏蔽", ARCHIVED: "已归档", NEW: "新信"
  };
  return map[status] || status;
}

function renderTab() {
  var letters = [];
  switch (currentTab) {
    case "inbox": letters = allInbox.filter(function(l) { return l.status !== "ARCHIVED"; }); break;
    case "outbox": letters = allOutbox.filter(function(l) { return l.status !== "ARCHIVED"; }); break;
    case "drafts": letters = allOutbox.filter(function(l) { return l.status === "DRAFT"; }); break;
    case "archived": letters = [].concat(allInbox, allOutbox).filter(function(l) { return l.status === "ARCHIVED"; }); break;
  }

  var list = document.getElementById("letterList");
  if (!letters.length) {
    var msgs = { inbox: "暂时没有收信。", outbox: "还没有寄出的慢信。", drafts: "没有草稿。", archived: "没有归档的信件。" };
    list.innerHTML = '<div class="inbox-empty"><div class="inbox-empty-icon">~</div><p>' + IC.empty(msgs[currentTab]) + '</p></div>';
    return;
  }

  list.innerHTML = letters.map(function(l, idx) {
    var delay = Math.min(idx * 60, 480);
    var isUnread = l.status === "DELIVERED" || l.status === "NEW";
    return '<article class="letter-card' + (isUnread ? ' unread' : '') + '" style="animation-delay:' + delay + 'ms" onclick="openLetter(' + l.id + ',\'' + (currentTab === "inbox" ? "in" : "out") + '\')">' +
      '<div class="letter-card-header">' +
        '<strong class="letter-card-title">' + esc(l.title || "无标题") + '</strong>' +
        '<span class="badge ' + statusBadge(l.status) + '">' + statusLabel(l.status) + '</span>' +
      '</div>' +
      '<p class="letter-card-preview">' + esc((l.letterBody || "").substring(0, 120)) + ((l.letterBody || "").length > 120 ? "..." : "") + '</p>' +
      '<div class="letter-card-footer">' +
        '<span class="muted">' + IC.formatTime(l.createdAt) + '</span>' +
        (isUnread ? '<span class="badge badge-new">新</span>' : '') +
      '</div>' +
    '</article>';
  }).join("");
}

async function openLetter(id, direction) {
  var r = await API.letterDetail(id);
  if (!r.success || !r.data) { IC.toast("无法加载信件", "warn"); return; }
  var l = r.data;
  currentDetail = l;

  document.getElementById("modalTitle").textContent = l.title || "信件详情";
  /* IC-LTR-002 reading ceremony: the escaped letter body is split into
     .letter-seg spans (still IC.esc()'d — no raw innerHTML for body content)
     and wrapped in .letter-paper-reading. openReadingCeremony() decides
     whether to play the 启封 prelude (motion allowed) or render fully open
     (reduced-motion / unsupported / failure). Either way the body text is in
     the DOM here, so it can never be trapped invisible by a CSS regression. */
  var escapedBody = esc(l.letterBody || "");
  var bodySegments = renderLetterSegments(escapedBody);
  /* Reset any prior ceremony state/timers so re-opening a letter (without
     closing first) starts the prelude fresh and never inherits opened=true. */
  clearCeremonyTimers();
  __readingCeremonyState.opened = false;
  document.getElementById("modalContent").innerHTML =
    '<div class="letter-ceremony" id="letterCeremony">' +
      '<div class="letter-envelope" id="letterEnvelope" onclick="openReadingCeremony()" role="button" tabindex="0" aria-label="启封这封信">' +
        '<div class="envelope-seal" aria-hidden="true">启</div>' +
        '<p class="envelope-caption">有一封穿过宇宙距离的信，正等你打开。</p>' +
        '<span class="envelope-hint">轻轻触碰，慢慢展开</span>' +
      '</div>' +
      '<div class="letter-paper-reading letter-reading--sealed" id="letterPaperReading">' + bodySegments + '</div>' +
    '</div>' +
    '<div style="padding:16px;background:rgba(160,155,180,.04);border-radius:var(--radius);margin-bottom:16px">' +
      '<h3 style="font-size:.9375rem;margin-bottom:10px">送达时间线</h3>' +
      '<div style="display:flex;flex-direction:column;gap:6px;font-size:.875rem">' +
        '<div class="muted"><strong>创建</strong> ' + IC.formatTime(l.createdAt) + '</div>' +
        (l.sentAt ? '<div class="muted"><strong>发送</strong> ' + IC.formatTime(l.sentAt) + '</div>' : '') +
        (l.deliveredAt ? '<div class="muted"><strong>送达</strong> ' + IC.formatTime(l.deliveredAt) + '</div>' : '') +
        (l.readAt ? '<div class="muted"><strong>已读</strong> ' + IC.formatTime(l.readAt) + '</div>' : '') +
      '</div>' +
      '<div style="margin-top:10px"><span class="badge ' + statusBadge(l.status) + '">' + statusLabel(l.status) + '</span></div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;flex-wrap:wrap">' +
      (direction === "in" && (l.status === "DELIVERED" || l.status === "READ") ?
        '<button onclick="letterAction(' + l.id + ',\'read\')">标记已读</button>' +
        '<button onclick="letterAction(' + l.id + ',\'reply\')">回复慢信</button>' +
        '<button onclick="openReplyWithLetter(' + l.id + ')">用一封慢信回复</button>' +
        '<button onclick="letterAction(' + l.id + ',\'decline\')">婉拒</button>' : '') +
      '<button onclick="letterAction(' + l.id + ',\'archive\')">归档</button>' +
      (direction === "in" ?
        '<button onclick="letterAction(' + l.id + ',\'block\')" style="color:var(--accent-coral)">屏蔽</button>' +
        '<button onclick="reportLetter(' + l.id + ')" style="color:var(--accent-coral)">举报</button>' : '') +
    '</div>';

  document.getElementById("letterModal").classList.remove("hidden");
  /* Read-status transition preserved exactly: AFTER rendering, as before.
     The ceremony is a purely presentational layer over the body text and
     never blocks or reorders this call. */
  if (l.status === "DELIVERED") await API.letterRead(id);

  /* Begin (or skip) the reading ceremony now that the modal is shown and the
     read-status call has been made. Safe to run after the await above. */
  openReadingCeremony();
}

function closeLetterDetail() {
  document.getElementById("letterModal").classList.add("hidden");
}

/* ── IC-LTR-002 reading ceremony helpers ──
   renderLetterSegments: split the ALREADY-ESCAPED letter body into .letter-seg
   spans by newline so each line can fade in independently during the ceremony.
   Input is escaped text (output of esc()), so this never introduces a raw
   innerHTML path for body content. Empty body yields a single gentle segment. */
function renderLetterSegments(escapedBody) {
  var text = escapedBody == null ? "" : String(escapedBody);
  if (!text.trim()) {
    return '<span class="letter-seg letter-seg--empty muted">（这封信没有写下文字。）</span>';
  }
  var lines = text.split("\n");
  return lines.map(function(line) {
    /* line is already escaped; wrap verbatim. Preserve blank lines as breaks. */
    var content = line.length ? line : "&nbsp;";
    return '<span class="letter-seg">' + content + "</span>";
  }).join("");
}

/* openReadingCeremony: the 启封 prelude + progressive reveal, gated on motion.
   REDUCED-MOTION CONTRACT (golden): 信件正文永不被困在 opacity:0。
   - If reduced-motion is on, OR matchMedia is unavailable, OR any step throws,
     we go straight to the fully-open state: envelope removed, paper marked
     --opened (segments plainly visible, no transition dependency). The escaped
     body was already in the DOM at render time, so even a total JS failure
     before this call leaves it readable once CSS unseals (and the sealed class
     is the ONLY thing that hides it — never inline opacity:0).
   - When motion IS allowed: remove envelope, flip paper to --revealing so each
     .letter-seg transitions in with a calm stagger. A safety timeout (max ~7s)
     forces --opened regardless of any glitch, so buttons + text stay reachable. */
var __readingCeremonyState = { opened: false, timers: [] };

function motionReduced() {
  /* Reuse the established pattern (motion.js sets window.__icMotionDisabled). */
  if (window.__icMotionDisabled) return true;
  /* If the UA cannot tell us the user's motion preference, treat as
     reduced-motion: bail to the fully-open state so we never animate (and
     never risk trapping content behind an unsupported API). */
  if (typeof window.matchMedia !== "function") return true;
  return !!window.matchMedia("(prefers-reduced-motion: reduce)").matches;
}

function clearCeremonyTimers() {
  (__readingCeremonyState.timers || []).forEach(function(t) { clearTimeout(t); });
  __readingCeremonyState.timers = [];
}

function markReadingOpened() {
  var ceremony = document.getElementById("letterCeremony");
  var paper = document.getElementById("letterPaperReading");
  if (ceremony) ceremony.classList.add("letter-ceremony--opened");
  if (paper) {
    paper.classList.remove("letter-reading--sealed");
    paper.classList.remove("letter-reading--revealing");
    paper.classList.add("letter-reading--opened");
  }
  __readingCeremonyState.opened = true;
  clearCeremonyTimers();
}

function openReadingCeremony() {
  /* Idempotent + safe: if already opened or elements missing, force open. */
  var ceremony = document.getElementById("letterCeremony");
  var paper = document.getElementById("letterPaperReading");
  if (__readingCeremonyState.opened || !ceremony || !paper) {
    if (paper) {
      paper.classList.remove("letter-reading--sealed");
      paper.classList.add("letter-reading--opened");
    }
    __readingCeremonyState.opened = true;
    return;
  }
  try {
    if (motionReduced()) {
      /* Reduced-motion / unsupported: full body visible immediately, no
         prelude animation, no opacity:0 anywhere. */
      markReadingOpened();
      return;
    }
    /* Motion allowed: open the envelope, then reveal segments with a calm
       stagger. Total reveal capped via the per-segment delay + a hard safety
       timeout below. */
    ceremony.classList.add("letter-ceremony--opened");
    paper.classList.remove("letter-reading--sealed");
    paper.classList.add("letter-reading--revealing");
    var segs = paper.querySelectorAll(".letter-seg");
    var count = segs.length;
    /* Pace: ~120ms stagger, each segment transitions over 520ms (CSS).
       For a long letter this could exceed a few seconds, so the safety
       timeout below guarantees --opened by ~7s no matter what. */
    var stagger = 120;
    var perSeg = 520;
    for (var i = 0; i < count; i++) {
      (function(el, delay) {
        el.style.transitionDelay = delay + "ms";
        __readingCeremonyState.timers.push(setTimeout(function() {
          el.style.transitionDelay = "";
        }, delay + perSeg + 60));
      })(segs[i], i * stagger);
    }
    /* SAFETY: never let an animation glitch trap content or block the action
       buttons. Force fully-open at 7s (well under the ~8s ceiling). */
    __readingCeremonyState.timers.push(setTimeout(markReadingOpened, 7000));
  } catch (e) {
    /* Any failure → fail open. Content must remain reachable. */
    markReadingOpened();
  }
}

/* Reset ceremony state when the detail modal closes, so re-opening a letter
   starts the prelude fresh. */
(function wrapClose() {
  var orig = window.closeLetterDetail;
  if (typeof orig === "function") {
    window.closeLetterDetail = function() {
      clearCeremonyTimers();
      __readingCeremonyState.opened = false;
      orig();
    };
  }
})();

/* ── Reply with a letter of your own (#33) ──
   A small, low-pressure write form that lets the receiver answer a received
   letter with a new slow letter, instead of just flipping the status. */
function openReplyWithLetter(id) {
  var l = currentDetail;
  if (!l || (l.id !== id)) {
    IC.toast("请先重新打开这封信再回复。", "warn");
    return;
  }
  /* The reply is addressed to the original sender, routed via the original capsule. */
  IC.showModal(
    '<h2>用一封慢信回复</h2>' +
    '<p class="muted" style="margin-bottom:16px;line-height:1.7">不必急着回应，慢慢写下你想让对方知道的那一句。</p>' +
    '<div class="letter-field">' +
      '<label for="replyTitle" style="display:block;font-size:.8125rem;color:var(--muted);margin-bottom:6px">给这封回信一个标题</label>' +
      '<input id="replyTitle" class="letter-input" placeholder="例如：关于那一段共鸣" style="width:100%;padding:12px 16px;font-size:.9375rem;border:1px solid var(--line);border-radius:var(--radius);background:rgba(247,242,236,.48);color:var(--text);box-sizing:border-box">' +
    '</div>' +
    '<div class="letter-field">' +
      '<label for="replyBody" style="display:block;font-size:.8125rem;color:var(--muted);margin-bottom:6px">信的内容</label>' +
      '<textarea id="replyBody" placeholder="你可以写：我在哪一点上停了下来；我希望对方知道什么。" style="min-height:160px;width:100%;padding:12px 16px;font-size:.9375rem;line-height:1.8;border:1px solid var(--line);border-radius:var(--radius);background:rgba(247,242,236,.48);color:var(--text);resize:vertical;box-sizing:border-box"></textarea>' +
    '</div>' +
    '<div style="display:flex;gap:8px;margin-top:16px;flex-wrap:wrap">' +
      '<button onclick="submitReplyWithLetter(' + id + ')">投递回信</button>' +
      '<button onclick="IC.closeModal()">稍后再写</button>' +
    '</div>'
  );
}

async function submitReplyWithLetter(id) {
  var l = currentDetail;
  if (!l) { IC.toast("请先重新打开这封信再回复。", "warn"); return; }
  var title = document.getElementById("replyTitle").value.trim();
  var body = document.getElementById("replyBody").value.trim();
  if (!title) { IC.toast("给回信起一个标题吧。", "warn"); return; }
  if (!body) { IC.toast("先写下一点点内容再投递。", "warn"); return; }

  /* Reply is addressed to the original sender, routed through the original capsule. */
  var payload = {
    receiverUserId: l.senderUserId,
    receiverCapsuleId: l.receiverCapsuleId,
    title: title,
    letterBody: body
  };
  try {
    var r = await API.letterReplyWithLetter(id, payload);
    if (r.success && r.data) {
      IC.closeModal();
      closeLetterDetail();
      IC.showModalText(
        "回信已作为一封新的慢信保存为草稿。它会穿过一小段宇宙距离，在对方安静的时刻抵达。",
        { title: "回信已封缄", confirmText: "好的" }
      );
      IC.pulse("letter");
      load();
    } else if (r && r.message && r.message.indexOf("SAFETY") >= 0) {
      /* Guard blocked the content — keep it warm, never expose raw detail. */
      IC.toast("这封信暂时没有被送出，可以换一种更温和的表达再试试。", "warn");
    } else {
      IC.toast("回信暂时没有被保存，请稍后再试。", "warn");
    }
  } catch (e) {
    IC.toast("连接暂时没有响应，请稍后再试。", "warn");
  }
}

async function letterAction(id, action) {
  var actionMap = {
    read: function() { return API.letterRead(id); },
    reply: function() { return API.letterReply(id); },
    decline: function() { return API.letterDecline(id); },
    block: function() { return API.letterBlock(id); },
    archive: function() { return API.letterArchive(id); }
  };
  if (actionMap[action]) {
    await actionMap[action]();
    IC.toast("操作成功", "success");
    closeLetterDetail();
    load();
  }
}

function reportLetter(id) {
  IC.showModal(
    '<h2>举报信件</h2>' +
    '<p class="muted" style="margin-bottom:16px">请描述你觉得不适的内容。</p>' +
    '<textarea id="reportReason" placeholder="请描述举报原因..." style="min-height:100px;width:100%;padding:12px;border:1px solid var(--line);border-radius:var(--radius);background:var(--surface-paper);color:var(--text);font-family:var(--font-body)"></textarea>' +
    '<div style="display:flex;gap:8px;margin-top:16px">' +
      '<button onclick="submitReport(' + id + ')">提交举报</button>' +
      '<button onclick="IC.closeModal()">取消</button>' +
    '</div>'
  );
}

async function submitReport(id) {
  var reason = document.getElementById("reportReason").value;
  await API.letterReport(id, reason);
  IC.closeModal();
  IC.toast("举报已提交", "success");
  closeLetterDetail();
  load();
}
IC.hideLoading();
</script>
</body>
</html>
