<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/app.css"></head><body><main class="shell"><div class="topbar" data-topbar></div><section class="panel"><h2>登录</h2><div class="form"><input id="username" value="demo"><input id="password" type="password" value="demo123"><button onclick="login()">进入</button><p id="out" class="muted"></p></div></section></main><script src="/js/app.js"></script><script>IC.mountShell("登录");async function login(){const r=await IC.api('/api/auth/login',{method:'POST',body:JSON.stringify({username:username.value,password:password.value})});out.textContent=r.message;if(r.success) location.href='/pages/dashboard.html';}</script></body></html>
