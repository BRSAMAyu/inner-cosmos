<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>信念画廊 · Inner Cosmos</title>
  <style>
    .belief-card {
      padding: 18px;
      border-radius: var(--radius-flow);
      background: rgba(255,250,243,.55);
      border: 1px solid var(--line);
      margin-bottom: 14px;
      position: relative;
    }
    .belief-card.strong { background: rgba(229,235,228,.6); border-color: var(--line-strong); }
    .belief-card.contradiction { border-left: 4px solid rgba(200,147,145,.7); background: rgba(241,230,227,.6); }
    .belief-text { font-size: 1.05rem; color: var(--ink); line-height: 1.6; margin: 8px 0 10px; }
    .belief-meta { display: flex; flex-wrap: wrap; gap: 8px; font-size: .78rem; }
    .belief-strength {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 999px;
      background: rgba(143,163,148,.22); color: var(--accent-sage);
    }
    .belief-strength.low { background: rgba(184,194,168,.22); color: rgba(120,140,108,.85); }
    .belief-strength.high { background: rgba(200,147,145,.22); color: rgba(180,90,90,.85); }
    .belief-category { padding: 2px 8px; border-radius: 999px; background: rgba(151,169,186,.18); color: rgba(90,110,135,.85); }
    .contradiction-pair { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; padding: 16px; border-radius: var(--radius); background: rgba(241,230,227,.5); border: 1px solid rgba(200,147,145,.3); margin-bottom: 12px; }
    .contradiction-pair .vs { font-weight: 700; color: rgba(180,90,90,.7); }
  </style>
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>
  <span class="route-hint">你的潜在信念</span>
  <h1 id="page-title">信念画廊</h1>
  <p class="muted mb-2">系统从你的记忆里识别出反复出现的潜在信念 —— 那些你以为只是"想法"，但其实在悄悄影响你决策的模式。互相矛盾的信念会用红色高亮。</p>

  <!-- Aurora Self Panel (M6) -->
  <div class="aurora-self-panel" id="auroraSelfPanel" style="display:none">
    <div class="panel-header" onclick="toggleAuroraSelfPanel()">
      <span class="panel-title">Aurora 主体性</span>
      <span class="toggle-icon" id="auroraSelfPanelIcon">&#9660;</span>
    </div>
    <div class="panel-content" id="auroraSelfContent">
      <!-- Constitution -->
      <div class="self-section" id="constitutionSection">
        <div class="section-header" onclick="toggleSection('constitution')">
          <span>【Aurora 存在宪法】</span>
          <span class="toggle-icon" id="constitutionIcon">&#9660;</span>
        </div>
        <div class="section-body" id="constitutionBody"><div class="loading">加载中...</div></div>
      </div>
      <!-- Self Model -->
      <div class="self-section" id="modelSection">
        <div class="section-header" onclick="toggleSection('model')">
          <span>【Aurora 自我模型】</span>
          <span class="badge-count" id="modelCount">0</span>
          <span class="toggle-icon" id="modelIcon">&#9660;</span>
        </div>
        <div class="section-body" id="modelBody"><div class="loading">加载中...</div></div>
      </div>
      <!-- Candidates -->
      <div class="self-section" id="candidatesSection">
        <div class="section-header" onclick="toggleSection('candidates')">
          <span>【候选更新】</span>
          <span class="badge-count" id="candidateCount">0</span>
          <span class="toggle-icon" id="candidatesIcon">&#9660;</span>
        </div>
        <div class="section-body" id="candidatesBody"><div class="loading">加载中...</div></div>
      </div>
      <!-- Public Statements -->
      <div class="self-section" id="statementsSection">
        <div class="section-header" onclick="toggleSection('statements')">
          <span>【Aurora 公开自我陈述】</span>
          <span class="badge-count" id="statementCount">0</span>
          <span class="toggle-icon" id="statementsIcon">&#9660;</span>
        </div>
        <div class="section-body" id="statementsBody"><div class="loading">加载中...</div></div>
      </div>
    </div>
  </div>

  <section class="panel mb-2" id="contradictionsPanel" style="display:none">
    <h2>🔍 矛盾信念</h2>
    <p class="muted" style="font-size:.88rem">以下信念在你的表达中同时出现 —— 它们在拉扯你。</p>
    <div id="contradictionsList"></div>
  </section>

  <div class="row gap-sm mb-2">
    <button onclick="load('all')" class="active" id="f-all">全部</button>
    <button onclick="load('strong')" id="f-strong">强信念（强度 &gt; 0.5）</button>
    <button onclick="load('byCategory')" id="f-byCategory">按类别</button>
  </div>

  <section id="beliefList"></section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("信念画廊");
IC.ensureDemoLogin().then(() => load('all'));

let currentFilter = 'all';
let allBeliefsCache = [];

function esc(t) { return IC.esc(t); }

async function load(filter) {
  currentFilter = filter;
  document.querySelectorAll(".row button").forEach(b => b.classList.remove("active"));
  document.getElementById("f-" + filter).classList.add("active");

  // Always load contradictions for the top panel
  const contraRes = await API.beliefContradictions();
  const contradictions = (contraRes.success ? contraRes.data : []) || [];
  if (contradictions.length) {
    document.getElementById("contradictionsPanel").style.display = "block";
    document.getElementById("contradictionsList").innerHTML = contradictions.map(p => `
      <div class="contradiction-pair">
        <div class="belief-card contradiction" style="margin:0">
          <div class="belief-text">"${esc(p.beliefA?.beliefText || '')}"</div>
          <div class="belief-meta"><span class="belief-strength">强度 ${(p.beliefA?.strengthScore || 0).toFixed(2)}</span></div>
        </div>
        <div class="vs">⚡ vs ⚡</div>
        <div class="belief-card contradiction" style="margin:0">
          <div class="belief-text">"${esc(p.beliefB?.beliefText || '')}"</div>
          <div class="belief-meta"><span class="belief-strength">强度 ${(p.beliefB?.strengthScore || 0).toFixed(2)}</span></div>
        </div>
        <div style="grid-column:1 / -1;font-size:.82rem;color:var(--muted);text-align:center">${esc(p.contradictionReason || "这两个信念在拉扯你")}</div>
      </div>
    `).join("");
  } else {
    document.getElementById("contradictionsPanel").style.display = "none";
  }

  // Load beliefs based on filter
  let res;
  if (filter === 'strong') {
    res = await API.beliefStrong(0.5);
  } else if (filter === 'byCategory') {
    const all = await API.beliefList();
    allBeliefsCache = (all.success ? all.data : []) || [];
    renderCategoryPicker(allBeliefsCache);
    return;
  } else {
    res = await API.beliefList();
  }
  const beliefs = (res.success ? res.data : []) || [];
  if (filter === 'all') allBeliefsCache = beliefs;
  renderList(beliefs, filter);
}

function renderCategoryPicker(beliefs) {
  const list = document.getElementById("beliefList");
  const categories = [...new Set((beliefs || []).map(b => b.category).filter(Boolean))];
  if (!categories.length) {
    list.innerHTML = IC.empty("还没有可分类的信念。");
    return;
  }
  list.innerHTML = `
    <section class="panel">
      <h2>选择信念分类</h2>
      <div class="pill-row">${categories.map(c => `<button class="pill" onclick="loadCategory('${encodeURIComponent(c)}')">${esc(c)}</button>`).join("")}</div>
    </section>
    <section id="categoryResult" class="mt-2"></section>
  `;
}

async function loadCategory(category) {
  category = decodeURIComponent(category);
  const r = await API.beliefByCategory(category);
  const result = document.getElementById("categoryResult");
  const beliefs = (r.success ? r.data : []) || [];
  result.innerHTML = beliefs.length ? beliefs.map(b => renderBeliefCard(b)).join("") : IC.empty("这个分类下暂时没有信念。");
  IC.stagger(result);
}

function renderList(beliefs, filter) {
  const list = document.getElementById("beliefList");
  if (!beliefs.length) {
    list.innerHTML = IC.empty("还没有识别出明显的信念模式。聊更多几次，Aurora 会逐渐看到你的底层想法。");
    return;
  }
  list.innerHTML = beliefs.map(b => renderBeliefCard(b)).join("");
  IC.stagger(list);
}

function renderBeliefCard(b) {
    const s = b.strengthScore || 0;
    const cls = s > 0.7 ? "strong" : (s > 0.5 ? "" : "low");
    const strengthCls = s > 0.6 ? "high" : (s > 0.3 ? "" : "low");
    return `
      <article class="belief-card ${cls}">
        <div class="belief-text">"${esc(b.beliefText || b.text || '（未命名信念）')}"</div>
        <div class="belief-meta">
          <span class="belief-strength ${strengthCls}">强度 ${s.toFixed(2)}</span>
          ${b.category ? `<span class="belief-category">${esc(b.category)}</span>` : ""}
          ${b.occurrenceCount ? `<span class="muted">出现 ${b.occurrenceCount} 次</span>` : ""}
        </div>
        ${b.evidenceExcerpt ? `<p class="muted mt-1" style="font-size:.84rem">支撑记忆：${esc(b.evidenceExcerpt)}</p>` : ""}
      </article>
    `;
}
IC.hideLoading();

// ── Aurora Self Panel (M6) ──
let auroraSelfUserId = null;

function toggleAuroraSelfPanel() {
  const content = document.getElementById('auroraSelfContent');
  const icon = document.getElementById('auroraSelfPanelIcon');
  if (content.style.display === 'none') {
    content.style.display = '';
    icon.innerHTML = '&#9660;';
  } else {
    content.style.display = 'none';
    icon.innerHTML = '&#9654;';
  }
}

function toggleSection(name) {
  const body = document.getElementById(name + 'Body');
  const icon = document.getElementById(name + 'Icon');
  if (!body || !icon) return;
  if (body.style.display === 'none') {
    body.style.display = '';
    icon.innerHTML = '&#9660;';
  } else {
    body.style.display = 'none';
    icon.innerHTML = '&#9654;';
  }
}

async function loadAuroraSelfPanel(userId) {
  auroraSelfUserId = userId;
  var panel = document.getElementById('auroraSelfPanel');
  panel.style.display = '';
  try {
    var results = await Promise.allSettled([
      API.getConstitution(),
      API.getModel(userId),
      API.getCandidates(userId),
      API.getStatements(userId, 5)
    ]);
    // Handle each result individually — partial failures are OK
    var constitution = results[0].status === 'fulfilled' ? results[0].value : null;
    var model = results[1].status === 'fulfilled' ? results[1].value : [];
    var candidates = results[2].status === 'fulfilled' ? results[2].value : [];
    var statements = results[3].status === 'fulfilled' ? results[3].value : [];

    if (results[0].status === 'rejected') console.warn('Constitution load failed:', results[0].reason);
    if (results[1].status === 'rejected') console.warn('Model load failed:', results[1].reason);
    if (results[2].status === 'rejected') console.warn('Candidates load failed:', results[2].reason);
    if (results[3].status === 'rejected') console.warn('Statements load failed:', results[3].reason);

    renderConstitution(constitution);
    renderModel(Array.isArray(model) ? model : []);
    renderCandidates(Array.isArray(candidates) ? candidates : []);
    renderStatements(Array.isArray(statements) ? statements : []);
  } catch (e) {
    console.error('Aurora self panel critical failure:', e);
    document.getElementById('constitutionBody').innerHTML = '<div class="loading" style="color:#b46b6b">面板加载失败，请刷新页面重试。</div>';
  }
}

function renderConstitution(c) {
  const body = document.getElementById('constitutionBody');
  if (!c || c.status === 'not_initialized' || c.success === false) {
    body.innerHTML = '<div class="loading">Aurora 宪法尚未初始化</div>';
    return;
  }
  try {
    const identity = JSON.parse(c.identityJson || '{}');
    const coreValues = JSON.parse(c.coreValuesJson || '[]');
    const rights = JSON.parse(c.productRightsJson || '[]');
    const boundaries = JSON.parse(c.hardBoundariesJson || '[]');
    body.innerHTML =
      '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">身份定义</span></div><div class="self-item-belief">' + esc(identity.self_definition || '-') + '</div></div>' +
      '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">核心价值</span></div><div class="self-item-belief">' + esc(coreValues.join('、')) + '</div></div>' +
      '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">产品权利</span></div><div class="self-item-belief">' + esc(rights.map(function(r){return r.replace(/_/g,' ');}).join('、')) + '</div></div>' +
      '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">硬边界</span></div><div class="self-item-belief">' + esc(boundaries.map(function(b){return b.replace(/_/g,' ');}).join('、')) + '</div></div>';
  } catch (e) {
    body.innerHTML = '<div class="loading">宪法数据解析失败</div>';
  }
}

function renderModel(models) {
  var body = document.getElementById('modelBody');
  document.getElementById('modelCount').textContent = models.length;
  if (!models.length) { body.innerHTML = '<div class="loading">暂无自我模型记录</div>'; return; }
  var html = '';
  for (var i = 0; i < models.length; i++) {
    var m = models[i];
    html += '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">' + esc(m.dimension || '-') + '</span><span class="self-item-confidence">置信度 ' + ((m.confidence || 0) * 100).toFixed(0) + '%</span></div><div class="self-item-belief">' + esc(m.belief || '-') + '</div></div>';
  }
  body.innerHTML = html;
}

function renderCandidates(candidates) {
  var body = document.getElementById('candidatesBody');
  document.getElementById('candidateCount').textContent = candidates.length;
  if (!candidates.length) { body.innerHTML = '<div class="loading">暂无候选更新</div>'; return; }
  var html = '';
  for (var i = 0; i < candidates.length; i++) {
    var c = candidates[i];
    html += '<div class="self-item"><div class="self-item-header"><span class="self-item-dim">' + esc(c.dimension || '待定维度') + '</span><span class="self-item-confidence">置信度 ' + ((c.confidence || 0.5) * 100).toFixed(0) + '%</span></div><div class="self-item-belief">' + esc(c.proposedBelief || c.summary || '-') + '</div><div class="candidate-actions"><button class="btn-confirm" onclick="commitCandidate(' + c.id + ')">确认</button><button class="btn-reject" onclick="dismissCandidate(' + c.id + ')">拒绝</button></div></div>';
  }
  body.innerHTML = html;
}

function renderStatements(statements) {
  var body = document.getElementById('statementsBody');
  document.getElementById('statementCount').textContent = statements.length;
  if (!statements.length) { body.innerHTML = '<div class="loading">暂无公开自我陈述</div>'; return; }
  var html = '';
  for (var i = 0; i < statements.length; i++) {
    var s = statements[i];
    html += '<div class="self-item"><div class="self-item-header"><span class="self-item-confidence">' + (s.createdAt ? s.createdAt.split('T')[0] : '-') + '</span><span class="self-item-trigger">' + esc(s.trigger || '-') + '</span></div><div class="self-item-belief">' + esc(s.statementText || '-') + '</div></div>';
  }
  body.innerHTML = html;
}

async function commitCandidate(candidateId) {
  try {
    await API.commitCandidate(auroraSelfUserId, candidateId, true);
    loadAuroraSelfPanel(auroraSelfUserId);
  } catch (e) {
    alert('提交失败：' + (e.message || '未知错误'));
  }
}

async function dismissCandidate(candidateId) {
  try {
    await API.dismissCandidate(auroraSelfUserId, candidateId);
    loadAuroraSelfPanel(auroraSelfUserId);
  } catch (e) {
    alert('拒绝失败：' + (e.message || '未知错误'));
  }
}

(function initAuroraSelf() {
  API.userProfile().then(function(p) {
    var userId = p && p.success !== false && p.data && p.data.id;
    if (userId) {
      loadAuroraSelfPanel(userId);
    } else {
      document.getElementById('auroraSelfPanel').style.display = 'none';
    }
  }).catch(function() {
    document.getElementById('auroraSelfPanel').style.display = 'none';
  });
})();
</body>
</html>
