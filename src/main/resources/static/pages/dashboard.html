<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>宇宙核心 · 内宇宙</title>
  <style>
    .dashboard-hero {
      padding: 32px 28px;
      border-radius: var(--radius-card);
      background:
        linear-gradient(135deg, rgba(143,163,148,.12), rgba(151,169,186,.10)),
        var(--surface-paper);
      border: 1px solid rgba(255,255,255,.20);
      backdrop-filter: blur(16px);
      box-shadow: var(--elev-2);
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .dashboard-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(240,216,176,.15), transparent 50%);
      pointer-events: none;
      animation: hero-glow-drift 16s var(--ease-drift, ease-in-out) infinite alternate;
    }
    /* The dawn light over the hero shifts slowly, like a sky that is never quite still. */
    @keyframes hero-glow-drift {
      0%   { opacity: .7; transform: translate(0, 0) scale(1); }
      100% { opacity: 1; transform: translate(-3%, 2%) scale(1.08); }
    }
    .time-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(255,250,243,.6);
      border: 1px solid var(--line);
      font-size: 0.82rem;
      color: var(--muted);
    }
    .greeting-large {
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--ink);
      margin: 16px 0 8px;
      line-height: 1.2;
      text-wrap: balance;
    }
    .guiding-text {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .emotion-weather-card {
      padding: 24px;
      border-radius: var(--radius-flow);
      background: rgba(255,250,243,.55);
      border: 1px solid var(--line);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .emotion-weather-card .weather-icon {
      font-size: 3rem;
      margin-bottom: 8px;
      display: inline-block;
      animation: weather-float 6.5s var(--ease-flow, ease-in-out) infinite;
    }
    @keyframes weather-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
    .emotion-weather-card .weather-label {
      font-size: 1.1rem;
      color: var(--ink);
      margin-bottom: 4px;
    }
    .emotion-weather-card .weather-desc {
      font-size: 0.88rem;
      color: var(--muted);
    }
    .theme-pill-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 4px;
    }
    .theme-pill-mini {
      display: inline-block;
      padding: 6px 14px;
      border-radius: 999px;
      background: rgba(143,163,148,.16);
      border: 1px solid var(--line);
      font-size: 0.82rem;
      color: var(--ink);
      cursor: pointer;
      transition: transform .2s var(--ease-flow), background .2s;
      text-decoration: none;
    }
    .theme-pill-mini:hover {
      transform: translateY(-1px);
      background: rgba(143,163,148,.24);
      border-color: var(--line-strong);
    }
    .theme-pill-mini.size-1 { font-size: 0.75rem; padding: 4px 10px; }
    .theme-pill-mini.size-2 { font-size: 0.82rem; padding: 6px 12px; }
    .theme-pill-mini.size-3 { font-size: 0.92rem; padding: 8px 16px; font-weight: 500; }
    .progress-ring {
      width: 80px;
      height: 80px;
      position: relative;
    }
    .progress-ring circle {
      fill: none;
      stroke-width: 6;
      stroke-linecap: round;
      transform: rotate(-90deg);
      transform-origin: 50% 50%;
    }
    .progress-ring .bg {
      stroke: var(--line);
    }
    .progress-ring .progress {
      stroke: var(--accent-sage);
      transition: stroke-dashoffset 0.6s var(--ease-bloom);
    }
    .progress-ring-text {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--ink);
    }
    .quick-action {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius);
      background: rgba(255,250,243,.6);
      border: 1px solid var(--line);
      text-decoration: none;
      transition: all .2s var(--ease-flow);
    }
    .quick-action:hover {
      background: rgba(255,250,243,.9);
      border-color: var(--line-strong);
      transform: translateY(-1px);
    }
    .quick-action .icon {
      font-size: 1.4rem;
    }
    .quick-action .label {
      flex: 1;
      font-size: 0.92rem;
      color: var(--ink);
    }
    .quick-action .count {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .aurora-note {
      padding: 20px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(191,150,152,.16), rgba(143,163,148,.12));
      border: 1px solid var(--line-strong);
      font-style: italic;
      color: var(--ink);
      line-height: 1.7;
    }
    /* ── Dark mode ── */
    body.dark-star .dashboard-hero {
      background: linear-gradient(135deg, rgba(42,38,34,.68), rgba(37,33,29,.52)),
        rgba(42,38,34,.40);
      border-color: rgba(163,153,143,.10);
      box-shadow: 0 4px 16px rgba(0,0,0,.08), 0 16px 48px rgba(0,0,0,.16);
    }
    body.dark-star .dashboard-hero::before {
      background: radial-gradient(circle at 80% 20%, rgba(192,144,96,.08), transparent 50%);
    }
    body.dark-star .emotion-weather-card {
      background: rgba(42,38,34,.56);
      border-color: rgba(163,153,143,.10);
    }
    body.dark-star .quick-action {
      background: rgba(42,38,34,.56);
      border-color: rgba(163,153,143,.10);
    }
    body.dark-star .aurora-note-card {
      background: rgba(42,38,34,.56);
      border-color: rgba(163,153,143,.10);
    }
    /* Frosted light surfaces that were missing a dark counterpart (the "灰色框"
       in 夜色 mode): badge, quick-action hover, and the notification cards. */
    body.dark-star .time-badge { background: rgba(42,38,34,.55); }
    body.dark-star .quick-action:hover { background: rgba(42,38,34,.82); }
    body.dark-star .notif-card {
      background: linear-gradient(180deg, rgba(42,38,34,.72), rgba(37,33,29,.5)), var(--surface-paper);
    }

    /* RUN-006 — unread notifications strip */
    .notif-strip { display: flex; flex-direction: column; gap: 10px; margin: 0 0 8px; }
    .notif-card {
      display: flex; align-items: flex-start; justify-content: space-between; gap: 14px;
      padding: 14px 18px; border-radius: 14px;
      background: linear-gradient(180deg, rgba(255,250,243,.7), rgba(247,242,236,.5)), var(--surface-paper);
      border: 1px solid var(--line);
      box-shadow: 0 2px 10px rgba(0,0,0,.04);
      animation: notif-in 420ms var(--ease-bloom, ease) both;
    }
    @keyframes notif-in { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    .notif-card.warn { border-color: rgba(176,124,108,.34); }
    .notif-card .notif-body strong { display: block; font-size: .95rem; color: var(--ink); margin-bottom: 3px; }
    .notif-card .notif-body p { margin: 0; font-size: .84rem; color: var(--muted); line-height: 1.6; }
    .notif-card .notif-dismiss {
      flex: none; background: none; border: none; cursor: pointer;
      color: var(--faint); font-size: 1.1rem; line-height: 1; padding: 2px 4px;
      transition: color 200ms ease;
    }
    .notif-card .notif-dismiss:hover { color: var(--ink); }
    body.dark-star .notif-card {
      background: rgba(42,38,34,.56); border-color: rgba(163,153,143,.12);
    }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Dashboard Hero with time-aware greeting -->
  <section class="dashboard-hero">
    <div class="time-badge" id="timeBadge">
      <span id="timeIcon">☀️</span>
      <span id="timeDisplay">上午 09:23</span>
    </div>
    <h1 class="greeting-large" id="greetingText">正在读取你的内宇宙...</h1>
    <p class="guiding-text" id="guidingText">让自己先回到身体里</p>
  </section>

  <!-- RUN-006 — unread system notifications (e.g. capsule sync done/failed), finally surfaced. -->
  <section id="notifStrip" class="notif-strip" hidden></section>

  <!-- Main Grid -->
  <section class="grid">
    <!-- Center - Emotion Weather Card -->
    <article class="emotion-weather-card">
      <div class="weather-icon" id="weatherIcon">☁️</div>
      <div class="weather-label" id="weatherLabel">多云</div>
      <div class="weather-desc" id="weatherDesc">平静的一天</div>
      <div class="row gap-sm mt-2" style="justify-content:center">
        <a class="button" href="/pages/aurora-chat.html">和 <span data-aurora-name>Aurora</span> 聊聊今天</a>
      </div>
    </article>

    <!-- Left - Todo Progress -->
    <article class="panel">
      <h2>今日待办</h2>
      <div class="row" style="align-items:center;gap:20px;margin-top:12px">
        <div class="progress-ring">
          <svg width="80" height="80">
            <circle class="bg" cx="40" cy="40" r="34"/>
            <circle class="progress" id="todoProgressRing" cx="40" cy="40" r="34"
                    stroke-dasharray="213.6" stroke-dashoffset="213.6"/>
          </svg>
          <div class="progress-ring-text" id="todoProgressText">0%</div>
        </div>
        <div style="flex:1">
          <p id="todoCount" class="muted" style="font-size:.88rem">0 / 0 已完成</p>
          <p id="todoNext" class="muted" style="font-size:.82rem;margin-top:4px">暂无待办</p>
        </div>
      </div>
      <a class="button mt-2" href="/app/aurora/">管理待办</a>
    </article>

    <!-- Right - Unread Letters & Updates -->
    <article class="panel">
      <h2>待处理事项</h2>
      <div id="quickActions" style="display:grid;gap:10px;margin-top:12px">
        <a href="/pages/inbox.html" class="quick-action">
          <span class="icon">✉️</span>
          <span class="label">未读慢信</span>
          <span class="count" id="letterCount">0 封</span>
        </a>
        <a href="/pages/echo-plaza.html" class="quick-action">
          <span class="icon">💫</span>
          <span class="label">共鸣体更新</span>
          <span class="count" id="capsuleCount">0 个</span>
        </a>
        <a href="/pages/memory-starfield.html" class="quick-action">
          <span class="icon">⭐</span>
          <span class="label">新记忆星体</span>
          <span class="count" id="newMemoryCount">0 颗</span>
        </a>
      </div>
    </article>
  </section>

  <div class="spacer"></div>

  <!-- Theme Cloud Widget -->
  <section class="panel">
    <div class="flex-between mb-1">
      <h2>最近浮现的主题</h2>
      <a href="/pages/themes.html" class="muted" style="font-size:.88rem">查看全部 →</a>
    </div>
    <div class="theme-pill-bar" id="themeCloud"></div>
  </section>

  <div class="spacer"></div>

  <!-- Weekly Review Preview + Aurora Note -->
  <section class="grid">
    <article class="panel">
      <h2>本周回顾</h2>
      <div id="weeklySummary">
        <p class="muted">Aurora 正在整理过去 7 天的内在轨迹...</p>
      </div>
      <a class="button mt-2" href="/app/aurora/#/cosmos">查看完整周报</a>
    </article>
    <article class="aurora-note" id="auroraNote">
      <strong><span data-aurora-name>Aurora</span> 的观察：</strong>
      <p class="muted mt-1" id="auroraObservation">正在观察你的内在宇宙...</p>
    </article>
  </section>

  <div class="spacer"></div>

  <section class="panel">
    <div class="flex-between mb-1">
      <h2>7 天理解概览</h2>
      <a href="/app/aurora/#/cosmos" class="muted" style="font-size:.88rem">查看依据 →</a>
    </div>
    <div id="understandingOverview" class="grid">
      <p class="muted">正在汇总日记、对话、待办与记忆线索...</p>
    </div>
  </section>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("宇宙核心");

IC.ensureDemoLogin().then(load);

function esc(t) { return IC.esc(t); }

async function load() {
  loadAiHealth();
  updateDateTime();
  setInterval(updateDateTime, 60000); // Update every minute

  const r = await API.dashboardSummary();
  if (!r.success || !r.data) return;
  const d = r.data;

  // Update greeting
  const greeting = IC.greetingByTime();
  document.getElementById("greetingText").textContent = greeting;
  document.getElementById("guidingText").textContent = d.greeting || "让自己先回到身体里";

  // Update emotion weather
  const realWeather = window.ICWeather?.getWeatherState ? window.ICWeather.getWeatherState() : null;
  updateWeatherCard(realWeather, d.emotionWeather);
  window.addEventListener("weatherChanged", e => updateWeatherCard(e.detail.weather, d.emotionWeather));
  document.body.dataset.emotionWeather = d.emotionWeather || "";
  /*
  const weatherDescs = {
    "SUN": "晴朗的一天",
    "CLOUD": "平静的一天",
    "RAIN": "有些情绪",
    "STORM": "波动强烈",
    "FOG": "有些朦胧",
    "SNOW": "安静沉淀"
  };
  document.getElementById("weatherDesc").textContent = weatherDescs[d.emotionWeather] || "平静的一天";
  */

  // Update todos
  const todos = d.todos || [];
  const done = todos.filter(t => t.status === "DONE").length;
  const total = todos.length;
  const percent = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById("todoCount").textContent = `${done} / ${total} 已完成`;
  const circumference = 2 * Math.PI * 34;
  document.getElementById("todoProgressRing").style.strokeDashoffset = circumference - (percent / 100) * circumference;
  document.getElementById("todoProgressText").textContent = `${percent}%`;

  const nextTodo = todos.find(t => t.status !== "DONE");
  document.getElementById("todoNext").textContent = nextTodo ? esc(nextTodo.taskName || nextTodo.description || "下一个待办") : "暂无待办";

  // Update quick actions
  document.getElementById("letterCount").textContent = `${d.unreadLetterCount || 0} 封`;
  document.getElementById("capsuleCount").textContent = `${d.capsuleCount || 0} 个`;
  document.getElementById("newMemoryCount").textContent = `${d.memoryCount || 0} 颗`;

  // Load theme cloud
  try {
    const tr = await API.memoryThemes();
    if (tr.success && tr.data) {
      const themes = tr.data.slice(0, 8);
      const max = Math.max(...themes.map(t => t.memoryCount || t.cardCount || 1), 1);
      document.getElementById("themeCloud").innerHTML = themes.map(t => {
        const count = t.memoryCount || t.cardCount || 1;
        const size = Math.min(3, Math.max(1, Math.round(count / max * 3)));
        return `<a href="/pages/themes.html" class="theme-pill-mini size-${size}">${esc(t.themeName || t.name)} <span class="muted">${count}</span></a>`;
      }).join("") || '<span class="muted">还没有聚类出主题</span>';
    }
  } catch(e) {
    document.getElementById("themeCloud").innerHTML = '<span class="muted">主题加载中...</span>';
  }

  // Load weekly review
  try {
    const wr = await API.weeklyReviewLatest();
    if (wr.success && wr.data) {
      const review = wr.data;
      document.getElementById("auroraObservation").textContent = review.auroraObservation || review.themeSummary || "Aurora 正在观察你的内在宇宙...";
      document.getElementById("weeklySummary").innerHTML = `
        <p class="muted" style="font-size:.88rem;margin-bottom:8px">${esc(review.dateRange || "本周")}</p>
        <p style="font-size:.92rem;line-height:1.6">${esc(review.title || "本周回顾")}</p>
        <p class="muted" style="font-size:.82rem;margin-top:8px">${(d.memoryCount || 0)} 条记忆 · ${done} 个待办完成</p>
      `;
    }
  } catch(e) {}

  await loadUnderstandingOverview();
  checkAuroraProactive();
  loadNotifications();

  IC.stagger(document);
}

// RUN-006 — surface unread system notifications (e.g. capsule sync done/failed) that the
// backend has been writing to tb_notification but the UI never consumed. Each card is
// dismissible; dismissing marks it read so it won't reappear.
async function loadNotifications() {
  const strip = document.getElementById("notifStrip");
  if (!strip) return;
  let items = [];
  try {
    const res = await API.notifications();
    items = (res && res.success ? res.data : []) || [];
  } catch (e) { return; }
  if (!items.length) { strip.hidden = true; return; }
  strip.hidden = false;
  strip.innerHTML = items.map(n => {
    const warn = (n.type === "SYNC_FAILED");
    return `<article class="notif-card${warn ? " warn" : ""}" data-id="${n.id}">
        <div class="notif-body">
          <strong>${IC.esc(n.title || "提醒")}</strong>
          <p>${IC.esc(n.body || "")}</p>
        </div>
        <button class="notif-dismiss" type="button" aria-label="知道了" title="知道了" data-id="${n.id}">×</button>
      </article>`;
  }).join("");
  strip.querySelectorAll(".notif-dismiss").forEach(btn => {
    btn.addEventListener("click", () => dismissNotification(btn.getAttribute("data-id")));
  });
}

async function dismissNotification(id) {
  const card = document.querySelector(`.notif-card[data-id="${id}"]`);
  if (card) { card.style.transition = "opacity .25s ease"; card.style.opacity = "0"; }
  try { await API.markNotificationRead(id); } catch (e) {}
  setTimeout(() => {
    card?.remove();
    const strip = document.getElementById("notifStrip");
    if (strip && !strip.querySelector(".notif-card")) strip.hidden = true;
  }, 260);
}

async function checkAuroraProactive() {
  if (sessionStorage.getItem("aurora_proactive_dismissed") === "1") return;
  try {
    const r = await requestAuroraProactiveWithTimeout(8000);
    if (!r.success || !r.data || !r.data.shouldGreet) return;
    const note = document.createElement("div");
    note.className = "proactive-greeting visible";
    note.innerHTML = `
      <div class="greeting-content">
        <strong><span data-aurora-name>Aurora</span> 想起你了</strong>
        <p>${IC.esc(r.data.greeting || "我在这里。要不要先和我说一句今天最真实的话？")}</p>
      </div>
      <div class="greeting-actions">
        <a class="greeting-btn primary" href="/pages/aurora-chat.html">去聊聊</a>
        <button class="greeting-btn secondary" type="button" onclick="dismissAuroraProactive(this)">稍后</button>
      </div>
    `;
    document.body.appendChild(note);
  } catch (e) {}
}

async function requestAuroraProactiveWithTimeout(timeoutMs) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), timeoutMs);
  try {
    const res = await IC.secureFetch("/api/aurora/proactive/check", {
      method: "POST",
      headers: { "Content-Type": "application/json; charset=utf-8" },
      signal: controller.signal
    });
    return await res.json();
  } finally {
    clearTimeout(timer);
  }
}

async function dismissAuroraProactive(button) {
  sessionStorage.setItem("aurora_proactive_dismissed", "1");
  const node = button.closest(".proactive-greeting");
  node?.classList.add("hiding");
  setTimeout(() => node?.remove(), 260);
  API.auroraProactiveDismiss(0).catch(() => {});
}

function updateWeatherCard(realWeather, emotionWeather) {
  const w = realWeather || {};
  const type = w.type || "CLOUD";
  const location = w.locationLabel || localStorage.getItem("ic_location_label") || "当前位置";
  document.getElementById("weatherIcon").textContent = window.ICWeather?.getWeatherIcon ? ICWeather.getWeatherIcon(type) : IC.weatherIcon(type);
  document.getElementById("weatherLabel").textContent = `${location} · ${w.description || "真实天气"}${w.temperature !== undefined ? " · " + w.temperature + "℃" : ""}`;
  document.getElementById("weatherDesc").textContent = `情绪天气：${emotionWeather || "尚未记录"}${w.isAuto === false ? " · 手动天气" : " · 自动定位天气"}`;
}

async function loadUnderstandingOverview() {
  const box = document.getElementById("understandingOverview");
  try {
    const r = await API.understandingOverview(7);
    if (!r.success || !r.data) return;
    const o = r.data;
    const todo = o.todoStats || {};
    const learning = o.systemLearning || {};
    const themes = (o.themeEvolution || []).slice(0, 4).map(t => t.themeName || t.name).filter(Boolean);
    box.innerHTML = `
      <article class="card">
        <strong>用户自身变化</strong>
        <p class="muted">情绪记录 ${(o.emotionTraces || []).length} 条，重要事件 ${(o.importantEvents || []).length} 个，关系线索 ${(o.relationSignals || []).length} 条。</p>
        <div class="pill-row">${themes.map(t => `<span class="pill">${esc(t)}</span>`).join("") || '<span class="pill">主题沉淀中</span>'}</div>
      </article>
      <article class="card">
        <strong><span data-aurora-name>Aurora</span> 学到了什么</strong>
        <p class="muted">新增记忆 ${(o.newMemories || []).length} 条，依据节点 ${(o.evidence || []).length} 个，被记住的片段约 ${Number(learning.rememberedWords || 0)} 字。</p>
        <p class="muted">活跃待办 ${Number(todo.active || 0)} 个，已完成 ${Number(todo.done || 0)} 个。</p>
      </article>
    `;
  } catch (e) {
    box.innerHTML = '<p class="muted">理解概览暂时不可用。</p>';
  }
}

function updateDateTime() {
  const now = new Date();
  const hour = now.getHours();
  const timeIcons = {
    dawn: "🌅",
    morning: "☀️",
    noon: "🌤",
    afternoon: "🌇",
    dusk: "🌆",
    night: "🌙",
    "deep-night": "⭐"
  };
  const timeLabels = {
    dawn: "晨曦",
    morning: "上午",
    noon: "正午",
    afternoon: "午后",
    dusk: "暮色",
    night: "夜色",
    "deep-night": "深夜"
  };

  let timeOfDay;
  if (hour >= 5 && hour < 7) timeOfDay = "dawn";
  else if (hour >= 7 && hour < 11) timeOfDay = "morning";
  else if (hour >= 11 && hour < 15) timeOfDay = "noon";
  else if (hour >= 15 && hour < 18) timeOfDay = "afternoon";
  else if (hour >= 18 && hour < 20) timeOfDay = "dusk";
  else if (hour >= 20 && hour < 23) timeOfDay = "night";
  else timeOfDay = "deep-night";

  const timeStr = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
  document.getElementById("timeIcon").textContent = timeIcons[timeOfDay] || "🕐";
  document.getElementById("timeDisplay").textContent = `${timeLabels[timeOfDay]} ${timeStr}`;
}
