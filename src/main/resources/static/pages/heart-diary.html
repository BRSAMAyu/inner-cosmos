<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>心声日记 · 内宇宙</title>
  <style>
    /* Hero */
    .diary-hero { padding: 0 0 28px; margin-bottom: 24px;
      background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(184,194,174,.10), transparent),
                  radial-gradient(ellipse 40% 50% at 70% 40%, rgba(165,179,194,.08), transparent); }
    .diary-hero h1 { font-family: var(--font-hero); font-size: clamp(1.8rem,4vw,2.6rem); margin: 0 0 8px; text-wrap: balance; }
    .diary-hero p { color: var(--muted); line-height: 1.7; text-wrap: pretty; }
    /* Hand-written paper theme styling */
    .diary-paper {
      background: linear-gradient(rgba(255, 255, 255, 0.82), rgba(255, 250, 243, 0.72)), var(--surface-paper);
      border-radius: var(--radius-card);
      border: 1px solid var(--line-strong);
      padding: 32px;
      box-shadow: var(--elev-2, var(--shadow));
      min-height: 480px;
      position: relative;
    }
    .diary-paper::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 45px;
      width: 1px;
      background: rgba(191, 150, 152, 0.28);
    }
    .diary-textarea {
      background: transparent;
      border: none;
      width: 100%;
      min-height: 320px;
      padding-left: 30px;
      line-height: 1.9;
      font-size: 1.1rem;
      font-family: var(--font-body);
      color: var(--ink);
      resize: vertical;
    }
    .diary-textarea:focus {
      outline: none;
      border: none;
      box-shadow: none;
      background: transparent;
    }
    .polish-btn-group button {
      background: rgba(255, 255, 255, 0.38);
      border-color: var(--line);
    }
    .polish-btn-group button.active {
      background: rgba(143, 163, 148, 0.32);
      border-color: var(--line-strong);
      color: var(--ink);
    }
    /* Sinking animation for saving */
    @keyframes dissolve-fly {
      0% {
        transform: translateY(0) scale(1) rotate(0deg);
        opacity: 1;
        filter: blur(0);
      }
      50% {
        transform: translateY(-80px) scale(0.8) rotate(-2deg);
        opacity: 0.5;
        filter: blur(2px);
      }
      100% {
        transform: translateY(-200px) scale(0) rotate(5deg);
        opacity: 0;
        filter: blur(10px);
      }
    }
    .fly-animation {
      animation: dissolve-fly 1.2s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }
    .star-float {
      position: fixed;
      width: 6px;
      height: 6px;
      background: #f0d8b0;
      border-radius: 50%;
      box-shadow: 0 0 12px #fff;
      pointer-events: none;
      z-index: 9999;
      animation: float-up 1.5s ease-out forwards;
    }
    @keyframes float-up {
      0% { transform: translateY(0) scale(1); opacity: 1; }
      100% { transform: translateY(-300px) scale(0); opacity: 0; }
    }
    /* Dark mode */
    body.dark-star .diary-hero { background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(122,142,127,.06), transparent); }
    /* warm Morandi dark-star palette (was cold navy rgb(30,35,40)/rgb(35,40,48)/rgb(60,70,80)) */
    body.dark-star .diary-paper { background: linear-gradient(rgba(52,47,42,.82), rgba(42,38,34,.72)); border-color: rgba(163,153,143,.16); }
    body.dark-star .diary-textarea { color: var(--ink); }
    body.dark-star .diary-paper::before { background: rgba(191,150,152,.12); }
    body.dark-star .polish-btn-group button { background: rgba(52,47,42,.5); border-color: rgba(163,153,143,.16); }
    body.dark-star .polish-btn-group button.active { background: rgba(143,163,148,.22); border-color: rgba(163,153,143,.20); }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>

  <section class="diary-hero">
    <span class="route-hint">记录流淌的内在</span>
    <h1 id="page-title">心声日记</h1>
    <p>不必有逻辑地去写，甚至可以直接用麦克风倾诉。我们为你提取意义。</p>
  </section>

  <div class="letter-layout">
    <!-- Writing section -->
    <section>
      <div id="diaryPaper" class="diary-paper">
        <textarea id="diaryContent" class="diary-textarea" placeholder="在这里倾泻下今天的混乱、碎片或者平静..."></textarea>
      </div>

      <!-- Action panel -->
      <div class="row gap-md mt-2" style="align-items: center; justify-content: space-between;">
        <div class="row gap-sm" style="align-items: center;">
          <button id="btnVoiceRecord" class="voice-pill" onclick="toggleVoiceRecording()" title="语音心声输入">🎤 开始倾诉录音</button>
          <button class="voice-pill ghost" onclick="mockVoiceInput()" title="开发演示输入">模拟</button>
          <span id="voiceStatus" class="muted" style="font-size: .84rem;"></span>
        </div>
        <div class="row gap-sm">
          <button id="btnSubmit" onclick="submitDiary()" class="button" style="background: rgba(143,163,148,.24); font-weight: bold;">将心声化作记忆星宿</button>
        </div>
      </div>
    </section>

    <!-- Side structure (Polishing comparisons) -->
    <section class="diary-guide">
      <div class="panel">
        <h2>心声整理与润色</h2>
        <p class="muted">语音输入或散乱拼写的原文通常带有很多冗余。你可以选择不同的档位让 Aurora 协助梳理，但我们始终会保留你的初心。</p>
        
        <div class="tab-bar mt-2 mb-2 polish-btn-group" id="polishTabs" style="display: none;">
          <button id="tabRaw" class="active" onclick="switchPolish(0)">原文</button>
          <button id="tabL1" onclick="switchPolish(1)">净化</button>
          <button id="tabL2" onclick="switchPolish(2)">梳理</button>
          <button id="tabL3" onclick="switchPolish(3)">重塑</button>
        </div>

        <div id="polishNote" class="soft-stage mb-2" style="display: none;">
          <strong id="polishTitle" style="font-size: .94rem;">当前：原文</strong>
          <p id="polishDesc" class="muted mt-1" style="font-size: .84rem; line-height: 1.6;">当前为录入原文。</p>
        </div>

        <div id="polishLoader" class="empty" style="display: none; min-height: 80px;">
          <div class="empty-star"></div>
          <p>Aurora 正在凝神，帮你修饰字句...</p>
        </div>
      </div>
    </section>
  </div>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("心声日记");

let transcriptionId = null;
let rawText = "";
let polishedTexts = { 0: "" }; // 0: Raw, 1: L1, 2: L2, 3: L3
let activePolish = 0;
let recorder = null;
let audioChunks = [];
let isRecording = false;

IC.ensureDemoLogin();

const mockSentences = [
  "嗯……就是说，我今天那个Java项目拖延了，呃，主要是作业那块卡住了，不知道怎么写，其实心里挺烦的。啊，就是觉得自己总是做不好，害怕老师问起，但傍晚看到路上的夕阳，心里又稍微亮了一下，觉得自己是不是把自己逼得太紧了。嗯，明天我必须开始，但是不知道该从哪里下手好。"
];

async function toggleVoiceRecording() {
  if (isRecording) {
    recorder.stop();
    return;
  }
  if (!navigator.mediaDevices || !window.MediaRecorder) {
    IC.toast("当前浏览器不支持录音，请先用文字记录。", "warn");
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioChunks = [];
    const recordOptions = pickRecorderOptions();
    recorder = new MediaRecorder(stream, recordOptions);
    recorder.ondataavailable = event => {
      if (event.data && event.data.size > 0) audioChunks.push(event.data);
    };
    recorder.onstop = async () => {
      stream.getTracks().forEach(track => track.stop());
      isRecording = false;
      document.getElementById("btnVoiceRecord").textContent = "🎤 开始倾诉录音";
      document.getElementById("voiceStatus").textContent = "正在调用 MiMo 语音识别...";
      const mimeType = recorder.mimeType || "audio/webm";
      const blob = new Blob(audioChunks, { type: mimeType });
      const file = await toWavFile(blob);
      const tr = await API.diaryTranscribeAudio(file);
      if (tr.success && tr.data) {
        transcriptionId = tr.data.id;
        rawText = tr.data.originalText || "";
        polishedTexts = { 0: rawText };
        document.getElementById("diaryContent").value = rawText;
        document.getElementById("voiceStatus").textContent = "已由 MiMo 语音识别转写";
        onRawTextChanged(rawText);
        IC.toast("语音已转成文字，可以继续润色或修改。", "success");
      } else {
        document.getElementById("voiceStatus").textContent = "转写失败，请稍后重试";
      }
    };
    recorder.start();
    isRecording = true;
    transcriptionId = null;
    document.getElementById("btnVoiceRecord").textContent = "■ 结束录音";
    document.getElementById("voiceStatus").textContent = "正在录音，最长建议 30 秒...";
  } catch (error) {
    IC.toast("无法打开麦克风，请检查浏览器授权。", "warn");
    document.getElementById("voiceStatus").textContent = "";
  }
}

function pickRecorderOptions() {
  const candidates = [
    "audio/wav",
    "audio/webm;codecs=opus",
    "audio/webm",
    "audio/mp4"
  ];
  for (const mimeType of candidates) {
    if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(mimeType)) {
      return { mimeType };
    }
  }
  return {};
}

async function toWavFile(blob) {
  if (blob.type === "audio/wav") {
    return new File([blob], "heart-diary.wav", { type: "audio/wav" });
  }
  const arrayBuffer = await blob.arrayBuffer();
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  const audioContext = new AudioContextClass();
  try {
    const audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));
    const wavBytes = encodeWav(audioBuffer);
    return new File([wavBytes], "heart-diary.wav", { type: "audio/wav" });
  } finally {
    if (audioContext.close) audioContext.close();
  }
}

function encodeWav(audioBuffer) {
  const channelCount = Math.min(2, audioBuffer.numberOfChannels);
  const sampleRate = audioBuffer.sampleRate;
  const samples = interleaveChannels(audioBuffer, channelCount);
  const dataLength = samples.length * 2;
  const buffer = new ArrayBuffer(44 + dataLength);
  const view = new DataView(buffer);
  writeAscii(view, 0, "RIFF");
  view.setUint32(4, 36 + dataLength, true);
  writeAscii(view, 8, "WAVE");
  writeAscii(view, 12, "fmt ");
  view.setUint32(16, 16, true);
  view.setUint16(20, 1, true);
  view.setUint16(22, channelCount, true);
  view.setUint32(24, sampleRate, true);
  view.setUint32(28, sampleRate * channelCount * 2, true);
  view.setUint16(32, channelCount * 2, true);
  view.setUint16(34, 16, true);
  writeAscii(view, 36, "data");
  view.setUint32(40, dataLength, true);
  let offset = 44;
  for (const sample of samples) {
    const clamped = Math.max(-1, Math.min(1, sample));
    view.setInt16(offset, clamped < 0 ? clamped * 0x8000 : clamped * 0x7FFF, true);
    offset += 2;
  }
  return buffer;
}

function interleaveChannels(audioBuffer, channelCount) {
  const length = audioBuffer.length;
  const result = new Float32Array(length * channelCount);
  const channels = Array.from({ length: channelCount }, (_, i) => audioBuffer.getChannelData(i));
  for (let i = 0; i < length; i++) {
    for (let channel = 0; channel < channelCount; channel++) {
      result[i * channelCount + channel] = channels[channel][i];
    }
  }
  return result;
}

function writeAscii(view, offset, text) {
  for (let i = 0; i < text.length; i++) {
    view.setUint8(offset + i, text.charCodeAt(i));
  }
}

async function mockVoiceInput() {
  const input = document.getElementById("diaryContent");
  const randomSent = mockSentences[Math.floor(Math.random() * mockSentences.length)];
  input.value = "";
  
  // Simulated typewriter typing out the mock voice input
  let i = 0;
  document.getElementById("voiceStatus").textContent = "正在模拟语音输入中...";
  const interval = setInterval(() => {
    if (i < randomSent.length) {
      input.value += randomSent[i];
      i++;
    } else {
      clearInterval(interval);
      document.getElementById("voiceStatus").textContent = "已转写（含口水词，可手动修改）";
      onRawTextChanged(randomSent);
      IC.toast("语音已模拟转写，可在右侧挑选润色", "success");
      IC.pulse("strong");
    }
  }, 35);
}

// Track when raw text changes to reset the transcription
document.getElementById("diaryContent").addEventListener("input", (e) => {
  onRawTextChanged(e.target.value);
});

async function onRawTextChanged(text) {
  rawText = text;
  polishedTexts = { 0: text };
  
  if (text.trim().length > 5) {
    document.getElementById("polishTabs").style.display = "flex";
    document.getElementById("polishNote").style.display = "block";
    switchPolish(0);
  } else {
    document.getElementById("polishTabs").style.display = "none";
    document.getElementById("polishNote").style.display = "none";
  }
}

async function switchPolish(level) {
  activePolish = level;
  const area = document.getElementById("diaryContent");
  
  // Highlight active tab button
  const btns = document.getElementById("polishTabs").querySelectorAll("button");
  btns.forEach((b, i) => b.classList.toggle("active", i === level));

  // Update note details
  const notes = {
    0: { title: "当前：原文", desc: "没有经过任何修饰的倾诉记录，可能会显得有些凌乱，但这最真实。" },
    1: { title: "当前：净化", desc: "过滤了您表达中的口头词（如‘呃’，‘就是说’）和拼写语法失误，完全保留原话顺序和您的口吻。" },
    2: { title: "当前：梳理", desc: "在不改变您主观表达意图的前提下，修正乱序表达，梳理逻辑，提升阅读的流畅度和整体条理性。" },
    3: { title: "当前：重塑", desc: "由 Aurora 对您的倾诉进行文学化的提炼与段落排版重构，消除一切语音口癖，让它成为一篇文字优美的反思日记。" }
  };
  document.getElementById("polishTitle").textContent = notes[level].title;
  document.getElementById("polishDesc").textContent = notes[level].desc;

  if (polishedTexts[level] !== undefined) {
    area.value = polishedTexts[level];
    return;
  }

  // Need to fetch from backend
  document.getElementById("polishLoader").style.display = "flex";
  document.getElementById("btnSubmit").disabled = true;
  
  // Save transcription if we haven't done so for this rawText run
  if (!transcriptionId) {
    const tr = await API.diaryTranscribe(rawText);
    if (tr.success && tr.data) {
      transcriptionId = tr.data.id;
    } else {
      document.getElementById("polishLoader").style.display = "none";
      document.getElementById("btnSubmit").disabled = false;
      return;
    }
  }

  const pr = await API.diaryPolish(rawText, level);
  document.getElementById("polishLoader").style.display = "none";
  document.getElementById("btnSubmit").disabled = false;

  if (pr.success && pr.data) {
    polishedTexts[level] = cleanPolishedDisplay(pr.data.polishedText);
    area.value = polishedTexts[level];
  }
}

function cleanPolishedDisplay(text) {
  let value = String(text || "").trim();
  value = value.replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
  value = value.replace(/^```(?:json|markdown|text)?\s*/i, "").replace(/```\s*$/i, "").trim();
  const jsonMatch = value.match(/"(?:polishedText|polished|result|content|text)"\s*:\s*"((?:\\.|[^"\\])*)"/is);
  if (jsonMatch) {
    value = jsonMatch[1].replace(/\\n/g, "\n").replace(/\\"/g, "\"").replace(/\\\\/g, "\\").trim();
  }
  const markers = ["润色后的正文：", "润色后正文：", "最终正文：", "最终结果：", "输出：", "正文："];
  for (const marker of markers) {
    const idx = value.lastIndexOf(marker);
    if (idx >= 0) value = value.slice(idx + marker.length).trim();
  }
  return value.split(/\r?\n/)
    .filter(line => {
      const t = line.trim();
      if (!t) return true;
      return !t.startsWith("你是 Inner Cosmos")
        && !t.startsWith("只返回")
        && !t.startsWith("不要添加")
        && !t.startsWith("原文：")
        && !t.toLowerCase().includes("prompt");
    })
    .join("\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

async function submitDiary() {
  const content = document.getElementById("diaryContent").value.trim();
  if (content.length < 5) {
    IC.toast("心声内容太短，多写几句吧", "warn");
    return;
  }

  document.getElementById("btnSubmit").disabled = true;

  // Ensure transcription ID is saved first
  if (!transcriptionId) {
    const tr = await API.diaryTranscribe(rawText || content);
    if (tr.success && tr.data) {
      transcriptionId = tr.data.id;
    } else {
      document.getElementById("btnSubmit").disabled = false;
      return;
    }
  }

  // Trigger floating star particles animation
  createStarParticles();
  document.getElementById("diaryPaper").classList.add("fly-animation");

  // Call submission API
  const sr = await API.diarySubmit(transcriptionId, content);
  
  if (sr.success) {
    IC.toast("心声已凝聚为星斗，流淌入记忆宇宙", "success");
    IC.pulse("settle");
    setTimeout(() => {
      window.location.href = "/pages/daily-record.html";
    }, 1200);
  } else {
    document.getElementById("btnSubmit").disabled = false;
    document.getElementById("diaryPaper").classList.remove("fly-animation");
  }
}

function createStarParticles() {
  const paper = document.getElementById("diaryPaper");
  const rect = paper.getBoundingClientRect();
  const count = 35;
  
  for (let i = 0; i < count; i++) {
    const star = document.createElement("div");
    star.className = "star-float";
    star.style.left = (rect.left + Math.random() * rect.width) + "px";
    star.style.top = (rect.top + Math.random() * rect.height) + "px";
    
    // Random delay and horizontal drift
    star.style.animationDelay = (Math.random() * 0.4) + "s";
    star.style.setProperty("--drift", (Math.random() * 40 - 20) + "px");
    
    document.body.appendChild(star);
    setTimeout(() => star.remove(), 1500);
  }
}
IC.hideLoading();
</script>
</body>
</html>
