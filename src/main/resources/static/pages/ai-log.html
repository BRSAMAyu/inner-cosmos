<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>AI 协作日志 · 内宇宙</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .log-hero {
      padding: 24px 20px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(165,179,194,.12), rgba(143,163,148,.08));
      border: 1px solid var(--line);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .log-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 70% 30%, rgba(165,179,194,.08), transparent 50%);
      pointer-events: none;
    }
    .log-hero h1 {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-family: var(--font-hero);
      color: var(--ink);
      margin: 0 0 8px;
      position: relative;
      text-wrap: balance;
    }
    .log-hero .muted { position: relative; text-wrap: pretty; }
    .log-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      position: relative;
    }
    .log-filters input, .log-filters select {
      padding: 8px 12px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-paper);
      font-size: .88rem;
      transition: border-color .2s;
    }
    .log-filters input:focus, .log-filters select:focus {
      outline: none;
      border-color: var(--accent-sage);
    }
    .metric-card {
      padding: 18px;
      border-radius: var(--radius-card);
      background: rgba(255,250,243,.55);
      border: 1px solid var(--line);
      text-align: center;
      transition: transform .2s var(--ease-flow);
    }
    .metric-card:hover {
      transform: translateY(-1px);
      background: rgba(255,250,243,.8);
    }
    .metric-card .value {
      font-size: 1.8rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1;
    }
    .metric-card .label {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 6px;
    }
    /* ── Dark mode ── */
    body.dark-star .log-hero {
      background: linear-gradient(135deg, rgba(42,38,34,.68), rgba(37,33,29,.52));
      border-color: rgba(163,153,143,.10);
    }
    body.dark-star .log-hero::before {
      background: radial-gradient(circle at 70% 30%, rgba(134,152,169,.06), transparent 50%);
    }
    body.dark-star .log-filters input,
    body.dark-star .log-filters select {
      background: rgba(30,27,24,.60);
      border-color: rgba(163,153,143,.16);
    }
    body.dark-star .metric-card {
      background: rgba(42,38,34,.56);
      border-color: rgba(163,153,143,.10);
    }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Hero -->
  <section class="log-hero">
    <h1>AI 交互日志</h1>
    <p class="muted">每一次 Aurora 对话背后，都有一笔模型调用记录。这里是透明的技术追踪。</p>
    <div class="log-filters mt-2">
      <input type="text" id="searchInput" placeholder="搜索模块名..." oninput="filterLogs()" style="width:180px">
      <select id="providerFilter" onchange="filterLogs()">
        <option value="">全部 Provider</option>
        <option value="minimax">MiniMax</option>
        <option value="deepseek">DeepSeek</option>
        <option value="glm">GLM</option>
        <option value="mock">Mock</option>
      </select>
    </div>
  </section>

  <!-- Stats row -->
  <section class="grid mb-2" style="grid-template-columns:repeat(auto-fit,minmax(180px,1fr))">
    <article class="metric-card">
      <div class="value" id="totalCount">0</div>
      <div class="label">总调用次数</div>
    </article>
    <article class="metric-card">
      <div class="value" id="avgLatency">-</div>
      <div class="label">平均延迟</div>
    </article>
    <article class="metric-card">
      <div class="value" id="providerList" style="font-size:1.2rem">-</div>
      <div class="label">使用的 Provider</div>
    </article>
  </section>

  <!-- Log entries -->
  <section id="logs" class="grid"></section>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("AI 交互日志");

let allLogs = [];

IC.ensureDemoLogin().then(load);

async function load() {
  const r = await API.aiLogs();
  allLogs = (r.success ? r.data : []) || [];
  updateStats();
  renderLogs(allLogs);
}

function esc(text) { return IC.esc(text); }

function updateStats() {
  document.getElementById("totalCount").textContent = allLogs.length;
  if (allLogs.length) {
    const avg = Math.round(allLogs.reduce((s, l) => s + (l.latencyMs || 0), 0) / allLogs.length);
    document.getElementById("avgLatency").textContent = avg + "ms";
    const providers = [...new Set(allLogs.map(l => l.provider).filter(Boolean))];
    document.getElementById("providerList").textContent = providers.join(", ") || "-";
  }
}

function filterLogs() {
  const search = document.getElementById("searchInput").value.toLowerCase();
  const provider = document.getElementById("providerFilter").value;
  const filtered = allLogs.filter(l => {
    if (provider && (l.provider || "").toLowerCase() !== provider) return false;
    if (search && !(l.moduleName || "").toLowerCase().includes(search)) return false;
    return true;
  });
  renderLogs(filtered);
}

function renderLogs(logs) {
  const container = document.getElementById("logs");
  if (!logs.length) {
    container.innerHTML = IC.empty("暂无 AI 调用日志。和 Aurora 聊一次天后，这里会出现记录。");
    return;
  }
  container.innerHTML = logs.map(l => {
    const latency = l.latencyMs || 0;
    const latencyClass = latency > 3000 ? "style=\"color:#c97b63\"" : latency > 1000 ? "style=\"color:#b8a882\"" : "";
    return `<article class="card">
      <div class="flex-between mb-1">
        <strong>${esc(l.moduleName || "Unknown")}</strong>
        <span class="muted" style="font-size:.82rem">${IC.formatTime(l.createdAt)}</span>
      </div>
      <div class="pill-row">
        <span class="pill">${esc(l.provider || "-")}</span>
        <span class="pill">${esc(l.modelName || "-")}</span>
        <span class="pill" ${latencyClass}>${latency}ms</span>
        ${l.fallbackUsed ? `<span class="pill">fallback</span>` : ""}
        ${l.success === false ? `<span class="pill">failed</span>` : ""}
      </div>
      ${l.errorMessage ? `<p class="muted mt-1" style="font-size:.78rem;color:#b56b5c">${esc(l.errorMessage)}</p>` : ""}
      ${l.tokenInputEstimate || l.tokenOutputEstimate ? `<p class="muted mt-1" style="font-size:.78rem">tokens≈ ${(l.tokenInputEstimate || 0)}+${(l.tokenOutputEstimate || 0)}</p>` : ""}
    </article>`;
  }).join("");
  IC.stagger(container);
}
IC.hideLoading();
</script>
</body>
</html>
