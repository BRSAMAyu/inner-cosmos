<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/app.css"></head><body><main class="shell"><div class="topbar" data-topbar></div><h1>AI 交互日志</h1><section id="logs" class="grid"></section></main><script src="/js/app.js"></script><script>IC.mountShell("AI 日志");IC.ensureDemoLogin().then(load);async function load(){const r=await IC.api('/api/ai-logs');logs.innerHTML=(r.data||[]).map(l=>`<article class="card"><strong>${l.moduleName}</strong><p>${l.provider} / ${l.modelName} / ${l.latencyMs||0}ms</p></article>`).join('')||'<p class="muted">暂无 AI 调用日志。</p>';}</script></body></html>
