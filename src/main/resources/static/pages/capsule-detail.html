<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>共鸣体详情 · Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Capsule detail header -->
  <section class="panel mb-2">
    <div class="flex-between mb-2">
      <div>
        <span class="route-hint">数字回声</span>
        <h1 id="capsuleName">加载中...</h1>
      </div>
      <span id="capsuleType" class="badge badge-read">用户</span>
    </div>
    <p id="capsuleIntro" class="muted mb-2"></p>

    <div class="pill-row mb-2" id="capsuleTags"></div>

    <!-- Stats -->
    <div class="grid" style="grid-template-columns:repeat(auto-fit,minmax(140px,1fr))">
      <div class="soft-stage text-center">
        <strong id="echoEnergy" class="teal">0.00</strong>
        <p class="muted">回声能量</p>
      </div>
      <div class="soft-stage text-center">
        <strong id="dailyLimit">30</strong>
        <p class="muted">每日对话轮数</p>
      </div>
      <div class="soft-stage text-center">
        <strong id="letterAllowed">允许</strong>
        <p class="muted">慢信请求</p>
      </div>
    </div>
  </section>

  <!-- Boundary info -->
  <section class="panel mb-2">
    <h2>边界说明</h2>
    <div class="grid">
      <div>
        <h3 class="muted">允许谈论</h3>
        <div id="allowTopics" class="pill-row"></div>
      </div>
      <div>
        <h3 class="muted">明确避开</h3>
        <div id="blockTopics" class="pill-row"></div>
      </div>
    </div>
    <div class="soft-stage mt-2">
      <p class="muted">它只是一段回声，不是一个人。对话内容会被边界系统监督。</p>
    </div>
  </section>

  <section class="panel mb-2">
    <h2>共鸣体知道什么</h2>
    <div id="contextPreview" class="soft-stage">
      <p class="muted">正在读取授权上下文...</p>
    </div>
  </section>

  <!-- Actions -->
  <section class="panel mb-2">
    <h2>互动</h2>
    <div class="row gap-sm">
      <a class="button" id="chatBtn" href="#">和这个回声对话</a>
      <a class="button" id="letterBtn" href="/pages/slow-letter.html">写一封慢信</a>
    </div>
  </section>

  <!-- Owner controls (hidden by default) -->
  <section id="ownerControls" class="panel" style="display:none">
    <h2>管理我的共鸣体</h2>
    <div class="row gap-sm">
      <button onclick="toggleVisibility()">切换可见性</button>
      <button onclick="openContextEditor()">编辑上下文与边界</button>
      <button onclick="archiveMyCapsule()" style="color:var(--accent-coral)">归档</button>
    </div>
  </section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("共鸣体详情");
IC.ensureDemoLogin();

const capsuleId = new URLSearchParams(window.location.search).get("id");
let capsuleData = null;
let boundaryData = null;
let isOwner = false;

function esc(text) { return IC.esc(text); }

async function init() {
  if (!capsuleId) {
    document.getElementById("capsuleName").textContent = "未找到共鸣体";
    return;
  }

  const r = await API.capsuleDetail(Number(capsuleId));
  if (!r.success || !r.data) {
    document.getElementById("capsuleName").textContent = "加载失败";
    return;
  }

  capsuleData = r.data;
  renderDetail(capsuleData);

  /* Check boundary info */
  try {
    const br = await API.capsuleBoundary(Number(capsuleId));
    if (br.success && br.data) {
      boundaryData = br.data;
      renderBoundary(br.data);
    }
  } catch(e) {}
  await loadContextPreview();

  /* Check if owner */
  const myCaps = await API.myCapsules();
  if (myCaps.success && myCaps.data) {
    isOwner = myCaps.data.some(c => c.id === Number(capsuleId));
    if (isOwner) document.getElementById("ownerControls").style.display = "block";
  }
}

function renderDetail(c) {
  document.getElementById("capsuleName").textContent = c.pseudonym || "未命名回声";
  document.getElementById("capsuleIntro").textContent = c.intro || "一枚数字回声。";
  document.getElementById("capsuleType").textContent = c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED" ? "种子" : "用户";
  document.getElementById("echoEnergy").textContent = (c.echoEnergy || 0).toFixed(2);
  document.getElementById("dailyLimit").textContent =
    (c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED" || Number(c.conversationLimitPerDay) <= 0)
      ? "不限"
      : (c.conversationLimitPerDay || 30);
  document.getElementById("letterAllowed").textContent = c.allowLetterRequest ? "允许" : "不允许";

  const tags = (c.publicTags || "").split(",").filter(Boolean);
  document.getElementById("capsuleTags").innerHTML = tags.map(t =>
    `<span class="pill">${esc(t.trim())}</span>`
  ).join("");

  document.getElementById("chatBtn").href = `/pages/capsule-chat.html?capsuleId=${c.id}`;
  document.getElementById("letterBtn").href = `/pages/slow-letter.html?capsuleId=${c.id}`;
}

function renderBoundary(b) {
  const allow = parseList(b.allowTopics);
  const block = parseList(b.blockedTopics);

  document.getElementById("allowTopics").innerHTML = allow.map(t =>
    `<span class="pill">${esc(t.trim())}</span>`
  ).join("") || '<span class="muted">未设置</span>';

  document.getElementById("blockTopics").innerHTML = block.map(t =>
    `<span class="pill">${esc(t.trim())}</span>`
  ).join("") || '<span class="muted">未设置</span>';
}

async function toggleVisibility() {
  if (!capsuleData) return;
  const newStatus = capsuleData.visibilityStatus === "PUBLIC" ? "PRIVATE" : "PUBLIC";
  const r = await API.updateCapsuleVisibility(capsuleData.id, newStatus, newStatus === "PUBLIC");
  if (r.success) {
    capsuleData = r.data;
    IC.toast("可见性已更新", "success");
    renderDetail(capsuleData);
  }
}

async function archiveMyCapsule() {
  if (!capsuleData) return;
  IC.showModal(`
    <h2>归档共鸣体</h2>
    <p class="muted mb-2">确定要归档这个共鸣体吗？它将不再出现在星海广场。</p>
    <div class="row gap-sm">
      <button onclick="confirmArchive()">确认归档</button>
      <button onclick="IC.closeModal()">取消</button>
    </div>
  `);
}

function parseList(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value.filter(Boolean);
  const text = String(value);
  try {
    const parsed = JSON.parse(text);
    if (Array.isArray(parsed)) return parsed.filter(Boolean);
  } catch(e) {}
  return text.split(",").map(x => x.trim()).filter(Boolean);
}

async function loadContextPreview() {
  const box = document.getElementById("contextPreview");
  try {
    const r = await API.capsuleContextPreview(Number(capsuleId));
    if (!r.success || !r.data) return;
    const d = r.data;
    const ids = d.authorizedMemoryIds || [];
    box.innerHTML = `
      <p class="muted">${esc(d.desensitizedSummary || d.contextPreview || d.visibleSummary || "当前共鸣体只会读取授权后的脱敏摘要。")}</p>
      <div class="pill-row mt-1">
        ${ids.map(id => `<span class="pill">memory #${esc(id)}</span>`).join("")}
        ${d.styleProfile ? `<span class="pill">风格画像已生成</span>` : ""}
        ${d.privacy ? `<span class="pill">${esc(d.privacy)}</span>` : ""}
      </div>
    `;
  } catch (e) {
    box.innerHTML = '<p class="muted">上下文预览暂时不可用。</p>';
  }
}

function openContextEditor() {
  if (!capsuleData) return;
  const b = boundaryData || {};
  IC.showModal(`
    <h2>编辑共鸣体</h2>
    <label class="muted">补充经历/说明<textarea id="ctxNote" rows="4">${esc(capsuleData.ownerContextNote || "")}</textarea></label>
    <label class="muted">公开标签<input id="ctxTags" value="${esc(capsuleData.publicTags || "")}"></label>
    <label class="muted">允许话题<input id="allowEdit" value="${esc(parseList(b.allowTopics).join(","))}"></label>
    <label class="muted">禁止话题<input id="blockEdit" value="${esc(parseList(b.blockedTopics).join(","))}"></label>
    <label class="muted">轮次上限<input id="turnEdit" type="number" min="1" max="50" value="${Number(b.maxConversationTurns || capsuleData.conversationLimitPerDay || 30)}"></label>
    <label class="muted"><input id="standInEdit" type="checkbox" ${capsuleData.standInEnabled ? "checked" : ""}> 允许离线代回声</label>
    <div class="row gap-sm mt-2"><button onclick="saveContextEditor()">保存</button><button onclick="IC.closeModal()">取消</button></div>
  `);
}

async function saveContextEditor() {
  const contextBody = {
    ownerContextNote: document.getElementById("ctxNote").value.trim(),
    publicTags: document.getElementById("ctxTags").value.trim(),
    standInEnabled: document.getElementById("standInEdit").checked
  };
  const boundaryBody = {
    allowTopics: JSON.stringify(document.getElementById("allowEdit").value.split(",").map(x => x.trim()).filter(Boolean)),
    blockedTopics: JSON.stringify(document.getElementById("blockEdit").value.split(",").map(x => x.trim()).filter(Boolean)),
    maxConversationTurns: Math.min(50, Math.max(1, Number(document.getElementById("turnEdit").value || 30))),
    allowLetterRequest: true,
    privacyLevel: boundaryData?.privacyLevel || "STRICT"
  };
  const cr = await API.updateCapsuleContext(capsuleData.id, contextBody);
  const br = await API.updateCapsuleBoundary(capsuleData.id, boundaryBody);
  if (cr.success && br.success) {
    IC.closeModal();
    IC.toast("共鸣体上下文与边界已更新。", "success");
    await init();
  }
}

async function confirmArchive() {
  await API.archiveCapsule(capsuleData.id);
  IC.closeModal();
  IC.toast("共鸣体已归档", "success");
  setTimeout(() => location.href = "/pages/echo-plaza.html", 800);
}

init();
IC.hideLoading();
</script>
</body>
</html>
