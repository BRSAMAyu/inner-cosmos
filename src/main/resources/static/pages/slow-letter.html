<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/inner-cosmos.css?v=morandi-20260526"></head>
<body>
<main class="shell"><div class="topbar" data-topbar></div><section class="letter-layout"><article class="panel letter-paper"><span class="route-hint">慢连接</span><h2>写一封慢信</h2><p>你不需要索取回应，只要真诚表达是哪一句话让你停下来了。</p><input id="title" placeholder="给这封信一个标题"><textarea id="letterBody" placeholder="你可以写：我在哪一点上感到共鸣；我希望对方知道什么；我不急着得到回复。"></textarea><div class="row"><button data-letter-action onclick="draft()">保存草稿</button><button data-letter-action onclick="send()">投递</button><a class="button" href="/pages/inbox.html">查看信箱</a></div><div id="out" class="soft-stage" style="margin-top:14px"></div></article><aside class="panel letter-guide"><h2>写信引导</h2><p>是哪句话让你停下来了？</p><p>你在哪一点上感到共鸣？</p><p>你希望对方知道你怎样的经历？</p><p class="gold">慢信不是搭讪，它是一种郑重的靠近。</p></aside></section></main>
<script src="/js/app.js"></script>
<script>
IC.mountShell("写慢信");IC.ensureDemoLogin();let letterId=null;
async function draft(){const r=await IC.api("/api/letters/draft",{method:"POST",body:JSON.stringify({receiverUserId:1,receiverCapsuleId:1,title:title.value,letterBody:letterBody.value})});letterId=r.data.id;out.innerHTML=`<strong>草稿已保存</strong><p>预计送达：${r.data.estimatedArrivalAt||"稍后"}</p>`;IC.pulse("letter");}
async function send(){if(!letterId) await draft();const r=await IC.api(`/api/letters/${letterId}/send`,{method:"POST"});out.innerHTML=`<strong>慢信已投递</strong><p>状态：${r.data.status}。它会穿过一小段宇宙距离，而不是立刻打扰对方。</p>`;IC.toast("慢信已投递","success");IC.pulse("letter");}
</script>
</body></html>
