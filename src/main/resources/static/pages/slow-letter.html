<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="shell">
  <div class="topbar" data-topbar></div>

  <section class="letter-layout">
    <!-- Writing area -->
    <article class="panel letter-paper">
      <span class="route-hint">慢连接</span>
      <h2>写一封慢信</h2>
      <p class="muted mb-2">你不需要索取回应，只要真诚表达是哪一句话让你停下来了。</p>

      <div class="field-group mb-2">
        <label for="receiverName">收信人（回声化名）</label>
        <input id="receiverName" placeholder="例如：柔雾回声" readonly>
        <input type="hidden" id="receiverCapsuleId">
      </div>

      <div class="field-group mb-2">
        <label for="title">给这封信一个标题</label>
        <input id="title" placeholder="例如：关于那一次共鸣">
      </div>

      <div class="field-group mb-2">
        <label for="letterBody">信的内容</label>
        <textarea id="letterBody" placeholder="你可以写：我在哪一点上感到共鸣；我希望对方知道什么；我不急着得到回复。" style="min-height:200px" oninput="updateCount()"></textarea>
        <span id="charCount" class="muted" style="font-size:.82rem">0 / 2000 字</span>
      </div>

      <div class="row gap-sm mb-2">
        <button onclick="draft()">保存草稿</button>
        <button onclick="sendLetter()">投递慢信</button>
        <a class="button" href="/pages/inbox.html">查看信箱</a>
      </div>

      <!-- Delivery animation -->
      <div id="deliveryAnim" class="text-center" style="display:none;padding:24px 0">
        <div class="empty-star" style="margin:0 auto 16px;animation:fly-away 1.4s ease forwards"></div>
        <p class="gold">慢信正在穿过宇宙距离...</p>
      </div>

      <!-- Result -->
      <div id="out" class="soft-stage" style="display:none"></div>
    </article>

    <!-- Letter guide -->
    <aside class="panel letter-guide">
      <h2>写信引导</h2>
      <div class="soft-stage mb-2">
        <p>是哪句话让你停下来了？</p>
        <p>你在哪一点上感到共鸣？</p>
        <p>你希望对方知道你怎样的经历？</p>
      </div>
      <p class="gold">慢信不是搭讪，它是一种郑重的靠近。</p>

      <h3 class="mt-2">安全提示</h3>
      <p class="muted">不要在信中暴露真实身份信息。如果收到让你不适的内容，可以婉拒或举报。</p>

      <h3 class="mt-2">预计送达时间</h3>
      <p class="muted" id="deliveryEstimate">慢信会在 2-24 小时内送达，而不是立刻打扰对方。</p>

      <div class="mt-2">
        <a class="button w-full text-center" href="/pages/safety-harbor.html">需要帮助？安全避风港</a>
      </div>
    </aside>
  </section>
</main>

<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("写慢信");

IC.ensureDemoLogin();

let letterId = null;
let receiverUserId = null;
const urlParams = new URLSearchParams(window.location.search);
const capsuleIdParam = urlParams.get("capsuleId");

if (!capsuleIdParam) {
  document.querySelector(".letter-paper").innerHTML = '<div style="text-align:center;padding:40px 20px"><h2>请先选择一个共鸣体作为收信人</h2><p class="muted mt-1">你需要先在星海广场选择一个共鸣体，再写慢信。</p><a class="button mt-2" href="/pages/echo-plaza.html">前往星海广场</a></div>';
}

/* Pre-fill from URL */
if (capsuleIdParam) {
  document.getElementById("receiverCapsuleId").value = capsuleIdParam;
  /* Try to load capsule name and owner info */
  API.capsuleDetail(Number(capsuleIdParam)).then(r => {
    if (r.success && r.data) {
      document.getElementById("receiverName").value = r.data.pseudonym;
      receiverUserId = r.data.ownerId || r.data.userId || null;
    }
  });
}

function esc(text) { return IC.esc(text); }

function updateCount() {
  const len = document.getElementById("letterBody").value.length;
  document.getElementById("charCount").textContent = `${len} / 2000 字`;
  if (len > 2000) {
    document.getElementById("charCount").style.color = "var(--accent-coral)";
  } else {
    document.getElementById("charCount").style.color = "";
  }
}

async function draft() {
  const capsuleId = Number(document.getElementById("receiverCapsuleId").value);
  if (!capsuleId) { IC.toast("请先选择收信人", "warn"); return; }
  const data = {
    receiverUserId: receiverUserId,
    receiverCapsuleId: capsuleId,
    title: document.getElementById("title").value,
    letterBody: document.getElementById("letterBody").value
  };

  const r = await API.letterDraft(data);
  if (r.success && r.data) {
    letterId = r.data.id;
    const out = document.getElementById("out");
    out.style.display = "grid";
    out.innerHTML = `<strong>草稿已保存</strong><p class="muted">预计送达：${r.data.estimatedArrivalAt || "稍后"}</p><p class="muted">状态：${r.data.status || "草稿"}</p>`;
    IC.toast("草稿已保存", "success");
    IC.pulse("letter");
  }
}

async function sendLetter() {
  if (!letterId) await draft();
  if (!letterId) { IC.toast("请先写一些内容", "warn"); return; }

  /* Show delivery animation */
  document.getElementById("deliveryAnim").style.display = "block";

  const r = await API.letterSend(letterId);
  if (r.success && r.data) {
    setTimeout(() => {
      document.getElementById("deliveryAnim").style.display = "none";
      const out = document.getElementById("out");
      out.style.display = "grid";
      out.innerHTML = `
        <strong>慢信已投递</strong>
        <p class="muted">状态：${r.data.status}。它会穿过一小段宇宙距离，而不是立刻打扰对方。</p>
        <p class="muted">预计送达：${r.data.estimatedArrivalAt || "2-24 小时内"}</p>
      `;
    }, 1500);
    IC.toast("慢信已投递", "success");
    IC.pulse("letter");
  }
}
</script>
</body>
</html>
