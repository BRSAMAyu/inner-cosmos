<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="shell">
  <div class="topbar" data-topbar></div>

  <section class="letter-layout">
    <!-- Writing area with enhanced paper texture -->
    <article class="panel letter-paper-texture">
      <span class="route-hint">慢连接 · 穿过宇宙距离的对话</span>
      <div class="letter-header">
        <h2>写一封慢信</h2>
        <p class="muted mb-2">你不需要索取回应，只要真诚表达是哪一句话让你停下来了。</p>
      </div>

      <div class="letter-body-wrapper">
        <div class="field-group mb-2">
          <label for="receiverName">收信人（回声化名）</label>
          <input id="receiverName" placeholder="例如：柔雾回声" readonly class="letter-input">
          <input type="hidden" id="receiverCapsuleId">
        </div>

        <div class="field-group mb-2">
          <label for="title">给这封信一个标题</label>
          <input id="title" placeholder="例如：关于那一次共鸣" class="letter-input">
        </div>

        <div class="field-group mb-2">
          <label for="letterBody">信的内容</label>
          <div class="letter-textarea-wrapper">
            <textarea id="letterBody" placeholder="你可以写：我在哪一点上感到共鸣；我希望对方知道什么；我不急着得到回复。" style="min-height:200px" oninput="updateCount()" class="letter-textarea"></textarea>
            <div class="writing-guidance">
              <span class="guidance-tip" id="guidanceTip">开始写下你的感受...</span>
            </div>
          </div>
          <span id="charCount" class="muted" style="font-size:.82rem">0 / 2000 字</span>
        </div>
      </div>

      <div class="row gap-sm mb-2">
        <button onclick="draft()">保存草稿</button>
        <button onclick="sendLetter()">投递慢信</button>
        <a class="button" href="/pages/inbox.html">查看信箱</a>
      </div>

      <!-- Enhanced delivery animation with star trail -->
      <div id="deliveryAnim" class="delivery-animation" style="display:none">
        <div class="delivery-path">
          <div class="envelope-wrapper">
            <div class="envelope">
              <div class="envelope-flap"></div>
              <div class="envelope-body"></div>
              <div class="star-trail"></div>
            </div>
          </div>
          <div class="destination-star"></div>
        </div>
        <p class="gold delivery-message">慢信正在穿过宇宙距离...</p>
        <p class="muted delivery-status">正在寻找接收者的坐标...</p>
      </div>

      <!-- Result -->
      <div id="out" class="soft-stage" style="display:none"></div>
    </article>

    <!-- Letter guide -->
    <aside class="panel letter-guide">
      <h2>写信引导</h2>
      <div class="soft-stage mb-2">
        <p>是哪句话让你停下来了？</p>
        <p>你在哪一点上感到共鸣？</p>
        <p>你希望对方知道你怎样的经历？</p>
      </div>
      <p class="gold">慢信不是搭讪，它是一种郑重的靠近。</p>

      <h3 class="mt-2">安全提示</h3>
      <p class="muted">不要在信中暴露真实身份信息。如果收到让你不适的内容，可以婉拒或举报。</p>

      <h3 class="mt-2">预计送达时间</h3>
      <p class="muted" id="deliveryEstimate">慢信会在 2-24 小时内送达，而不是立刻打扰对方。</p>

      <div class="mt-2">
        <a class="button w-full text-center" href="/pages/safety-harbor.html">需要帮助？安全避风港</a>
      </div>
    </aside>
  </section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("写慢信");

IC.ensureDemoLogin();

let letterId = null;
let receiverUserId = null;
const urlParams = new URLSearchParams(window.location.search);
const capsuleIdParam = urlParams.get("capsuleId");

if (!capsuleIdParam) {
  document.querySelector(".letter-paper").innerHTML = '<div style="text-align:center;padding:40px 20px"><h2>请先选择一个共鸣体作为收信人</h2><p class="muted mt-1">你需要先在星海广场选择一个共鸣体，再写慢信。</p><a class="button mt-2" href="/pages/echo-plaza.html">前往星海广场</a></div>';
}

/* Pre-fill from URL */
if (capsuleIdParam) {
  document.getElementById("receiverCapsuleId").value = capsuleIdParam;
  /* Try to load capsule name and owner info */
  API.capsuleDetail(Number(capsuleIdParam)).then(r => {
    if (r.success && r.data) {
      document.getElementById("receiverName").value = r.data.pseudonym;
      receiverUserId = r.data.ownerId || r.data.userId || null;
    }
  });
}

function esc(text) { return IC.esc(text); }

function updateCount() {
  const len = document.getElementById("letterBody").value.length;
  document.getElementById("charCount").textContent = `${len} / 2000 字`;
  if (len > 2000) {
    document.getElementById("charCount").style.color = "var(--accent-coral)";
  } else {
    document.getElementById("charCount").style.color = "";
  }

  // Update guidance based on content
  updateGuidance(len);
}

function updateGuidance(length) {
  const tip = document.getElementById("guidanceTip");
  if (length === 0) {
    tip.textContent = "开始写下你的感受...";
  } else if (length < 50) {
    tip.textContent = "很好，继续表达你在哪一点上产生了共鸣...";
  } else if (length < 150) {
    tip.textContent = "你可以写写希望对方知道你怎样的经历...";
  } else if (length < 300) {
    tip.textContent = "慢慢来，不急着得到回复，真诚表达就好...";
  } else {
    tip.textContent = "你的话语正在沉淀，准备好再检查一遍...";
  }
}

async function draft() {
  const capsuleId = Number(document.getElementById("receiverCapsuleId").value);
  if (!capsuleId) { IC.toast("请先选择收信人", "warn"); return; }
  const data = {
    receiverUserId: receiverUserId,
    receiverCapsuleId: capsuleId,
    title: document.getElementById("title").value,
    letterBody: document.getElementById("letterBody").value
  };

  const r = await API.letterDraft(data);
  if (r.success && r.data) {
    letterId = r.data.id;
    const out = document.getElementById("out");
    out.style.display = "grid";
    out.innerHTML = `<strong>草稿已保存</strong><p class="muted">预计送达：${r.data.estimatedArrivalAt || "稍后"}</p><p class="muted">状态：${r.data.status || "草稿"}</p>`;
    IC.toast("草稿已保存", "success");
    IC.pulse("letter");
  }
}

async function sendLetter() {
  if (!letterId) await draft();
  if (!letterId) { IC.toast("请先写一些内容", "warn"); return; }

  /* Show enhanced delivery animation with ceremony */
  const deliveryAnim = document.getElementById("deliveryAnim");
  deliveryAnim.style.display = "block";

  // Animate the delivery stages
  const messageEl = deliveryAnim.querySelector(".delivery-message");
  const statusEl = deliveryAnim.querySelector(".delivery-status");

  // Stage 1: Seal envelope
  messageEl.textContent = "正在封缄这封信...";
  statusEl.textContent = "你的话语正在被保存";

  await sleep(800);

  // Stage 2: Launch into cosmos
  messageEl.textContent = "慢信正在穿过宇宙距离...";
  statusEl.textContent = "正在寻找接收者的坐标";

  const envelope = deliveryAnim.querySelector(".envelope");
  if (envelope) {
    envelope.classList.add("launching");
  }

  await sleep(1200);

  // Stage 3: Arriving
  messageEl.textContent = "即将到达接收者的内宇宙...";
  statusEl.textContent = "请等待对方在安静的时刻打开";

  const r = await API.letterSend(letterId);
  if (r.success && r.data) {
    await sleep(800);

    deliveryAnim.style.display = "none";
    const out = document.getElementById("out");
    out.style.display = "grid";
    out.innerHTML = `
      <div class="letter-result-success">
        <div class="result-icon">✉</div>
        <strong>慢信已投递</strong>
        <p class="muted">状态：${r.data.status}。它会穿过一小段宇宙距离，而不是立刻打扰对方。</p>
        <p class="muted">预计送达：${r.data.estimatedArrivalAt || "2-24 小时内"}</p>
        <p class="gold">感谢你用文字传递了一份真诚的共鸣。</p>
      </div>
    `;
    IC.toast("慢信已投递", "success");
    IC.pulse("letter");

    // Play completion sound
    if (window.ICAudio && ICAudio.playInteraction) {
      ICAudio.playInteraction("letter_sent");
    }
  }
}

function sleep(ms) {
  return new Promise(resolve => setTimeout(resolve, ms));
}
</script>
</body>
</html>
