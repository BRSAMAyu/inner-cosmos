<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>成长周报 · Inner Cosmos</title>
  <style>
    /* Page hero */
    .weekly-hero { padding: 0 0 28px; margin-bottom: 24px;
      background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(184,194,174,.10), transparent),
                  radial-gradient(ellipse 40% 50% at 70% 40%, rgba(165,179,194,.08), transparent); }
    .weekly-hero h1 { font-family: var(--font-hero); font-size: clamp(1.8rem,4vw,2.6rem); margin: 0 0 8px; }
    .weekly-hero p { color: var(--muted); line-height: 1.7; }
    /* Content hero */
    .wr-hero {
      padding: 36px 32px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(143,163,148,.18), rgba(151,169,186,.18));
      border: 1px solid var(--line);
      margin-bottom: 24px;
    }
    .wr-hero h2 { font-size: 1.6rem; margin: 0 0 12px; line-height: 1.3; }
    .wr-theme { display: inline-block; padding: 4px 14px; border-radius: 999px; background: rgba(255,250,243,.5); margin: 4px 4px 0 0; font-size: .82rem; }
    .wr-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
    .wr-stat { padding: 18px; border-radius: var(--radius); background: rgba(255,250,243,.55); border: 1px solid var(--line); }
    .wr-stat .num { font-size: 2rem; line-height: 1; color: var(--ink); font-weight: 600; }
    .wr-section { padding: 22px 26px; border-radius: var(--radius-flow); background: rgba(255,250,243,.55); border: 1px solid var(--line); margin-bottom: 18px; }
    .wr-section h3 { margin: 0 0 10px; font-size: 1.1rem; }
    .wr-aurora-note {
      padding: 24px 28px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(191,150,152,.16), rgba(143,163,148,.12));
      border: 1px solid var(--line-strong);
      font-style: italic;
      color: var(--ink);
      line-height: 1.7;
    }
    .wr-timeline { display: grid; gap: 10px; }
    .wr-day {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 12px;
      align-items: start;
      padding: 12px 14px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.4);
      border: 1px solid var(--line);
    }
    .wr-day .date { font-size: .82rem; color: var(--muted); }
    .wr-day .weather { font-size: 1.4rem; }
    .regenerate-btn {
      width: 100%;
      padding: 12px;
      background: rgba(143,163,148,.22);
      border-color: var(--line-strong);
    }
    /* Dark mode */
    body.dark-star .weekly-hero { background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(122,142,127,.06), transparent); }
    body.dark-star .wr-hero { background: rgba(30,35,40,.6); border-color: rgba(60,70,80,.4); }
    body.dark-star .wr-stat { background: rgba(30,35,40,.7); border-color: rgba(60,70,80,.4); }
    body.dark-star .wr-section { background: rgba(30,35,40,.7); border-color: rgba(60,70,80,.4); }
    body.dark-star .wr-day { background: rgba(30,35,40,.6); border-color: rgba(60,70,80,.35); }
    body.dark-star .wr-aurora-note { background: linear-gradient(135deg, rgba(120,90,100,.2), rgba(100,120,100,.15)); border-color: rgba(60,70,80,.4); }
    body.dark-star .regenerate-btn { background: rgba(143,163,148,.15); border-color: rgba(60,70,80,.4); }
  </style>
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>
  <section class="weekly-hero">
    <span class="route-hint">一周的内在总结</span>
    <h1 id="page-title">成长周报</h1>
    <p>过去 7 天你的内在宇宙发生了什么。系统会从记忆、情绪、待办、主题等多个维度生成一份只属于你的总结。</p>
  </section>

  <button class="regenerate-btn mb-2" onclick="generate()">重新生成这一周</button>

  <section id="content"></section>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("成长周报");
IC.ensureDemoLogin().then(load);

function esc(t) { return IC.esc(t); }

async function load() {
  const r = await API.weeklyReviewLatest();
  if (r.success && r.data) {
    render(r.data);
  } else {
    showEmpty();
  }
}

async function generate() {
  document.getElementById("content").innerHTML = `<div class="empty"><div class="empty-star"></div><p>Aurora 正在回看这 7 天的你，整理一份只属于这周的总结...</p></div>`;
  await API.weeklyReviewGenerate();
  setTimeout(load, 800);
}

function showEmpty() {
  document.getElementById("content").innerHTML = IC.empty("还没有生成过周报。点击「重新生成」开始整理过去 7 天的内在轨迹。");
}

function render(data) {
  const container = document.getElementById("content");
  if (!data) { showEmpty(); return; }

  const themes = (data.topThemes || []).map(t => `<span class="wr-theme">${esc(t)}</span>`).join("");

  container.innerHTML = `
    <div class="wr-hero">
      <h2>${esc(data.title || "这一周的你")}</h2>
      <p class="muted" style="margin:0 0 12px">${esc(data.dateRange || "")}</p>
      <div>${themes || '<span class="muted" style="font-size:.84rem">这周还没有聚类出主题</span>'}</div>
    </div>

    <div class="wr-grid mb-2">
      <div class="wr-stat"><span class="muted">记忆数</span><div class="num">${data.memoryCount || 0}</div></div>
      <div class="wr-stat"><span class="muted">完成待办</span><div class="num">${data.completedTodos || 0}</div></div>
      <div class="wr-stat"><span class="muted">主题数</span><div class="num">${(data.topThemes || []).length}</div></div>
      <div class="wr-stat"><span class="muted">主导情绪</span><div class="num" style="font-size:1.2rem">${esc(data.dominantEmotion || "—")}</div></div>
    </div>

    <div class="wr-section">
      <h3>本周轨迹</h3>
      <div class="wr-timeline">
        ${(data.dailySnapshots || []).map(d => `
          <div class="wr-day">
            <div>
              <div class="date">${esc((d.date || "").slice(5))}</div>
              <div class="weather">${IC.weatherIcon(d.emotionWeather || "")}</div>
            </div>
            <div>
              <strong>${esc(d.theme || "—")}</strong>
              <p class="muted" style="font-size:.84rem;margin:4px 0 0">${esc(d.summary || "")}</p>
            </div>
          </div>
        `).join("") || '<p class="muted">这周还没有每日记录</p>'}
      </div>
    </div>

    ${data.auroraObservation ? `
      <div class="wr-aurora-note">
        <strong>Aurora 的观察：</strong><br>
        ${esc(data.auroraObservation)}
      </div>
    ` : ""}

    ${data.recommendation ? `
      <div class="wr-section">
        <h3>下周的微小建议</h3>
        <p>${esc(data.recommendation)}</p>
      </div>
    ` : ""}
  `;
  IC.stagger(container);
}
IC.hideLoading();
</script>
</body>
</html>
