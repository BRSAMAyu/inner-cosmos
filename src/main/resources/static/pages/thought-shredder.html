<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>思维碎纸机 · Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .shred-hero {
      padding: 24px 20px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(184,194,168,.12), rgba(191,150,152,.1));
      border: 1px solid var(--line);
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .shred-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 60% 50%, rgba(184,194,168,.1), transparent 50%);
      pointer-events: none;
    }
    .shred-hero h1 {
      font-size: clamp(1.4rem, 3.5vw, 2rem);
      font-family: var(--font-hero);
      color: var(--ink);
      margin: 0 0 8px;
      position: relative;
    }
    .shred-hero .muted { position: relative; }
    .shred-paper {
      background: rgba(247,242,236,.85);
      border: 1px solid var(--line);
      border-radius: var(--radius-flow);
      position: relative;
    }
    .shred-paper textarea {
      background: transparent;
      border: none;
      resize: vertical;
    }
    .shred-paper textarea:focus {
      outline: none;
    }
    .intensity-track {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .intensity-track input[type="range"] {
      flex: 1;
      -webkit-appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent-sage), var(--accent-rose));
      outline: none;
    }
    .intensity-track input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--ink);
      cursor: pointer;
      border: 2px solid var(--surface-paper);
      box-shadow: 0 2px 6px rgba(0,0,0,.15);
    }
    .shred-btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      background: linear-gradient(135deg, var(--accent-sage), rgba(143,163,148,.8));
      color: #fff;
      font-size: 1rem;
      font-family: var(--font-hero);
      cursor: pointer;
      transition: filter .2s, transform .15s var(--ease-flow);
    }
    .shred-btn:hover:not(:disabled) { filter: brightness(1.06); }
    .shred-btn:active:not(:disabled) { transform: scale(.98); }
    .shred-btn:disabled { opacity: .6; cursor: default; }
    .result-section h3 {
      font-size: .95rem;
      color: var(--ink);
      margin: 16px 0 6px;
    }
    .result-section h3:first-child { margin-top: 0; }
    .result-section .gold { font-size: .95rem; line-height: 1.6; color: var(--ink); font-weight: 500; }
    .result-section .teal { font-size: .95rem; line-height: 1.6; color: var(--ink); font-weight: 500; font-style: italic; }
    /* Shred animation strips */
    @keyframes shredFall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      60% { opacity: .6; }
      100% { transform: translateY(120px) rotate(15deg); opacity: 0; }
    }
    .shred-strip {
      position: absolute;
      background: rgba(247,242,236,.9);
      border: 1px solid var(--line);
      animation: shredFall 1.2s var(--ease-settle) forwards;
    }
    /* Dark mode */
    body.dark-star .shred-hero { background: linear-gradient(135deg, rgba(122,132,108,.08), rgba(120,90,100,.06)); border-color: rgba(60,70,80,.4); }
    body.dark-star .shred-hero::before { background: radial-gradient(circle at 60% 50%, rgba(122,132,108,.06), transparent 50%); }
    body.dark-star .shred-hero h1 { color: var(--ink); }
    body.dark-star .shred-paper { background: rgba(30,35,40,.8); border-color: rgba(60,70,80,.4); }
    body.dark-star .shred-btn { background: linear-gradient(135deg, var(--accent-sage), rgba(143,163,148,.6)); }
    body.dark-star .result-section .gold,
    body.dark-star .result-section .teal { color: var(--ink); }
    body.dark-star .shred-strip { background: rgba(30,35,40,.8); border-color: rgba(60,70,80,.3); }
  </style>
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Hero -->
  <section class="shred-hero">
    <h1>思维碎纸机</h1>
    <p class="muted">把混乱、愤怒、焦虑、碎碎念一次性倒进来。它会帮你把噪音和真正的需求分开。</p>
  </section>

  <p id="aiStatus" class="muted mb-2" style="font-size:.82rem">正在检查结构化 AI 状态...</p>

  <section class="grid">
    <!-- Input area -->
    <article class="shred-paper" style="padding:20px">
      <div class="field-group mb-2">
        <label for="shredText">把想法倒进来</label>
        <textarea id="shredText" placeholder="把混乱、愤怒、焦虑、碎碎念一次性倒进来..." style="min-height:200px;width:100%"></textarea>
      </div>

      <div class="field-group mb-2">
        <label>情绪强度</label>
        <div class="intensity-track">
          <span class="muted" style="font-size:.82rem">温和</span>
          <input type="range" id="intensity" min="1" max="10" value="5">
          <span class="muted" style="font-size:.82rem">强烈</span>
        </div>
      </div>

      <div class="field-group mb-2">
        <label>保存模式</label>
        <select id="saveMode">
          <option value="KEEP_RAW">保留原始</option>
          <option value="KEEP_ONLY_RESULT">仅保留结果</option>
          <option value="DISPLAY_ONCE">仅看一次</option>
        </select>
      </div>

      <button class="shred-btn" onclick="shred()" id="shredBtn">粉碎并沉淀</button>
    </article>

    <!-- Result area -->
    <article class="panel" style="position:relative;overflow:hidden">
      <h2>粉碎结果</h2>
      <div id="result" class="result-section soft-stage">
        <p class="muted">粉碎后，结果会出现在这里。</p>
      </div>
      <div id="shredAnim" style="display:none;padding:24px 0" class="text-center">
        <div class="empty-star" style="margin:0 auto"></div>
        <p class="muted mt-1">正在粉碎...</p>
      </div>
    </article>
  </section>

  <div class="spacer"></div>

  <!-- History -->
  <section class="panel">
    <h2>历史粉碎记录</h2>
    <div id="history" class="grid"></div>
  </section>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("思维碎纸机");
IC.ensureDemoLogin().then(() => { loadAiStatus(); loadHistory(); });

function esc(text) { return IC.esc(text); }

async function loadAiStatus() {
  const r = await API.aiHealth();
  if (!r.success || !r.data) return;
  const h = r.data;
  document.getElementById("aiStatus").textContent =
    `${h.provider || "-"} / ${h.model || "-"} · ${h.apiKeyConfigured ? "真实模型已配置" : "未配置真实模型密钥"} · ${h.fallbackAllowed ? "开发 fallback 可用" : "fallback 关闭"}`;
}

async function shred() {
  const text = document.getElementById("shredText").value.trim();
  if (!text) { IC.toast("请先写下你的想法", "warn"); return; }

  const btn = document.getElementById("shredBtn");
  btn.disabled = true;
  btn.textContent = "正在粉碎...";

  /* Shred animation */
  document.getElementById("shredAnim").style.display = "block";
  document.getElementById("result").style.display = "none";

  /* Animate strips falling */
  var resultPanel = document.getElementById("result").closest("article");
  var existing = resultPanel.querySelectorAll(".shred-strip");
  for (var si = 0; si < existing.length; si++) existing[si].remove();
  var charLen = text.length;
  var stripCount = Math.min(12, Math.max(4, Math.floor(charLen / 20)));
  for (var si = 0; si < stripCount; si++) {
    var strip = document.createElement("div");
    strip.className = "shred-strip";
    strip.style.left = (10 + Math.random() * 80) + "%";
    strip.style.top = (10 + Math.random() * 30) + "%";
    strip.style.width = (30 + Math.random() * 50) + "px";
    strip.style.height = (8 + Math.random() * 14) + "px";
    strip.style.animationDelay = (si * 80) + "ms";
    resultPanel.appendChild(strip);
  }

  const r = await API.shredderProcess(text, document.getElementById("saveMode").value);

  /* Clean up strips */
  var strips = resultPanel.querySelectorAll(".shred-strip");
  for (var si = 0; si < strips.length; si++) strips[si].remove();

  document.getElementById("shredAnim").style.display = "none";
  document.getElementById("result").style.display = "grid";

  btn.disabled = false;
  btn.textContent = "粉碎并沉淀";

  if (r.success && r.data) {
    const d = r.data;
    document.getElementById("result").innerHTML = `
      <h3>核心感受</h3>
      <p class="gold">${esc(d.coreFeeling || d.reframeText || "正在识别中...")}</p>

      <h3 class="mt-2">隐藏需求</h3>
      <p class="muted">${esc(d.hiddenNeed || d.reframeText || "正在挖掘中...")}</p>

      <h3 class="mt-2">可以放下的噪音</h3>
      <p class="muted">${Array.isArray(d.noiseToDrop) ? d.noiseToDrop.map(esc).join("；") : esc(d.noiseToDrop || "已识别")}</p>

      <h3 class="mt-2">值得保留的一句话</h3>
      <p class="teal">${esc(d.sentenceToKeep || d.reframeText || "...")}</p>

      <div class="row gap-sm mt-2">
        <button onclick="settleToMemory(${d.memoryCard.id})">沉淀到记忆</button>
        <button onclick="deleteShred(${d.memoryCard.id})">删除</button>
      </div>
    `;
    IC.pulse("settle");
  } else {
    document.getElementById("result").innerHTML = `<p class="muted">粉碎未能完成，请重试。</p>`;
  }

  loadHistory();
}

async function loadHistory() {
  const r = await API.shredderHistory();
  if (r.success && r.data) {
    const historyEl = document.getElementById("history");
    historyEl.innerHTML = r.data.slice(0, 6).map(h =>
      `<article class="card" style="min-height:80px">
        <strong>${esc(h.title || h.memoryType || "粉碎记录")}</strong>
        <p class="muted">${esc((h.rawExcerpt || h.summary || "").substring(0, 80))}...</p>
        <div class="pill-row mt-1">
          <span class="pill">${esc(h.memoryType || "碎纸")}</span>
          <span class="pill">重力 ${Number(h.emotionalGravity || h.gravity || 0).toFixed(2)}</span>
        </div>
      </article>`
    ).join("") || IC.empty("还没有粉碎记录。");
    IC.stagger(historyEl);
  }
}

async function settleToMemory(id) {
  await API.shredderSettle(id);
  IC.toast("已沉淀到记忆", "success");
  IC.pulse("settle");
  loadHistory();
}

async function deleteShred(id) {
  await API.shredderDelete(id);
  IC.toast("记录已删除", "success");
  loadHistory();
}
IC.hideLoading();
</script>
</body>
</html>
