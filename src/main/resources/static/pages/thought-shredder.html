<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/app.css"></head><body><main class="shell"><div class="topbar" data-topbar></div><section class="panel"><h2>思维碎纸机</h2><textarea id="text" placeholder="把混乱、愤怒、焦虑、碎碎念一次性倒进来"></textarea><button onclick="go()">粉碎并沉淀</button><pre id="out" class="panel"></pre></section></main><script src="/js/app.js"></script><script>IC.mountShell("思维碎纸机");IC.ensureDemoLogin();async function go(){const r=await IC.api('/api/thought-shredder/process',{method:'POST',body:JSON.stringify({text:text.value})});out.textContent=JSON.stringify(r.data,null,2);}</script></body></html>
