<!doctype html>
<html lang="zh-CN">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/app.css?v=morandi-20260526"></head>
<body>
<main class="shell">
  <div class="topbar" data-topbar></div>
  <section class="grid">
    <article class="panel">
      <span class="route-hint">脱敏预览与边界设置</span>
      <h1>共鸣体编织</h1>
      <p>共鸣体只携带被你允许的主题。真实身份、诊断承诺和强迫回应会被边界挡住。</p>
      <div class="soft-stage">
        <div class="field-group"><label for="capsuleName">化名</label><input id="capsuleName" placeholder="例如：柔雾回声"></div>
        <div class="field-group"><label for="intro">可公开简介</label><textarea id="intro" placeholder="它能表达的只是脱敏后的经历轮廓，不包含真实身份。"></textarea></div>
        <div class="field-group"><label for="allow">允许谈论</label><input id="allow" value="自我观察, 日常支持, 温柔建议"></div>
        <div class="field-group"><label for="block">明确避开</label><input id="block" value="真实姓名, 诊断承诺, 强迫即时回应"></div>
        <div class="row">
          <select id="privacy"><option value="BALANCED">均衡保护</option><option value="STRICT">严格保护</option><option value="OPEN">开放一点</option></select>
          <select id="visibility"><option value="PUBLIC">公开到星海</option><option value="PRIVATE">先仅自己可见</option><option value="HIDDEN">隐藏</option></select>
          <input id="turns" type="number" min="2" max="12" value="5" aria-label="每日对话轮数">
        </div>
        <div class="row"><button onclick="preview()">生成脱敏预览</button><button onclick="create()">确认编织</button></div>
      </div>
    </article>
    <aside class="panel">
      <h2>预览</h2>
      <div id="previewBox" class="timeline"></div>
      <div id="out" class="soft-stage" style="display:none"></div>
    </aside>
  </section>
</main>
<script src="/js/app.js"></script>
<script>
IC.mountShell("共鸣体编织");IC.ensureDemoLogin();
function values(input){return input.value.split(",").map(x=>x.trim()).filter(Boolean);}
function preview(){
  previewBox.innerHTML = `<div class="timeline-item"><strong>${capsuleName.value||"未命名回声"}</strong><p>${intro.value||"一枚从脱敏记忆中编织出的数字回声。"}</p></div><div class="timeline-item"><strong>允许谈论</strong><p>${values(allow).join("、")}</p></div><div class="timeline-item"><strong>边界</strong><p>${values(block).join("、")}</p></div>`;
  IC.pulse("open");
}
async function create(){
  preview();
  const visibilityStatus = visibility.value;
  const r=await IC.api('/api/capsule/create-from-memory',{method:'POST',body:JSON.stringify({pseudonym:capsuleName.value,intro:intro.value,memoryIds:[],allowTopics:values(allow),blockedTopics:values(block),maxConversationTurns:Number(turns.value||5),allowLetterRequest:true,privacyLevel:privacy.value,visibilityStatus,isPublic:visibilityStatus==="PUBLIC"})});
  out.style.display="grid";
  out.innerHTML = `<strong>${r.data.pseudonym}</strong><p>${r.data.intro}</p><div class="pill-row"><span class="pill">${r.data.visibilityStatus}</span><span class="pill">每日 ${r.data.conversationLimitPerDay} 轮</span><span class="pill">能量 ${Math.round((r.data.echoEnergy||0)*100)}%</span></div><a class="button" href="/pages/echo-plaza.html">查看星海广场</a>`;
  IC.toast("共鸣体已生成","success");
  IC.pulse("settle");
}
</script>
</body></html>
