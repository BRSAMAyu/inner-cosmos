<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>星海广场 · Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    /* ── Echo Plaza — quiet echo field ── */
    .echo-hero {
      position: relative;
      min-height: 36vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 0 48px;
      background:
        radial-gradient(ellipse 60% 80% at 25% 20%, rgba(143,163,148,.14), transparent),
        radial-gradient(ellipse 50% 60% at 75% 30%, rgba(168,161,184,.12), transparent),
        linear-gradient(180deg, var(--surface-warm) 0%, transparent 100%);
      overflow: hidden;
    }
    .echo-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(1.2px 1.2px at 12% 28%, rgba(184,194,174,.40), transparent),
        radial-gradient(1px 1px at 35% 65%, rgba(200,192,187,.32), transparent),
        radial-gradient(1.5px 1.5px at 58% 14%, rgba(184,194,174,.28), transparent),
        radial-gradient(1px 1px at 78% 52%, rgba(168,161,184,.30), transparent),
        radial-gradient(1px 1px at 91% 78%, rgba(184,194,174,.24), transparent);
      pointer-events: none;
      animation: echo-stardust-drift 24s var(--ease-drift) infinite alternate;
    }
    @keyframes echo-stardust-drift {
      0% { transform: translateY(0) translateX(0); opacity: .6; }
      100% { transform: translateY(-8px) translateX(4px); opacity: 1; }
    }
    .echo-hero-title {
      font-family: var(--font-hero);
      font-size: clamp(2.4rem, 5.5vw, 4rem);
      line-height: 1.08;
      color: var(--ink);
      margin: 0 0 12px;
      position: relative;
      z-index: 1;
    }
    .echo-hero-sub {
      font-size: 1.0625rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }
    .echo-hero-sub strong {
      color: var(--ink);
      font-weight: 500;
    }

    /* ── Sync banner ── */
    .echo-sync-banner {
      background:
        linear-gradient(135deg, rgba(184,169,110,.08), rgba(184,169,110,.03)),
        var(--surface-paper);
      border: 1px solid rgba(184,169,110,.18);
      border-radius: var(--radius-card);
      padding: 16px 20px;
      margin-bottom: 24px;
      backdrop-filter: blur(12px);
    }

    /* ── Tab bar ── */
    .echo-tabs {
      display: flex;
      gap: 4px;
      background: rgba(160,155,180,.06);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 24px;
    }
    .echo-tabs button {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: .9375rem;
      cursor: pointer;
      transition: all 260ms var(--ease-flow);
    }
    .echo-tabs button:hover { color: var(--ink); }
    .echo-tabs button.active {
      background: var(--surface-paper);
      color: var(--ink);
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
    }

    /* ── Search & filters ── */
    .echo-toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 28px;
    }
    .echo-search {
      flex: 1;
      min-width: 200px;
      max-width: 320px;
      padding: 10px 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-paper);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: .9375rem;
      transition: border-color 260ms var(--ease-flow), box-shadow 260ms var(--ease-flow);
    }
    .echo-search:focus {
      outline: none;
      border-color: var(--accent-sage);
      box-shadow: 0 0 0 3px rgba(143,163,148,.12);
    }
    .echo-filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .echo-filter-pills .pill {
      cursor: pointer;
      transition: all 260ms var(--ease-flow);
    }
    .echo-filter-pills .pill:hover {
      background: rgba(143,163,148,.18);
      transform: translateY(-1px);
    }
    .echo-filter-pills .pill.active {
      background: rgba(143,163,148,.28);
      color: var(--ink);
    }
    .echo-sort {
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-paper);
      color: var(--muted);
      font-family: var(--font-body);
      font-size: .875rem;
    }

    /* ── Capsule grid ── */
    .echo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── Capsule card ── */
    .capsule-card {
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,250,243,.72), rgba(247,242,236,.48)),
        var(--surface-paper);
      border: 1px solid rgba(255,255,255,.24);
      border-radius: var(--radius-card);
      padding: 24px;
      cursor: pointer;
      backdrop-filter: blur(20px) saturate(115%);
      box-shadow:
        0 4px 16px rgba(0,0,0,.04),
        0 16px 48px rgba(0,0,0,.06);
      transition:
        transform 400ms var(--ease-bloom),
        box-shadow 400ms var(--ease-bloom),
        border-color 300ms var(--ease-flow);
      opacity: 0;
      transform: translateY(16px);
      animation: card-reveal 700ms var(--ease-bloom) forwards;
    }
    .capsule-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: var(--radius-card);
      border-top: 1px solid rgba(255,255,255,.32);
      pointer-events: none;
    }
    .capsule-card:hover {
      transform: translateY(-4px);
      box-shadow:
        0 8px 24px rgba(0,0,0,.06),
        0 28px 64px rgba(0,0,0,.10);
      border-color: rgba(143,163,148,.24);
    }
    @keyframes card-reveal {
      to { opacity: 1; transform: translateY(0); }
    }

    .capsule-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .capsule-card-identity {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .capsule-card-name {
      font-family: var(--font-hero);
      font-size: 1.125rem;
      font-weight: 500;
    }
    .capsule-card-badges {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .capsule-card-intro {
      color: var(--muted);
      font-size: .9375rem;
      line-height: 1.65;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .capsule-card-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .capsule-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--line);
      font-size: .8125rem;
      color: var(--faint);
    }
    .capsule-card-energy {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .energy-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-sage);
      opacity: .7;
    }

    /* ── Dark mode ── */
    body.dark-star .echo-hero {
      background:
        radial-gradient(ellipse 60% 80% at 25% 20%, rgba(122,142,127,.10), transparent),
        radial-gradient(ellipse 50% 60% at 75% 30%, rgba(154,144,167,.08), transparent),
        linear-gradient(180deg, var(--surface-warm) 0%, transparent 100%);
    }
    body.dark-star .echo-hero::before {
      background:
        radial-gradient(1.2px 1.2px at 12% 28%, rgba(200,144,96,.28), transparent),
        radial-gradient(1px 1px at 35% 65%, rgba(200,192,187,.18), transparent),
        radial-gradient(1px 1px at 58% 14%, rgba(192,144,96,.20), transparent),
        radial-gradient(1px 1px at 78% 52%, rgba(134,152,169,.22), transparent),
        radial-gradient(1px 1px at 91% 78%, rgba(192,144,96,.16), transparent);
    }
    body.dark-star .echo-hero-title { color: var(--ink); }
    body.dark-star .echo-sync-banner {
      background: rgba(42,38,34,.72);
      border-color: rgba(184,169,110,.16);
    }
    body.dark-star .echo-tabs {
      background: rgba(160,155,180,.06);
    }
    body.dark-star .echo-tabs button.active {
      background: rgba(42,38,34,.88);
      color: var(--ink);
    }
    body.dark-star .echo-search,
    body.dark-star .echo-sort {
      background: rgba(30,27,24,.72);
      border-color: rgba(163,153,143,.18);
      color: var(--muted);
    }
    body.dark-star .capsule-card {
      background:
        linear-gradient(180deg, rgba(42,38,34,.72), rgba(37,33,29,.56)),
        rgba(42,38,34,.48);
      border-color: rgba(163,153,143,.14);
      box-shadow:
        0 4px 16px rgba(0,0,0,.12),
        0 16px 48px rgba(0,0,0,.20);
    }
    body.dark-star .capsule-card::before {
      border-top-color: rgba(255,255,255,.06);
    }
    body.dark-star .capsule-card:hover {
      box-shadow:
        0 8px 24px rgba(0,0,0,.18),
        0 28px 64px rgba(0,0,0,.28);
      border-color: rgba(143,163,148,.20);
    }
    body.dark-star .capsule-card-meta {
      border-top-color: var(--line);
    }

    /* ── Empty state ── */
    .echo-empty {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 24px;
      color: var(--faint);
    }
    .echo-empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: .4;
      animation: echo-breathe 6s var(--ease-flow) infinite;
    }
    @keyframes echo-breathe {
      0%, 100% { transform: scale(1); opacity: .4; }
      50% { transform: scale(1.04); opacity: .6; }
    }

    /* ── Modal refinement ── */
    .echo-modal-section {
      padding: 16px;
      background: rgba(160,155,180,.04);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }
    .echo-modal-section h3 {
      font-size: .9375rem;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .echo-modal-section p {
      font-size: .875rem;
      line-height: 1.6;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      .echo-hero { min-height: 28vh; padding-bottom: 32px; }
      .echo-grid { grid-template-columns: 1fr; gap: 16px; }
      .echo-toolbar { flex-direction: column; }
      .echo-search { max-width: 100%; }
    }
  </style>
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Hero -->
  <section class="echo-hero">
    <span class="route-hint">数字回声花园</span>
    <h1 class="echo-hero-title" id="page-title">星海广场</h1>
    <p class="echo-hero-sub">
      这里不是交友信息流。你遇见的是<strong>被授权的数字回声</strong>——
      少量、高质、可停留。每一段回声都有边界。
    </p>
  </section>

  <!-- Pending sync banner -->
  <div id="syncBanner" class="echo-sync-banner" style="display:none">
    <div class="flex-between">
      <div>
        <strong style="color:#b8a96e">你的共鸣体正在更新</strong>
        <p class="muted" style="font-size:.86rem;margin:4px 0 0">有新的同步请求等待确认</p>
      </div>
      <div style="display:flex;gap:8px">
        <button class="button" onclick="showSyncPending()">查看</button>
        <button class="button" onclick="dismissSyncBanner()" style="opacity:.6">暂不处理</button>
      </div>
    </div>
  </div>

  <!-- Tab bar -->
  <div class="echo-tabs">
    <button class="active" onclick="switchTab('seed')">种子共鸣体</button>
    <button onclick="switchTab('user')">用户共鸣体</button>
  </div>

  <!-- Search & Filters -->
  <div class="echo-toolbar">
    <input id="search" class="echo-search" placeholder="搜索共鸣体..." oninput="filterCapsules()">
    <div id="tagFilters" class="echo-filter-pills"></div>
    <select id="sortSelect" class="echo-sort" onchange="filterCapsules()">
      <option value="energy">按回声能量</option>
      <option value="newest">最新发布</option>
      <option value="chat">最多对话</option>
    </select>
  </div>

  <!-- Capsule grid -->
  <section id="list" class="echo-grid"></section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script src="/js/capsule-personality.js"></script>
<script>
IC.mountShell("星海广场");

let capsules = [];
let matchById = new Map();
let currentTab = "seed";
let allTags = [];

IC.ensureDemoLogin().then(load);

async function load() {
  const matchRes = await API.plazaMatches();
  if (matchRes.success) {
    const rows = matchRes.data || [];
    capsules = rows.map(x => x.capsule || x);
    matchById = new Map(rows.map(x => [String((x.capsule || x).id), x]));
  } else {
    const r = await API.plazaCapsules();
    if (r.success) capsules = r.data || [];
  }
  buildTagFilters();
  filterCapsules();
}

function esc(text) { return IC.esc(text); }
function formatCapsuleTurns(c) {
  if (!c || c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED" || Number(c.conversationLimitPerDay) <= 0) {
    return "不限轮次";
  }
  return "每日 " + (c.conversationLimitPerDay || 30) + " 轮";
}
function tagsOf(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value;
  try {
    var parsed = JSON.parse(value);
    if (Array.isArray(parsed)) return parsed;
  } catch (e) {}
  return String(value).split(",").map(function(t) { return t.replace(/["\[\]]/g, "").trim(); }).filter(Boolean);
}

function switchTab(tab) {
  currentTab = tab;
  var btns = document.querySelectorAll(".echo-tabs button");
  btns[0].classList.toggle("active", tab === "seed");
  btns[1].classList.toggle("active", tab === "user");
  filterCapsules();
}

function buildTagFilters() {
  allTags = [];
  var seen = {};
  capsules.forEach(function(c) {
    tagsOf(c.publicTags).forEach(function(t) {
      if (!seen[t]) { seen[t] = true; allTags.push(t); }
    });
  });
  document.getElementById("tagFilters").innerHTML = allTags.slice(0, 8).map(function(t) {
    return '<span class="pill" style="cursor:pointer" onclick="toggleTagFilter(this, \'' + esc(t) + '\')">' + esc(t) + '</span>';
  }).join("");
}

var activeTagFilters = new Set();
function toggleTagFilter(el, tag) {
  if (activeTagFilters.has(tag)) {
    activeTagFilters.delete(tag);
    el.classList.remove("active");
  } else {
    activeTagFilters.add(tag);
    el.classList.add("active");
  }
  filterCapsules();
}

function filterCapsules() {
  var search = (document.getElementById("search").value || "").toLowerCase();
  var sort = document.getElementById("sortSelect").value;
  var filtered = capsules.filter(function(c) {
    if (currentTab === "seed" && c.capsuleType !== "SEED_CAPSULE") return false;
    if (currentTab === "user" && c.capsuleType === "SEED_CAPSULE") return false;
    if (search && !(c.pseudonym || "").toLowerCase().includes(search) && !(c.intro || "").toLowerCase().includes(search)) return false;
    if (activeTagFilters.size > 0) {
      var tags = tagsOf(c.publicTags);
      var _iteratorNormalCompletion = true;
      var _didIteratorError = false;
      for (var ft of activeTagFilters) { if (!tags.includes(ft)) return false; }
    }
    return true;
  });

  if (sort === "energy") filtered.sort(function(a, b) { return (b.echoEnergy || 0) - (a.echoEnergy || 0); });
  if (sort === "newest") filtered.sort(function(a, b) { return new Date(b.createdAt || 0) - new Date(a.createdAt || 0); });
  if (sort === "chat") filtered.sort(function(a, b) { return (b.totalChats || 0) - (a.totalChats || 0); });

  renderList(filtered);
}

function renderList(data) {
  var list = document.getElementById("list");
  if (!data.length) {
    list.innerHTML = '<div class="echo-empty"><div class="echo-empty-icon">~</div><p>' +
      IC.empty(currentTab === "seed"
        ? "种子共鸣体正在生长中。"
        : "还没有用户共鸣体。你可以编织一个。") + '</p></div>';
    return;
  }
  list.innerHTML = data.map(function(c, idx) {
    var personality = CapsulePersonality.getPersonality(c.pseudonym);
    var match = matchById.get(String(c.id)) || {};
    var tags = tagsOf(c.publicTags);
    var delay = Math.min(idx * 80, 640);
    return '<article class="capsule-card" style="cursor:pointer;animation-delay:' + delay + 'ms" onclick="openCapsule(' + c.id + ')" data-pseudonym="' + esc(c.pseudonym) + '">' +
      '<div class="capsule-card-header">' +
        '<div class="capsule-card-identity">' +
          CapsulePersonality.generateAvatar(c.pseudonym, "small") +
          '<strong class="capsule-card-name" style="color:' + personality.color + '">' + esc(c.pseudonym) + '</strong>' +
        '</div>' +
        '<div class="capsule-card-badges">' +
          CapsulePersonality.createBadge(c.pseudonym) +
          '<span class="badge badge-read">' + (c.capsuleType === "SEED_CAPSULE" ? "种子" : "用户") + '</span>' +
        '</div>' +
      '</div>' +
      '<p class="capsule-card-intro">' + esc(c.intro || "") + '</p>' +
      (tags.length ? '<div class="capsule-card-tags">' + tags.map(function(t) { return '<span class="pill">' + esc(t) + '</span>'; }).join("") + '</div>' : '') +
      '<div class="capsule-card-meta">' +
        '<span class="capsule-card-energy"><span class="energy-dot"></span> ' + (c.echoEnergy || 0).toFixed(2) + '</span>' +
        '<span>' + formatCapsuleTurns(c) + '</span>' +
        (match.matchScore ? '<span>' + (match.matchScore).toFixed(2) + ' 匹配</span>' : '') +
      '</div>' +
    '</article>';
  }).join("");

  // Apply personality styles
  list.querySelectorAll('.capsule-card').forEach(function(card) {
    var pseudonym = card.dataset.pseudonym;
    if (pseudonym) CapsulePersonality.applyPersonality(pseudonym, card);
  });
}

function openCapsule(id) {
  var c = capsules.find(function(x) { return x.id === id; });
  if (!c) return;
  var personality = CapsulePersonality.getPersonality(c.pseudonym);
  var match = matchById.get(String(c.id)) || {};
  var tags = tagsOf(c.publicTags);

  IC.showModal(
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">' +
      '<div style="display:flex;align-items:center;gap:12px">' +
        CapsulePersonality.generateAvatar(c.pseudonym, "medium") +
        '<div>' +
          '<h2 style="color:' + personality.color + ';margin-bottom:4px">' + esc(c.pseudonym) + '</h2>' +
          CapsulePersonality.createBadge(c.pseudonym) +
        '</div>' +
      '</div>' +
      '<button onclick="IC.closeModal()">关闭</button>' +
    '</div>' +
    '<p class="muted" style="margin-bottom:16px;line-height:1.65">' + esc(c.intro || "") + '</p>' +
    (tags.length ? '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px">' +
      tags.map(function(t) { return '<span class="pill">' + esc(t) + '</span>'; }).join("") +
    '</div>' : '') +
    (match.matchSummary ? '<div class="echo-modal-section"><h3>为什么推荐</h3><p class="muted">' + esc(match.matchSummary) + '</p></div>' : '') +
    '<div class="echo-modal-section" style="border-left:3px solid ' + personality.color + '">' +
      '<h3>边界</h3>' +
      '<p class="muted">对话轮数：' + formatCapsuleTurns(c) + '</p>' +
      '<p class="muted">回声能量：' + (c.echoEnergy || 0).toFixed(2) + '</p>' +
      '<p class="muted">对话特质：' + CapsulePersonality.getMoodLabel(personality.mood) + '</p>' +
      '<p class="muted" style="margin-top:8px;opacity:.7">它只是一段回声，不是一个人。</p>' +
    '</div>' +
    '<div style="display:flex;gap:10px">' +
      '<a class="button" href="/pages/capsule-chat.html?capsuleId=' + c.id + '">和回声对话</a>' +
      '<a class="button" href="/pages/slow-letter.html?capsuleId=' + c.id + '">写慢信</a>' +
    '</div>'
  );
  IC.pulse("open");
}

async function checkSyncPending() {
  try {
    var r = await API.syncPending();
    if (r.success && r.data && r.data.length > 0) {
      document.getElementById("syncBanner").style.display = "block";
    }
  } catch (e) {}
}

function showSyncPending() {
  IC.showModal(
    '<h2>共鸣体同步请求</h2>' +
    '<p class="muted" style="margin-bottom:16px">以下共鸣体的人格上下文即将更新，请确认：</p>' +
    '<div id="syncPendingList"></div>'
  );
  loadSyncPendingList();
}

async function loadSyncPendingList() {
  var r = await API.syncPending();
  var list = document.getElementById("syncPendingList");
  if (!r.success || !r.data || !r.data.length) {
    list.innerHTML = '<p class="muted">暂无待处理的同步请求。</p>';
    return;
  }
  list.innerHTML = r.data.map(function(q) {
    return '<div class="echo-modal-section">' +
      '<p class="muted">胶囊 #' + q.capsuleId + '</p>' +
      '<pre class="muted" style="font-size:.82rem;white-space:pre-wrap">' + esc(q.proposedContextDiff || "{}") + '</pre>' +
      '<div style="display:flex;gap:8px;margin-top:8px">' +
        '<button class="button" onclick="decideSync(' + q.id + ',\'ALLOW\')">允许</button>' +
        '<button class="button" onclick="decideSync(' + q.id + ',\'ALLOW_PARTIAL\')">部分允许</button>' +
        '<button class="button" style="opacity:.6" onclick="decideSync(' + q.id + ',\'REJECT\')">拒绝</button>' +
      '</div>' +
    '</div>';
  }).join("");
}

async function decideSync(queueId, decision) {
  var body = { decision: decision };
  if (decision === "ALLOW_PARTIAL") {
    var allowed = prompt("请输入允许的字段，用逗号分隔（如 real_name,values）：");
    if (allowed) body.allowedFields = allowed.split(",").map(function(s) { return s.trim(); }).filter(Boolean);
    else return;
  }
  var r = await IC.api("/api/capsule/sync/" + queueId + "/decide", {
    method: "POST",
    body: JSON.stringify(body)
  });
  if (r.success) {
    IC.toast(decision === "REJECT" ? "已拒绝更新" : "已确认更新", "info");
    IC.closeModal();
    document.getElementById("syncBanner").style.display = "none";
  } else {
    IC.toast(r.message || "操作失败", "warn");
  }
}

function dismissSyncBanner() {
  document.getElementById("syncBanner").style.display = "none";
}

IC.ensureDemoLogin().then(load).then(checkSyncPending);
IC.hideLoading();
</script>
</body>
