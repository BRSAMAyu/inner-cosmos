<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>星海广场 · Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <span class="route-hint">数字回声花园</span>
  <h1 id="page-title">星海广场</h1>
  <p class="muted mb-2">这里不是交友信息流。你先遇见的是一部分被授权的数字回声。</p>

  <!-- Pending sync banner -->
  <div id="syncBanner" class="soft-stage mb-2" style="display:none; border-left: 3px solid #b8a96e">
    <div class="flex-between">
      <div>
        <strong style="color:#b8a96e">你的共鸣体正在更新</strong>
        <p class="muted" style="font-size:.86rem; margin:4px 00">有新的同步请求等待确认</p>
      </div>
      <div class="flex-row gap-sm">
        <button class="button" onclick="showSyncPending()">查看</button>
        <button class="button" onclick="dismissSyncBanner()" style="opacity:.6">暂不处理</button>
      </div>
    </div>
  </div>

  <!-- Tab bar: Seed / User -->
  <div class="tab-bar mb-2">
    <button class="active" onclick="switchTab('seed')">种子共鸣体</button>
    <button onclick="switchTab('user')">用户共鸣体</button>
  </div>

  <!-- Search & Filters -->
  <div class="row gap-sm mb-2" style="flex-wrap:wrap">
    <input id="search" placeholder="搜索共鸣体..." style="max-width:280px" oninput="filterCapsules()">
    <div id="tagFilters" class="pill-row"></div>
    <select id="sortSelect" onchange="filterCapsules()">
      <option value="energy">按回声能量</option>
      <option value="newest">最新发布</option>
      <option value="chat">最多对话</option>
    </select>
  </div>

  <!-- Capsule grid -->
  <section id="list" class="grid"></section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script src="/js/capsule-personality.js"></script>
<script>
IC.mountShell("星海广场");

let capsules = [];
let matchById = new Map();
let currentTab = "seed";
let allTags = [];

IC.ensureDemoLogin().then(load);

async function load() {
  const matchRes = await API.plazaMatches();
  if (matchRes.success) {
    const rows = matchRes.data || [];
    capsules = rows.map(x => x.capsule || x);
    matchById = new Map(rows.map(x => [String((x.capsule || x).id), x]));
  } else {
    const r = await API.plazaCapsules();
    if (r.success) capsules = r.data || [];
  }
  buildTagFilters();
  filterCapsules();
}

function esc(text) { return IC.esc(text); }
function formatCapsuleTurns(c) {
  if (!c || c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED" || Number(c.conversationLimitPerDay) <= 0) {
    return "不限轮次";
  }
  return `每日 ${c.conversationLimitPerDay || 30} 轮`;
}
function tagsOf(value) {
  if (!value) return [];
  if (Array.isArray(value)) return value;
  try {
    const parsed = JSON.parse(value);
    if (Array.isArray(parsed)) return parsed;
  } catch (e) {}
  return String(value).split(",").map(t => t.replace(/["\[\]]/g, "").trim()).filter(Boolean);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll(".tab-bar button").forEach((btn, i) => {
    btn.classList.toggle("active", (tab === "seed" && i === 0) || (tab === "user" && i === 1));
  });
  filterCapsules();
}

function buildTagFilters() {
  allTags = [...new Set(capsules.flatMap(c => tagsOf(c.publicTags)))];
  document.getElementById("tagFilters").innerHTML = allTags.slice(0, 8).map(t =>
    `<span class="pill" style="cursor:pointer" onclick="toggleTagFilter(this, '${esc(t)}')">${esc(t)}</span>`
  ).join("");
}

let activeTagFilters = new Set();
function toggleTagFilter(el, tag) {
  if (activeTagFilters.has(tag)) {
    activeTagFilters.delete(tag);
    el.style.background = "";
  } else {
    activeTagFilters.add(tag);
    el.style.background = "rgba(143,163,148,.32)";
  }
  filterCapsules();
}

function filterCapsules() {
  const search = (document.getElementById("search").value || "").toLowerCase();
  const sort = document.getElementById("sortSelect").value;
  let filtered = capsules.filter(c => {
    if (currentTab === "seed" && c.capsuleType !== "SEED_CAPSULE") return false;
    if (currentTab === "user" && c.capsuleType === "SEED_CAPSULE") return false;
    if (search && !(c.pseudonym || "").toLowerCase().includes(search) && !(c.intro || "").toLowerCase().includes(search)) return false;
    if (activeTagFilters.size > 0) {
      const tags = tagsOf(c.publicTags);
      for (const ft of activeTagFilters) { if (!tags.includes(ft)) return false; }
    }
    return true;
  });

  /* Sort */
  if (sort === "energy") filtered.sort((a, b) => (b.echoEnergy || 0) - (a.echoEnergy || 0));
  if (sort === "newest") filtered.sort((a, b) => new Date(b.createdAt || 0) - new Date(a.createdAt || 0));
  if (sort === "chat") filtered.sort((a, b) => (b.totalChats || 0) - (a.totalChats || 0));

  renderList(filtered);
}

function renderList(data) {
  const list = document.getElementById("list");
  if (!data.length) {
    list.innerHTML = IC.empty(currentTab === "seed"
      ? "种子共鸣体正在生长中。"
      : "还没有用户共鸣体。你可以编织一个。");
    return;
  }
  list.innerHTML = data.map(c => {
    const personality = CapsulePersonality.getPersonality(c.pseudonym);
    const match = matchById.get(String(c.id)) || {};
    const tags = tagsOf(c.publicTags);
    return `
    <article class="card capsule-card" style="cursor:pointer" onclick="openCapsule(${c.id})"
             data-pseudonym="${esc(c.pseudonym)}">
      <div class="flex-between mb-1">
        <div class="flex-row gap-sm" style="align-items:center">
          ${CapsulePersonality.generateAvatar(c.pseudonym, 'small')}
          <strong style="color: ${personality.color}">${esc(c.pseudonym)}</strong>
        </div>
        <div class="flex-row gap-sm">
          ${CapsulePersonality.createBadge(c.pseudonym)}
          <span class="badge badge-read">${c.capsuleType === "SEED_CAPSULE" ? "种子" : "用户"}</span>
        </div>
      </div>
      <p class="muted">${esc(c.intro || "")}</p>
      <div class="pill-row mt-1">
        ${tags.map(t => `<span class="pill">${esc(t)}</span>`).join("")}
      </div>
      <p class="gold mt-1" style="font-size:.88rem">
        匹配 ${(match.matchScore || c.echoEnergy || 0).toFixed(2)} / 回声能量 ${(c.echoEnergy || 0).toFixed(2)} / ${formatCapsuleTurns(c)}
      </p>
      ${match.matchSummary ? `<p class="muted" style="font-size:.86rem">${esc(match.matchSummary)}</p>` : ""}
    </article>
  `}).join("");

  // Apply personality styles to each card
  list.querySelectorAll('.capsule-card').forEach(card => {
    const pseudonym = card.dataset.pseudonym;
    if (pseudonym) {
      CapsulePersonality.applyPersonality(pseudonym, card);
    }
  });

  IC.stagger(list);
}

function openCapsule(id) {
  const c = capsules.find(x => x.id === id);
  if (!c) return;

  const personality = CapsulePersonality.getPersonality(c.pseudonym);
  const match = matchById.get(String(c.id)) || {};
  const tags = tagsOf(c.publicTags);

  IC.showModal(`
    <div class="flex-between mb-2">
      <div class="flex-row gap-sm" style="align-items:center">
        ${CapsulePersonality.generateAvatar(c.pseudonym, 'medium')}
        <div>
          <h2 style="color: ${personality.color}">${esc(c.pseudonym)}</h2>
          ${CapsulePersonality.createBadge(c.pseudonym)}
        </div>
      </div>
      <button onclick="IC.closeModal()">关闭</button>
    </div>
    <p class="muted mb-2">${esc(c.intro || "")}</p>
    <div class="pill-row mb-2">
      ${tags.map(t => `<span class="pill">${esc(t)}</span>`).join("")}
    </div>
    ${match.matchSummary ? `<div class="soft-stage mb-2"><h3>为什么推荐</h3><p class="muted">${esc(match.matchSummary)}</p></div>` : ""}
    <div class="soft-stage mb-2" style="border-left: 3px solid ${personality.color}">
      <h3>边界</h3>
      <p class="muted">对话轮数：${formatCapsuleTurns(c)}</p>
      <p class="muted">回声能量：${(c.echoEnergy || 0).toFixed(2)}</p>
      <p class="muted">对话特质：${CapsulePersonality.getMoodLabel(personality.mood)}</p>
      <p class="muted">它只是一段回声，不是一个人。</p>
    </div>
    <div class="row gap-sm">
      <a class="button" href="/pages/capsule-chat.html?capsuleId=${c.id}">和回声对话</a>
      <a class="button" href="/pages/slow-letter.html?capsuleId=${c.id}">写慢信</a>
    </div>
  `);
  IC.pulse("open");
}

async function checkSyncPending() {
  try {
    const r = await API.syncPending();
    if (r.success && r.data && r.data.length > 0) {
      document.getElementById("syncBanner").style.display = "block";
    }
  } catch (e) {}
}

function showSyncPending() {
  IC.showModal(`
    <h2>共鸣体同步请求</h2>
    <p class="muted mb-2">以下共鸣体的人格上下文即将更新，请确认：</p>
    <div id="syncPendingList"></div>
  `);
  loadSyncPendingList();
}

async function loadSyncPendingList() {
  const r = await API.syncPending();
  const list = document.getElementById("syncPendingList");
  if (!r.success || !r.data || r.data.length === 0) {
    list.innerHTML = '<p class="muted">暂无待处理的同步请求。</p>';
    return;
  }
  list.innerHTML = r.data.map(q => `
    <div class="soft-stage mb-2">
      <p class="muted">胶囊 #${q.capsuleId}</p>
      <pre class="muted" style="font-size:.82rem; white-space:pre-wrap">${esc(q.proposedContextDiff || "{}")}</pre>
      <div class="flex-row gap-sm mt-1">
        <button class="button" onclick="decideSync(${q.id}, 'ALLOW')">允许</button>
        <button class="button" onclick="decideSync(${q.id}, 'ALLOW_PARTIAL')">部分允许</button>
        <button class="button" style="opacity:.6" onclick="decideSync(${q.id}, 'REJECT')">拒绝</button>
      </div>
    </div>
  `).join("");
}

async function decideSync(queueId, decision) {
  const body = { decision };
  if (decision === "ALLOW_PARTIAL") {
    const allowed = prompt("请输入允许的字段，用逗号分隔（如 real_name,values）：");
    if (allowed) body.allowedFields = allowed.split(",").map(s => s.trim()).filter(Boolean);
    else return;
  }
  const r = await IC.api("/api/capsule/sync/" + queueId + "/decide", {
    method: "POST",
    body: JSON.stringify(body)
  });
  if (r.success) {
    IC.toast(decision === "REJECT" ? "已拒绝更新" : "已确认更新", "info");
    IC.closeModal();
    document.getElementById("syncBanner").style.display = "none";
  } else {
    IC.toast(r.message || "操作失败", "warn");
  }
}

function dismissSyncBanner() {
  document.getElementById("syncBanner").style.display = "none";
}

IC.ensureDemoLogin().then(load).then(checkSyncPending);
IC.hideLoading();
</script>
</body>
</html>
