<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>我的更正 · 内宇宙</title>
  <style>
    .corrections-hero { padding: 0 0 28px; margin-bottom: 24px;
      background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(184,194,174,.10), transparent),
                  radial-gradient(ellipse 40% 50% at 70% 40%, rgba(165,179,194,.08), transparent); }
    .corrections-hero h1 { font-family: var(--font-hero); font-size: clamp(1.8rem,4vw,2.6rem); margin: 0 0 8px; text-wrap: balance; }
    .corrections-hero p { color: var(--muted); line-height: 1.7; text-wrap: pretty; }

    .correction-card {
      padding: 18px;
      border-radius: var(--radius-flow);
      background: rgba(255,250,243,.55);
      border: 1px solid var(--line);
      margin-bottom: 14px;
      position: relative;
    }
    .correction-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; flex-wrap: wrap; }
    .correction-field { font-size: .8rem; padding: 2px 10px; border-radius: 999px; background: rgba(151,169,186,.18); color: rgba(90,110,135,.85); }
    .correction-type { font-size: .74rem; color: var(--muted); }
    .correction-time { font-size: .76rem; color: var(--muted); }
    .correction-change { font-size: 1.02rem; color: var(--ink); line-height: 1.6; }
    .correction-change .arrow { color: var(--accent-sage); margin: 0 6px; font-weight: 600; }
    .correction-change .old { color: var(--muted); text-decoration: line-through; }
    .correction-change .new { color: var(--ink); }
    .correction-reason { margin-top: 8px; font-size: .88rem; color: var(--muted); line-height: 1.5; }
    .correction-actions { margin-top: 12px; display: flex; justify-content: flex-end; }
    .btn-retire { padding: 6px 14px; border-radius: 999px; border: 1px solid rgba(200,147,145,.5);
      background: rgba(241,230,227,.5); color: rgba(180,90,90,.9); cursor: pointer; font-size: .82rem; transition: background .15s; }
    .btn-retire:hover { background: rgba(200,147,145,.25); }

    body.dark-star .corrections-hero { background: radial-gradient(ellipse 50% 60% at 30% 30%, rgba(122,142,127,.06), transparent); }
    body.dark-star .correction-card { background: rgba(52,47,42,.7); border-color: rgba(163,153,143,.16); }
    body.dark-star .correction-change .new { color: var(--ink); }
    body.dark-star .btn-retire { background: rgba(50,30,30,.6); border-color: rgba(200,147,145,.4); color: rgba(220,160,160,.9); }
    body.dark-star .btn-retire:hover { background: rgba(80,40,40,.6); }
    body.dark-star .panel { background: rgba(42,38,34,.88); border-color: rgba(163,153,143,.16); }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>
  <section class="corrections-hero">
    <span class="route-hint">Aurora 自我理解</span>
    <h1>我的更正</h1>
    <p>你曾说过的"这不太是我"。每一条更正都会让 Aurora 重新理解你，并在对话里切实调整。如果某条已经过时或不再代表你，可以在这里让它退休。</p>
  </section>

  <section id="correctionList"></section>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("我的更正");
IC.ensureDemoLogin().then(load);

function esc(t) { return IC.esc(t); }

async function load() {
  const list = document.getElementById("correctionList");
  let res;
  try {
    res = await IC.api("/api/aurora/corrections");
  } catch (e) {
    list.innerHTML = '<div class="loading" style="color:#b46b6b">加载失败，请稍后重试。</div>';
    return;
  }
  const corrections = (res && res.success ? res.data : []) || [];
  if (!corrections.length) {
    list.innerHTML = IC.empty("还没有任何更正。当 Aurora 误解你时，告诉它\"这不太是我\"，更正会出现在这里。");
    return;
  }
  list.innerHTML = corrections.map(renderCard).join("");
  IC.stagger(list);
}

function fmtTime(t) {
  if (!t) return "";
  return String(t).replace("T", " ").slice(0, 16);
}

function renderCard(c) {
  const field = c.fieldName || "self_understanding";
  const type = c.targetType || "";
  const oldV = c.oldValue || "（原理解）";
  const newV = c.newValue || "（新理解）";
  return `
    <article class="correction-card">
      <div class="correction-head">
        <span class="correction-field">${esc(field)}</span>
        ${type ? `<span class="correction-type">${esc(type)}</span>` : ""}
        ${c.createdAt ? `<span class="correction-time">${esc(fmtTime(c.createdAt))}</span>` : ""}
      </div>
      <div class="correction-change">
        <span class="old">${esc(oldV)}</span>
        <span class="arrow">→</span>
        <span class="new">${esc(newV)}</span>
      </div>
      ${c.reason ? `<p class="correction-reason">理由：${esc(c.reason)}</p>` : ""}
      <div class="correction-actions">
        <button class="btn-retire" onclick="retire(${c.id})">让这条退休</button>
      </div>
    </article>
  `;
}

async function retire(id) {
  if (!confirm("确定让这条更正退休吗？Aurora 将不再据此调整对你的理解。")) return;
  const r = await IC.api("/api/aurora/corrections/" + id, { method: "DELETE" });
  if (r && r.success) { await load(); }  // only reload on actual success (IC.api toasts the error otherwise)
}

IC.hideLoading();
</script>
</body>
</html>
