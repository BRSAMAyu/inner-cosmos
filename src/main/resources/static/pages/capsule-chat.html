<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>与回声对话 · 内宇宙</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    .capsule-header {
      padding: 20px 24px;
      border-radius: var(--radius-flow);
      background: linear-gradient(135deg, rgba(143,163,148,.1), rgba(165,179,194,.08));
      border: 1px solid var(--line);
      position: relative;
      overflow: hidden;
    }
    .capsule-header::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 80% 20%, rgba(191,150,152,.08), transparent 50%);
      pointer-events: none;
    }
    .capsule-header .capsule-identity {
      display: flex;
      align-items: center;
      gap: 14px;
      position: relative;
    }
    .capsule-header h2 {
      font-family: var(--font-hero);
      font-size: 1.3rem;
      color: var(--ink);
      margin: 0;
      text-wrap: balance;
    }
    .capsule-header .capsule-intro {
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      position: relative;
    }
    .capsule-header .turns-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
      position: relative;
    }
    .capsule-header .energy-bar {
      flex: 1;
      max-width: 200px;
      height: 6px;
      border-radius: 3px;
      background: var(--line);
      overflow: hidden;
    }
    .capsule-header .energy-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent-sage);
      transition: width .4s var(--ease-flow);
    }
    .chat-area {
      min-height: 340px;
      padding: 16px 0;
    }
    .chat-area .bubble {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: var(--radius-card);
      margin-bottom: 12px;
      line-height: 1.6;
      font-size: .95rem;
      animation: bubbleIn .4s var(--ease-bloom);
    }
    .chat-area .bubble.user {
      margin-left: auto;
      background: rgba(143,163,148,.18);
      border: 1px solid rgba(143,163,148,.24);
      color: var(--ink);
    }
    .chat-area .bubble.ai {
      margin-right: auto;
      background: rgba(255,250,243,.7);
      border: 1px solid var(--line);
      color: var(--ink);
    }
    .chat-area .bubble .speaker {
      font-size: .78rem;
      color: var(--accent-lavender);
      margin-bottom: 4px;
    }
    @keyframes bubbleIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .composer {
      position: sticky;
      bottom: 0;
      z-index: 5;
      margin-top: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-flow);
      background: rgba(255,250,243,.85);
      backdrop-filter: blur(12px);
      border: 1px solid var(--line);
    }
    .composer .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .composer input {
      flex: 1;
      padding: 10px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-paper);
      font-size: .92rem;
      transition: border-color .2s;
    }
    .composer input:focus {
      outline: none;
      border-color: var(--accent-sage);
    }
    .composer button {
      padding: 10px 20px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent-sage);
      color: #fff;
      font-size: .9rem;
      cursor: pointer;
      transition: filter .2s var(--ease-flow), transform .2s var(--ease-flow), box-shadow .2s var(--ease-flow);
    }
    .composer button:hover {
      filter: brightness(1.06);
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(143,163,148,.28);
    }
    .composer button:active { transform: translateY(0); }
    /* Dark mode — warm Morandi dark-star palette (matches .convo-letter / shared dark theme),
       replacing the older cold-navy rgb(30,35,40)/rgb(60,70,80) tones that clashed with the rest of the app. */
    body.dark-star .capsule-header { background: rgba(52,47,42,.6); border-color: rgba(163,153,143,.16); }
    body.dark-star .capsule-header::before { background: radial-gradient(circle at 80% 20%, rgba(191,150,152,.07), transparent 50%); }
    body.dark-star .capsule-header h2 { color: var(--ink); }
    body.dark-star .chat-area .bubble.user { background: rgba(143,163,148,.12); border-color: rgba(143,163,148,.18); }
    body.dark-star .chat-area .bubble.ai { background: rgba(52,47,42,.7); border-color: rgba(163,153,143,.14); }
    body.dark-star .composer { background: rgba(42,38,34,.85); border-color: rgba(163,153,143,.16); }
    body.dark-star .composer input { background: rgba(42,38,34,.6); border-color: rgba(163,153,143,.16); }
    body.dark-star .composer input:focus { border-color: var(--accent-sage); }
  </style>
</head>
<body>
<main id="ic-main" class="shell">
  <a class="skip-link ic-skip-link" href="#ic-main">跳到主内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Capsule info header -->
  <section class="capsule-header mb-2">
    <div class="capsule-identity mb-1">
      <div id="capsuleAvatar"></div>
      <div>
        <span class="route-hint">数字回声对话</span>
        <h2 id="capsuleName">加载中...</h2>
      </div>
      <div style="margin-left:auto">
        <button class="btn-sm" onclick="closeSession()">结束对话</button>
      </div>
    </div>
    <p id="capsuleIntro" class="capsule-intro"></p>
    <div class="pill-row mt-1" id="capsuleTags"></div>

    <!-- Remaining turns -->
    <div class="turns-row">
      <span class="muted" style="font-size:.82rem">剩余轮数</span>
      <div class="energy-bar">
        <div id="turnsFill" class="energy-bar-fill" style="width:100%"></div>
      </div>
      <span id="turnsLabel" class="muted" style="font-size:.82rem">5 / 5</span>
    </div>

    <!-- Disclaimer -->
    <div class="soft-stage mt-2" style="position:relative">
      <p class="muted">它只是一段回声，不是一个人。如果产生真实共鸣，请写慢信。</p>
    </div>
  </section>

  <!-- Chat area -->
  <section class="panel" style="padding-bottom:0">
    <div id="chat" class="chat-area" aria-live="polite"></div>
    <p id="typing" class="muted" style="display:none;padding:8px 0">
      <span style="animation:pulse 1.4s infinite;display:inline-block">回声正在回应</span>...
    </p>
  </section>

  <!-- Composer -->
  <div class="composer">
    <div id="composerArea" class="input-row">
      <input id="msg" placeholder="向这枚数字回声提一个问题" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
    <div id="exhaustedHint" style="display:none" class="mt-1">
      <p class="gold" style="font-size:.88rem">今日对话轮数已用完。它只是一段回声，也许你可以写一封慢信？</p>
      <a class="button mt-1" id="letterLink" href="/pages/slow-letter.html">写一封慢信</a>
    </div>
  </div>
</main>

<script src="/js/app.js?v=final-20260612"></script>
<script src="/js/time-system.js?v=final-20260612"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script src="/js/capsule-personality.js"></script>
<script>
IC.mountShell("共鸣体对话");

const params = new URLSearchParams(location.search);
const capsuleId = params.get("capsuleId");
if (!capsuleId) {
  document.getElementById("ic-main").innerHTML = `
    <section class="soft-stage" style="text-align:center;padding:72px 20px">
      <h1>请先选择一个共鸣体</h1>
      <p class="muted mb-2">从星海广场进入对话舱后，这里会加载对应的数字回声。</p>
      <a class="button" href="/pages/echo-plaza.html">前往星海广场</a>
    </section>`;
}

let sid = null;
let totalTurns = 5;
let usedTurns = 0;
let capsuleIsSeed = false;
let currentCapsuleId = null;

function esc(text) { return IC.esc(text); }

/**
 * IC-CAP-001: fetch authoritative per-day quota from the backend and refresh the
 * turns display. The backend (tb_capsule_usage_quota) is the source of truth —
 * the old client-side usedTurns++ counter could be bypassed by opening new sessions.
 * SEED capsules (dailyLimit reported as 50 but seed=true) render as "不限".
 */
async function refreshQuotaFromBackend() {
  if (!currentCapsuleId) return;
  try {
    const r = await API.personaChatQuota(currentCapsuleId);
    if (r.success && r.data) {
      capsuleIsSeed = !!r.data.seed;
      totalTurns = r.data.dailyLimit;
      usedTurns = r.data.turnCount;
      updateTurnsDisplay();
    }
  } catch (e) {
    // best-effort: leave previous display as-is if the endpoint is unreachable
  }
}

async function init() {
  await IC.ensureDemoLogin();

  /* Load capsule info */
  const capsuleResp = await API.capsuleDetail(capsuleId);
  if (capsuleResp.success && capsuleResp.data) {
    const c = capsuleResp.data;
    currentCapsuleId = c.id;
    document.getElementById("capsuleName").textContent = c.pseudonym || "数字回声";
    document.getElementById("capsuleIntro").textContent = c.intro || "一枚从脱敏记忆中编织出的数字回声。";
    capsuleIsSeed = (c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED");
    // IC-CAP-001: totalTurns/usedTurns now come from the authoritative /quota endpoint.
    // Seed type is provisional until /quota confirms; refreshQuotaFromBackend overrides both.
    totalTurns = capsuleIsSeed ? 0 : (c.conversationLimitPerDay || 30);
    updateTurnsDisplay();
    await refreshQuotaFromBackend();

    /* CapsulePersonality avatar */
    var avatarBox = document.getElementById("capsuleAvatar");
    if (typeof CapsulePersonality !== "undefined" && avatarBox) {
      avatarBox.innerHTML = CapsulePersonality.generateAvatar(c.pseudonym, "medium", c.id);
      var personality = CapsulePersonality.getPersonality(c.pseudonym, c.id);
      if (personality) {
        document.getElementById("capsuleName").style.color = personality.color;
      }
    }

    const tags = (c.publicTags || "").split(",").filter(Boolean);
    document.getElementById("capsuleTags").innerHTML = tags.map(t =>
      `<span class="pill">${esc(t.trim())}</span>`
    ).join("");

    document.getElementById("letterLink").href = `/pages/slow-letter.html?capsuleId=${c.id}`;
    const policy = c.realContactPolicy || "LETTER_ONLY";
    const standIn = c.standInEnabled ? "它被允许在主人离线时先做有限代回声。" : "它不会代替主人承诺或决定。";
    document.querySelector(".soft-stage.mt-2 .muted").textContent =
      `这是授权共鸣体，不是真人实时回复。${standIn} 真人联系策略：${policy === "NO_REAL_CONTACT" ? "不开放真人联系" : policy === "DIRECT_REQUEST" ? "可发送会话邀请" : "优先写慢信"}。`;
  }

  /* Restore or create chat session */
  const key = `capsule_chat_session_${capsuleId}`;
  sid = sessionStorage.getItem(key);
  let restored = false;
  if (sid) restored = await loadPersonaHistory();
  if (!restored) {
    const r = await API.createPersonaChat(Number(capsuleId));
    if (r.success && r.data) {
      sid = r.data.id;
      sessionStorage.setItem(key, sid);
      addBubble("我只是一个有限的数字回声。你可以先问一个真正让你停下来的问题。", "ai");
    } else {
      addBubble("对话建立失败，请稍后再试。", "ai");
    }
  }
}

async function loadPersonaHistory() {
  const r = await API.personaChatMessages(sid);
  if (!r.success || !Array.isArray(r.data) || !r.data.length) return false;
  usedTurns = 0;
  r.data.forEach(m => {
    const speaker = m.speaker || m.role || "";
    const kind = speaker === "USER" ? "user" : "ai";
    if (kind === "user") usedTurns++;
    addBubble(m.textContent || m.content || "", kind);
  });
  updateTurnsDisplay();
  return true;
}
function addBubble(content, kind) {
  const chat = document.getElementById("chat");
  if (!chat) return;
  const div = document.createElement("div");
  div.className = "bubble " + kind;
  if (kind === "ai") {
    const capsuleName = document.getElementById("capsuleName")?.textContent || "";
    const personality = typeof CapsulePersonality !== "undefined" ? CapsulePersonality.getPersonality(capsuleName) : null;
    const speaker = personality ? CapsulePersonality.getMoodLabel(personality.mood) : "回声";
    div.innerHTML = '<div class="speaker">' + esc(speaker) + '</div><div>' + esc(content) + '</div>';
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateTurnsDisplay() {
  // IC-CAP-001: SEED capsules render as "不限" (effective limit 50 is high enough
  // to feel unlimited in practice; the backend still enforces the hard cap).
  if (capsuleIsSeed || totalTurns <= 0) {
    document.getElementById("turnsFill").style.width = "100%";
    document.getElementById("turnsLabel").textContent = "不限";
    return;
  }
  const remaining = Math.max(0, totalTurns - usedTurns);
  document.getElementById("turnsFill").style.width = (remaining / totalTurns * 100) + "%";
  document.getElementById("turnsLabel").textContent = `${remaining} / ${totalTurns}`;

  if (remaining <= 0) {
    document.getElementById("composerArea").style.display = "none";
    document.getElementById("exhaustedHint").style.display = "block";
  }

  // Show warning when 1 round remains
  const lastTurnHint = document.getElementById("lastTurnHint");
  if (remaining === 1) {
    if (!lastTurnHint && !document.getElementById("lastTurnHint")) {
      const hint = document.createElement("div");
      hint.id = "lastTurnHint";
      hint.className = "soft-stage mt-1";
      hint.style.borderColor = "rgba(200, 147, 145, 0.4)";
      hint.style.background = "rgba(241, 230, 227, 0.6)";
      hint.innerHTML = `<p class="gold" style="font-size:0.88rem">这是最后一轮对话了。如果你还想继续交流，可以写一封慢信给这个共鸣体。</p><a class="button mt-1" href="/pages/slow-letter.html?capsuleId=${capsuleId}">写一封慢信</a>`;
      const composerArea = document.getElementById("composerArea");
      if (composerArea && composerArea.parentNode) {
        composerArea.parentNode.insertBefore(hint, document.getElementById("exhaustedHint"));
      }
    }
    if (lastTurnHint) {
      lastTurnHint.style.display = "block";
    }
  } else if (lastTurnHint) {
    lastTurnHint.style.display = "none";
  }
}

async function send() {
  const input = document.getElementById("msg");
  if (!input.value.trim() || !sid) return;
  const text = input.value.trim();
  addBubble(text, "user");
  input.value = "";
  usedTurns++;
  updateTurnsDisplay();
  IC.pulse("send");
  document.getElementById("typing").style.display = "block";
  try {
    const r = await API.personaChatMessage(sid, text);
    document.getElementById("typing").style.display = "none";
    if (r.success && r.data) {
      addBubble(r.data.textContent || r.data.content || "...", "ai");
      IC.stagger(document.getElementById("chat"));
      // IC-CAP-001: refresh authoritative remaining-turns from the backend after each reply.
      // (the optimistic usedTurns++ above gives instant feedback; this reconciles with the
      //  server's per-day quota, which is what actually decides whether the next turn is allowed)
      await refreshQuotaFromBackend();
    } else {
      IC.toast(r.message || "回声没有回应", "warn");
    }
  } catch (e) {
    document.getElementById("typing").style.display = "none";
    IC.toast("连接暂时不稳定，请稍后再试。", "warn");
  }
}

function closeSession() {
  IC.showModal(`
    <h2>结束对话</h2>
    <p class="muted mb-2">确定要结束与这个回声的对话吗？</p>
    <div class="row gap-sm">
      <button onclick="IC.closeModal();location.href='/pages/echo-plaza.html'">确认离开</button>
      <button onclick="IC.closeModal()">继续对话</button>
    </div>
  `);
}

if (capsuleId) init();
IC.hideLoading();
</script>
</body>
</html>
