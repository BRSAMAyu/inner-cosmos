<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>与回声对话 · Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main id="main" class="shell">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <!-- Capsule info header -->
  <section class="panel mb-2">
    <div class="flex-between mb-1">
      <div>
        <span class="route-hint">数字回声对话</span>
        <h2 id="capsuleName">加载中...</h2>
      </div>
      <button onclick="closeSession()">结束对话</button>
    </div>
    <p id="capsuleIntro" class="muted"></p>
    <div class="pill-row mt-1" id="capsuleTags"></div>

    <!-- Remaining turns -->
    <div class="row gap-sm mt-2" style="align-items:center">
      <span class="muted" style="font-size:.82rem">剩余轮数</span>
      <div class="energy-bar" style="flex:1;max-width:200px">
        <div id="turnsFill" class="energy-bar-fill" style="width:100%"></div>
      </div>
      <span id="turnsLabel" class="muted" style="font-size:.82rem">5 / 5</span>
    </div>

    <!-- Disclaimer -->
    <div class="soft-stage mt-2">
      <p class="muted">它只是一段回声，不是一个人。如果产生真实共鸣，请写慢信。</p>
    </div>
  </section>

  <!-- Chat area -->
  <section class="panel" style="padding-bottom:0">
    <div id="chat" class="chat" aria-live="polite" style="min-height:320px"></div>
    <p id="typing" class="muted" style="display:none;padding:8px 0">回声正在回应...</p>
  </section>

  <!-- Composer -->
  <section class="panel" style="position:sticky;bottom:0;z-index:5;margin-top:12px">
    <div id="composerArea" class="row" style="flex-wrap:nowrap">
      <input id="msg" placeholder="向这枚数字回声提一个问题" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
    <div id="exhaustedHint" style="display:none" class="soft-stage mt-1">
      <p class="gold">今日对话轮数已用完。它只是一段回声，也许你可以写一封慢信？</p>
      <a class="button mt-1" id="letterLink" href="/pages/slow-letter.html">写一封慢信</a>
    </div>
  </section>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("共鸣体对话");

const params = new URLSearchParams(location.search);
const capsuleId = params.get("capsuleId");
if (!capsuleId) {
  document.body.innerHTML = '<div style="text-align:center;padding:80px 20px"><h2>请先选择一个共鸣体</h2><p><a href="/pages/echo-plaza.html">前往星海广场</a></p></div>';
}

let sid = null;
let totalTurns = 5;
let usedTurns = 0;

function esc(text) { return IC.esc(text); }

async function init() {
  await IC.ensureDemoLogin();

  /* Load capsule info */
  const capsuleResp = await API.capsuleDetail(capsuleId);
  if (capsuleResp.success && capsuleResp.data) {
    const c = capsuleResp.data;
    document.getElementById("capsuleName").textContent = c.pseudonym || "数字回声";
    document.getElementById("capsuleIntro").textContent = c.intro || "一枚从脱敏记忆中编织出的数字回声。";
    totalTurns = (c.capsuleType === "SEED_CAPSULE" || c.capsuleType === "SEED") ? 0 : (c.conversationLimitPerDay || 30);
    updateTurnsDisplay();

    const tags = (c.publicTags || "").split(",").filter(Boolean);
    document.getElementById("capsuleTags").innerHTML = tags.map(t =>
      `<span class="pill">${esc(t.trim())}</span>`
    ).join("");

    document.getElementById("letterLink").href = `/pages/slow-letter.html?capsuleId=${c.id}`;
    const policy = c.realContactPolicy || "LETTER_ONLY";
    const standIn = c.standInEnabled ? "它被允许在主人离线时先做有限代回声。" : "它不会代替主人承诺或决定。";
    document.querySelector(".soft-stage.mt-2 .muted").textContent =
      `这是授权共鸣体，不是真人实时回复。${standIn} 真人联系策略：${policy === "NO_REAL_CONTACT" ? "不开放真人联系" : policy === "DIRECT_REQUEST" ? "可发送会话邀请" : "优先写慢信"}。`;
  }

  /* Restore or create chat session */
  const key = `capsule_chat_session_${capsuleId}`;
  sid = sessionStorage.getItem(key);
  let restored = false;
  if (sid) restored = await loadPersonaHistory();
  if (!restored) {
    const r = await API.createPersonaChat(Number(capsuleId));
    if (r.success && r.data) {
      sid = r.data.id;
      sessionStorage.setItem(key, sid);
      addBubble("我只是一个有限的数字回声。你可以先问一个真正让你停下来的问题。", "ai");
    } else {
      addBubble("对话建立失败，请稍后再试。", "ai");
    }
  }
}

async function loadPersonaHistory() {
  const r = await API.personaChatMessages(sid);
  if (!r.success || !Array.isArray(r.data) || !r.data.length) return false;
  usedTurns = 0;
  r.data.forEach(m => {
    const speaker = m.speaker || m.role || "";
    const kind = speaker === "USER" ? "user" : "ai";
    if (kind === "user") usedTurns++;
    addBubble(m.textContent || m.content || "", kind);
  });
  updateTurnsDisplay();
  return true;
}
function addBubble(content, kind) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `bubble ${kind}`;
  if (kind === "ai") {
    div.innerHTML = `<div class="row gap-sm" style="align-items:flex-start;margin-bottom:4px"><span style="font-size:1rem;color:var(--accent-lavender)">✦</span><span class="muted" style="font-size:.78rem">回声</span></div><div>${esc(content)}</div>`;
  } else {
    div.textContent = content;
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function updateTurnsDisplay() {
  const remaining = Math.max(0, totalTurns - usedTurns);
  if (totalTurns <= 0) {
    document.getElementById("turnsFill").style.width = "100%";
    document.getElementById("turnsLabel").textContent = "不限";
    return;
  }
  document.getElementById("turnsFill").style.width = (remaining / totalTurns * 100) + "%";
  document.getElementById("turnsLabel").textContent = `${remaining} / ${totalTurns}`;

  if (remaining <= 0) {
    document.getElementById("composerArea").style.display = "none";
    document.getElementById("exhaustedHint").style.display = "block";
  }

  // Show warning when 1 round remains
  const lastTurnHint = document.getElementById("lastTurnHint");
  if (remaining === 1) {
    if (!lastTurnHint && !document.getElementById("lastTurnHint")) {
      const hint = document.createElement("div");
      hint.id = "lastTurnHint";
      hint.className = "soft-stage mt-1";
      hint.style.borderColor = "rgba(200, 147, 145, 0.4)";
      hint.style.background = "rgba(241, 230, 227, 0.6)";
      hint.innerHTML = `<p class="gold" style="font-size:0.88rem">这是最后一轮对话了。如果你还想继续交流，可以写一封慢信给这个共鸣体。</p><a class="button mt-1" href="/pages/slow-letter.html?capsuleId=${capsuleId}">写一封慢信</a>`;
      const composerArea = document.getElementById("composerArea");
      if (composerArea && composerArea.parentNode) {
        composerArea.parentNode.insertBefore(hint, document.getElementById("exhaustedHint"));
      }
    }
    if (lastTurnHint) {
      lastTurnHint.style.display = "block";
    }
  } else if (lastTurnHint) {
    lastTurnHint.style.display = "none";
  }
}

async function send() {
  const input = document.getElementById("msg");
  if (!input.value.trim() || !sid) return;
  const text = input.value.trim();
  addBubble(text, "user");
  input.value = "";
  usedTurns++;
  updateTurnsDisplay();
  IC.pulse("send");
  document.getElementById("typing").style.display = "block";
  try {
    const r = await API.personaChatMessage(sid, text);
    document.getElementById("typing").style.display = "none";
    if (r.success && r.data) {
      addBubble(r.data.textContent || r.data.content || "...", "ai");
      IC.stagger(document.getElementById("chat"));
    } else {
      IC.toast(r.message || "回声没有回应", "warn");
    }
  } catch (e) {
    document.getElementById("typing").style.display = "none";
    IC.toast("连接暂时不稳定，请稍后再试。", "warn");
  }
}

function closeSession() {
  IC.showModal(`
    <h2>结束对话</h2>
    <p class="muted mb-2">确定要结束与这个回声的对话吗？</p>
    <div class="row gap-sm">
      <button onclick="IC.closeModal();location.href='/pages/echo-plaza.html'">确认离开</button>
      <button onclick="IC.closeModal()">继续对话</button>
    </div>
  `);
}

init();
IC.hideLoading();
</script>
</body>
</html>
