<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aurora - Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="shell aurora-page">
  <div class="topbar" data-topbar></div>

  <section class="panel aurora-hero mb-2">
    <div class="flex-between" style="align-items:flex-start;gap:16px;flex-wrap:wrap">
      <div>
        <span class="route-hint">共享内核的朋友型 Agent</span>
        <h1>Aurora</h1>
        <p class="muted">Aurora 会根据上下文决定说一条、两条或三条消息。不同模式不是换机器人，而是同一个朋友换一种陪伴方式。</p>
        <p id="aiStatus" class="muted" style="font-size:.84rem;margin-top:8px">正在检查真实 AI 状态...</p>
      </div>
      <div class="row gap-sm">
        <button onclick="rhythmCheck()">节律检查</button>
        <button onclick="finish()">沉淀今天</button>
      </div>
    </div>
    <div id="modes" class="segmented mt-2"></div>
    <p id="modeNote" class="mode-note"></p>
    <div id="loopState" class="soft-stage mt-2" style="display:none"></div>
    <div id="memoryLens" class="soft-stage mt-2" style="display:none">
      <div class="flex-between"><strong>记忆镜头</strong><span id="memoryPolicy" class="route-hint"></span></div>
      <div id="memoryChips" class="pill-row mt-1"></div>
      <p id="memoryContinuity" class="muted" style="font-size:.84rem"></p>
    </div>
  </section>

  <section class="panel aurora-chat-panel" style="padding-bottom:0">
    <div id="chat" class="chat" aria-live="polite" style="min-height:420px"></div>
    <p id="typing" class="muted" style="display:none;padding:8px 0">Aurora 正在想下一句话...</p>
  </section>

  <section class="panel aurora-composer" style="position:sticky;bottom:0;z-index:5;margin-top:12px">
    <div class="row" style="flex-wrap:nowrap">
      <input id="msg" placeholder="把现在最想说的一句话放在这里" onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>
    <p id="voiceState" class="muted" style="font-size:.82rem;margin-top:6px">语音日记请从“心声日记”进入，Aurora 会共享同一套长期记忆。</p>
  </section>

  <div id="settleOverlay" class="modal-overlay hidden">
    <div class="modal-box text-center">
      <div class="empty-star" style="margin:0 auto 16px"></div>
      <h2>正在沉淀今天</h2>
      <p class="muted">Aurora 会把这次对话整理成记忆、情绪线索和可能的下一步。</p>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("Aurora");

let sid = null;
let mode = "DAILY_TALK";
let messageCount = 0;

const modeCopy = {
  DAILY_TALK: { label: "今日倾诉", icon: "听", desc: "先像朋友一样接住当下，不急着分析。" },
  THOUGHT_CLARIFY: { label: "思维整理", icon: "理", desc: "把混乱内容拆成事实、感受、担心、需要和下一步。" },
  SLEEP_REVIEW: { label: "睡前复盘", icon: "夜", desc: "低声收束今天，让没完成的事先被放下。" },
  SOCRATIC: { label: "苏格拉底追问", icon: "问", desc: "温和追问一个关键假设，而不是直接给结论。" },
  ACTION_SPLIT: { label: "行动拆解", icon: "行", desc: "把压力拆成十分钟内能开始的第一步。" },
  RELATION_REVIEW: { label: "关系复盘", icon: "人", desc: "区分事实、感受、需要和边界。" }
};

function buildModes() {
  const container = document.getElementById("modes");
  container.innerHTML = Object.entries(modeCopy).map(([key, m]) =>
    `<button data-mode="${key}" class="${key === mode ? "active" : ""}"><span class="mode-icon">${m.icon}</span>${m.label}</button>`
  ).join("");
  document.getElementById("modeNote").textContent = modeCopy[mode].desc;
  container.querySelectorAll("button").forEach(btn => {
    btn.onclick = async () => {
      if (btn.dataset.mode === mode) return;
      mode = btn.dataset.mode;
      container.querySelectorAll("button").forEach(x => x.classList.remove("active"));
      btn.classList.add("active");
      document.getElementById("modeNote").textContent = modeCopy[mode].desc;
      await proactiveGreeting(false);
    };
  });
}

function addBubble(content, kind) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `bubble ${kind === "ai" ? "aurora" : "user"}`;
  div.innerHTML = kind === "ai"
    ? `<div class="row gap-sm" style="align-items:flex-start;margin-bottom:4px"><span style="font-size:1.1rem;color:var(--accent-sage)">✦</span><span class="muted" style="font-size:.78rem">Aurora</span></div><div>${IC.esc(content)}</div>`
    : IC.esc(content);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAurora(messages) {
  const parts = Array.isArray(messages) ? messages : [String(messages || "")];
  parts.filter(Boolean).slice(0, 3).forEach((part, index) => {
    setTimeout(() => addBubble(part, "ai"), index * 520);
  });
}

function renderAgentLoop(reply) {
  const box = document.getElementById("loopState");
  const loop = reply.agentLoop || {};
  const ai = reply.aiState || {};
  box.style.display = "block";
  box.innerHTML = `
    <div class="pill-row">
      <span class="pill">本轮 ${loop.speakCount || (reply.messages || []).length || 1} 条</span>
      <span class="pill">${IC.esc(loop.modeLabel || modeCopy[mode].label)}</span>
      <span class="pill">${IC.esc(ai.provider || "-")} / ${IC.esc(ai.model || "-")}</span>
      <span class="pill">${ai.fallbackAllowed ? "fallback 可用" : "真实模型优先"}</span>
    </div>
    <p class="muted" style="font-size:.84rem;margin-top:8px">${IC.esc(loop.continueReason || "")}</p>
    ${reply.featureSuggestion ? `<p class="gold" style="font-size:.86rem;margin-top:8px">${IC.esc(reply.featureSuggestion)}</p>` : ""}
  `;
}

function renderMemoryLens(context) {
  if (!context) return;
  const notes = [
    ...(context.longTermMemoryNotes || []).slice(0, 2),
    ...(context.activeThemeNotes || []).slice(0, 2),
    context.emotionWeather ? `情绪天气：${context.emotionWeather}` : ""
  ].filter(Boolean);
  if (!notes.length && !context.continuityHypothesis) return;
  document.getElementById("memoryPolicy").textContent = context.memoryPolicy || "memory context";
  document.getElementById("memoryChips").innerHTML = notes.map(note => `<span class="tag">${IC.esc(note).slice(0, 96)}</span>`).join("");
  document.getElementById("memoryContinuity").textContent = context.continuityHypothesis || "";
  document.getElementById("memoryLens").style.display = "block";
}

async function proactiveGreeting(save = true) {
  if (!sid) return;
  document.getElementById("typing").style.display = "block";
  const gr = await API.auroraGreeting({ sessionId: save ? sid : null, mode });
  document.getElementById("typing").style.display = "none";
  if (gr.success && gr.data) {
    addAurora(gr.data.messages || []);
    renderAgentLoop(gr.data);
    renderMemoryLens(gr.data.memoryContext);
  }
}

async function init() {
  await IC.ensureDemoLogin();
  buildModes();
  const r = await API.createSession({ title: "Aurora 对话", sessionType: "AURORA_CHAT" });
  if (r.success && r.data) sid = r.data.id;
  await loadAiStatus();
  await proactiveGreeting(true);
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text || !sid) return;
  addBubble(text, "user");
  input.value = "";
  messageCount++;
  document.getElementById("typing").style.display = "block";
  const r = await API.auroraMessageRich({ sessionId: sid, message: text, inputType: "TEXT", mode });
  document.getElementById("typing").style.display = "none";
  if (r.success && r.data) {
    addAurora(r.data.messages || []);
    renderAgentLoop(r.data);
    renderMemoryLens(r.data.memoryContext);
    if (r.data.suggestSettle) {
      IC.toast("Aurora 建议把今天先沉淀下来。", "warn");
    }
  } else {
    IC.toast(r.message || "Aurora 暂时没有回应", "warn");
  }
  if (messageCount % 4 === 0) rhythmCheck();
}

async function rhythmCheck() {
  const r = await API.auroraRhythmCheck();
  if (r.success && r.data && r.data.advice) IC.toast(r.data.advice, "warn");
}

async function finish() {
  if (!sid) return;
  document.getElementById("settleOverlay").classList.remove("hidden");
  await API.finishSession(sid);
  await API.auroraSettle(sid);
  setTimeout(() => location.href = "/pages/daily-record.html", 900);
}

async function loadAiStatus() {
  const r = await API.aiHealth();
  if (!r.success || !r.data) return;
  const h = r.data;
  const state = h.apiKeyConfigured ? "真实模型已配置" : "未配置真实模型密钥";
  const fallback = h.fallbackAllowed ? "fallback 开启" : "fallback 关闭";
  document.getElementById("aiStatus").textContent = `${h.provider || "-"} / ${h.model || "-"} · ${state} · ${fallback} · ASR ${h.asrProvider || "-"} / ${h.asrModel || "-"}`;
}

init();
</script>
</body>
</html>
