<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Aurora - Inner Cosmos</title>
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main id="main" class="shell aurora-page">
  <a class="skip-link" href="#main">跳到主要内容</a>
  <div class="topbar" data-topbar></div>

  <section class="panel aurora-hero mb-2">
    <div class="flex-between" style="align-items:flex-start;gap:16px;flex-wrap:wrap">
      <div>
        <span class="route-hint">共享内核的朋友型 Agent</span>
        <h1 id="page-title" data-aurora-name>Aurora</h1>
        <p class="muted">Aurora 会根据上下文决定说一条、两条或三条消息。不同模式不是换机器人，而是同一个朋友换一种陪伴方式。</p>
        <p id="aiStatus" class="muted" style="font-size:.84rem;margin-top:8px">正在检查真实 AI 状态...</p>
      </div>
      <div class="row gap-sm">
        <label class="model-picker">
          模型
          <select id="modelPicker" onchange="onModelChange()">
            <option value="">系统默认</option>
            <option value="MINIMAX">MiniMax M3</option>
            <option value="MIMO">MiMo v2.5</option>
            <option value="GLM">GLM-4 Flash</option>
            <option value="DEEPSEEK">DeepSeek v4 Flash</option>
            <option value="MOCK">Mock (本地)</option>
          </select>
        </label>
        <button onclick="rhythmCheck()">节律检查</button>
        <button onclick="finish()">沉淀今天</button>
        <button class="ghost" onclick="goodbye()">温柔告别</button>
      </div>
    </div>
    <div id="modes" class="segmented mt-2"></div>
    <p id="modeNote" class="mode-note"></p>
    <div id="loopState" class="soft-stage mt-2" style="display:none"></div>
    <div id="memoryLens" class="soft-stage mt-2" style="display:none">
      <div class="flex-between">
        <div><strong>记忆镜头</strong><span id="memoryPolicy" class="route-hint" style="margin-left:8px"></span></div>
        <button id="memoryToggle" class="ghost" onclick="toggleMemoryLens()" type="button">展开</button>
      </div>
      <div id="memoryLensBody" style="display:none">
        <div id="memoryChips" class="pill-row mt-1"></div>
        <p id="memoryContinuity" class="muted" style="font-size:.84rem"></p>
      </div>
    </div>
  </section>

  <section class="panel aurora-chat-panel" style="padding-bottom:0">
    <div id="chat" class="chat" aria-live="polite" style="min-height:420px"></div>
    <p id="typing" class="muted" style="display:none;padding:8px 0">Aurora 正在想下一句话...</p>
  </section>

  <section class="panel aurora-composer" style="position:sticky;bottom:0;z-index:5;margin-top:12px">
    <div class="row" style="flex-wrap:nowrap">
      <input id="msg" class="voice-input-target" data-voice-bound="true" placeholder="把现在最想说的一句话放在这里" onkeydown="if(event.key==='Enter')send()">
      <button class="voice-mini" onclick="IC.recordToField(document.getElementById('msg'), this)" title="语音输入">🎙</button>
      <button onclick="send()">发送</button>
    </div>
    <p id="voiceState" class="muted" style="font-size:.82rem;margin-top:6px">语音会尽量尊重原文转写，你可以继续手动修改后再发送。</p>
  </section>

  <div id="settleOverlay" class="modal-overlay hidden">
    <div class="modal-box text-center">
      <div class="empty-star" style="margin:0 auto 16px"></div>
      <h2>正在沉淀今天</h2>
      <p class="muted">Aurora 会把这次对话整理成记忆、情绪线索和可能的下一步。</p>
    </div>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/time-system.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/weather-system.js"></script>
<script src="/js/audio-system.js"></script>
<script src="/js/api.js"></script>
<script src="/js/ic-proactive-client.js"></script>
<script>
IC.mountShell("Aurora");

let sid = null;
let mode = "DAILY_TALK";
let messageCount = 0;
let auroraSending = false;

const modeCopy = {
  DAILY_TALK: { label: "今日倾诉", icon: "听", desc: "先像朋友一样接住当下，不急着分析。" },
  THOUGHT_CLARIFY: { label: "思维整理", icon: "理", desc: "把混乱内容拆成事实、感受、担心、需要和下一步。" },
  SOCRATIC: { label: "苏格拉底追问", icon: "问", desc: "温和追问一个关键假设，而不是直接给结论。" }
};

function buildModes() {
  const container = document.getElementById("modes");
  container.innerHTML = Object.entries(modeCopy).map(([key, m]) =>
    `<button data-mode="${key}" class="${key === mode ? "active" : ""}"><span class="mode-icon">${m.icon}</span>${m.label}</button>`
  ).join("");
  document.getElementById("modeNote").textContent = modeCopy[mode].desc;
  container.querySelectorAll("button").forEach(btn => {
    btn.onclick = async () => {
      if (btn.dataset.mode === mode) return;
      const newMode = btn.dataset.mode;
      try {
        const r = await API.auroraModeSwitch(sid, newMode);
        if (r.success) {
          mode = newMode;
          container.querySelectorAll("button").forEach(x => x.classList.remove("active"));
          btn.classList.add("active");
          document.getElementById("modeNote").textContent = modeCopy[mode].desc;
          document.getElementById("loopState").style.display = "none";
        } else {
          IC.toast(r.message || "切换模式失败，请稍后再试。", "warn");
        }
      } catch (e) {
        IC.toast("切换模式失败：" + e.message, "warn");
      }
    };
  });
}

function addBubble(content, kind) {
  const chat = document.getElementById("chat");
  const div = document.createElement("div");
  div.className = `bubble ${kind === "ai" ? "aurora" : "user"}`;
  div.innerHTML = kind === "ai"
    ? `<div class="row gap-sm" style="align-items:flex-start;margin-bottom:4px"><span style="font-size:1.1rem;color:var(--accent-sage)">✦</span><span class="muted" style="font-size:.78rem">Aurora</span></div><div>${IC.esc(content)}</div>`
    : IC.esc(content);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addAurora(messages) {
  const parts = Array.isArray(messages) ? messages : [String(messages || "")];
  parts.filter(Boolean).slice(0, 3).forEach((part, index) => {
    setTimeout(() => addBubble(part, "ai"), index * 520);
  });
}

function renderAgentLoop(reply) {
  const box = document.getElementById("loopState");
  const loop = reply.agentLoop || {};
  const ai = reply.aiState || {};
  box.style.display = "block";
  box.innerHTML = `
    <div class="pill-row">
      <span class="pill">本轮 ${loop.speakCount || (reply.messages || []).length || 1} 条</span>
      <span class="pill">${IC.esc(loop.modeLabel || modeCopy[mode].label)}</span>
      <span class="pill">${IC.esc(ai.provider || "-")} / ${IC.esc(ai.model || "-")}</span>
      <span class="pill">${ai.fallbackAllowed ? "fallback 可用" : "真实模型优先"}</span>
    </div>
    <p class="muted" style="font-size:.84rem;margin-top:8px">${IC.esc(loop.continueReason || "")}</p>
    ${reply.featureSuggestion ? `<p class="gold" style="font-size:.86rem;margin-top:8px">${IC.esc(reply.featureSuggestion)}</p>` : ""}
  `;
}

function renderMemoryLens(context) {
  if (!context) return;
  const notes = [
    ...(context.longTermMemoryNotes || []).slice(0, 2),
    ...(context.activeThemeNotes || []).slice(0, 2),
    context.emotionWeather ? `情绪天气：${context.emotionWeather}` : ""
  ].filter(Boolean);
  if (!notes.length && !context.continuityHypothesis) return;
  document.getElementById("memoryPolicy").textContent = context.memoryPolicy || "memory context";
  document.getElementById("memoryChips").innerHTML = notes.map(note => `<span class="tag">${IC.esc(note).slice(0, 96)}</span>`).join("");
  document.getElementById("memoryContinuity").textContent = context.continuityHypothesis || "";
  document.getElementById("memoryLens").style.display = "block";
}

function toggleMemoryLens() {
  const body = document.getElementById("memoryLensBody");
  const btn = document.getElementById("memoryToggle");
  const open = body.style.display === "none";
  body.style.display = open ? "block" : "none";
  btn.textContent = open ? "收起" : "展开";
}

async function proactiveGreeting(save = true) {
  if (!sid) return;
  const onceKey = `aurora_greeting_${sid}`;
  if (save && sessionStorage.getItem(onceKey) === "done") return;
  document.getElementById("typing").style.display = "block";
  const gr = await API.auroraGreeting({ sessionId: save ? sid : null, mode });
  document.getElementById("typing").style.display = "none";
  if (gr.success && gr.data) {
    addAurora(gr.data.messages || []);
    renderAgentLoop(gr.data);
    renderMemoryLens(gr.data.memoryContext);
    if (save) sessionStorage.setItem(onceKey, "done");
  }
}

async function init() {
  await IC.ensureDemoLogin();
  buildModes();
  const params = new URLSearchParams(location.search);
  sid = params.get("sessionId");
  if (!sid) {
    const r = await API.createSession({ title: "Aurora 对话", sessionType: "AURORA_CHAT" });
    if (r.success && r.data) {
      sid = r.data.id;
      history.replaceState(null, "", `${location.pathname}?sessionId=${sid}`);
    }
  }
  const restored = await loadHistory();
  await loadAiStatus();
  if (!restored) await proactiveGreeting(true);
}

async function loadHistory() {
  if (!sid) return false;
  const r = await API.sessionMessages(sid);
  if (!r.success || !Array.isArray(r.data) || !r.data.length) return false;
  r.data.forEach(m => addBubble(m.textContent || "", m.speaker === "AURORA" ? "ai" : "user"));
  return true;
}

async function send() {
  const input = document.getElementById("msg");
  const typing = document.getElementById("typing");
  const text = input.value.trim();
  if (!text || !sid) return;
  if (auroraSending) {
    IC.toast("Aurora 还在整理上一句话，请稍等一下。", "warn");
    return;
  }
  auroraSending = true;
  addBubble(text, "user");
  input.value = "";
  messageCount++;
  typing.style.display = "block";

  try {
    const weather = window.ICWeather?.getWeatherState ? window.ICWeather.getWeatherState() : {};
    const localNow = new Date();
    // Prefer the city-level label resolved by GeocodingService / Nominatim
    // (cached in localStorage by ICTimeSystem). Fall back to the weather
    // widget's coarse label or a literal "未知".
    const cityLabel = window.ICLocation?.getCityLabel
        ? window.ICLocation.getCityLabel()
        : (localStorage.getItem("ic_location_label") || "");
    const latLon = window.ICLocation?.getLatLon ? window.ICLocation.getLatLon() : null;
    const body = {
      sessionId: sid,
      message: text,
      inputType: "TEXT",
      mode,
      timezone: Intl.DateTimeFormat().resolvedOptions().timeZone || "",
      localTimeLabel: localNow.toLocaleString("zh-CN"),
      weatherType: weather.type || "",
      weatherDescription: weather.description || "",
      temperature: weather.temperature ?? null,
      locationLabel: cityLabel || weather.locationLabel || "",
      latitude: latLon ? latLon.lat : null,
      longitude: latLon ? latLon.lon : null,
      aiProviderPreference: localStorage.getItem("ic_ai_provider_preference") || ""
    };
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);
    const res = await fetch("/api/aurora/message-rich", {
      method: "POST",
      credentials: "include",
      headers: { "Content-Type": "application/json; charset=utf-8" },
      body: JSON.stringify(body),
      signal: controller.signal
    });
    clearTimeout(timeout);
    const r = await res.json();
    if (r.success && r.data) {
      addAurora(r.data.messages || []);
      renderAgentLoop(r.data);
      renderMemoryLens(r.data.memoryContext);
      if (r.data.suggestSettle) IC.toast("Aurora 建议先把今天沉淀下来。", "warn");
    } else {
      IC.toast(r.message || "Aurora 暂时没有回应", "warn");
    }
  } catch (error) {
    IC.toast(error.name === "AbortError" ? "这次回应超时了，可以重新发一次。" : "Aurora 连接暂时不稳定。", "warn");
  } finally {
    typing.style.display = "none";
    auroraSending = false;
  }
  if (messageCount % 4 === 0) rhythmCheck();
}
async function rhythmCheck() {
  const r = await API.auroraRhythmCheck();
  if (r.success && r.data && r.data.advice) IC.toast(r.data.advice, "warn");
}

async function finish() {
  if (!sid) return;
  document.getElementById("settleOverlay").classList.remove("hidden");
  await API.finishSession(sid);
  await API.auroraSettle(sid);
  setTimeout(() => location.href = "/pages/daily-record.html", 900);
}

async function goodbye() {
  if (!sid) return;
  if (!confirm("确定要结束这次对话吗？")) return;
  try {
    const r = await API.goodbye({ sessionId: sid, trigger: "BUTTON" });
    if (r.success && r.data && r.data.line) {
      addBubble(r.data.line, "ai");
      // After goodbye, redirect to daily record after a short delay
      setTimeout(() => {
        if (confirm("Aurora 已经道别。要去沉淀今天的记录吗？")) {
          location.href = "/pages/daily-record.html";
        }
      }, 1500);
    } else {
      IC.toast("结束对话失败，请稍后再试。", "warn");
    }
  } catch (error) {
    IC.toast("连接暂时不稳定，请稍后再试。", "warn");
  }
}

async function loadAiStatus() {
  const r = await API.aiHealth();
  if (!r.success || !r.data) return;
  const h = r.data;
  const state = h.apiKeyConfigured ? "真实模型已配置" : "未配置真实模型密钥";
  const fallback = h.fallbackAllowed ? "fallback 开启" : "fallback 关闭";
  document.getElementById("aiStatus").textContent = `${h.provider || "-"} / ${h.model || "-"} · ${state} · ${fallback} · ASR ${h.asrProvider || "-"} / ${h.asrModel || "-"}`;
}

async function onModelChange() {
  const picker = document.getElementById("modelPicker");
  if (!picker) return;
  const provider = picker.value;
  const r = await API.setPreferredModel({ provider: provider || null });
  if (!r || !r.success) {
    IC.toast("切换模型失败，请稍后再试。", "warn");
    return;
  }
  if (window.sid) await API.setSessionModel(sid, provider);
  IC.toast(provider ? "已切换到 " + provider : "已切回系统默认", "success");
}

// Handle proactive Aurora messages (greetings, mode acknowledgements, etc.)
function addAuroraProactive(data) {
  if (data.type === "MODE_ACK") {
    // Mode transition acknowledgement — show as system notification + optional bubble
    IC.toast("陪伴模式已切换：" + (modeCopy[mode]?.label || mode), "success");
  }
  addBubble(data.content, "ai");
}

window.addEventListener("aurora-proactive", function(e) {
  addAuroraProactive(e.detail);
});

init();
// Start proactive SSE connection if available
if (window.ICProactive) ICProactive.start();
IC.hideLoading();
</script>
</body>
</html>
