<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
</head>
<body>
<main class="shell">
  <div class="topbar" data-topbar></div>

  <div class="flex-between mb-2" style="flex-wrap:wrap;gap:12px">
    <div>
      <span class="route-hint">我被整理清楚了</span>
      <h1>今日记录卡</h1>
      <p class="muted">它不是诊断，也不是给你贴标签。它只是在帮你把今天摊平。</p>
    </div>
    <div class="row gap-sm">
      <button id="acceptBtn" onclick="acceptRecord()">接受并保存</button>
      <a class="button" href="/pages/memory-starfield.html">查看星图</a>
    </div>
  </div>

  <!-- Previous records nav -->
  <div class="row gap-sm mb-2">
    <button onclick="prevRecord()" id="prevBtn" disabled>前一天</button>
    <span id="recordDate" class="muted" style="font-size:.88rem">今天</span>
    <button onclick="nextRecord()" id="nextBtn" disabled>后一天</button>
  </div>

  <!-- Weather + Theme -->
  <section class="grid mb-2">
    <article class="panel">
      <div class="flex-between">
        <div>
          <h2>今日主题</h2>
          <p id="theme" style="font-size:1.1rem;color:var(--ink)"></p>
        </div>
        <div class="row gap-sm" style="align-items:center">
          <button onclick="editSection('theme')" class="muted" style="font-size:.82rem">编辑</button>
          <span id="weatherIcon" class="weather-icon"></span>
        </div>
      </div>
      <p id="summary" class="gold mt-1"></p>
    </article>
    <article class="panel">
      <h2>情绪天气</h2>
      <div id="emotions" class="timeline"></div>
    </article>
  </section>

  <!-- Event Summary -->
  <section class="panel mb-2">
    <div class="flex-between mb-1">
      <h2>事件概览</h2>
      <button onclick="editSection('event')" class="muted" style="font-size:.82rem">编辑</button>
    </div>
    <p id="eventSummary" class="muted"></p>
  </section>

  <!-- Cognitive Fragments -->
  <section class="panel mb-2">
    <h2>认知碎片</h2>
    <p class="muted mb-1">每一段想法都被温柔地拆解了。</p>
    <div id="fragments" class="grid"></div>
  </section>

  <!-- Relation Clues + Todo Clues -->
  <section class="grid mb-2">
    <article class="panel">
      <h2>关系线索</h2>
      <div id="relations" class="timeline"></div>
    </article>
    <article class="panel">
      <h2>待办线索</h2>
      <div id="todos" class="timeline"></div>
      <a class="button mt-1" href="/pages/todo.html">管理待办</a>
    </article>
  </section>

  <!-- Aurora Summary -->
  <section class="panel mb-2">
    <h2>Aurora 观察记录</h2>
    <p id="auroraNote" class="muted" style="line-height:1.8"></p>
  </section>

  <!-- Actions -->
  <div class="row gap-sm">
    <a class="button" href="/pages/capsule-create.html">编织共鸣体预览</a>
    <a class="button" href="/pages/memory-starfield.html">在星图中查看</a>
    <a class="button" href="/pages/aurora-chat.html">继续对话</a>
  </div>
</main>

<script src="/js/app.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("今日记录卡");

let records = [];
let recordIndex = 0;
let currentRecordId = null;

IC.ensureDemoLogin().then(async () => {
  await loadRecords();
  await loadCurrent();
});

async function loadRecords() {
  const r = await API.dailyRecords();
  if (r.success) records = r.data || [];
}

async function loadCurrent() {
  const r = await API.latestDailyRecord();
  if (r.success && r.data) {
    renderRecord(r.data);
  } else {
    document.getElementById("theme").textContent = "今天还没有记录";
    document.getElementById("summary").textContent = "和 Aurora 聊一次天后，这里会出现你的今日记录。";
    document.getElementById("weatherIcon").textContent = "☁️";
  }
}

function esc(text) { return IC.esc(text); }

function weatherIcon(type) {
  return IC.weatherIcon(type);
}

function renderRecord(d) {
  currentRecordId = d.id;
  document.getElementById("theme").textContent = d.theme || "未命名主题";
  document.getElementById("summary").textContent = d.auroraSummary || "";
  document.getElementById("eventSummary").textContent = d.eventSummary || (d.mainMemory ? d.mainMemory.summary : "今天的事件已被整理。");
  document.getElementById("auroraNote").textContent = d.auroraSummary || "Aurora 正在观察你的成长轨迹。";

  /* Weather icon from emotions */
  const emo = d.emotions || [];
  if (emo.length) {
    document.getElementById("weatherIcon").textContent = weatherIcon(emo[0].weatherType);
  } else {
    document.getElementById("weatherIcon").textContent = "☁️";
  }

  /* Emotions timeline */
  document.getElementById("emotions").innerHTML = emo.map(e =>
    `<div class="timeline-item"><strong>${weatherIcon(e.weatherType)} ${esc(e.emotionName || e.weatherType)}</strong><p>强度 ${e.emotionScore || 0}，触发：${esc(e.triggerScene || "未记录")}</p></div>`
  ).join("") || IC.empty("还没有情绪轨迹。");

  /* Fragments */
  document.getElementById("fragments").innerHTML = (d.fragments || []).map(f => {
    const iconMap = { COGNITION: "🧩", EMOTION: "💭", RELATION: "🤝", ACTION: "📋" };
    const icon = iconMap[f.fragmentType] || "✦";
    return `<article class="card"><strong>${icon} ${esc(f.fragmentType || "碎片")}</strong><p>${esc(f.rawExcerpt || "")}</p>${f.reframeText ? `<p class="gold">${esc(f.reframeText)}</p>` : ""}</article>`;
  }).join("") || IC.empty("对话结束后会出现认知碎片。");

  /* Relations */
  document.getElementById("relations").innerHTML = (d.relations || []).map(r =>
    `<div class="timeline-item"><strong>${esc(r.relationTarget || r.clue || "关系线索")}</strong><p>${esc(r.description || "")}</p></div>`
  ).join("") || IC.empty("今天没有特别的关系线索。");

  /* Todos */
  document.getElementById("todos").innerHTML = (d.todos || []).map(t =>
    `<div class="timeline-item"><strong>${esc(t.taskName)}</strong><p>${esc(t.description || "")}</p></div>`
  ).join("") || IC.empty("今天没有强行生成待办。");

  IC.stagger(document);
}

async function acceptRecord() {
  if (!currentRecordId) { IC.toast("没有可保存的记录", "warn"); return; }
  await API.acceptDailyRecord(currentRecordId);
  IC.toast("记录已接受并保存", "success");
  IC.pulse("settle");
}

function editSection(section) {
  const themeEl = document.getElementById("theme");
  const eventEl = document.getElementById("eventSummary");

  if (section === "event") {
    const current = eventEl.textContent;
    eventEl.outerHTML = `<div class="field-group" id="eventEditWrap">
      <input type="text" id="eventEditInput" value="${IC.esc(current)}" style="width:100%">
      <div class="row gap-sm mt-1">
        <button onclick="saveEdit('event')">保存</button>
        <button onclick="cancelEdit('event','${IC.esc(current)}')">取消</button>
      </div>
    </div>`;
  } else if (section === "theme") {
    const current = themeEl.textContent;
    themeEl.outerHTML = `<div class="field-group" id="themeEditWrap">
      <input type="text" id="themeEditInput" value="${IC.esc(current)}" style="width:100%">
      <div class="row gap-sm mt-1">
        <button onclick="saveEdit('theme')">保存</button>
        <button onclick="cancelEdit('theme','${IC.esc(current)}')">取消</button>
      </div>
    </div>`;
  }
}

async function saveEdit(field) {
  if (!currentRecordId) { IC.toast("没有可编辑的记录", "warn"); return; }
  let value = "";

  if (field === "event") {
    const input = document.getElementById("eventEditInput");
    value = input ? input.value : "";
  } else if (field === "theme") {
    const input = document.getElementById("themeEditInput");
    value = input ? input.value : "";
  }

  const body = {};
  if (field === "theme") body.theme = value;
  if (field === "event") body.cognitiveSummary = value;

  await IC.api("/api/daily-record/" + currentRecordId + "/edit", {
    method: "POST",
    body: JSON.stringify(body)
  });
  IC.toast("已保存", "success");
  IC.pulse("settle");
  loadCurrent();
}

function cancelEdit(field, original) {
  if (field === "event") {
    const wrap = document.getElementById("eventEditWrap");
    if (wrap) wrap.outerHTML = `<p id="eventSummary" class="muted">${IC.esc(original)}</p>`;
  } else if (field === "theme") {
    const wrap = document.getElementById("themeEditWrap");
    if (wrap) wrap.outerHTML = `<p id="theme" style="font-size:1.1rem;color:var(--ink)">${IC.esc(original)}</p>`;
  }
}

function prevRecord() {
  if (recordIndex < records.length - 1) {
    recordIndex++;
    renderRecord(records[recordIndex]);
    document.getElementById("nextBtn").disabled = (recordIndex === 0);
    document.getElementById("prevBtn").disabled = (recordIndex >= records.length - 1);
  }
}

function nextRecord() {
  if (recordIndex > 0) {
    recordIndex--;
    renderRecord(records[recordIndex]);
    document.getElementById("nextBtn").disabled = (recordIndex === 0);
    document.getElementById("prevBtn").disabled = (recordIndex >= records.length - 1);
  }
}
</script>
</body>
</html>
