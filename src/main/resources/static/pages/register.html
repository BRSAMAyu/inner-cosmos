<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><link rel="stylesheet" href="/css/app.css"></head><body><main class="shell"><div class="topbar" data-topbar></div><section class="panel"><h2>注册</h2><div class="form"><input id="username" placeholder="用户名"><input id="nickname" placeholder="昵称"><input id="password" type="password" placeholder="密码"><button onclick="reg()">创建账号</button><p id="out" class="muted"></p></div></section></main><script src="/js/app.js"></script><script>IC.mountShell("注册");async function reg(){const r=await IC.api('/api/auth/register',{method:'POST',body:JSON.stringify({username:username.value,nickname:nickname.value,password:password.value})});out.textContent=r.message;if(r.success) location.href='/pages/dashboard.html';}</script></body></html>
