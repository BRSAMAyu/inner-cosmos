<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="/css/app.css">
  <title>待办清单 - Inner Cosmos</title>
</head>
<body>
<main class="shell">
  <div class="topbar" data-topbar></div>

  <span class="route-hint">下一步变小</span>
  <h1>待办清单</h1>
  <p class="muted mb-2">待办不是自我审判，而是把下一步变小。</p>

  <!-- Today's progress -->
  <section class="panel mb-2">
    <div class="flex-between mb-1">
      <h2>今日进度</h2>
      <span id="progressLabel" class="muted" style="font-size:.88rem">0 / 0 完成</span>
    </div>
    <div class="progress-bar">
      <div id="todoProgress" class="progress-bar-fill" style="width:0%"></div>
    </div>
    <p class="muted mt-1" style="font-size:.82rem">这不是判断，只是下一步。做不完也没关系。</p>
  </section>

  <!-- Create new todo -->
  <section class="panel mb-2">
    <h2>新建待办</h2>
    <form id="createForm" onsubmit="createTodo(event)" class="form" style="max-width: 100%; margin-top: 10px;">
      <div class="row gap-md" style="align-items: flex-end;">
        <div style="flex: 2; min-width: 250px;">
          <input type="text" id="new_taskName" placeholder="你想轻轻推进什么事？" required>
        </div>
        <div style="flex: 1; min-width: 120px;">
          <select id="new_priority">
            <option value="HIGH">优先</option>
            <option value="MEDIUM" selected>中等</option>
            <option value="LOW">不急</option>
          </select>
        </div>
        <div style="flex: 1.5; min-width: 180px;">
          <input type="datetime-local" id="new_deadline">
        </div>
      </div>
      <div style="margin-top: 10px;">
        <textarea id="new_description" placeholder="任务备注（可选，建议拆到十分钟内能开始）" style="min-height: 50px; padding: 8px 10px;"></textarea>
      </div>
      <div class="row mt-1">
        <button type="submit">添加待办</button>
      </div>
    </form>
  </section>

  <!-- Tab bar -->
  <div class="tab-bar mb-2">
    <button class="active" onclick="switchTab('today', this)">今天</button>
    <button onclick="switchTab('week', this)">本周</button>
    <button onclick="switchTab('done', this)">已完成</button>
    <button onclick="switchTab('letgo', this)">已放下</button>
  </div>

  <!-- Todo list -->
  <section id="todoList" class="grid"></section>
</main>

<script src="/js/app.js"></script>
<script src="/js/motion.js"></script>
<script src="/js/api.js"></script>
<script>
IC.mountShell("待办清单");
IC.ensureDemoLogin().then(load);

let todos = [];
let currentTab = "today";

function esc(text) { return IC.esc(text); }

async function load() {
  const r = await API.todoList();
  if (r.success) todos = r.data || [];
  renderTab();
}

function switchTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll(".tab-bar button").forEach(btn => btn.classList.remove("active"));
  if (el) el.classList.add("active");
  renderTab();
}

function renderTab() {
  let filtered = [];
  switch (currentTab) {
    case "today": filtered = todos.filter(t => t.status === "TODO" || t.status === "DOING"); break;
    case "week": filtered = todos.filter(t => t.status === "TODO" || t.status === "DOING"); break;
    case "done": filtered = todos.filter(t => t.status === "DONE"); break;
    case "letgo": filtered = todos.filter(t => t.status === "CANCELLED"); break;
  }

  /* Progress */
  const doneCount = todos.filter(t => t.status === "DONE").length;
  const totalCount = todos.length;
  document.getElementById("todoProgress").style.width = totalCount ? Math.round(doneCount / totalCount * 100) + "%" : "0%";
  document.getElementById("progressLabel").textContent = `${doneCount} / ${totalCount} 完成`;

  const list = document.getElementById("todoList");
  if (!filtered.length) {
    const emptyMsgs = {
      today: "今天没有待办。可以先休息。",
      week: "本周没有待办。",
      done: "还没有完成的事项。",
      letgo: "没有放下的事项。"
    };
    list.innerHTML = IC.empty(emptyMsgs[currentTab]);
    return;
  }

  const priorityColors = { HIGH: "badge-new", MEDIUM: "badge-read", LOW: "badge-declined" };
  const priorityLabels = { HIGH: "优先", MEDIUM: "中等", LOW: "不急" };

  list.innerHTML = filtered.map(t => `
    <article class="card">
      <div class="flex-between mb-1">
        <strong>${esc(t.taskName)}</strong>
        <span class="badge ${priorityColors[t.priority] || 'badge-read'}">${priorityLabels[t.priority] || t.priority || "中等"}</span>
      </div>
      <p class="muted">${esc(t.description || "")}</p>
      ${t.deadline ? `<p class="muted mt-1" style="font-size:.82rem">截止：${IC.formatTime(t.deadline)}</p>` : ""}
      ${t.sourceMemoryCardId ? `<a class="route-hint mt-1" href="/pages/memory-starfield.html">来源记忆</a>` : ""}
      <div class="row gap-sm mt-2">
        ${currentTab === "today" || currentTab === "week" ? `
          <button onclick="updateStatus(${t.id},'DOING')">开始</button>
          <button onclick="updateStatus(${t.id},'DONE')">完成</button>
          <button onclick="updateStatus(${t.id},'CANCELLED')">放下</button>
          <button onclick="editTodo(${t.id})">修改</button>
        ` : ""}
        ${currentTab === "done" ? `
          <button onclick="updateStatus(${t.id},'TODO')">重新打开</button>
          <button onclick="editTodo(${t.id})">修改</button>
        ` : ""}
        ${currentTab === "letgo" ? `
          <button onclick="updateStatus(${t.id},'TODO')">重新拾起</button>
          <button onclick="deleteTodo(${t.id})">彻底删除</button>
        ` : ""}
      </div>
    </article>
  `).join("");
  IC.stagger(list);
}

async function createTodo(event) {
  event.preventDefault();
  const taskName = document.getElementById("new_taskName").value.trim();
  const priority = document.getElementById("new_priority").value;
  const deadlineValue = document.getElementById("new_deadline").value;
  const description = document.getElementById("new_description").value.trim();
  
  const data = {
    taskName,
    priority,
    deadline: deadlineValue ? new Date(deadlineValue).toISOString() : null,
    description
  };
  
  const r = await API.todoCreate(data);
  if (r.success) {
    IC.toast("待办已添加", "success");
    document.getElementById("createForm").reset();
    load();
  }
}

function editTodo(id) {
  const t = todos.find(x => x.id === id);
  if (!t) return;
  const deadlineStr = t.deadline ? t.deadline.substring(0, 16) : "";
  IC.showModal(`
    <h2 class="mb-2">修改待办</h2>
    <form onsubmit="saveTodo(event, ${t.id})" class="form" style="margin-top: 10px;">
      <div class="field-group mb-1">
        <label style="font-size:.88rem;" class="muted">任务名称</label>
        <input type="text" id="edit_taskName" value="${esc(t.taskName)}" required>
      </div>
      <div class="field-group mb-1">
        <label style="font-size:.88rem;" class="muted">优先级</label>
        <select id="edit_priority">
          <option value="HIGH" ${t.priority === 'HIGH' ? 'selected' : ''}>优先</option>
          <option value="MEDIUM" ${t.priority === 'MEDIUM' ? 'selected' : ''}>中等</option>
          <option value="LOW" ${t.priority === 'LOW' ? 'selected' : ''}>不急</option>
        </select>
      </div>
      <div class="field-group mb-1">
        <label style="font-size:.88rem;" class="muted">截止时间</label>
        <input type="datetime-local" id="edit_deadline" value="${deadlineStr}">
      </div>
      <div class="field-group mb-2">
        <label style="font-size:.88rem;" class="muted">备注描述</label>
        <textarea id="edit_description" style="min-height:70px; padding: 8px 10px;">${esc(t.description || "")}</textarea>
      </div>
      <div class="row gap-md">
        <button type="submit">保存修改</button>
        <button type="button" class="muted" onclick="IC.closeModal()">取消</button>
      </div>
    </form>
  `);
}

async function saveTodo(event, id) {
  event.preventDefault();
  const taskName = document.getElementById("edit_taskName").value.trim();
  const priority = document.getElementById("edit_priority").value;
  const deadlineValue = document.getElementById("edit_deadline").value;
  const description = document.getElementById("edit_description").value.trim();
  
  const data = {
    taskName,
    priority,
    deadline: deadlineValue ? new Date(deadlineValue).toISOString() : null,
    description
  };
  
  const r = await API.todoUpdate(id, data);
  if (r.success) {
    IC.toast("修改成功", "success");
    IC.closeModal();
    load();
  }
}

async function updateStatus(id, status) {
  await API.todoStatus(id, status);
  const labels = { DOING: "已开始", DONE: "已完成", CANCELLED: "已放下", TODO: "已重新打开" };
  IC.toast(labels[status] || "状态已更新", "success");
  IC.pulse("soft");
  load();
}

async function deleteTodo(id) {
  await API.todoDelete(id);
  IC.toast("已删除", "success");
  load();
}
</script>
</body>
</html>
