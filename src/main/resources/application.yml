server:
  port: 8080

spring:
  application:
    name: inner-cosmos
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:innercosmos;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: false # Enable for development only
      path: /h2-console
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

llm:
  mode: ${LLM_MODE:prod}
  provider: ${LLM_PROVIDER:minimax}
  api-key: ${LLM_API_KEY:REMOVED_FROM_HISTORY}
  base-url: ${LLM_BASE_URL:}
  model: ${LLM_MODEL:MiniMax-M2.7}
  allow-fallback: ${LLM_ALLOW_FALLBACK:false}
  asr-provider: ${ASR_PROVIDER:mimo}
  prompt:
    language: ${LLM_PROMPT_LANGUAGE:zh-CN}  # zh-CN for Chinese, en-US for English
  mimo:
    api-key: ${MIMO_API_KEY:tp-cgqfqmlacq35o53s29s6ce5r6qn57cdw717s1n7fi4up27ds}
    asr-model: ${MIMO_ASR_MODEL:mimo-v2.5-asr}
    asr-base-url: ${MIMO_ASR_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    asr-language: ${MIMO_ASR_LANGUAGE:auto}
    timeout-ms: ${MIMO_TIMEOUT_MS:30000}
  glm:
    api-key: ${GLM_API_KEY:}
    model: ${GLM_MODEL:glm-4-flash}
    base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
    timeout-ms: ${GLM_TIMEOUT_MS:20000}
    asr-api-key: ${GLM_ASR_API_KEY:}
    asr-model: ${GLM_ASR_MODEL:glm-asr-2512}
    asr-base-url: ${GLM_ASR_BASE_URL:https://open.bigmodel.cn/api/paas/v4/audio/transcriptions}
  minimax:
    api-key: ${MINIMAX_API_KEY:${LLM_API_KEY:REMOVED_FROM_HISTORY}}
    model: ${MINIMAX_MODEL:MiniMax-M2.7}
    base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com/v1/chat/completions}
    timeout-ms: ${MINIMAX_TIMEOUT_MS:30000}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    timeout-ms: ${DEEPSEEK_TIMEOUT_MS:30000}

inner-cosmos:
  demo:
    seed-enabled: true
  security:
    session-user-key: LOGIN_USER_ID
