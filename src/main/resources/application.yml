server:
  port: 8080

spring:
  application:
    name: inner-cosmos
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:innercosmos;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: false # Enable for development only
      path: /h2-console
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

llm:
  mode: remote
  provider: minimax
  api-key: ""
  base-url: ""
  model: mock-inner-cosmos
  glm:
    api-key: ""
    model: "glm-4-flash"
    base-url: "https://open.bigmodel.cn/api/paas/v4/chat/completions"
    timeout-ms: 20000
    asr-api-key: ""
  minimax:
    api-key: "REMOVED_FROM_HISTORY"
    model: "MiniMax-M2.5-highspeed"
    base-url: "https://api.minimaxi.com/v1/chat/completions"
    timeout-ms: 30000

inner-cosmos:
  demo:
    seed-enabled: true
  security:
    session-user-key: LOGIN_USER_ID
