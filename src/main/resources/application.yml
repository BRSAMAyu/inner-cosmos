# Inner Cosmos default configuration: local development is intentionally offline-safe.
server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  servlet:
    session:
      cookie:
        http-only: true
        # A demo APK's WebView origin (https://localhost, see web/capacitor.config.json) is
        # cross-site relative to a tunneled backend origin, so its session cookie needs
        # SameSite=None (which requires Secure=true) to survive that cross-origin fetch --
        # same-site: lax silently drops it. Override both via env for that scenario only;
        # same-site: lax + secure: false remain the safe defaults for plain local dev.
        same-site: ${COOKIE_SAME_SITE:lax}
        secure: ${COOKIE_SECURE:false}
  tomcat:
    threads:
      max: 200
      min-spare: 10
    connection-timeout: 15000

spring:
  application:
    name: inner-cosmos
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:file:./data/innercosmos;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_RECONNECT=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 15000
      leak-detection-threshold: 60000
  sql:
    init:
      mode: ${SQL_INIT_MODE:always}
      encoding: UTF-8
  flyway:
    enabled: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      connect-timeout: ${REDIS_CONNECT_TIMEOUT:2s}
      timeout: ${REDIS_READ_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  h2:
    console:
      enabled: false
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
  task:
    execution:
      pool:
        core-size: 4
        max-size: 20
        queue-capacity: 100
      thread-name-prefix: async-
    shutdown:
      await-termination: true
      await-termination-period: 30s

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus,info
      base-path: /actuator
  endpoint:
    health:
      show-details: when_authorized
      show-components: when_authorized
      # Spring Boot's "when_authorized" is satisfied by ANY authenticated principal unless a
      # roles list is set here -- and registration is public/unauthenticated, so without this,
      # anyone who self-registers in seconds unlocks full health details (DB status/errors, JVM
      # memory) at the permitAll /actuator/health endpoint (2026-07-24 8-agent audit P2-16).
      roles: ADMIN
      # Kubernetes liveness must only ever reflect "is this JVM's own event loop still
      # alive", never a transient PostgreSQL/Redis/AI-provider outage — otherwise a
      # dependency blip triggers a liveness-driven restart storm across every replica
      # at once (the opposite of what a restart is for). Readiness is where dependency
      # health belongs: it only pulls the pod out of Service/HPA traffic, non-destructively.
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis,custom
  health:
    db:
      enabled: true
    diskspace:
      enabled: true
    # management.health.redis.enabled is left at its Spring Boot default (true) here;
    # deployments without Redis (e.g. kind-dev's H2+Mock profile) turn it off via the
    # MANAGEMENT_HEALTH_REDIS_ENABLED=false env var already wired into that overlay.

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

memory:
  embedding:
    enabled: ${MEMORY_EMBEDDING_ENABLED:false}
    api-key: ${MEMORY_EMBEDDING_API_KEY:}
    # Real, empirically-confirmed W1 default: Aliyun DashScope's OpenAI-compatible endpoint,
    # text-embedding-v4 at 1536 dimensions -- matches tb_memory_embedding.embedding_vector's
    # fixed vector(1536) column exactly (see MemoryEmbeddingConfig javadoc). Any OpenAI-compatible
    # provider still works by overriding these three env vars.
    base-url: ${MEMORY_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${MEMORY_EMBEDDING_MODEL:text-embedding-v4}
    version: ${MEMORY_EMBEDDING_VERSION:2026-01}
    dimensions: ${MEMORY_EMBEDDING_DIMENSIONS:1536}
    rebuild-batch-size: ${MEMORY_EMBEDDING_REBUILD_BATCH_SIZE:50}
    rebuild-delay-ms: ${MEMORY_EMBEDDING_REBUILD_DELAY_MS:60000}

capsule:
  embedding:
    rebuild-batch-size: ${CAPSULE_EMBEDDING_REBUILD_BATCH_SIZE:50}
    rebuild-delay-ms: ${CAPSULE_EMBEDDING_REBUILD_DELAY_MS:60000}

tts:
  enabled: ${TTS_ENABLED:false}
  api-key: ${TTS_API_KEY:}
  ws-url: ${TTS_WS_URL:wss://dashscope.aliyuncs.com/api-ws/v1/inference}
  timeout-ms: ${TTS_TIMEOUT_MS:8000}

llm:
  mode: ${LLM_MODE:dev}
  provider: ${LLM_PROVIDER:mock}
  api-key: ${LLM_API_KEY:}
  base-url: ${LLM_BASE_URL:}
  model: ${LLM_MODEL:mock-inner-cosmos}
  allow-fallback: ${LLM_ALLOW_FALLBACK:true}
  disable-thinking-mode: ${LLM_DISABLE_THINKING_MODE:true}
  asr-provider: ${ASR_PROVIDER:mock}
  failover-providers: ${LLM_FAILOVER_PROVIDERS:glm,minimax}
  prompt:
    language: ${LLM_PROMPT_LANGUAGE:zh-CN}
  mimo:
    api-key: ${MIMO_API_KEY:}
    model: ${MIMO_MODEL:mimo-v2.5}
    base-url: ${MIMO_BASE_URL:https://api.xiaomimimo.com/v1/chat/completions}
    asr-model: ${MIMO_ASR_MODEL:mimo-v2.5-asr}
    asr-base-url: ${MIMO_ASR_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
    asr-language: ${MIMO_ASR_LANGUAGE:auto}
    timeout-ms: ${MIMO_TIMEOUT_MS:30000}
  glm:
    api-key: ${GLM_API_KEY:}
    model: ${GLM_MODEL:glm-4.7}
    model-high: ${GLM_MODEL_HIGH:glm-5.2}
    base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4/chat/completions}
    timeout-ms: ${GLM_TIMEOUT_MS:60000}
    asr-api-key: ${GLM_ASR_API_KEY:}
    asr-model: ${GLM_ASR_MODEL:glm-asr-2512}
    asr-base-url: ${GLM_ASR_BASE_URL:https://open.bigmodel.cn/api/paas/v4/audio/transcriptions}
  minimax:
    api-key: ${MINIMAX_API_KEY:}
    model: ${MINIMAX_MODEL:MiniMax-M3}
    base-url: ${MINIMAX_BASE_URL:https://api.minimaxi.com/v1/chat/completions}
    timeout-ms: ${MINIMAX_TIMEOUT_MS:60000}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    timeout-ms: ${DEEPSEEK_TIMEOUT_MS:30000}

inner-cosmos:
  aurora:
    stream:
      redis:
        enabled: ${REDIS_AURORA_STREAM_ENABLED:false}
      stage-namespace: ${REDIS_AURORA_STAGE_NAMESPACE:inner-cosmos:aurora:stage:v1}
      live-namespace: ${REDIS_AURORA_LIVE_NAMESPACE:inner-cosmos:aurora:live:v1}
      stage-ttl: ${AURORA_STREAM_STAGE_TTL:PT1M}
      stage-max-entries: ${AURORA_STREAM_STAGE_MAX_ENTRIES:1024}
      retention: ${AURORA_STREAM_RETENTION:PT15M}
      max-length: ${AURORA_STREAM_MAX_LENGTH:1024}
  idempotency:
    ttl: ${IDEMPOTENCY_TTL:PT24H}
    max-response-bytes: ${IDEMPOTENCY_MAX_RESPONSE_BYTES:1048576}
    redis:
      enabled: ${REDIS_IDEMPOTENCY_ENABLED:false}
      namespace: ${REDIS_IDEMPOTENCY_NAMESPACE:inner-cosmos:idempotency:v1}
  runtime:
    role: ${INNER_COSMOS_RUNTIME_ROLE:all}
  events:
    outbox:
      enabled: ${JDBC_OUTBOX_ENABLED:false}
      poll-delay-ms: ${JDBC_OUTBOX_POLL_DELAY_MS:1000}
  session:
    redis:
      enabled: ${REDIS_SESSION_ENABLED:false}
  auth:
    oidc:
      enabled: ${OIDC_ENABLED:false}
      auto-provision: ${OIDC_AUTO_PROVISION:true}
      issuer-uri: ${OIDC_ISSUER_URI:}
      jwk-set-uri: ${OIDC_JWK_SET_URI:}
      audience: ${OIDC_AUDIENCE:}
      authorization-uri: ${OIDC_AUTHORIZATION_URI:}
      token-uri: ${OIDC_TOKEN_URI:}
      client-id: ${OIDC_MOBILE_CLIENT_ID:}
      redirect-uri: ${OIDC_MOBILE_REDIRECT_URI:}
      scopes: ${OIDC_MOBILE_SCOPES:openid,profile,email}
  security:
    csrf-enabled: ${CSRF_ENABLED:true}
    session-user-key: LOGIN_USER_ID
    cors-origins: ${CORS_ALLOWED_ORIGINS:}
    rate-limit:
      redis:
        enabled: ${REDIS_RATE_LIMIT_ENABLED:false}
        namespace: ${REDIS_RATE_LIMIT_NAMESPACE:inner-cosmos:rate-limit:v1}
      user:
        capacity: ${RATE_LIMIT_USER_CAPACITY:40}
        refill-per-minute: ${RATE_LIMIT_USER_REFILL_PER_MINUTE:40}
        advertised-limit: ${RATE_LIMIT_USER_ADVERTISED:240}
      anonymous:
        capacity: ${RATE_LIMIT_ANON_CAPACITY:20}
        refill-per-minute: ${RATE_LIMIT_ANON_REFILL_PER_MINUTE:20}
        advertised-limit: ${RATE_LIMIT_ANON_ADVERTISED:60}
      aurora:
        capacity: ${RATE_LIMIT_AURORA_CAPACITY:5}
        refill-per-minute: ${RATE_LIMIT_AURORA_REFILL_PER_MINUTE:5}
        advertised-limit: ${RATE_LIMIT_AURORA_ADVERTISED:120}
      login:
        capacity: ${RATE_LIMIT_LOGIN_CAPACITY:10}
        refill-per-minute: ${RATE_LIMIT_LOGIN_REFILL_PER_MINUTE:10}
        advertised-limit: ${RATE_LIMIT_LOGIN_ADVERTISED:10}
  demo:
    seed-enabled: ${SEED_ENABLED:false}
  scheduler:
    redis-lock:
      enabled: ${REDIS_SCHEDULER_LOCK_ENABLED:false}
      namespace: ${REDIS_SCHEDULER_LOCK_NAMESPACE:inner-cosmos-scheduler-v1}
  safety:
    semantic-recheck:
      enabled: ${SAFETY_SEMANTIC_RECHECK_ENABLED:true}

---
# 2026-07-24 8-agent audit (P1-7): CLAUDE.md documents `./mvnw spring-boot:run` (dev profile, H2 +
# Mock, no Redis) as the zero-config quick start, and its own verification guidance says to poll
# /actuator/health. Without this, that exact documented path reports DOWN (Spring Boot's Redis
# health indicator has no local Redis to reach) even though every dev-profile feature needing
# Redis already defaults its own *_ENABLED flag to false, so there is nothing real to report on.
# Scoped to the `dev` profile only (via this document's own activation guard) so profiles that do
# run real Redis (local-complete, prod, academy-eks) keep the real health signal unchanged.
# NOTE: src/main/resources/application-dev.yml is gitignored (a personal/local override file, not
# shipped to other checkouts) -- this fix belongs in the tracked file so it survives a fresh clone.
spring:
  config:
    activate:
      on-profile: dev
management:
  endpoint:
    health:
      group:
        readiness:
          # Disabling the redis contributor below removes it from existence, so it must also
          # drop out of this group's include list or Spring Boot fails startup validation
          # ("Included health contributor 'redis' in group 'readiness' does not exist").
          include: readinessState,db,custom
  health:
    redis:
      enabled: false
