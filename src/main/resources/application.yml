server:
  port: 8080

spring:
  application:
    name: inner-cosmos
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:innercosmos;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      encoding: UTF-8
  h2:
    console:
      enabled: true
      path: /h2-console
  jackson:
    default-property-inclusion: non_null

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

llm:
  mode: mock
  provider: mock
  api-key: ""
  base-url: ""
  model: mock-inner-cosmos

inner-cosmos:
  demo:
    seed-enabled: true
  security:
    session-user-key: LOGIN_USER_ID
