spring.config.activate.on-profile: commercial-sg

inner-cosmos:
  runtime:
    role: ${INNER_COSMOS_RUNTIME_ROLE:api}
  events:
    outbox:
      enabled: true
  infrastructure:
    profile: commercial-sg
    region: ap-southeast-1
    event-dispatcher: sqs-outbox
    database: rds-postgresql-pgvector
    redis: elasticache-tls-ha
    durable-storage-claim: production-target
    aws-workload-identity: required
    sqs-runtime: required
    product-semantics: complete
