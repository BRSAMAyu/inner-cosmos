# Inner Cosmos — Nginx Reverse Proxy Config
# Place in /etc/nginx/sites-available/inner-cosmos

upstream inner_cosmos_app {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    server_name yourdomain.com;  # Replace with your domain

    # Redirect all HTTP to HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://api.minimaxi.com https://open.bigmodel.cn https://api.xiaomimimo.com https://nominatim.openstreetmap.org https://api.open-meteo.com; font-src 'self';" always;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req zone=api_limit burst=50 nodelay;

    # Gzip compression
    gzip on;
    gzip_types application/json text/plain text/css application/javascript application/xml;
    gzip_min_length 1000;

    # Proxy to Spring Boot app
    location / {
        proxy_pass http://inner_cosmos_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        client_max_body_size 10M;
    }

    # Actuator endpoints — restricted to internal network
    location /actuator/ {
        allow 127.0.0.1;
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        proxy_pass http://inner_cosmos_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Static assets — long cache
    location /static/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        proxy_pass http://inner_cosmos_app;
    }

    # Logs
    access_log /var/log/nginx/inner-cosmos_access.log;
    error_log /var/log/nginx/inner-cosmos_error.log;
}