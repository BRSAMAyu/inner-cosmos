name: Java baseline

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  web-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.20.0'
      - name: Activate pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.9.0 --activate
      - name: Install frontend and isolated OpenAPI toolchain
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Gate generated OpenAPI types
        run: pnpm run api:check
      - name: Verify OpenAPI breaking-change rules
        run: pnpm run api:diff:test
      - name: Gate OpenAPI compatibility against the event base
        env:
          OPENAPI_BASE_REF: ${{ github.event.pull_request.base.sha || github.event.before || github.sha }}
        run: pnpm run api:diff
      - name: Type-check and build the React/PWA client
        run: pnpm run build
      - name: Run frontend component and protocol tests
        run: pnpm test

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Validate Maven wrapper
        run: ./mvnw -v
      - name: Clean verify
        run: ./mvnw -B clean verify
      - name: PostgreSQL pgvector contract and 100k retrieval gate
        run: ./mvnw -B -f poc/postgres-pgvector/pom.xml -Pbenchmark verify
      - name: Enforce executed test baseline
        shell: pwsh
        run: ./scripts/assert-test-baseline.ps1 -MinimumTests 931
      - name: Scan current tree for credentials
        shell: pwsh
        run: ./scripts/scan-secrets.ps1
      - name: Scan reachable branch history for credentials
        shell: pwsh
        run: ./scripts/scan-secrets.ps1 -History
      - name: Gate Academy workloads on the latest Flyway schema
        shell: pwsh
        run: ./scripts/academy/validate-schema-version.ps1
      - name: Gate High and Critical dependency vulnerabilities from SBOM
        run: >-
          docker run --rm
          -v "$PWD:/workspace:ro"
          aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e
          sbom --skip-version-check --severity HIGH,CRITICAL
          --exit-code 1
          /workspace/target/sbom/inner-cosmos-0.1.0.json
      - name: Gate High and Critical infrastructure misconfigurations
        run: >-
          docker run --rm
          -v "$PWD:/workspace:ro"
          aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e
          config --skip-version-check --severity HIGH,CRITICAL
          --skip-dirs /workspace/.git --skip-dirs /workspace/target
          --exit-code 1 /workspace
      - name: Build Java 21 non-root image
        run: docker build -t inner-cosmos:ci .
      - name: Production profile smoke with certificate-verified PostgreSQL and Flyway
        shell: pwsh
        run: ./scripts/verify-production-image.ps1 -Image inner-cosmos:ci
      - name: Verify local image signature and provenance round trip
        shell: pwsh
        run: ./scripts/verify-image-signature.ps1 -Image inner-cosmos:ci
      - name: Gate High and Critical image vulnerabilities
        run: >-
          docker run --rm
          -v /var/run/docker.sock:/var/run/docker.sock
          aquasec/trivy@sha256:be1190afcb28352bfddc4ddeb71470835d16462af68d310f9f4bca710961a41e
          image --skip-version-check --scanners vuln --severity HIGH,CRITICAL
          --exit-code 1 inner-cosmos:ci
      - name: Upload test and SBOM evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: java-baseline-evidence
          if-no-files-found: error
          path: |
            target/surefire-reports/
            target/sbom/
            target/spotbugsXml.xml
            poc/postgres-pgvector/target/surefire-reports/
            poc/postgres-pgvector/target/failsafe-reports/
