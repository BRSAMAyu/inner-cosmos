# Production-like compose. Required values must be supplied by a secret manager or
# an untracked environment file. The application guard independently rejects Mock,
# fallback, demo seeding, weak database TLS, and missing credentials.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inner-cosmos:latest
    container_name: inner-cosmos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:?set a MySQL URL using sslMode=VERIFY_IDENTITY or VERIFY_CA}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:?set DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
      LLM_MODE: prod
      LLM_PROVIDER: ${LLM_PROVIDER:?set a non-Mock provider}
      LLM_API_KEY: ${LLM_API_KEY:?set LLM_API_KEY through a secret manager}
      LLM_ALLOW_FALLBACK: "false"
      SEED_ENABLED: "false"
      COOKIE_SECURE: "true"
      CORS_ALLOWED_ORIGINS: ${CORS_ORIGINS:?set trusted HTTPS origins}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-logs:/var/log/inner-cosmos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  mysql:
    image: mysql:8.4
    container_name: inner-cosmos-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-inner_cosmos}
      MYSQL_USER: ${DB_USER:?set DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/backup:/backup
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: inner-cosmos-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    depends_on:
      - app

  grafana:
    image: grafana/grafana:11.3.0
    container_name: inner-cosmos-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  app-logs:
  prometheus-data:
  grafana-data:
