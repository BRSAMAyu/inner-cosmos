# Inner Cosmos — Docker Compose for Production
# Usage: docker-compose -f docker-compose.yml up -d

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inner-cosmos:latest
    container_name: inner-cosmos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DATABASE_URL=jdbc:mysql://db:3306/innercosmos
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=innercosmos
      - DB_USER=${DB_USER:-innercosmos}
      - DB_PASSWORD=${DB_PASSWORD}
      - LLM_MODE=prod
      - LLM_API_KEY=${LLM_API_KEY}
      - CORS_ALLOWED_ORIGINS=${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - app-logs:/var/log/inner-cosmos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  db:
    image: mysql:8.4
    container_name: inner-cosmos-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=innercosmos
      - MYSQL_USER=${DB_USER:-innercosmos}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - db-data:/var/lib/mysql
      - ./scripts/backup:/backup  # For automated backups
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: inner-cosmos-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - app

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:11.3.0
    container_name: inner-cosmos-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:?GRAFANA_PASSWORD must be set}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  db-data:
  app-logs:
  prometheus-data:
  grafana-data: