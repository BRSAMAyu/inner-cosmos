# Inner Cosmos — Docker Compose for Production
# Usage:
#   docker compose up -d                      # local-prod (defaults below; override for real prod)
#   DB_PASSWORD=... MYSQL_ROOT_PASSWORD=... docker compose up -d
# App connects to MySQL via SPRING_DATASOURCE_* env (read by application-prod.yml).

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: inner-cosmos:latest
    container_name: inner-cosmos-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      # 12-factor datasource (read by application-prod.yml). Defaults point at the
      # compose `mysql` service so `docker compose up` works with no extra env.
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/${DB_NAME:-inner_cosmos}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=${DB_USER:-innercosmos}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-innercosmos}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-inner_cosmos}
      - LLM_MODE=prod
      - LLM_API_KEY=${LLM_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ORIGINS:-}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - app-logs:/var/log/inner-cosmos
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  mysql:
    image: mysql:8.4
    container_name: inner-cosmos-mysql
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpass-change-me}
      - MYSQL_DATABASE=${DB_NAME:-inner_cosmos}
      - MYSQL_USER=${DB_USER:-innercosmos}
      - MYSQL_PASSWORD=${DB_PASSWORD:-innercosmos}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/backup:/backup  # For automated backups
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max-connections=200
      --innodb-buffer-pool-size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: inner-cosmos-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    depends_on:
      - app

  # Grafana for visualization (optional)
  grafana:
    image: grafana/grafana:11.3.0
    container_name: inner-cosmos-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin-change-me}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql-data:
  app-logs:
  prometheus-data:
  grafana-data: